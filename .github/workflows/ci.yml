name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python lint and offline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: bin/setup-python
      - name: Lint baseline
        run: scripts/lint-powerpacks
      - name: Offline unit tests
        run: scripts/test-powerpacks
