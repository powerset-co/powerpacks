name: gitleaks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan git history
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfL "${base}/${asset}" -o "/tmp/${asset}"
          curl -sSfL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
          (cd /tmp && grep " ${asset}$" gitleaks_checksums.txt | sha256sum -c -)
          tar -xzf "/tmp/${asset}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks git --config .gitleaks.toml --redact --no-banner --exit-code 1 .
