title = "Powerpacks gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Public Auth0 PKCE client ID in explicit Powerset-hosted env example"
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "line"
paths = [
  '''packs/powerset/templates/env\.powerset\.example''',
]
regexes = [
  '''POWERPACKS_AUTH0_CLIENT_ID=U7p09NWeJ0jy9M4GiaWa4cz0YVCdDVBl''',
]

[[allowlists]]
description = "Historical public Auth0 PKCE client ID defaults removed from code"
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "line"
paths = [
  '''packs/messages/primitives/powerset_auth/powerset_auth\.py''',
  '''packs/powerset/primitives/auth/auth\.py''',
]
regexes = [
  '''POWERPACKS_AUTH0_CLIENT_ID", "U7p09NWeJ0jy9M4GiaWa4cz0YVCdDVBl''',
]

[[allowlists]]
description = "Synthetic retired LinkedIn identifier pinned by deep-context migration tests"
targetRules = ["linkedin-client-secret"]
condition = "AND"
regexTarget = "line"
paths = [
  '''tests/test_deep_context_candidates\.py''',
]
regexes = [
  '''LEGACY\s*=\s*"message-linkedin:[a-f0-9]{16}"''',
]
