itives/query_postgres_profiles"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "refine_search_results", "pack": "search", "path": "packs/search/primitives/refine_search_results"}, {"entrypoint": "packs/search/primitives/resolve_companies/resolve_companies.py", "file_count": 2, "has_readme": true, "name": "resolve_companies", "pack": "search", "path": "packs/search/primitives/resolve_companies"}, {"entrypoint": "packs/search/primitives/resolve_education/resolve_education.py", "file_count": 2, "has_readme": true, "name": "resolve_education", "pack": "search", "path": "packs/search/primitives/resolve_education"}, {"entrypoint": "packs/search/primitives/resolve_investors/resolve_investors.py", "file_count": 2, "has_readme": true, "name": "resolve_investors", "pack": "search", "path": "packs/search/primitives/resolve_investors"}, {"entrypoint": "packs/search/primitives/resolve_set_operators/resolve_set_operators.py", "file_count": 2, "has_readme": true, "name": "resolve_set_operators", "pack": "search", "path": "packs/search/primitives/resolve_set_operators"}, {"entrypoint": "packs/search/primitives/search_network_pipeline/search_network_pipeline.py", "file_count": 2, "has_readme": true, "name": "search_network_pipeline", "pack": "search", "path": "packs/search/primitives/search_network_pipeline"}, {"entrypoint": "packs/search/primitives/task_state/task_state.py", "file_count": 2, "has_readme": true, "name": "task_state", "pack": "search", "path": "packs/search/primitives/task_state"}], "skills": [{"description": "Browse Powerset contacts through the Powerset Search MCP. Natural-language routing for my contacts vs set contacts, app-native search fields, app-native sorting, pagination, and field projection.", "display_name": "powerset:search-contacts", "heading": "Search Contacts", "markdown": "---\nname: search-contacts\ndescription: Browse Powerset contacts through the Powerset Search MCP. Natural-language routing for my contacts vs set contacts, app-native search fields, app-native sorting, pagination, and field projection.\n---\n\n# Search Contacts\n\nUse this skill when the user asks for `/search-contacts <request>`, \"show my\ncontacts\", \"show the most messaged contacts in my Powerset set\", or \"show my\ncontacts with emails, LinkedIn, and Twitter\".\n\nThis is a pure MCP representation of the existing Powerset app contacts views.\nDo **not** convert this into semantic people search. Do **not** call `search`,\n`count`, `query_results`, Sales Nav tools, or company-directory tools from this\nskill.\n\n## Tools\n\nCall the remote `powerset-search` MCP tools directly:\n\n- `list_contacts` \u2014 app-equivalent `GET /v2/contacts` for the authenticated\n  user's own contacts.\n- `list_sets` \u2014 enumerate accessible sets when the user names a set.\n- `list_set_contacts` \u2014 app-equivalent `GET /v2/set-contacts/{set_id}` for\n  contacts across a set.\n\nIf the MCP is missing, route the user through `$powerset login` / `mcp_install`\nrather than pretending to fetch contacts.\n\n## Routing\n\n### 1. Decide own contacts vs set contacts\n\nUse `list_contacts` unless the user explicitly names a set.\n\nSet language examples:\n\n- \"in my Powerset set\"\n- \"in the Powerset set\"\n- \"for the Powerset set\"\n- \"from the Founders set\"\n\nIf the user names a set:\n\n1. Call `list_sets`.\n2. Resolve the set name using this exact tie-breaker:\n   1. exact case-insensitive name match\n   2. prefer non-personal sets\n   3. prefer highest `member_count`\n   4. then personal sets\n   5. if still ambiguous, ask the user to choose\n3. Call `list_set_contacts` with that `set_id`.\n\nDo not invent set ids. Do not call local `resolve_set_operators` from this\nskill; the MCP set list is the source of truth for this UX.\n\n### 2. Parse app-native sort intent\n\nOnly use sort fields the contacts APIs expose.\n\nFor `list_contacts`:\n\n- \"most messaged\", \"most messages\", \"most interactions\" \u2192\n  `sort_field: \"total_messages\"`, `sort_dir: \"desc\"`\n  (`list_contacts` accepts `total_messages` as an alias for the app's\n  `total_interactions` sort field.)\n- \"least messaged\" \u2192 `sort_field: \"total_messages\"`, `sort_dir: \"asc\"`\n- \"by first name\", \"alphabetical\" \u2192 `sort_field: \"first_name\"`, `sort_dir: \"asc\"`\n- \"by last name\" \u2192 `sort_field: \"last_name\"`, `sort_dir: \"asc\"`\n- \"by headline/title\" \u2192 `sort_field: \"headline\"`, `sort_dir: \"asc\"`\n- \"by location\" \u2192 `sort_field: \"location_raw\"`, `sort_dir: \"asc\"`\n\nFor `list_set_contacts`:\n\n- allowed sort fields: `first_name`, `last_name`, `headline`, `total_messages`\n- default for set contacts: `sort_field: \"total_messages\"`, `sort_dir: \"desc\"`\n\nIf the user gives no sort preference:\n\n- own contacts: use tool defaults (`first_name asc`)\n- set contacts: use `total_messages desc`\n\n### 3. Parse app-native search filters\n\nOnly use the search syntax supported by the app contacts routes:\n\n- plain text \u2192 name search, e.g. `search: \"arthur chen\"`\n- `email:<text>` for email/domain filtering, e.g. `email:@powerset.co`\n- `phone:<digits>` for phone filtering, or `phone:` for contacts with phones\n- `headline:<text>` for title/headline filtering\n- `company:<text>` only when the user explicitly asks to filter contacts by a\n  company field in the contacts view\n\nNo Twitter search exists in the app search syntax today. If the user asks to\n\"show twitter\", treat Twitter as an output field, not a search filter.\n\nDo not interpret phrases like \"AI engineers\" semantically. If the user clearly\nasks for a headline/title filter, use `headline:engineer`; otherwise ask a\nclarifying question.\n\n### 4. Parse output fields\n\nIf the user does not specify fields, show the default useful columns:\n\n- name/display_name\n- headline/title\n- location\n- total_messages or interaction_level\n- LinkedIn when available\n\nIf the user asks for fields, pass `include_fields` only to `list_contacts`.\n`list_set_contacts` returns the app's set-contact lead shape; project fields in\nthe final answer rather than passing `include_fields`.\n\nField aliases for own contacts:\n\n- \"name\" \u2192 `display_name`, `first_name`, `last_name`\n- \"email\" / \"emails\" \u2192 `emails`\n- \"linkedin\" \u2192 `confirmed_linkedin_url`, `public_profile_url`, `public_identifier`\n- \"twitter\" / \"x\" \u2192 `x_twitter_handle`\n- \"phone\" \u2192 `phone_number`\n- \"messages\" / \"interactions\" \u2192 `total_messages`\n- \"headline\" / \"title\" \u2192 `headline`\n- \"location\" \u2192 `location_raw`\n\nAlways include enough identity fields to make the output readable even when the\nuser requests only contact fields. For example, \"show emails and LinkedIn\" still\nneeds `display_name` or `first_name`/`last_name`.\n\n### 5. Pagination\n\nDefault to page 0 and page size 50 unless the user asks otherwise. Present the\nfirst 20-50 rows as a compact markdown table. If `has_more` / `hasMore` is true,\ntell the user how to ask for the next page.\n\nDo not auto-page through all contacts unless the user explicitly asks to export\nor retrieve all pages.\n\n## Examples\n\n### My contacts, most messaged, selected fields\n\nUser:\n\n```text\n/search-contacts show me my contacts ordered by most messages and show emails, twitter, and linkedin\n```\n\nTool:\n\n```text\nlist_contacts(\n  sort_field=\"total_messages\",\n  sort_dir=\"desc\",\n  page=0,\n  page_size=50,\n  include_fields=[\n    \"display_name\", \"first_name\", \"last_name\", \"emails\",\n    \"confirmed_linkedin_url\", \"public_profile_url\", \"public_identifier\",\n    \"x_twitter_handle\", \"total_messages\"\n  ]\n)\n```\n\n### Set contacts, most messaged\n\nUser:\n\n```text\n/search-contacts show me the most messaged contacts in my Powerset set\n```\n\nTools:\n\n```text\nlist_sets()\n# resolve \"Powerset\" with exact \u2192 non-personal \u2192 most members \u2192 personal \u2192 ask\nlist_set_contacts(set_id=\"...\", sort_field=\"total_messages\", sort_dir=\"desc\", page=0, page_size=50)\n```\n\n### Email domain filter\n\nUser:\n\n```text\n/search-contacts show my contacts with @powerset.co emails\n```\n\nTool:\n\n```text\nlist_contacts(search=\"email:@powerset.co\", page=0, page_size=50)\n```\n", "mcp_count": 3, "mcp_refs": ["list_contacts", "list_set_contacts", "list_sets"], "name": "search-contacts", "pack": "contacts", "path": "packs/contacts/skills/search-contacts/SKILL.md", "primitive_count": 1, "primitive_refs": ["mcp_install"]}, {"description": "One-command guided contact import workflow. Orchestrates iMessage, WhatsApp, merge, Powerset matching, research, review, retarget feedback, and upload gates.", "display_name": "powerset:import-contacts", "heading": "Import Contacts", "markdown": "---\nname: import-contacts\ndescription: One-command guided contact import workflow. Orchestrates iMessage, WhatsApp, merge, Powerset matching, research, review, retarget feedback, and upload gates.\n---\n\n# Import Contacts\n\nUse this skill for `$import-contacts` or any request to import iMessage /\nWhatsApp contacts into the Powerset messages research workflow.\n\n## Rule\n\n`$import-contacts` starts with a fresh run:\n\n```bash\nuv run --project . python packs/messages/primitives/import_contacts_pipeline/import_contacts_pipeline.py run\n```\n\nAfter that, only use:\n\n```bash\nuv run --project . python packs/messages/primitives/import_contacts_pipeline/import_contacts_pipeline.py continue\nuv run --project . python packs/messages/primitives/import_contacts_pipeline/import_contacts_pipeline.py approve\n```\n\nDo not ask the user to choose flags. Do not walk them through primitive\ncommands. Use primitives directly only for narrow debugging after the\norchestrator reports a concrete failure.\n\n## Fresh Slate\n\n`run` starts a new import and archives stale run-owned files first:\n\n- active ledger\n- merged contacts CSV\n- channel exports and manifests\n- Powerset candidate cache\n- research queue\n- review CSV\n- retarget queue and ledger\n\nIt keeps expensive files:\n\n- WhatsApp message-count cache for unchanged live chats\n- deep research files, especially\n`.powerpacks/messages/research/<handle>/01_research_parallel.json` and\n`03_network_review.json`\n\nSo fresh runs rescan live WhatsApp but do not recount unchanged chats, and\nalready-researched handles are reused.\nWhen a prior review CSV is archived, the regenerated review carries forward\nexplicit human decisions (`exclude`, `enrich_decision`) and `retarget_hint`\nvalues for matching handles/phones.\n\n`continue` resumes the active run and does not clear anything.\n\n## Consent\n\nAsk once before starting:\n\n> This imports local message/contact metadata only. It never reads message\n> bodies. It may read iMessage metadata, local Contacts names, sync WhatsApp,\n> ask for a WhatsApp QR scan, match against your Powerset contacts, run paid\n> research after approval, and ask again before upload. Continue?\n\nAfter consent, do not ask again for local extraction, normalization, merge,\nPowerset login, candidate sync, or matching. Stop only for:\n\n- macOS Full Disk Access / Contacts permission\n- Docker/WhatsApp QR action\n- LLM cost approval when estimate is at least `$10.00`\n- Parallel.ai research approval\n- final upload approval\n\nNever upload automatically.\n\n## Execution\n\nUse a worker sub-agent for the long-running orchestrator loop when available.\nAfter consent, the main-chat handoff line should be exactly:\n\n`Starting work through sub-agent.`\n\nThe main chat should show only:\n\n- QR / permission actions\n- spend prompts, with cost only\n- upload prompts, with upload count only\n- final result, exactly `Uploaded X contacts`\n\nDo not stream primitive JSON, terminal transcripts, progress logs, local file\npaths, row counts, matched/unmatched counts, or implementation details unless a\nfailure needs diagnosis or the user asks.\n\nFor WhatsApp, use plain user-facing status:\n\n- `We're syncing WhatsApp.`\n- `WhatsApp is taking a bit longer.`\n- `WhatsApp needs a QR scan.`\n- `WhatsApp sync finished.`\n\n## Loop\n\n1. Run `run`.\n2. If blocked on a user action, tell the user the action, then run `continue`.\n3. If blocked on spend/upload approval, ask the exact approval question. If the\n   user approves, run `approve`, then `continue`.\n4. If review opens, tell the user:\n   `Review opened. When done, say: done with review, upload`\n5. On review completion, run `continue`. Retarget feedback is automatic:\n   edited `retarget_hint` rows are queued, researched after approval, merged\n   back into the review CSV, then upload approval is requested.\n\n## Output\n\nBe terse.\n\n- Spend: `Estimated deep research cost: $X, completion time is about Y. Approve?`\n- Review: `Review opened. When done, say: done with review, upload`\n- Upload: `Upload reviewed contacts? uploading X.`\n- Done: `Uploaded X contacts`\n", "mcp_count": 0, "mcp_refs": [], "name": "import-contacts", "pack": "messages", "path": "packs/messages/skills/import-contacts/SKILL.md", "primitive_count": 1, "primitive_refs": ["import_contacts_pipeline"]}, {"description": "Unified Powerset command surface. Use for `$powerset login`, `$powerset status`, `$powerset whoami`, `$powerset sets list`, `$powerset sets use <id|name>`, `$powerset mcp install`, `$powerset env pull`, and `$powerset help`.", "display_name": "powerset:powerset", "heading": "Powerset", "markdown": "---\nname: powerset\ndescription: Unified Powerset command surface. Use for `$powerset login`, `$powerset status`, `$powerset whoami`, `$powerset sets list`, `$powerset sets use <id|name>`, `$powerset mcp install`, `$powerset env pull`, and `$powerset help`.\n---\n\n# Powerset\n\nUse this skill when the user asks for `$powerset ...` or wants Powerset setup,\nstatus, identity, MCP registration, runtime env provisioning, or default set\nselection.\n\n## Command routing\n\n| User command | Do this |\n| --- | --- |\n| `$powerset`, `$powerset help` | Print the supported subcommands below. |\n| `$powerset login` | Run the login workflow below. |\n| `$powerset status` | Run the setup check quietly and summarize only blockers. |\n| `$powerset whoami` | Run the Auth0 `whoami` primitive. |\n| `$powerset sets`, `$powerset sets list` | List sets via the Powerset Search MCP. |\n| `$powerset sets use <id|name>` | Resolve a set via MCP and write `POWERPACKS_DEFAULT_SET_ID` to local `.env`. |\n| `$powerset mcp install` | Register/refresh the `powerset-search` MCP for local hosts. |\n| `$powerset env pull [--profile <profile>]` | Pull allowlisted runtime keys into `.env`. The explicit command is consent to write `.env`. Default `search-core` is the standard setup. |\n\nAliases remain valid for backcompat: `$powerset-login` means `$powerset login`;\n`$powerset-set` means `$powerset sets` / `$powerset sets use`.\n\n## Help text\n\nWhen asked for help, respond with:\n\n```text\n$powerset login                 log in and provision local Powerpacks config\n$powerset status                check local setup\n$powerset whoami                show current Powerset/Auth0 identity\n$powerset sets list             list visible Powerset sets\n$powerset sets use <id|name>    set local default set in .env\n$powerset mcp install           install/refresh powerset-search MCP\n$powerset env pull              pull profile keys into .env\n$powerset help                  show this help\n```\n\n## Path setup\n\nResolve primitive paths from the current environment:\n\n- From the Powerpacks repo root, use `packs/powerset/primitives/...`.\n- From an installed skill bundle, use `powerpacks/packs/powerset/primitives/...`.\n- If a path does not exist, locate it with `rg --files -g 'doctor.py' -g\n  'auth.py' -g 'provision_runtime_env.py' -g 'mcp_install.py'`.\n\nPrefer `python3` if `python` is not on PATH.\n\n## `$powerset login`\n\nUser-facing output must be terse:\n\n- Start with exactly: `Updating your credentials...`\n- Do not narrate setup checks, missing check names, token formats, MCP config\n  details, or successful substeps.\n- If a browser/code login is needed, show only the auth URL/code prompt.\n- On success, say exactly:\n  `Credentials updated. Please restart Codex to reload the Powerset MCP token.`\n- If everything was already valid, say:\n  `Credentials are already up to date. Restart Codex if the Powerset MCP still fails.`\n- For unresolved human-action blockers, give one short sentence with the action\n  required. Do not paste raw reports.\n\nRun one internal setup check:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env \\\n  --gcp-project powerset-search\n```\n\nThis check intentionally does **not** check gcloud application-default\ncredentials. ADC is not needed for normal Powerpacks workflows.\n\nIf `overall == \"ok\"`, use the already-valid success sentence above and stop.\nOtherwise handle `fix_kind` values internally:\n\n- `auto`: run the primitive directly from this shell.\n- `interactive`: run the CLI directly from this shell. For browser/code flows,\n  keep prompts visible to the user.\n- `shell_install`: ask before running any OS-level install command.\n- `human_action`: tell the user what maintainer/Slack action is required.\n\nCommon direct fixes:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/auth/auth.py login\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/provision_runtime_env/provision_runtime_env.py pull \\\n  --profile search-core --env-file .env --confirm --best-effort\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nDo not run nested fix commands in the normal login flow; they can hide\ninteractive work inside a subprocess. Run the direct primitives above instead.\nNever print secret values.\n\nThe setup check only probes per-user Secret Manager access when `.env` is incomplete\n(or when `--check-user-secrets` is used for refresh debugging). If `.env` already\nhas the requested profile keys, expired gcloud Secret Manager auth is not a\nlogin blocker and should not be surfaced.\n\nIf the setup check reports `user_secrets` with `fix_kind: interactive` or a message\nlike `gcloud credentials need reauthentication`, this is not a Slack/IAM issue:\nthe selected `@powerset.co` account is fine, but gcloud's cached token expired.\nFor explicit `$powerset login` or `$powerset env pull` requests, immediately run\n`gcloud auth login --no-launch-browser`, relay the verification URL/code prompt,\nand ask them to paste the code. Do not stop for a separate yes/no confirmation.\n\nRe-run the setup check at the end and use one of the terse final messages above.\nIf `user_secrets` is still\na human-action blocker, tell the user to ping `#powerpacks` with their\n`@powerset.co` email so a maintainer can provision per-user secrets.\n\n## `$powerset status`\n\nRun the setup check read-only with the requested or default profile:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env \\\n  --gcp-project powerset-search\n```\n\nSummarize only `Ready` or the concise blocker/action. Do not mention the checker,\nraw counts, ADC, or individual passed checks unless the user explicitly asks for\ndebugging detail.\n\n## `$powerset whoami`\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/auth/auth.py whoami\n```\n\nReport the email and authorization/role. Do not print raw tokens.\n\n## `$powerset mcp install`\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nIf the user asks only to inspect MCP state, run:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\n## `$powerset env pull`\n\nDefault profile is `search-core` unless the user specifies another profile.\nIt pulls the standard Powerpacks runtime secrets into `.env` on a best-effort\nbasis. The explicit `$powerset env pull` request is consent to write `.env`;\ndo not ask for separate confirmation. Run:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/provision_runtime_env/provision_runtime_env.py pull \\\n  --profile search-core \\\n  --env-file .env \\\n  --confirm \\\n  --best-effort\n```\n\nIf this reports expired gcloud credentials or the setup check reports\n`user_secrets` with `fix_kind: interactive`, immediately run:\n\n```bash\ngcloud auth login --no-launch-browser\n```\n\nRelay the URL/code prompt tersely, then rerun the env pull command.\n\n## `$powerset sets list` / `$powerset sets use <id|name>`\n\nUse the Powerset Search MCP for set retrieval and name resolution. Do not use\nlocal SQL for normal set listing.\n\nFor `sets list`, call the MCP `list_sets` tool and show concise rows with name,\nset ID, role, and counts.\n\nFor `sets use <id|name>`:\n\n1. Call MCP `list_sets`.\n2. Resolve the user's value against set IDs and names.\n3. Upsert exactly one local `.env` line:\n\n```dotenv\nPOWERPACKS_DEFAULT_SET_ID=<set_id>\n```\n\nIf `POWERPACKS_DEFAULT_SET_ID=` already exists, replace that line; otherwise\nappend it. Do not append duplicates. If only legacy `POWERSET_DEFAULT_SET_ID`\nexists, leave it alone and add the preferred `POWERPACKS_DEFAULT_SET_ID` line.\n\nAfter setting, report the selected set name, `set_id`, `person_count`,\n`member_count`, and `sales_nav_account_count` when available.\n", "mcp_count": 1, "mcp_refs": ["list_sets"], "name": "powerset", "pack": "powerset", "path": "packs/powerset/skills/powerset/SKILL.md", "primitive_count": 4, "primitive_refs": ["auth", "doctor", "mcp_install", "provision_runtime_env"]}, {"description": "One-command Powerset login flow. Quietly refreshes credentials, env, and MCP registration, and only stops for OS installs, visible auth codes, or human actions.", "display_name": "powerset:powerset-login", "heading": "Powerset Login", "markdown": "---\nname: powerset-login\ndescription: One-command Powerset login flow. Quietly refreshes credentials, env, and MCP registration, and only stops for OS installs, visible auth codes, or human actions.\n---\n\n# Powerset Login\n\nUse this skill when the user asks for `$powerset login`, `$powerset-login`,\nsecret provisioning, runtime setup, API key bootstrap, or \"log me in to\nPowerset\". Also the right skill when an unrelated Powerpacks command failed\nbecause of a missing key or expired session.\n\n**This skill is built to be fast and quiet.** The user said \"log me in\" \u2014 do\nthat. Don't ask permission for every step. Use setup-check classifications to\ndecide what needs asking, but run fixes yourself from the current\ninvocation/shell so prompts, URLs, and failures are visible.\n\nUser-facing output must be terse:\n\n- Start with exactly: `Updating your credentials...`\n- Do not narrate setup checks, missing check names, token formats, MCP config\n  details, or successful substeps.\n- If a browser/code login is needed, show only the auth URL/code prompt.\n- On success, say exactly:\n  `Credentials updated. Please restart Codex to reload the Powerset MCP token.`\n- If everything was already valid, say:\n  `Credentials are already up to date. Restart Codex if the Powerset MCP still fails.`\n- For unresolved human-action blockers, give one short sentence with the action\n  required. Do not paste raw reports.\n\n## Core rule\n\nUse the read-only setup checker for diagnosis. In the normal skill flow, do not\nrun nested fix commands; they can hide interactive work inside a subprocess and\nswallow browser/code prompts. Let the skill self-heal by running the relevant\nprimitive or CLI command directly.\n\nOnly use install commands when something is actually missing. Do not reinstall\nPowerpacks adapters, MCP config, `gcloud`, or credentials when the setup check says\nthe check is already `ok`.\n\n## Path setup\n\nResolve primitive paths from the current environment:\n\n- From the Powerpacks repo root, use `packs/powerset/primitives/...`.\n- From an installed skill bundle, use `powerpacks/packs/powerset/primitives/...`.\n- If the example command path does not exist, locate it with `rg --files -g\n  'doctor.py' -g 'auth.py' -g 'provision_runtime_env.py' -g 'mcp_install.py'`.\n\nPrefer `python3` if `python` is not on PATH.\n\n## Happy path\n\nRun one internal read-only setup check:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env \\\n  --gcp-project powerset-search\n```\n\nIf `overall == \"ok\"`, use the already-valid success sentence above and stop.\nThe setup check does not check gcloud application-default credentials by default;\nADC is not needed for normal Powerpacks workflows.\n\n## How to handle the setup report\n\nThe setup check returns one JSON object. The fields you care about are `checks`,\n`by_fix_kind`, and `next_actions`. Each missing/fail check has a `fix_kind`:\n\n| `fix_kind` | What to do | Ask the user? |\n| --- | --- | --- |\n| `auto` | Run the specific primitive directly from this shell. | **no** |\n| `interactive` | Run the CLI directly from this shell. For `gcloud`, use `--no-launch-browser`, echo the login URL, ask for the code, and write it to stdin. | **no**, except asking for the auth code |\n| `shell_install` | OS-level install (`brew install`, etc.). | **yes**, with the exact command shown |\n| `human_action` | Cannot be fixed by the skill (Slack ping, IAM grant from a maintainer). | tell the user, don't loop |\n\n## Workflow\n\n### Step 1 \u2014 Install/bootstrap only when missing\n\nIf `gcloud_installed` is missing, ask before running the exact OS install\ncommand from the setup report (`brew install --cask google-cloud-sdk` on macOS).\n\nIf the Powerpacks skill bundle or host adapter is missing and you are in the\nPowerpacks repo, run the repo installer for the current host instead of trying\nto repair it through a nested fix command:\n\n```bash\n./install.sh codex\n./install.sh claude-code\n```\n\nPick the host the user is currently using. If both hosts need repair, run both.\nBecause this writes outside the repo, request escalation if the sandbox\nrequires it.\n\n### Step 2 \u2014 Login directly from this shell\n\nIf `auth0_login` is missing or expired, run:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/auth/auth.py login\n```\n\nIf `gcloud_account` is missing, run:\n\n```bash\ngcloud auth login --no-launch-browser\n```\n\nRelay the full `https://accounts.google.com/...` URL from stdout to the user.\nWhen `gcloud` asks for the verification code, ask the user for it and write it\nto the running command's stdin. If `gcloud` cannot read or write\n`~/.config/gcloud`, request escalation for `gcloud auth ...`.\n\nIf `gcloud_account` is a non-`@powerset.co` account, do not guess. Tell the\nuser to log in as a Powerset account or run:\n\n```bash\ngcloud config set account you@powerset.co\n```\n\nDo not check or configure gcloud application-default credentials during the\nnormal login flow. Only run `gcloud auth application-default login\n--no-launch-browser` if the user explicitly asks for SDK/client ADC debugging.\n\n### Step 3 \u2014 Pull secrets and register MCP directly\n\nIf `env_file` is missing keys and `user_secrets` is accessible, run:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/provision_runtime_env/provision_runtime_env.py pull \\\n  --profile search-core \\\n  --env-file .env \\\n  --confirm \\\n  --best-effort\n```\n\nIf `mcp_powerset_search` is missing but a host CLI exists, run:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nIf `mcp_powerset_search` says no MCP host CLI is on PATH, that is an install\ngap: use `./install.sh codex` or `./install.sh claude-code` only for the host\nthe user is using, or tell the user which host CLI is missing.\n\n### Step 4 \u2014 Human-action blockers\n\n**`human_action`** entries:\n\n- `auth0_role` warn \u2192 \"You're logged in but haven't been granted a Powerpacks\n  role on Auth0. Ping #powerpacks on Slack with your @powerset.co email and\n  ask to be added to the Powerpacks role.\"\n- `user_secrets` `not_provisioned` / `not_privileged` \u2192 \"You're set up\n  locally but don't have GCP per-user secrets yet. Ping #powerpacks on\n  Slack with your @powerset.co email \u2014 a maintainer will run\n  `provision_user_secrets apply --users <you>` and you can re-run\n  `$powerset login`.\"\n\nThese are not blockers for unrelated workflows unless that workflow needs the\nmissing shared infra key.\n\n### Step 5 \u2014 Final state\n\nRe-run the setup check and report a terse final message:\n\n- `overall: ok` \u2192 \"Credentials updated. Please restart Codex to reload the\n  Powerset MCP token.\"\n- `overall: warn` \u2192 same, but mention the remaining warning in one short phrase.\n- `overall: needs_setup` \u2192 list the still-blocked items and what the user\n  needs to do.\n\n## Hard rules\n\n- **Never print secret values.** Every primitive redacts.\n- **Never run an OS install command without explicit user approval.** That's\n  the `shell_install` line.\n- **Never write `.env` without `--confirm`.** All primitive paths refuse\n  without it.\n- The `@powerset.co` check is a UX guardrail; real authorization is enforced\n  by GCP IAM on Secret Manager resources.\n- Per-user secret IDs follow `powerpacks-users-<slug>-<capability>`. The\n  active `gcloud` account decides scope.\n\n## Profiles\n\n| Profile | Includes | When to pick |\n| --- | --- | --- |\n| `search-core` | Standard Powerpacks runtime secrets | default setup for search plus messages review/research |\n| `messages` | OpenRouter + Parallel | `import-contacts` LLM/research extras |\n| `sales-nav` | RapidAPI LinkedIn | LinkedIn enrichment |\n| `twitter` | RapidAPI Twitter | Twitter pipelines |\n| `supabase-admin` | Supabase URL + service role | admin only |\n| `all` | every allowlisted key | one-shot full setup |\n\nPass `--profile <name>` to the setup check and to the direct provisioning\nprimitive.\n\n## Maintainer-only: provisioning a new user\n\nIf a user shows up in `#powerpacks` with `user_secrets: not_provisioned`, a\nmaintainer (anyone with `roles/owner` on `powerset-search`) runs:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/provision_user_secrets/provision_user_secrets.py plan \\\n  --users newperson@powerset.co \\\n  --project powerset-search --with-diff\n\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/provision_user_secrets/provision_user_secrets.py apply \\\n  --users newperson@powerset.co \\\n  --project powerset-search --confirm\n```\n\nIdempotent. Re-running on an existing user reconciles missing IAM bindings\nor refreshes secret versions when the source value changed.\n", "mcp_count": 0, "mcp_refs": [], "name": "powerset-login", "pack": "powerset", "path": "packs/powerset/skills/powerset-login/SKILL.md", "primitive_count": 5, "primitive_refs": ["auth", "doctor", "mcp_install", "provision_runtime_env", "provision_user_secrets"]}, {"description": "List accessible Powerset sets, show the active default set, or set POWERPACKS_DEFAULT_SET_ID so local Powerpacks search primitives inherit the desired set scope.", "display_name": "powerset:powerset-set", "heading": "Powerset Set", "markdown": "---\nname: powerset-set\ndescription: List accessible Powerset sets, show the active default set, or set POWERPACKS_DEFAULT_SET_ID so local Powerpacks search primitives inherit the desired set scope.\n---\n\n# Powerset Set\n\nUse this skill when the user wants to choose, inspect, retrieve, list, switch,\nor set the active Powerset set for local Powerpacks search.\n\nThe skill uses the Powerset Search MCP for set retrieval and name resolution.\nIt only manages local set scope:\n\n- lists sets accessible to the logged-in Powerset user\n- shows the resolved default set and operator IDs\n- writes `POWERPACKS_DEFAULT_SET_ID` into the local ignored `.env`\n- does not upload contacts, run searches, or mutate server-side set membership\n\n## Workflow\n\n1. Ensure Powerset login exists. If credentials are missing, route the user to\n   `$powerset login`.\n2. Confirm the Powerset Search MCP is installed when needed:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\n3. List sets by calling the Powerset Search MCP `list_sets` tool directly.\n   Do not use local SQL or `set_scope.py` for normal set retrieval.\n\n4. Show the current default by reading `POWERPACKS_DEFAULT_SET_ID` from the\n   local `.env`, then matching that ID against the MCP `list_sets` result.\n   If `POWERPACKS_DEFAULT_SET_ID` is unset, check legacy\n   `POWERSET_DEFAULT_SET_ID`.\n\n5. Set the default by ID or name:\n\n- call MCP `list_sets`\n- resolve the user's `<name>` or `<set_id>` against the returned sets\n- upsert only this local `.env` line. If `POWERPACKS_DEFAULT_SET_ID=` already\n  exists, replace that line; otherwise append it. Do not append duplicates.\n\n```dotenv\nPOWERPACKS_DEFAULT_SET_ID=<set_id>\n```\n\n6. After setting, report the selected set name, `set_id`, `person_count`,\n   `member_count`, and `sales_nav_account_count` from MCP. Only run\n   `resolve_set_operators` if the user specifically asks to validate local\n   TurboPuffer operator scoping.\n\n## Notes\n\n- `set_id` is a Powerset set UUID.\n- Local search primitives resolve it to `operator_ids` before applying\n  TurboPuffer `allowed_operator_ids`.\n- `POWERPACKS_DEFAULT_SET_ID` is preferred. `POWERSET_DEFAULT_SET_ID` is still\n  accepted as a legacy alias by search primitives.\n- The remote MCP owns set listing. The local repo owns only the default choice\n  stored in `.env`.\n", "mcp_count": 1, "mcp_refs": ["list_sets"], "name": "powerset-set", "pack": "powerset", "path": "packs/powerset/skills/powerset-set/SKILL.md", "primitive_count": 2, "primitive_refs": ["mcp_install", "resolve_set_operators"]}, {"description": "Run a Sales Navigator search through the Powerset Search MCP. Resolves company / title filters to LinkedIn IDs, runs a paginated lead search with server-side artifact persistence on by default, and offers paginated retrieval via get_artifact.", "display_name": "powerset:sales-nav-search", "heading": "Sales Nav Search", "markdown": "---\nname: sales-nav-search\ndescription: Run a Sales Navigator search through the Powerset Search MCP. Resolves company / title filters to LinkedIn IDs, runs a paginated lead search with server-side artifact persistence on by default, and offers paginated retrieval via get_artifact.\n---\n\n# Sales Nav Search\n\nUse this skill when the user asks for `/sales-nav-search <query>`,\n\"find LinkedIn leads at <company>\", \"show me sales nav results for <title>\",\nor any other Sales Navigator search request scoped to the user's set.\n\nThe skill is in its own pack (`packs/sales-nav`) but **depends on\n`packs/powerset`** for Auth0 login and MCP install. If those aren't ready,\nroute the user to `$powerset login` first.\n\nIt calls three MCP tools served by the remote `powerset-search` MCP at\n`https://search-api-7wk4uhe77q-uw.a.run.app/mcp`:\n\n- `sales_nav_resolve` \u2014 turn company names + titles into LinkedIn\n  `company_ids` / canonical title strings\n- `sales_nav_search` \u2014 paginated lead search scoped to the user's set;\n  with `conversation_id` + `persist_artifact: true` the server writes a\n  Supabase artifact row and returns an `artifact_id`\n- `get_artifact` \u2014 paginated retrieval of a persisted artifact\n\nThe skill itself does not call HTTP \u2014 Claude Code / Codex invoke the MCP\ntools directly once `mcp_install` (in `packs/powerset`) has registered the\nserver.\n\n## Hard rules\n\n- This skill **requires** the `powerset-search` MCP. If it is not\n  registered, route the user through `$powerset login` \u2192\n  `mcp_install install --host all`.\n- Every Sales Nav call is **scoped to a `set_id`**. The MCP server enforces\n  the set context. Pass the one the user specifies. If the user does not\n  specify one, resolve the default with\n  `packs/search/primitives/resolve_set_operators/resolve_set_operators.py`\n  so it can inherit `POWERPACKS_DEFAULT_SET_ID` / `POWERSET_DEFAULT_SET_ID`, or\n  fall back to the logged-in operator's active personal set. Do not invent or\n  guess `set_id`s.\n- **Default to `persist_artifact: true` on every `sales_nav_search` call.**\n  Persistence is cheap and lets the user (or the agent in a later turn) page\n  large result sets via `get_artifact`. Only pass `persist_artifact: false`\n  when the user explicitly asks for an ephemeral search.\n- Persistence requires a `conversation_id`. See the conversation_id playbook\n  below \u2014 without one, persistence is silently skipped server-side and you\n  only get the inline `leads` list back.\n- Lead profiles can include LinkedIn URLs and contact metadata. Treat them\n  as sensitive: keep them in local `.powerpacks/` handoff files and present only\n  compact summaries in chat unless the user asks for details.\n- Do not pass accumulated lead/mutual payloads through chat or command args.\n  Save each MCP page response to a small JSON file, then run\n  `sales_nav_artifacts ingest-page --response <path>` so later steps pass only\n  paths/state.\n- For clear, unambiguous searches, do not ask approval/clarifying questions.\n  Resolve filters, search, ingest full artifact content, enrich the visible leads,\n  ingest enriched full artifact content, export CSVs, and present a compact\n  summary. Ask only when a filter is genuinely ambiguous (for example multiple\n  plausible \"Cisco\" companies) or when the user asks to page/enrich far beyond\n  the visible result set.\n- Do not auto-page beyond what the user requested. `sales_nav_search`\n  returns `has_more` and `next_start_offset`; surface them, don't loop.\n\n## Prereqs\n\nRun this once. It starts Auth0 login if credentials are missing or expired,\nthen installs the MCP into the chosen host:\n\n```bash\n./install-powerset-mcp.sh --host all\n```\n\nIf on Codex, rerun MCP install when the Auth0 token needs to be refreshed.\nThe installer writes a fresh `Authorization` header into `~/.codex/config.toml`:\n\n```bash\n./install-powerset-mcp.sh --host codex\n```\n\n## conversation_id playbook\n\n`conversation_id` is a Supabase `conversations.id`. The MCP server uses it\nto scope artifact reads/writes to a specific conversation. Three ways to\nget one:\n\n1. **From search.powerset.dev** \u2014 copy the conversation id from the URL\n   when the user has an open chat.\n2. **REST API** \u2014 `POST /v2/conversations` with the user's bearer token\n   returns `{ \"id\": \"...\" }`.\n3. **Per-skill ephemeral session** \u2014 generate a UUID4 the first time you\n   need one in the current skill invocation and reuse it for follow-ups\n   in the same turn. The artifact rows still persist in Supabase keyed by\n   that id; they just won't be linked to a webapp conversation.\n\nAlways pass the same `conversation_id` to subsequent `sales_nav_search`\ncalls and the matching `get_artifact` call.\n\n## Fast path runner\n\nPrefer the resumable Sales Nav orchestrator for normal runs:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_pipeline/sales_nav_pipeline.py run \\\n  --query \"<user query>\" \\\n  --set-id \"<set_id>\" \\\n  --search-args-json .powerpacks/sales-nav/<run>/search_args.json\n```\n\nThe runner owns local state and exits with `status: blocked_tool_call` whenever\nthe harness should call a `powerset-search` MCP tool. The block includes the\n`tool_name`, `tool_args`, `save_response_to`, and `continue_command`. The\nharness/agent should call the MCP tool natively, write the JSON response to the\nspecified path, then run the continue command. Local ingest, export, scoring\napprovals, and the ledger are handled by the runner.\n\nFor follow-up qualitative scoring, pass `--criteria`; the runner blocks for\n`approve llm --confirm` before calling `score_sales_nav_leads`.\n\n## Local file handoff\n\nUse `packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py` as\nthe durable local store for each skill invocation. It normalizes MCP page output\ninto these files:\n\n- `leads.jsonl` \u2014 internal handoff, one row per lead with `member_id`,\n  `profile_id`, `source_account_ids`, `operators`, `mutual_member_ids`,\n  `linkedin_url`, title/company/location, enriched profile fields (`summary`,\n  `experiences`, `education`, `enriched`) when available, artifact/source\n  metadata, and seen counts.\n- `mutuals.jsonl` \u2014 internal handoff, one row per lead\u2194mutual edge with\n  `lead_member_id`, `mutual_member_id`, mutual LinkedIn URL if resolved,\n  operator/source metadata, and artifact/source metadata.\n- `member_urls.json` \u2014 `member_id -> LinkedIn URL` results from\n  `sales_nav_resolve_member_ids`.\n- `manifest.json` / `state.json` \u2014 paths, counts, artifact ids, pages.\n- `exports/leads.csv` and `exports/mutuals.csv` \u2014 final user-facing CSVs written\n  only when you run `export`.\n\nInitialize once per search:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py init \\\n  --query \"<user query>\" \\\n  --set-id \"<set_id>\" \\\n  --conversation-id \"<conversation_id>\"\n```\n\nDo not ingest compact MCP preview rows when full artifact content is available.\nAfter each MCP `sales_nav_search`, save the response for audit, then immediately\ncall `get_artifact(include_content=true)` for the returned `artifact_id`, save\nthat full artifact response, and ingest with `--prefer-content`:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py ingest-page \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json \\\n  --response .powerpacks/sales-nav/runs/<run>/pages/artifact-full-000.json \\\n  --prefer-content\n```\n\nWhen the user asks for mutual LinkedIn URLs, first get pending IDs from the\nlocal file store:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py pending-mutual-ids \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json --limit 100\n```\n\nPass those IDs to MCP `sales_nav_resolve_member_ids`, save the MCP response,\nthen merge it:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py ingest-member-urls \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json \\\n  --response .powerpacks/sales-nav/runs/<run>/member_urls.response.json\n```\n\nAfter `enrich_extended_profiles`, call `get_artifact(include_content=true)` again\nand ingest with `--prefer-content` so `leads.jsonl` contains the full enriched\nprofile fields (`summary`, `experiences`, `education`).\n\nFor final files:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py export \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json\n```\n\nFor deterministic follow-up questions over the same Sales Nav run (for example\n\"show me Brookfield VPs\"), do not run a new Sales Nav search unless the user is\nchanging the upstream search filters. Use local lookup first; it searches names,\ntitles, companies, headlines, summaries, experiences, and education in\n`leads.jsonl` and joins mutuals:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py lookup \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json --query \"<name/company/title>\"\n```\n\nFor qualitative/refinement questions (for example \"show me people with real\nestate exposure\"), run the scoring primitive instead of grepping manually:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/score_sales_nav_leads/score_sales_nav_leads.py \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json \\\n  --criteria \"real estate exposure\" \\\n  --threshold 0.7\n```\n\nIt fans out over `leads.jsonl`, includes joined mutual context, writes only\nmatching leads to `scores/<criteria>/matches.jsonl`, and writes the user-facing\n`matches.csv`. Non-matches are not written unless `--dump-debug` is passed.\n\n## Workflow\n\n### Step 0 \u2014 Confirm prereqs\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\nIf `installed: false` for the host the user is on, route to\n`$powerset login` first.\n\n### Step 0b \u2014 Resolve set scope\n\nIf the user provided a `set_id`, use it. Otherwise run:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_set_operators/resolve_set_operators.py \\\n  --env-file .env\n```\n\nUse the returned `set_id` in Sales Nav MCP calls. The returned\n`operator_ids` are useful for parity with local TurboPuffer searches, but the\nSales Nav MCP is still scoped by `set_id`.\n\n### Step 1 \u2014 Decide whether to resolve filters\n\nIf the user gave you free-text companies or titles, call\n`sales_nav_resolve` first to convert them into stable IDs / canonical\nstrings. If there is a single obvious recommended company/title match, proceed\nwithout asking. Ask the user only when multiple plausible matches are genuinely\nambiguous (for example many unrelated \"Cisco\" entities and no exact/obvious\nmatch):\n\n```text\nTool: sales_nav_resolve\nArgs: {\n  \"set_id\": \"<the user's set>\",\n  \"companies\": [\"Stripe\", \"Ramp\"],\n  \"titles\": [\"staff engineer\", \"principal engineer\"]\n}\n```\n\nIf the user already gave you a `company_id` or `function_id`, skip this\nand go straight to step 2.\n\nMode defaults:\n\n- \"who works at Brookfield\" / \"who's in my extended network at Cisco\" \u2192 company\n  search. Resolve company, search it, ingest full artifact content, enrich the\n  visible page, export.\n- \"who works at Brookfield in the finance department\" \u2192 same company search plus\n  finance intent. Use reliable Sales Nav filters if known (`function_ids`), and\n  also pass targeted `keywords`/`title` when helpful. If the first query is too\n  sparse, retry once or twice by relaxing the weakest text filter while keeping\n  the company/set fixed.\n- \"show me people with real estate exposure\" after a Sales Nav run \u2192 local\n  refinement over the existing `leads.jsonl` first. Use `lookup` because it\n  searches enriched summaries, experiences, and education. Run a new Sales Nav\n  search only if the user is changing upstream search filters or the local run\n  has not been enriched yet.\n\n### Step 2 \u2014 Run the search (always with persistence)\n\nInitialize the local file store before the MCP call if you have not already.\n\n```text\nTool: sales_nav_search\nArgs: {\n  \"set_id\":         \"<the user's set>\",\n  \"conversation_id\":\"<UUID \u2014 see conversation_id playbook>\",\n  \"persist_artifact\": true,\n  \"company_ids\":    [...],         // from sales_nav_resolve\n  \"title\":          \"staff engineer\",\n  \"function_ids\":   [...],\n  \"seniority_ids\":  [...],\n  \"geography_ids\":  [...],\n  \"headcount_ids\":  [...],\n  \"keywords\":       \"distributed systems\",\n  \"count\":          25,            // max 25 per page\n  \"start_offset\":   0\n}\n```\n\nResponse shape (with persistence):\n\n```jsonc\n{\n  \"artifact_id\": \"...\",\n  \"artifact\": { /* metadata */ },\n  \"total_count\": 1342,\n  \"max_total_count\": 2500,\n  \"results_returned\": 25,\n  \"has_more\": true,\n  \"next_start_offset\": 25,\n  \"filters_used\": { /* what the server actually filtered on */ },\n  \"reconnect_required\": false,\n  \"leads\": [\n    {\n      \"name\": \"...\",\n      \"headline\": \"...\",\n      \"linkedin_url\": \"...\",\n      \"company\": \"...\",\n      \"location\": \"...\",\n      \"mutual_count\": 3,\n      \"mutual_member_ids\": [\"...\", \"...\"]\n    }\n  ]\n}\n```\n\n`reconnect_required: true` means the user's Unipile/LinkedIn session\nneeds upstream re-auth; tell the user and stop. Do not retry.\n\nSave the MCP response for audit, but ingest the full artifact content: call\n`get_artifact` with `include_content: true`, save that response, then run\n`sales_nav_artifacts ingest-page --prefer-content` on it. The primitive records\n`artifact_id`, lead rows, mutual edges, and source/operator metadata in local\nhandoff files.\n\nThen enrich the visible leads by default:\n\n```text\nTool: enrich_extended_profiles\nArgs: {\n  \"conversation_id\": \"<same conversation_id>\",\n  \"member_ids\": [<member_ids from this visible page>],\n  \"set_id\": \"<same set_id>\"\n}\n```\n\nAfter enrichment, call `get_artifact(include_content=true)` again and ingest\nwith `--prefer-content`. This is what puts full profile data (`summary`,\n`experiences`, `education`) into `leads.jsonl`.\n\nEvery follow-up retrieval (next page, mutual lookup, re-display) should use the\nlocal state path plus `get_artifact` / `sales_nav_resolve_member_ids` as needed.\n\n### Step 3 \u2014 Present the first page\n\n- Lead with `total_count`, `results_returned`, and any non-zero `mutual`\n  counts.\n- For each lead present `name`, `headline`, `company`, `location`,\n  `mutual_count`, and `linkedin_url`.\n- Mention `artifact_id` to the user (they may want to reference it across\n  turns / sessions).\n- If `has_more`, ask if they want page N+1 \u2014 do **not** auto-fetch.\n\n### Step 4 \u2014 Paginate via get_artifact\n\nSubsequent pages of the same result set should go through\n`get_artifact`, not a fresh `sales_nav_search`. Save each page response and\nappend it to the same local files with `sales_nav_artifacts ingest-page`:\n\n```text\nTool: get_artifact\nArgs: {\n  \"artifact_id\":     \"<from step 2>\",\n  \"offset\":          25,\n  \"limit\":           25,\n  \"include_content\": true    // prefer full accumulated lead shape for local files\n}\n```\n\nThis avoids re-running an expensive Sales Nav fetch and keeps the\nfilters/result-set stable across pages. For each retrieved page, prefer\n`include_content=true` + `ingest-page --prefer-content` so local files keep the\nfull accumulated lead shape. The local primitive dedupes by `member_id` and\nappends new lead\u2194mutual edges to `mutuals.jsonl`.\n\n### Step 5 \u2014 Refining filters\n\nRefining upstream Sales Nav filters is a **new search**, not pagination. Re-call\n`sales_nav_search` with the new args, the same `conversation_id`, and\n`persist_artifact: true`. You'll get back a new `artifact_id`. Tell the\nuser the artifact id changed.\n\nRefining over already-loaded people is **not** a new Sales Nav search. For\nquestions like \"which of these have real estate exposure\", \"who is in NYC\", or\n\"show the Brookfield VPs with mutuals\", call `sales_nav_artifacts lookup` (or a\nfuture local query primitive) against the existing state first.\n\n| User says | What changes |\n| --- | --- |\n| \"next page\" | `get_artifact` with `offset += 25` |\n| \"narrow to NYC\" | new `sales_nav_search` with `geography_ids` |\n| \"only senior+ folks\" | new `sales_nav_search` with `seniority_ids` |\n| \"filter to mid-stage companies\" | new `sales_nav_search` with `headcount_ids` |\n| \"show me their mutual\" | use `mutual_member_ids` from the existing leads |\n\n### Step 6 \u2014 Resuming a previous search\n\nIf the user references a prior `artifact_id` (from a previous session,\nthe web app, or a paste), skip directly to `get_artifact` \u2014 no\n`sales_nav_search` needed.\n\n## What this skill does NOT do\n\n- It does not write leads to your local `contacts.csv`. Lead \u2192 contact\n  promotion is a separate (future) `import-sales-nav-leads` skill, likely\n  also under `packs/sales-nav`.\n- It does not promote leads into the Powerset main set. That UI affordance\n  is on the web app today.\n- It does not run a sequence of pages on its own. Pagination is always\n  user-confirmed and goes through `get_artifact`.\n", "mcp_count": 4, "mcp_refs": ["enrich_extended_profiles", "sales_nav_resolve", "sales_nav_resolve_member_ids", "sales_nav_search"], "name": "sales-nav-search", "pack": "sales-nav", "path": "packs/sales-nav/skills/sales-nav-search/SKILL.md", "primitive_count": 4, "primitive_refs": ["resolve_set_operators", "sales_nav_artifacts", "sales_nav_pipeline", "score_sales_nav_leads"]}, {"description": "Decompose a recruiting search query, job description, or URL into the Powerpacks role-search filter schema without executing retrieval.", "display_name": "powerset:extract-search-query", "heading": "Extract Search Query", "markdown": "---\nname: extract-search-query\ndescription: Decompose a recruiting search query, job description, or URL into the Powerpacks role-search filter schema without executing retrieval.\n---\n\n# Extract Search Query\n\nUse this skill when the next step needs a schema-valid search payload before\nrunning TurboPuffer or Postgres primitives.\n\nThis skill does not retrieve candidates. It only produces the\n`expand_search_request` output that downstream primitives consume.\n\n## Inputs\n\n- natural-language recruiting query\n- optional job description text\n- optional URL content already fetched by the host\n- optional prior task state or refinement instruction\n\n## Output Contract\n\nReturn JSON shaped like:\n\n```json\n{\n  \"intent_type\": \"role_search\",\n  \"source_type\": \"query\",\n  \"normalized_query\": \"...\",\n  \"vertical\": \"people_by_role\",\n  \"role_search_filters\": {\n    \"semantic_query\": \"...\",\n    \"bm25_queries\": [],\n    \"role_tracks\": [],\n    \"role_ids\": [],\n    \"seniority_bands\": [],\n    \"cities\": [],\n    \"states\": [],\n    \"countries\": [],\n    \"education_names\": [],\n    \"company_names\": [],\n    \"company_semantic_queries\": [],\n    \"position_after_date\": null,\n    \"position_before_date\": null\n  },\n  \"notes\": []\n}\n```\n\nThe exact fields must validate against:\n\n- `powerpacks/schemas/decomposed-query.schema.json`\n- `powerpacks/schemas/role-search-filters.schema.json`\n\nOmit null or empty fields in the final payload unless they clarify intent. For\nfilter-only searches where the user gives hard filters but no role/profile text\n(e.g. \"people who worked at Meta after 2020\"), omit `semantic_query` and rely on\ncompany/date/location/education filters.\n\n## Rules\n\n- Do not run retrieval, hydration, reranking, or persistence.\n- Do not invent schema fields.\n- Preserve hard constraints: role, location, seniority, currentness, education,\n  YOE, age, tenure/date windows, company names, company domains, funding,\n  headcount, investors, social thresholds, and `set_id`.\n- Use `education_names` for unresolved school names. Do not invent school IDs.\n- Use `company_names` for explicit companies. Do not invent company IDs.\n- Use `set_id` only when the user provides one or a prior task state already\n  has one. If no `set_id` is present, leave it unset; the orchestrating skill\n  will run `resolve_set_operators` to use the env/default/personal set.\n- Use `investor_names` for unresolved investors. Do not invent investor URNs.\n- Use `company_semantic_queries` for vertical/domain company intent such as\n  database companies, fintech startups, AI infrastructure, healthcare, or\n  developer tooling.\n- For common known company domains, also include the corresponding\n  `sector_types` when obvious so company resolution can use backend-parity\n  staged/soft-union behavior. Examples: fintech \u2192 `fintech`, database/data\n  infrastructure \u2192 `data`, AI/ML \u2192 `ai_ml`, developer tools/infrastructure \u2192\n  `infra_devtools`, healthcare/mental health \u2192 `healthcare`, cybersecurity \u2192\n  `security`, crypto/web3 \u2192 `crypto_web3`, climate \u2192 `climate`, logistics \u2192\n  `logistics`, SaaS \u2192 `enterprise_saas`, semiconductors \u2192 `semiconductors`.\n- Always choose `company_sector_strategy` explicitly when `sector_types` are\n  present with `company_semantic_queries`; default to `staged` for normal domain\n  searches unless the user asks for strict (`hard_filter`) or recall-heavy\n  broadening (`soft_union`).\n- Treat tenure/date constraints as overlapping-position windows:\n  `position_after_date` means the position overlaps after that date, not merely\n  that it started after that date.\n- Treat broad graduation ranges as education filters, not position-tenure\n  filters.\n- Use explicit split currentness fields only:\n  - `is_current_role`: currentness for role/title matching positions\n  - `is_current_company`: currentness for company membership filters\n- Do not emit legacy `is_current` in `role_search_filters`.\n- Treat query words like \"current\" or \"currently\" as current only for the\n  mentioned dimension. Example: \"current engineers at OpenAI\" usually sets both\n  `is_current_role: true` and `is_current_company: true`; \"people currently at\n  OpenAI who used to be PMs\" sets `is_current_company: true` and leaves role\n  currentness false/past if encoded separately.\n- For role or company queries, include a `notes` entry that makes currentness\n  semantics explicit: current-only, all-time, or past-only for each dimension.\n  If the user's wording does not make currentness clear, do not choose silently;\n  leave a note for the orchestrator to ask before retrieval.\n- For recall-style tests, do not add seniority unless the query or test\n  explicitly requires it.\n- Founder shortcut: for founder/co-founder/founding-team queries, include\n  canonical `role_ids: [\"founder\"]`, include founder title aliases in\n  `bm25_queries`, and do not add `seniority_bands` unless the user explicitly\n  asks for a non-founder seniority constraint.\n- C-suite shortcut: for CEO/CTO/CFO/CMO/COO/CPO/CRO/CISO queries, include the\n  canonical role ID when known (for example `chief_technology_officer` for CTO),\n  and use `seniority_bands: [\"c_suite\"]` unless the user asks for all executive\n  levels.\n\n## Semantic Query Standard\n\n`semantic_query` must be dense retrieval prose, not a bare title. Omit it only\nfor filter-only hard-filter searches with no role/profile semantics.\n\nGood:\n\n```json\n{\n  \"semantic_query\": \"People who build, debug, and maintain production software systems. They write application, backend, frontend, mobile, platform, infrastructure, or systems code and have hands-on responsibility for shipping software in a professional engineering environment.\",\n  \"bm25_queries\": [\"software engineer\", \"software developer\", \"SWE\"]\n}\n```\n\nBad:\n\n```json\n{ \"semantic_query\": \"software engineer\" }\n```\n\n## Title Inspection\n\nWhen role intent is broad, ambiguous, or recall-sensitive, the extraction step\nshould plan a follow-up title-inspection step before final retrieval.\n\nExamples:\n\n- `ai engineers`\n- `data science leaders`\n- `people with gtm experience`\n- `finance, data, operations, or supply chain leaders`\n\nThe output should include a string note such as:\n\n```json\n{\n  \"notes\": [\n    \"title_inspection_needed: The query names a broad role family; inspect matching indexed titles before choosing final BM25/title slices.\"\n  ]\n}\n```\n\n## Recording\n\nAfter producing the JSON, the orchestrating skill or harness should record it:\n\n```bash\npython powerpacks/packs/search/primitives/task_state/task_state.py record-step \\\n  --state \"$STATE\" \\\n  --step-id expand_search_request \\\n  --output-json '<the extraction JSON>'\n```\n\nDownstream primitives read this state. They should not re-extract the query.\n", "mcp_count": 0, "mcp_refs": [], "name": "extract-search-query", "pack": "search", "path": "packs/search/skills/extract-search-query/SKILL.md", "primitive_count": 3, "primitive_refs": ["expand_search_request", "resolve_set_operators", "task_state"]}, {"description": "Resolve company names, company descriptions, investor/funding filters, or vertical queries into canonical TurboPuffer company IDs for downstream people search.", "display_name": "powerset:search-company", "heading": "Search Company", "markdown": "---\nname: search-company\ndescription: Resolve company names, company descriptions, investor/funding filters, or vertical queries into canonical TurboPuffer company IDs for downstream people search.\n---\n\n# Search Company\n\nUse this when the user asks for company search directly, or when they want the\ncompany set behind a people search inspected first.\n\nExamples:\n\n- `/search-company database companies`\n- `/search-company series b fintech startups in california`\n- `/search-company companies backed by sequoia`\n\n## Workflow\n\n1. Decompose the request into the `role-search-filters` company fields only:\n   `company_names`, `company_semantic_queries`, `entity_types`, `sector_types`,\n   funding/headcount filters, company geography, `investor_names`, and\n   resolved `investors`. Preserve `set_id` when the user provides one.\n2. Resolve set scoping before company resolution. If the user did not provide a\n   `set_id`, run `resolve_set_operators` without `--set-id` so it inherits\n   `POWERPACKS_DEFAULT_SET_ID` / `POWERSET_DEFAULT_SET_ID`, or falls back to the\n   logged-in operator's active personal set. Copy the returned `operator_ids`\n   into the company resolver payload. Do not pass the raw set UUID as\n   `allowed_operator_ids`.\n3. If `investor_names` are present, run `resolve_investors` first and record or\n   copy the returned `investor_urns` into `investors`.\n4. Run `resolve_companies`.\n5. Present the returned company count, sample companies, set scope, and the company IDs\n   artifact/state path when available.\n6. If the user wants people at those companies, pass `company_ids` and\n   `operator_ids` into\n   `search-network`; for large company sets, use `apply_prefilters` so people\n   search batches company IDs instead of sending one giant `company_id In [...]`.\n\n## Query Guidance\n\nUse `company_semantic_queries` for vertical/domain intent, not just\n`sector_types`. Coarse sectors are useful, but the resolver needs an explicit\nsector strategy:\n\n- Use `company_sector_strategy: \"staged\"` by default for ambiguous domain\n  searches. This starts with sector-intersected semantic search and broadens if\n  the hard frontier is too small.\n- Use `company_sector_strategy: \"soft_union\"` when recall matters more than\n  precision or labels are known to be incomplete. This matches semantic results\n  OR sector-filter matches.\n- Use `company_sector_strategy: \"hard_filter\"` when the user explicitly wants\n  sector labels as a strict constraint.\n- Use `company_sector_strategy: \"semantic_only\"` when sector labels are too\n  noisy for the requested company domain.\n\nGood:\n\n```json\n{\n  \"company_semantic_queries\": [\n    \"Companies building database systems, hosted databases, data storage engines, database infrastructure, SQL or NoSQL databases, or developer platforms for managing application data.\"\n  ],\n  \"sector_types\": [\"data\"],\n  \"company_sector_strategy\": \"staged\",\n  \"company_sector_min_results\": 500\n}\n```\n\nBad:\n\n```json\n{ \"sector_types\": [\"data\"] }\n```\n\n## Commands\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_set_operators/resolve_set_operators.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_investors/resolve_investors.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_companies/resolve_companies.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n", "mcp_count": 0, "mcp_refs": [], "name": "search-company", "pack": "search", "path": "packs/search/skills/search-company/SKILL.md", "primitive_count": 4, "primitive_refs": ["apply_prefilters", "resolve_companies", "resolve_investors", "resolve_set_operators"]}, {"description": "Run a role-first people search from a natural-language query, job description, or URL. Use when the user wants the agent to decompose the request, show one compact search preview, then execute retrieval, hydration, LLM filtering/reranking, and result export.", "display_name": "powerset:search-network", "heading": "Search Network", "markdown": "---\nname: search-network\ndescription: Run a role-first people search from a natural-language query, job description, or URL. Use when the user wants the agent to decompose the request, show one compact search preview, then execute retrieval, hydration, LLM filtering/reranking, and result export.\n---\n\n# Search Network\n\nRun the full Powerpacks search loop from one user request such as:\n\n- `/search-network who are software engineers in sf`\n- `/search-network senior engineers at series a fintech companies`\n- `/search-network stanford engineers with 3-5 yoe in new york`\n- `/search-network people who work at OpenAI`\n\n## Intent\n\nGive the user one operational entrypoint that does the work end to end.\n\nThe agent should:\n\n- create a unique JSON task run before retrieval\n- orchestrate helper skills when they produce a cleaner intermediate artifact\n- decompose the request into the Powerpacks role-search schema\n- decide whether adjacent/domain search is off, confirmed, or should be asked\n  about\n- decide whether to search directly, count first, or generate slices\n- show one compact search preview after extraction and ask the user to\n  `execute`, `modify`, or `search only`\n- after `execute`, run retrieval, hydration, LLM filtering/reranking, and\n  persistence without a second approval gate\n- review the candidate frontier after each step\n- hydrate the full candidate frontier through Postgres into local JSONL handoff\n  files; do not pass large profile blobs through chat or command arguments\n- run conservative LLM filtering by default after hydration using the handoff path\n- run the async `llm_rerank_candidates` primitive by default after filtering,\n  producing `query_results.csv` with reasoning, confidence, and trait scores\n- persist result artifacts in reranked order for refinement and interoperability\n\n## Skill Composition\n\n`search-network` is the high-level orchestration skill. It may sequence other\nskills, but every handoff must be explicit and durable. Do not rely on chat\nmemory as the boundary between steps.\n\nWhen a sub-step is covered by another installed skill:\n\n- load that skill's instructions for that step\n- give it a concrete input artifact or task-state path\n- require a concrete output artifact or recorded task-state step\n- feed that artifact into the next step\n\nDefault composition:\n\n- `extract-search-query`: always use this first to produce\n  `expand_search_request` JSON\n- `search-company`: use when natural-language company criteria, investors,\n  sectors, funding, headcount, or company-domain intent must resolve into\n  canonical company IDs before people retrieval\n- `fix-people`: use only when the user explicitly asks to reconcile, merge, or\n  clean persisted person artifacts after search\n\nUseful handoff artifacts:\n\n- task state: `.powerpacks/runs/search-network-<id>.json`\n- extracted query: recorded at `steps[].id = \"expand_search_request\"`\n- planned checklist: recorded in `planned_steps[]` at approval time\n- company resolution: recorded at `steps[].id = \"resolve_companies\"` and, when\n  useful for debugging, mirrored to `artifacts/company_ids.json`\n- set resolution: recorded at `steps[].id = \"resolve_set_operators\"` and\n  consumed as `role_search_filters.operator_ids`\n- candidate frontier: recorded by retrieval steps and exported as JSONL\n- hydrated handoff: `hydrate_people` records `profiles_path` and\n  `llm_profiles_path` in task state; agents should pass the state/path, not read\n  the profile file unless the user asks for details\n- rerank output: `artifacts/<task>/llm_rerank_candidates/query_results.csv`;\n  the CSV columns match the app query-results schema (`person_id`,\n  `result_index`, `matched_position_indexes`, `final_score`, `trait_scores`,\n  `overall_reasoning`, plus metadata fields)\n\nIf a future workflow chains more skills, keep the same pattern: each task\nconsumes a path or task-state step and produces a path or task-state step.\nExample: `search-company` -> `search-network` -> `fix-people` is valid only if\neach boundary has a written artifact.\n\n## Fast path runner\n\nFor the normal semantic/role search path, prefer the resumable orchestrator once\n`extract-search-query` has produced an `expand_search_request` payload and the\nuser has approved the compact search preview:\n\n```bash\nuv run --env-file .env --project . python packs/search/primitives/search_network_pipeline/search_network_pipeline.py run \\\n  --query \"<user query>\" \\\n  --payload-json .powerpacks/search/<run>/expand_search_request.json \\\n  --execute-approved\n```\n\n`--execute-approved` means the user already saw and approved the extracted\nsearch. The orchestrator should then run retrieval, hydration, LLM filtering,\nLLM reranking, and persistence without another chat-visible approval gate.\n\nUse `--search-only` only when the user explicitly chooses to skip LLM\nfilter/rerank. If query extraction or currentness semantics are still ambiguous,\nresolve those before showing the preview or invoking the orchestrator.\n\n### Quiet Execution\n\nAfter query extraction/currentness is resolved and the user has selected\n`execute` or `search only`, do not create a separate chat-visible plan for\nnormal orchestrator runs. Keep invoking `search_network_pipeline.py` until it\nfinishes or emits a concrete `blocked_approval` / `blocked_user_action`.\n\nWhen the harness has a worker/sub-agent facility, dispatch noisy orchestrator\nexecution to a worker sub-agent. The only chat-visible handoff line should be\nexactly:\n\n`Starting search through sub-agent.`\n\nThe main chat should show only required user actions and the final compact\nresult summary with state, ledger, CSV/JSONL/manifest paths, rerank CSV path,\nand top candidates. The worker may inspect the ledger, task state, primitive\nJSON, and artifacts, but should not stream full primitive JSON or terminal\ntranscripts into the main chat unless diagnosis is needed.\n\nIf sub-agents are unavailable, say that once, then keep status messages\ndecision-oriented and terse.\n\n## Strategy Loop\n\n### Fast Path: Company Directory Lookup\n\nFor basic company-only requests like `$search-network people who work at Betr`,\n`show me people at OpenAI`, `who works at Stripe?`, or `current employees of\nDatabricks`, do **not** run semantic people search. If the request has a\nspecified company and no specified role/title/seniority/domain/person filters,\nroute directly to the existing app company-directory API through MCP:\n\n```text\nlist_company_people(company_name=\"OpenAI\", page=0, page_size=50, company_limit=5)\n```\n\nThis is a deterministic company \u2192 people directory lookup backed by the app's\n`POST /v2/companies/search` with `include_people=true`. It is not role search,\nnot reranking, and not semantic retrieval.\n\nRules for this fast path:\n\n1. Use `list_company_people` by `company_name` for the first call unless the user\n   provided an exact company id, in which case pass `company_id`.\n2. If multiple plausible companies are returned, ask the user to choose. Prefer\n   an exact case-insensitive company-name match when obvious.\n3. Page with `page` / `page_size`; do not auto-page through the whole company\n   unless the user asks.\n4. If the user explicitly asks to scope the company directory to a set, resolve\n   the set with `list_sets` using the same tiebreaker as `search-contacts`\n   (exact name \u2192 non-personal \u2192 most members \u2192 personal \u2192 ask), then pass\n   `set_id` to `list_company_people`.\n5. Skip task state, `extract-search-query`, `search-company`, `resolve_companies`,\n   `count_candidates`, `execute_role_search`, `hydrate_people`, approval prompts,\n   slicing, LLM filtering, rerank preparation, and result export.\n6. If the user adds a role/title/seniority/domain constraint \u2014 e.g. \"AI engineers\n   at OpenAI\", \"VPs at Stripe\", \"founders at fintech startups\" \u2014 this is no\n   longer the company-directory fast path. Continue with the normal\n   `search-network` workflow below.\n\nThis replaces the standalone `company-directory` skill; `search-network` is the\ncanonical entrypoint for both company-directory lookups and semantic/role people\nsearch.\n\n1. Create task state from `powerpacks/tasks/search-network.task.json`.\n   Use `task_state.py init --query \"<query>\"` so the default run file is\n   unique under `.powerpacks/runs/`.\n2. Invoke the `extract-search-query` skill instructions to produce\n   `expand_search_request` JSON. Do not hide query extraction inside eval or\n   retrieval code.\n3. Record the expansion output.\n4. If the request mentions adjacency or domain intent, run\n   `plan_adjacency_search` and record whether to include adjacency, ask the\n   user, or stay strict.\n5. Choose the initial strategy with `decide_search_strategy`.\n6. Resolve set scoping before retrieval:\n   - if the user provides `set_id`, preserve it in `role_search_filters.set_id`\n   - otherwise allow `resolve_set_operators` to use\n     `POWERPACKS_DEFAULT_SET_ID` / `POWERSET_DEFAULT_SET_ID`, or the logged-in\n     operator's active personal set from `~/.powerpacks/credentials.json`\n   - record the returned `operator_ids`; these are the values used for\n     TurboPuffer `allowed_operator_ids`, not the raw set UUID\n7. Resolve ID-producing constraints before retrieval:\n   - run `resolve_education` when `education_names` or unresolved school names\n     are present\n   - run `resolve_investors` when `investor_names` or unresolved investor names\n     are present\n   - run `resolve_companies` when company names or company attributes must\n     become company IDs\n   - run `apply_prefilters` when education, tech skills, social/interaction\n     metrics, or large company intersections must become `base_candidate_ids`\n8. Run one of:\n   - direct role search\n   - count then search\n   - multi-slice retrieval\n9. Record every primitive output into task state. `steps[]` is the append-only\n   execution log; `planned_steps[]` is the mutable checklist that should move\n   from pending to completed/failed/skipped as matching steps run.\n10. Assess the frontier with `assess_frontier`.\n11. Decide the next action with `plan_candidate_review`.\n12. Hydrate the full candidate frontier with `hydrate_people --write-state`.\n    Do not dump full hydrated profiles unless the user explicitly asks to debug\n    hydration; then pass `--dump-profiles`.\n13. Run conservative LLM filtering by default:\n    `llm_filter_candidates --state \"$STATE\" --profile-scope auto --write-state`.\n    Auto uses compact/current-role profiles only when role filters are\n    current-scoped (`is_current_role: true`); all-time/past-role queries use the\n    full hydrated profile. Do not dump filter scores/prompts unless debugging; then\n    pass `--dump-debug`. Use `--allow-partial-hydration` only when the user\n    explicitly accepts partial review.\n14. Run async LLM reranking by default:\n    `llm_rerank_candidates --state \"$STATE\" --concurrency 200 --write-state`.\n    Rerank is the final ordering pass and reads the full hydrated profile from\n    `profiles_path`. The primary output is `llm_rerank_candidates/query_results.csv`; columns must match the app\n    query-results schema: `conversation_id`, `query`, `person_id`,\n    `result_index`, `matched_position_indexes`, `final_score`, `trait_scores`,\n    `overall_reasoning`, `pre_rerank_score`, `tags`, `vertical_sources`,\n    `created_at`.\n15. Persist CSV/JSONL artifacts with `persist_search_results`; it should use\n    `llm_rerank_candidates.output.ranked_candidate_ids` when present so the\n    exported results are in final reranked order.\n16. Present artifact paths, a compact result summary, top candidates with score\n    + reason, and recommended follow-up refinements.\n17. Stop when the frontier is coherent enough to present.\n\n## First Response Contract\n\nFor an initial `/search-network ...` request, do not reply with a long visible\nplan. Extract the query, run the payload quality gate below, then show one\ncompact search preview and ask for exactly one decision:\n\n`Execute this search, modify it, or run search-only without LLM rerank?`\n\nThe preview should include only:\n\n- normalized query\n- state path or exact state path to create\n- set scope: explicit `set_id`, env/default set, or personal-set fallback\n- currentness semantics: `is_current_role` / `is_current_company`\n- role/title intent: dense `semantic_query` summary plus `bm25_queries`\n- company/domain/investor/education/location/seniority filters\n- expected execution: retrieval \u2192 hydration \u2192 LLM filter \u2192 LLM rerank \u2192 persist\n- runtime blockers, if any\n\nIf the user chooses `execute`, invoke `search_network_pipeline --execute-approved`\nso there is no second LLM approval gate. If the user chooses `search-only`, pass\n`--search-only`. If the user asks for changes, update/regenerate the extraction\nand show the compact preview again.\n\nBefore showing the preview, perform this payload quality gate:\n\n- If the query has role/profile/domain intent, `role_search_filters.semantic_query`\n  must be dense semantic retrieval prose, not a title or keyword phrase.\n- It must be at least 80 characters and should usually be 2-3 concise\n  sentences when there is role or domain intent.\n- It must describe responsibilities, skills, scope, domain work, or profile\n  evidence.\n- It must not be identical to, or merely a singular/plural variant of, any\n  `bm25_queries` entry.\n- For pure hard-filter queries with no role/profile/domain intent (for example,\n  \"people who worked at Meta after 2020\"), `semantic_query` may be omitted; the\n  pipeline will use filter-only TurboPuffer retrieval after resolving companies\n  and applying prefilters.\n- If this gate fails, do not ask for approval. Regenerate the decomposition\n  first and explain that the first payload was invalid.\n\n## Rules\n\n- default to LLM filtering and LLM reranking after the user approves the search\n  preview; only skip them when the user chooses `search only`, when\n  `OPENAI_API_KEY` is missing, or when the task is the company-directory MCP\n  fast path\n- do not force slices when the query is already specific\n- use counts and frontier feedback to decide whether to widen or narrow\n- produce a short decision trace after each stage\n- keep role, location, seniority, education, yoe, age, and company constraints\n  explicit\n- make currentness explicit for every role or company query. Use only\n  `is_current_role` and `is_current_company` in `role_search_filters`; do not\n  emit legacy `is_current`. If the user's wording does not make currentness\n  clear, ask before retrieval; do not proceed with implicit currentness.\n- split semantics such as current company plus past role should use\n  `is_current_company` / `is_current_role` instead of silently conflating them.\n- use `education_names` for school names that are not alr
