 The\n  manifest reports exact prompt/completion tokens and estimated USD.\n- Step 3: `contacts_queued \u00d7 2` Parallel lookups (control + treatment arm) at the\n  processor price (core2x = $0.05/lookup default). e.g. ~$41 for 414 contacts.\n  Confirm this estimate with the user before running \u2014 it is the only paid step\n  beyond the LLM in Step 2.\n\n## Step 3 \u2014 A/B resolution (runs as the next step; paid)\n\nAfter markers are written, continue automatically into the A/B resolution. It\nisolates one variable \u2014 whether the mined markers are attached as `context` \u2014 so\nany change in resolution is attributable to the markers.\n\n**3a. Build the two queues (local, free).** One row per contact with usable\nmarkers; control gets a blank `context`, treatment gets the markers.\n\n```bash\nuv run --project . python packs/ingestion/primitives/build_resolution_queue/build_resolution_queue.py\n```\n\nWrites `\u2026/email-context/ab/queue_control.csv` and `queue_context.csv` (+ manifest\nwith `contacts_queued`).\n\n**3b. Confirm the spend, then resolve both arms.** This is the only paid part.\nEstimate first and confirm with the user before running \u2014 `contacts_queued \u00d7 2`\nParallel lookups at the processor price (core $0.025, core2x $0.05, pro $0.10 per\nlookup). E.g. 414 contacts \u00d7 2 = 828 lookups \u2248 $41 on core2x. Do **not** pass\n`--approve-spend` until the user has approved the estimate.\n\n```bash\n# control arm (no markers)\nuv run --project . python packs/ingestion/primitives/resolve_linkedin_queue/resolve_linkedin_queue.py run \\\n  --input  .powerpacks/network-import/discover/email-context/ab/queue_control.csv \\\n  --output-dir .powerpacks/network-import/discover/email-context/ab/control\n# treatment arm (with markers as context)\nuv run --project . python packs/ingestion/primitives/resolve_linkedin_queue/resolve_linkedin_queue.py run \\\n  --input  .powerpacks/network-import/discover/email-context/ab/queue_context.csv \\\n  --output-dir .powerpacks/network-import/discover/email-context/ab/treatment\n```\n\n**3c. Diff the arms (local, free).**\n\n```bash\nuv run --project . python packs/ingestion/primitives/compare_resolution_ab/compare_resolution_ab.py \\\n  --baseline .powerpacks/network-import/discover/email-context/ab/control/linkedin_resolutions.csv \\\n  --context  .powerpacks/network-import/discover/email-context/ab/treatment/linkedin_resolutions.csv --open\n```\n\nReport the lift from `ab_summary.json` (newly_found / lost / url_changed /\nconfidence deltas) \u2014 the proof that the markers improved resolution.\n\n---\n_Created 2026-06-16. Changelog: 2026-06-16 initial version (body-mode default, role-mailbox filter, owner-context prior); 2026-06-17 add `--open` to auto-open markers.csv on macOS; 2026-06-19 hardcode concurrency default to 12 and stop reading `POWERPACKS_OPENAI_CONCURRENCY` (pass `--concurrency` explicitly to raise); 2026-06-19 auto-derive mailbox-owner identity (name + addresses) from msgvault and pass it to the LLM so owner facts are never attributed to a contact (no flag); 2026-06-19 add a phase-1 gate (step 2 aborts on missing/empty/incomplete step-1 context) and a \"Reading results \u2014 use the schema\" guardrail so results are reported from `markers.csv`/`manifest.json`, never fabricated; 2026-06-19 simplify marker schema \u2014 drop `is_person`/`relationship`, merge `current_employer`+`past_employer` into one `employers` list column (tagged current/past), and blank `company_guess` for personal/free-provider domains; 2026-06-19 drop the duplicate `canonical_name` marker category (it stays a single top-level column); 2026-06-20 add Step 3 \u2014 the A/B resolution now runs automatically as the next step (build_resolution_queue builds control+treatment queues, resolve_linkedin_queue runs both arms, compare_resolution_ab reports the lift), gated by a one-time Parallel spend confirmation._\n", "mcp_count": 0, "mcp_refs": [], "name": "enrich-email-markers", "pack": "ingestion", "path": "packs/ingestion/skills/enrich-email-markers/SKILL.md", "primitive_count": 5, "primitive_refs": ["build_email_context", "build_resolution_queue", "compare_resolution_ab", "infer_linkedin_markers", "resolve_linkedin_queue"]}, {"description": "Add Gmail to your local search index. Use for $import-gmail. Sets up msgvault/Gmail (OAuth + authorize), asks which accounts and how many years to sync, syncs + imports Gmail contacts (resolved to LinkedIn via Parallel.ai), then fan-in merges all imported sources and rebuilds the Modal search index. Always reruns the full checklist; overwrites in place.", "display_name": "powerset:import-gmail", "heading": "import-gmail", "markdown": "---\nname: import-gmail\ndescription: Add Gmail to your local search index. Use for $import-gmail. Sets up msgvault/Gmail (OAuth + authorize), asks which accounts and how many years to sync, syncs + imports Gmail contacts (resolved to LinkedIn via Parallel.ai), then fan-in merges all imported sources and rebuilds the Modal search index. Always reruns the full checklist; overwrites in place.\n---\n\n<!--\nCreated: 2026-06-20\nChangelog:\n- 2026-07-13: Added the product architecture guide; fixed multi-account discovery\n  and authorization instructions; documented the local directory, Parallel,\n  RapidAPI, Modal, privacy, and missing identity-review boundaries.\n- 2026-06-20: New skill, split out of $setup (replaces the old discovery-only\n  $import-email). Carries the Gmail/msgvault block (status -> ask accounts/years\n  -> OAuth app -> authorize -> sync -> import) plus the shared fan-in + Modal\n  index + validate so Gmail can be added on its own and merged into the index.\n-->\n\n# import-gmail\n\n`$import-gmail` adds **Gmail** to your local search index: set up msgvault, sync\nthe chosen accounts (bounded by a years-back window), import contacts (resolved\nto LinkedIn on Parallel.ai), then **merge all imported sources + rebuild the\nindex**. Run `$setup` (LinkedIn) first for the best results \u2014 Gmail merges on top\nof whatever is already imported.\n\nFor a product-level walkthrough, lookup stages, provider payloads, approval\nboundaries, and architecture diagram, see\n[`gmail-import-pipeline.md`](../../docs/gmail-import-pipeline.md).\n\nIt runs a **fixed checklist and always reruns it end to end**. Reruns are\nidempotent against fixed paths. The one exception is the msgvault store\n(`~/.msgvault/msgvault.db`): it is the durable, incrementally-synced archive \u2014\n**never delete it**. With the explicit history window below, reruns rescan that\nwindow deterministically and msgvault skips messages already stored. Last-message\nresume inference applies only when no explicit window is supplied.\n\n## How to run this skill\n\n**FIRST, create a literal, visible checklist with all ten steps below and step\nthrough it, marking each complete as you go.** Mandatory (TaskCreate / update_plan\n/ your harness's todo tool). Seed it with these exact titles:\n\n```\n0. Check prereqs (Powerset login + runtime keys)\n1. Check msgvault status\n2. Ask which Gmail accounts to link + how far back to sync\n3. Create msgvault OAuth app (browser, if not configured)\n4. Authorize Gmail accounts\n5. Sync Gmail archives\n6. Import Gmail contacts\n7. Merge all sources\n8. Index the merged network\n9. Validate the search index\n```\n\nStep 3 is conditional (no-op if OAuth already configured). Keep it in the\nchecklist and mark it complete as a no-op when it doesn't apply.\n\nThen: **work the checklist 0 \u2192 9, one item `in_progress` at a time**; run from the\ncanonical repo root (resolve once, see *Repo root*); overwrite fixed derived\npaths and rely on the primitives \u2014 don't pre-delete or invent folders.\n**Never delete `~/.msgvault/msgvault.db`.**\n\n### Guardrails (hard rules)\n\n- **No context pass. Do not go exploring.** Self-contained and authoritative.\n  Build the checklist and execute it directly.\n- **Do not edit code.** Only invoke the primitives below (flag an actual blocking\n  bug if you hit one). Plain shell for `cp`/`test`/`wc`/`cat` is fine; no glue\n  scripts.\n- **Never call `msgvault` (or `msgvault sync-full`) directly.** Gmail syncing\n  happens *only* through Step 5's `gmail.py discover --sync-after \"$SYNC_AFTER\"`.\n  A bare `msgvault sync-full <email>` has no date bound and pulls the entire\n  mailbox, ignoring the chosen window. **Re-authorizing a lapsed token is\n  `msgvault_setup.py add-account --force-auth` (OAuth only, no sync) \u2014 see Step 4;\n  it is never a `sync-full`.** If discover fails, recover by syncing *less* (a\n  narrower `--sync-after`), never the full mailbox.\n- **Consent gates (pause for the user):** msgvault browser/gcloud OAuth-app\n  creation and Gmail account authorization (Steps 3-4); the external identity\n  resolution/profile hydration in Step 6; and the cloud upload/provider-backed\n  Modal indexing in Step 8. The Step 6 primitive auto-runs Parallel below 25\n  unresolved contacts and does not internally gate RapidAPI cache misses, so the\n  agent must obtain approval before invoking it rather than relying on the child\n  gates. `index-people --max-usd 0` is also currently uncapped internal mode.\n\n### Repo root\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -x \"$candidate/bin/update-codex\" && -d \"$candidate/packs\" ]]; then\n      printf '%s\\n' \"$candidate\"; return 0\n    fi\n  done\n  return 1\n}\nREPO=\"$(resolve_powerpacks_root)\" || { echo \"Install Powerpacks to ~/powerpacks first.\" >&2; exit 1; }\ncd \"$REPO\"\n```\n\n---\n\n## The checklist\n\n### Step 0 \u2014 Check prereqs (Powerset login + runtime keys)\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/powerset/primitives/auth/auth.py whoami\ncd \"$REPO\" && uv run --project . python packs/powerset/primitives/pull_runtime_keys/pull_runtime_keys.py check --env-file .env\n```\n\nIf `whoami` fails or keys are missing, tell the user to run **`$setup`** first (or\n`auth.py login` + `pull_runtime_keys.py pull --env-file .env`) and stop here.\n\n### Step 1 \u2014 Check msgvault status\n\nSafe, local. Drives the next two steps:\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py status\n```\n\nThe JSON reports `gcloud`, `config.oauth_configured`, `database.exists`, and\nauthorized `accounts`. If `oauth_configured` is true and the db exists, Step 3 is\na no-op.\n\n### Step 2 \u2014 Ask which Gmail accounts to link (and how far back to sync)\n\nAsk the user for **every** Gmail address they want searchable, in one prompt.\nTreat the first as the **primary** (used to create the OAuth app in Step 3); the\nrest are additional accounts authorized in Step 4. Compare against the already\n`accounts` from Step 1 \u2014 only accounts not already authorized need Steps 3\u20134.\nRecord the list. Do not guess emails.\n\n**In the same prompt, ask how far back to sync.** How many years of mail should be\narchived? **Default is 3 years.** The user may answer **`all`** (full mailbox\nhistory) or any number of years (e.g. **1**, **2**, **5**). Record the answer as\n`$SYNC_YEARS` and carry it into Step 5. A wide window \u2014 especially `all` \u2014 makes\nthe first sync much longer; if the user asks for more than 3 years, confirm before\nrunning Step 5.\n\n### Step 3 \u2014 Create msgvault OAuth app (browser, if not configured)\n\nOnly if Step 1 showed OAuth not configured. One-time browser setup for the\n**primary** Gmail account from Step 2 \u2014 **consent: drives Chrome + gcloud, creates\nthe Google OAuth Desktop app, inits the db, authorizes the primary account**:\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py browser-setup \\\n  --email <primary-gmail> --add-account --init-db\n```\n\nWrites `~/.msgvault/config.toml`, the client secret, and `~/.msgvault/msgvault.db`\n(do not delete the db). If already configured, mark this step a no-op.\n\n### Step 4 \u2014 Authorize Gmail accounts\n\nRe-run `msgvault_setup.py status` after Step 3, because a fresh\n`browser-setup --add-account` already authorized the primary. For **every requested\naccount still absent from the current `status.accounts`**, run the per-account\nbrowser OAuth grant. This includes the primary only when OAuth configuration\npre-existed and it is still absent:\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-account --email <email>\n```\n\nRe-run `msgvault_setup.py status` and confirm every requested account appears\nunder `accounts`.\n\n**Re-authorizing a lapsed account.** If an account is *already in the vault* but\nits token is **expired, revoked, or missing**, re-authorize the same way with\n`--force-auth` (msgvault replaces the stale token; **OAuth only, downloads no\nmail**):\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-account --email <email> --force-auth\n```\n\nThe account keeps every previously-synced message; Step 5's bounded `discover`\nrescans the chosen window and deduplicates stored messages. **Never** re-authorize with\n`msgvault sync-full <email>` \u2014 it re-pulls the entire mailbox.\n\n### Step 5 \u2014 Sync Gmail archives\n\nSync all authorized accounts and build the discover artifacts in **one command**,\nusing the window from Step 2. Passing one account per separate invocation rewrites\nthe stable discovery manifest and can leave only the last account available to\nStep 6. Compute `SYNC_AFTER` from `$SYNC_YEARS` (default `3`; `all` = full history)\nand repeat `--account-email` once per selected account:\n\n```bash\ncd \"$REPO\"\n# $SYNC_YEARS from Step 2: a number (default 3) or the word \"all\".\nif [ \"${SYNC_YEARS:-3}\" = \"all\" ]; then\n  SYNC_AFTER=\"2004-01-01\"   # pre-Gmail = the entire mailbox\nelse\n  SYNC_AFTER=\"$(date -v-${SYNC_YEARS:-3}y +%Y-%m-%d 2>/dev/null || date -d \"${SYNC_YEARS:-3} years ago\" +%Y-%m-%d)\"\nfi\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/gmail.py discover \\\n  --account-email <first-email> \\\n  --account-email <second-email> \\\n  --sync-after \"$SYNC_AFTER\"\n```\n\nOmit extra repeated flags when only one account was selected. Writes\n`.powerpacks/network-import/discover/gmail/<account>/`. **Only sync through this\n`discover` command** \u2014 never `msgvault sync-full` (no `--after` bound \u2192 entire\nmailbox). If `discover` errors or the sync is too slow/large, recover by syncing\n**less, never more** (a more recent `--sync-after`). If a narrower window still\nfails, surface the error and stop. A large first sync can take a while; msgvault\nskips already-downloaded messages on reruns.\n\nContent boundary: the bounded `msgvault sync-full` child downloads messages into\nmsgvault's local full-message archive. The current command does not request\nattachment suppression, so supported msgvault builds may also store attachments.\nPowerpacks' subsequent SQLite reader selects contact/interaction metadata only and\ndoes not send bodies, subjects, snippets, MIME, or attachments to identity providers.\n\n### Step 6 \u2014 Import Gmail contacts\n\nImport first reuses the local identity directory, resolves only the remaining\ncontacts to LinkedIn via **Parallel.ai**, hydrates accepted LinkedIn URLs through\nthe local profile cache or **RapidAPI**, then writes\n`.powerpacks/network-import/import/gmail/people.csv`. Run **without** the spend\nflag first \u2014 the primitive auto-approves small batches (under its threshold) and\notherwise blocks:\n\nBefore running it, explain that Parallel receives name, email, and an\nemail-domain-derived company, while RapidAPI receives accepted LinkedIn URLs;\nthen get explicit approval for those provider calls. The current flow has no\nhuman identity-verification gate: a normalized match at confidence 0.75 or above\ncan proceed directly to hydration, and a found result with missing or zero provider\nconfidence is currently normalized to 0.90. The separate Gmail verification/review\nproposal is not wired into `$import-gmail` yet.\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/import_contacts_pipeline/gmail.py run\n```\n\n- If it completes (small batch auto-approved), proceed.\n- **If it blocks reporting pending Parallel contacts** (at/above the threshold),\n  tell the user the contact count and ask to approve the spend. On approval:\n\n  ```bash\n  cd \"$REPO\" && uv run --project . python packs/ingestion/primitives/import_contacts_pipeline/gmail.py run --approve-parallel-spend\n  ```\n\n### Step 7 \u2014 Merge all sources\n\nFan-in merges the per-source `import/<source>/people.csv` files into one network\n(Gmail here, plus LinkedIn/Messages if already imported):\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py fan-in \\\n  --people-csv .powerpacks/network-import/merged/people.csv\n```\n\nWrites `.powerpacks/network-import/merged/people.csv` (default\n`--include-existing-artifacts` picks up every imported source).\n\n### Step 8 \u2014 Index the merged network\n\nIndex the merged people.csv on Modal (generic indexer, no import stage) and\ndownload the duckdb:\n\nThis uploads the complete merged CSV, including email and interaction metadata,\nto a workspace-shared Modal volume. Input and run paths are prefixed by\n`POWERPACKS_OPERATOR_ID`, caches are shared, and a missing operator ID falls back\nto the all-zero path. Modal may use provider-backed classification and embeddings,\nand the current default `--max-usd 0` is uncapped internal mode. Show that boundary\nand obtain explicit approval before invoking the command.\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/indexing/modal/linkedin_modal_pipeline.py index-people \\\n  --people-csv .powerpacks/network-import/merged/people.csv\n```\n\nRun it in the background and keep Step 8 `in_progress` until the command\n**exits 0**. **Expect 5\u201330+ minutes**; most work (embeddings, classification,\nduckdb build) runs server-side on Modal, so long quiet stretches are **normal \u2014\nnot a hang**. It prints a final `{\"status\": \"completed\", ...}` on success and\nwrites progress to `.powerpacks/runs/setup-gmail-modal/status.json`; if that lags\nthe live stdout, **trust the running process**. Do not treat pre-existing\n`.powerpacks/search-index/` files as this run's output \u2014 confirm with Step 9.\nReassure the user every poll while it runs.\n\n### Step 9 \u2014 Validate the search index\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/indexing/primitives/validate_search_index/validate_search_index.py\n```\n\nJSON with `status` (`ok`/`fail`/`missing`), per-table row counts, `total_people`,\n`summary`. Pass only on `status: ok` (exit 0); on `fail`/`missing` (exit 1) report\nthe `errors`. Echo the `summary`.\n\n---\n\n## Done\n\nReport a terse summary: N Gmail accounts synced, contacts imported, merged network\nof M people, index validated. Remind the user that rerunning `$import-gmail`\nreruns the whole checklist: an explicit history window is rescanned with\n`--noresume`, while msgvault deduplicates stored messages and preserves its db.\nLinkedIn (`$setup`) and iMessage/WhatsApp (`$import-messages`)\nare separate skills.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-gmail", "pack": "ingestion", "path": "packs/ingestion/skills/import-gmail/SKILL.md", "primitive_count": 7, "primitive_refs": ["auth", "discover_contacts_pipeline", "import_contacts_pipeline", "index_contacts_pipeline", "msgvault_setup", "pull_runtime_keys", "validate_search_index"]}, {"description": "Gmail network import from local msgvault metadata. Uses msgvault SQLite, writes .powerpacks artifacts, and avoids Powerset-hosted Gmail OAuth/sync.", "display_name": "powerset:import-gmail-network", "heading": "Import Gmail Network", "markdown": "---\nname: import-gmail-network\ndescription: Gmail network import from local msgvault metadata. Uses msgvault SQLite, writes .powerpacks artifacts, and avoids Powerset-hosted Gmail OAuth/sync.\n---\n\n# Import Gmail Network\n\nUse this skill when the user wants to import Gmail/network contacts into\nPowerpacks.\n\nV1 scope is intentionally narrow: `.powerpacks/` artifacts only, backed by\nlocal msgvault metadata. Do not use Powerset-hosted Gmail OAuth/sync helpers,\ntask JSON, or an external legacy app checkout; code must live inside Powerpacks.\n\n## Consent / approval model\n\nCurrent V1 has no spend/write approval confirmations because it only reads local\nmsgvault metadata and writes local artifacts. Stop for explicit approval before\nany uploads, source seeding, production mutation, or paid enrichment.\n\nDo not assume EnrichLayer/RapidAPI keys exist. Do not call Powerset Gmail OAuth\nor backend gmail-sync endpoints for this flow.\n\n## msgvault metadata import\n\nmsgvault by Wes McKinney stores Gmail metadata in a local SQLite database,\nusually `~/.msgvault/msgvault.db`. Powerpacks reads only `sources`,\n`participants`, `messages`, and `message_recipients` to derive email/name/count\nmetadata; it never reads message bodies, subjects, snippets, raw MIME, or\nattachments.\n\nFirst list local msgvault Gmail source accounts so the harness can echo them\nback and ask the operator which ones to add:\n\n```bash\nuv run --project . python packs/ingestion/primitives/gmail_network_import/gmail_network_import.py msgvault-accounts \\\n  --db ~/.msgvault/msgvault.db\n```\n\nThen import one selected account at a time:\n\n```bash\nuv run --project . python packs/ingestion/primitives/gmail_network_import/gmail_network_import.py msgvault \\\n  --db ~/.msgvault/msgvault.db \\\n  --account-email <gmail-account-email>\n```\n\nThis writes legacy Gmail CSV artifacts plus canonical\n`.powerpacks/network-import/discover/gmail/<account>/people.csv`.\n\n## Legacy one-person seed\n\nThe primitive still has `run` / `continue` / `approve` for deterministic local\nfixtures. Do not use those commands for real Gmail sync; use `msgvault`.\n\n## Multi-account model\n\nmsgvault stores Gmail accounts in `sources`. Pass `--account-email` to filter to\none source account, or omit it to import metadata across all msgvault sources.\nLater orchestrators can merge by email, LinkedIn URL, or resolved person ID. Do\nnot ask OpenAI to infer that multiple emails are the same person in V1.\n\n## Sub-agent orchestration\n\nFor future long approved steps, the main agent can delegate `continue` to a\nsub-agent and ask it to return only status, step id, artifacts, return code, and\nlog tail. Keep the main chat clean; never paste full CSVs or secrets.\n\n## Output summary\n\nEnd with:\n\n- run ledger path\n- run artifact directory\n- generated CSV paths\n- confirmation that no external APIs, DVC, uploads, or prod writes ran\n", "mcp_count": 0, "mcp_refs": [], "name": "import-gmail-network", "pack": "ingestion", "path": "packs/ingestion/skills/import-gmail-network/SKILL.md", "primitive_count": 1, "primitive_refs": ["gmail_network_import"]}, {"description": "Import a LinkedIn Connections.csv export into Powerpacks-local people.csv artifacts using shared enrich_people delegation and run/continue/approve.", "display_name": "powerset:import-linkedin-network", "heading": "Import LinkedIn Network", "markdown": "---\nname: import-linkedin-network\ndescription: Import a LinkedIn Connections.csv export into Powerpacks-local people.csv artifacts using shared enrich_people delegation and run/continue/approve.\n---\n\n# Import LinkedIn Network\n\nUse this skill when the user wants to import LinkedIn connections.\n\nDo not depend on an external legacy app checkout. All code and artifacts live in Powerpacks.\nExternal API enrichment via the shared RapidAPI-only `enrich_people` primitive is spend-bearing only for cache misses and must be approved after the local CSV conversion step. Seed `--profile-cache-dir` to avoid paid calls when possible. A hidden row cap exists only for tiny local smoke tests; do not use caps in real workflows.\n\n## Main loop\n\n```bash\nuv run --project . python packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py run \\\n  --csv <Connections.csv> \\\n  --source-user <user-label> \\\n  --operator-id <operator-id-or-local>\n```\n\nIf blocked and the user approves spend:\n\n```bash\nuv run --project . python packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py approve\nuv run --project . python packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py continue\n```\n\n## Output summary\n\nReport only:\n\n- ledger path\n- run directory\n- parsed connection count\n- whether enrichment is blocked/completed\n- canonical `people.csv` path when produced\n- cache hit / paid call counts from the delegated enrichment summary\n\nDo not paste CSV contents or raw provider JSON into chat.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-linkedin-network", "pack": "ingestion", "path": "packs/ingestion/skills/import-linkedin-network/SKILL.md", "primitive_count": 2, "primitive_refs": ["enrich_people", "linkedin_network_import"]}, {"description": "Import or smoke-test Twitter/X network artifacts through the RapidAPI + MOE + LinkedIn resolution pipeline. Use for $import-twitter.", "display_name": "powerset:import-twitter", "heading": "import-twitter", "markdown": "---\nname: import-twitter\ndescription: Import or smoke-test Twitter/X network artifacts through the RapidAPI + MOE + LinkedIn resolution pipeline. Use for $import-twitter.\n---\n\n# import-twitter\n\nUse this skill for `$import-twitter` or Twitter/X network import testing.\n\nThis is an alias/wrapper around `twitter_network_import`. The production source\ncrawl is RapidAPI-backed and requires approval. Keep artifacts under\n`.powerpacks/network-import/discover/twitter/`.\n\n## Jake 10-row sanity command\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py run \\\n  --handle jake_zeller \\\n  --max-pages 1 \\\n  --limit 10 \\\n  --min-score 0 \\\n  --linkedin-workers 10 \\\n  --aggregator-workers 10\n```\n\nThen approve/continue as the primitive requests:\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py approve\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py continue\n```\n\n## Notes\n\n- Requires a RapidAPI Twitter key subscribed to `twitter241` (`RAPIDAPI_TWITTER_KEY` or `RAPIDAPI_KEY`).\n- MOE uses OpenAI and requires approval; do not run deep research for this smoke.\n- RapidAPI LinkedIn validation uses `RAPIDAPI_LINKEDIN_KEY` or `RAPIDAPI_KEY` and requires approval.\n- Final output should include `people.csv`; summarize as `x/10 linkedins` plus counts, not raw rows.\n\nAfter Twitter finishes, run `$discover-contacts --include-existing-artifacts` to merge into local network contacts and DuckDB.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-twitter", "pack": "ingestion", "path": "packs/ingestion/skills/import-twitter/SKILL.md", "primitive_count": 1, "primitive_refs": ["twitter_network_import"]}, {"description": "Import a Twitter/X network into Powerpacks-local ingestion artifacts using the RapidAPI-backed crawl and local review pipeline.", "display_name": "powerset:import-twitter-network", "heading": "import-twitter-network", "markdown": "---\nname: import-twitter-network\ndescription: Import a Twitter/X network into Powerpacks-local ingestion artifacts using the RapidAPI-backed crawl and local review pipeline.\n---\n\n# import-twitter-network\n\nUse this skill when the user asks to import a Twitter/X network into Powerpacks-local ingestion artifacts.\n\n## Workflow\n\nUse the primitive at:\n\n```bash\npacks/ingestion/primitives/twitter_network_import/twitter_network_import.py\n```\n\nThe source crawl is RapidAPI-backed only; do not ask for or use a local Twitter CSV as the production source. All artifacts must remain under `.powerpacks/network-import/discover/twitter/`.\n\nPipeline stages: RapidAPI Twitter crawl \u2192 local heuristic score \u2192 OpenAI MOE expert evaluation \u2192 free parallel LinkedIn pre-resolution \u2192 parallel RapidAPI LinkedIn validation \u2192 canonical `people.csv` formatting with temporary legacy alias.\n\n## Commands\n\nStart a run:\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py run --handle <operator_handle> --max-pages <n>\n```\n\nThe run stops before spend-bearing API calls. After explicit user approval:\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py approve\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py continue\n```\n\nCheck status:\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py status\n```\n\n## Guardrails\n\n- Ask before RapidAPI Twitter crawl, OpenAI MOE evaluation, or RapidAPI LinkedIn validation.\n- Never print API keys.\n- No Postgres writes.\n- No browser URLs containing bearer tokens.\n- A hidden row cap exists only for tiny local smoke tests. Do not use it in real workflows.\n- If using secrets from another local repo for a smoke test, source them into the process environment only and do not paste values into chat.\n\n## Outputs\n\nSummarize only counts and paths, not full datasets:\n\n- `followers_dump.csv`\n- `candidates.csv`\n- `moe_evaluated.csv`\n- `linkedin_resolved.csv`\n- `linkedin_resolution_queue.csv`\n- `linkedin_validated.csv`\n- `people.csv`\n- `people_harmonic_all.csv` temporary compatibility alias\n", "mcp_count": 0, "mcp_refs": [], "name": "import-twitter-network", "pack": "ingestion", "path": "packs/ingestion/skills/import-twitter-network/SKILL.md", "primitive_count": 1, "primitive_refs": ["twitter_network_import"]}, {"description": "Walk a user through linking/exporting all local network ingestion sources and persist non-secret status in .powerpacks/ingestion/accounts.json.", "display_name": "powerset:ingestion-onboarding", "heading": "Ingestion Onboarding", "markdown": "---\nname: ingestion-onboarding\ndescription: Walk a user through linking/exporting all local network ingestion sources and persist non-secret status in .powerpacks/ingestion/accounts.json.\n---\n\n# Ingestion Onboarding\n\nUse the onboarding primitive for status/plan checks. Current onboarding is\n**link-only**: record source links in `.powerpacks/ingestion/accounts.json` and\ndo not run Gmail/LinkedIn network imports, `msgvault sync-full`,\n`discover_contacts_pipeline`, Twitter crawls, messages import/research, or\nenrichment until the completed handoff.\n\nStart/resume the conversational setup flow:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py run\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --input <user-reply>\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py skip\n```\n\nHarnesses should prefer structured `continue --action ...` / `--csv ...` flags\nover free-form replies whenever possible:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action yes\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action no\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action skip\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action done\n```\n\nFor the LinkedIn CSV handoff, use the `harness_actions` commands returned by the\nprimitive, or these equivalent flags:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action scan-linkedin-downloads\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action open-downloads\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action open-linkedin-drop-folder\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action check-linkedin-drop-folder\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --csv <Connections.csv>\n```\n\nWhen a primitive response has `status: needs_agent_action`, Codex must run the\nreturned `command` itself. Do not tell the user to run it. After the command\nfinishes, run the returned `continue_command` when present, or continue with\n`done`.\n\nWhen a primitive response has `status: needs_user_action`, perform any returned\nlocal `command` that Codex can run, then tell the user only the human action\nthat remains, such as browser OAuth or QR/device linking.\n\nWhen a primitive response has `status: needs_user_input`, ask the question\ndirectly and continue with the user's reply.\n\nCheck/plan without entering the flow:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py check\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py plan\n```\n\nFor guided CLI operation, prefer the idempotent `step` loop. The harness should\nkeep calling the same command until it returns `completed`, `needs_input`,\n`waiting`, or `blocked_approval`; then echo the emitted prompt/commands, ask the\noperator to add/confirm/skip, and rerun `step`.\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step\n```\n\nGmail is msgvault-backed. The Gmail step should be dead simple for the user:\nask which discovered accounts to link and what other Gmail addresses they want\nto add. Multiple discovered source accounts are supported by repeating\n`--gmail-account`; `--gmail-all` records every discovered source account;\n`--gmail-add-email` starts the OAuth/test-user/add-account authorization flow\nfor new addresses as pending accounts without starting msgvault sync or marking\nthem import-ready; `--skip-source gmail` records an explicit skip.\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --gmail-db ~/.msgvault/msgvault.db \\\n  --gmail-account me@gmail.com \\\n  --gmail-account work@example.com\n```\n\nIf `step` returns `status: needs_agent_action` with `commands`, Codex must run\nthe returned commands in order. Do not tell the user to run them. For extra\nGmail addresses this means Codex runs the Google OAuth test-user browser\nautomation and authorizes each Gmail account in msgvault as user-action/linking.\nThe returned commands route through `msgvault_setup.py add-test-users`,\n`add-account`, or `browser-setup --add-account`; they are not network imports\nand must not run `msgvault sync-full`. After those commands succeed, rerun the\nemitted command with `--gmail-authorized-email <email>` so the account moves\nfrom pending to linked; `$setup` import workers own `msgvault sync-full` before\nreading the local msgvault DB.\nOnly ask the user to complete browser login/consent when Google requires human\naction.\n\nLinkedIn CSV remains the primary LinkedIn path:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --linkedin-csv ~/Downloads/Connections.csv \\\n  --linkedin-source-user <label>\n```\n\nThe LinkedIn step only records `--linkedin-csv` and `--linkedin-source-user`; it\ndoes not run provider enrichment/import. Messages and Twitter are also\nlink-only: use `--messages-contacts-csv <path>` and optional `--twitter-handle\n<handle>`, or skip sources with `--skip-source <messages|gmail|linkedin_csv|twitter>`.\n\nIt tracks non-secret v2 state in `.powerpacks/ingestion/accounts.json`:\n`gmail.msgvault_db/account_emails/oauth_app/oauth_test_users/available_accounts/selected_accounts/pending_accounts`,\n`linkedin_csv.csv_path/source_label`, `twitter.handle`, and\n`messages.contacts_csv`, while preserving v1 `usernames`/`artifacts` mirrors.\nWhen `step` returns completed, use the emitted handoff; its import phase calls\n`discover_contacts_pipeline.py run --from-accounts ...` after user confirmation.\n\nNever store tokens/passwords/cookies there. Only store usernames, linked status,\nartifact paths, and notes.\n", "mcp_count": 0, "mcp_refs": [], "name": "ingestion-onboarding", "pack": "ingestion", "path": "packs/ingestion/skills/ingestion-onboarding/SKILL.md", "primitive_count": 2, "primitive_refs": ["msgvault_setup", "onboarding"]}, {"description": "Import LinkedIn network data from LinkedIn's Connections.csv export into local Powerpacks artifacts.", "display_name": "powerset:linkedin-sync-csv", "heading": "LinkedIn Sync CSV", "markdown": "---\nname: linkedin-sync-csv\ndescription: Import LinkedIn network data from LinkedIn's Connections.csv export into local Powerpacks artifacts.\n---\n\n# LinkedIn Sync CSV\n\nUse `packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py`.\n\nThis is the stable LinkedIn ingestion path today.\n\n```bash\nuv run --project . python packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py run \\\n  --csv <Connections.csv> \\\n  --source-user <label>\n```\n\nAfter a successful run, update account registry:\n\n```bash\nuv run --project . python packs/ingestion/primitives/account_registry/account_registry.py mark \\\n  --channel linkedin_csv --username <label> --artifact <people_csv> --success\n```\n\nExternal provider enrichment requires approval.\n", "mcp_count": 0, "mcp_refs": [], "name": "linkedin-sync-csv", "pack": "ingestion", "path": "packs/ingestion/skills/linkedin-sync-csv/SKILL.md", "primitive_count": 2, "primitive_refs": ["account_registry", "linkedin_network_import"]}, {"description": "Configure a LinkedIn MCP server and track local non-secret LinkedIn MCP account state.", "display_name": "powerset:linkedin-sync-mcp", "heading": "LinkedIn Sync MCP", "markdown": "---\nname: linkedin-sync-mcp\ndescription: Configure a LinkedIn MCP server and track local non-secret LinkedIn MCP account state.\n---\n\n# LinkedIn Sync MCP\n\nUse when a user wants to connect LinkedIn through an MCP rather than uploading a CSV.\n\nCurrent recommended MCP candidate:\n\n- https://github.com/stickerdaniel/linkedin-mcp-server\n- package: `linkedin-scraper-mcp@latest`\n\nThis is WIP for connection export, so do not represent it as equivalent to CSV ingestion yet.\nUse it for setup, authenticated profile/search tools, and future connection export once upstream exposes it.\n\n```bash\nuv run --project . python packs/ingestion/primitives/linkedin_mcp_import/linkedin_mcp_import.py instructions\nuvx linkedin-scraper-mcp@latest --login\nuv run --project . python packs/ingestion/primitives/linkedin_mcp_import/linkedin_mcp_import.py mark-linked --username <profile-url-or-username>\n```\n\nDo not store LinkedIn credentials or cookies in Powerpacks.\n", "mcp_count": 0, "mcp_refs": [], "name": "linkedin-sync-mcp", "pack": "ingestion", "path": "packs/ingestion/skills/linkedin-sync-mcp/SKILL.md", "primitive_count": 1, "primitive_refs": ["linkedin_mcp_import"]}, {"description": "Alias for msgvault local Gmail archive setup. Use for `$local-msg-vault`, local message vault setup, browser-assisted Google OAuth Desktop app creation named `local-msg-vault`, msgvault account auth, and msgvault MCP registration.", "display_name": "powerset:local-msg-vault", "heading": "local-msg-vault", "markdown": "---\nname: local-msg-vault\ndescription: Alias for msgvault local Gmail archive setup. Use for `$local-msg-vault`, local message vault setup, browser-assisted Google OAuth Desktop app creation named `local-msg-vault`, msgvault account auth, and msgvault MCP registration.\n---\n\n# local-msg-vault\n\nThis is an alias for the `msgvault` skill. Load and follow\n`packs/ingestion/skills/msgvault/SKILL.md`.\n\nDefault setup command:\n\n```bash\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py browser-setup --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-test-users <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-account --email <gmail>\n```\n", "mcp_count": 0, "mcp_refs": [], "name": "local-msg-vault", "pack": "ingestion", "path": "packs/ingestion/skills/local-msg-vault/SKILL.md", "primitive_count": 1, "primitive_refs": ["msgvault_setup"]}, {"description": "Download EVERYTHING for a set of people across Gmail, iMessage, and WhatsApp and format it into a faithful, verbatim raw markdown archive \u2014 one file per email thread / DM / group, ## YYYY headings inside, append-only incremental sync. The inverse of $deep-context (which synthesizes facts and discards text). Use for $logbook, \"build a raw logbook\", \"archive all my messages with these people\", \"dump every email/text/whatsapp with X verbatim\", \"logbook from this CSV\".", "display_name": "powerset:logbook", "heading": "logbook", "markdown": "---\nname: logbook\ndescription: Download EVERYTHING for a set of people across Gmail, iMessage, and WhatsApp and format it into a faithful, verbatim raw markdown archive \u2014 one file per email thread / DM / group, ## YYYY headings inside, append-only incremental sync. The inverse of $deep-context (which synthesizes facts and discards text). Use for $logbook, \"build a raw logbook\", \"archive all my messages with these people\", \"dump every email/text/whatsapp with X verbatim\", \"logbook from this CSV\".\n---\n\n<!--\nCreated: 2026-06-25\nChangelog:\n- 2026-06-25: Initial skill. Raw verbatim archive (no LLM, no network, no spend) from a\n  people CSV. Streaming readers (uncapped, group-aware) reuse deep_context.sources for the\n  msgvault connection, attributedBody decoding, and immutable chat.db open. One entry per\n  person OR group (slug = person/group name); one file per email thread / DM / group;\n  ## YYYY headings inside; stable ids (gmail thread id + message id + historyId, wacli\n  chat_jid + msg_id + rowid, chat.db chat guid + ROWID) in frontmatter + manifest. export =\n  full rebuild; sync = append-only incremental keyed on a monotonic per-channel watermark.\n-->\n\n# logbook\n\nUse this for `$logbook`, \"build a raw logbook\", \"archive everything I've said\nwith these people\", or \"dump every email/text/WhatsApp with <person> verbatim\".\n\nIt builds a **faithful, verbatim raw archive** of your conversations with a list\nof people: every Gmail thread, every iMessage/WhatsApp DM, and group chats \u2014\nformatted into readable markdown. **No LLM, no network, no spend** \u2014 every read is\na local SQLite query, so it's fast and free. This is the *inverse* of\n`$deep-context`: that skill synthesizes facts and throws the text away; this one\nkeeps the text.\n\n## Defaults \u2014 this is NOT `$deep-context`. Do not borrow its defaults.\n\n`$logbook` has its OWN behavior. Even though it shares low-level readers with\n`$deep-context`, **none of deep-context's caps or opt-ins apply here**:\n\n- **NO message cap.** Download EVERYTHING. deep-context caps pooled messages at\n  1600 per person \u2014 `$logbook` does not. Never apply a 1600 (or any) message cap.\n- **Groups are ON by default** (DMs *and* every group a person is in, both chat\n  channels). deep-context makes group bodies opt-in; `$logbook` includes them by\n  default. Use `--no-groups` only if the user explicitly asks to exclude groups.\n- **Deepen ALWAYS** (step 3 below) \u2014 it is not optional and you do not ask to skip.\n- **There is no `--force` flag.** If the user says \"force\"/\"refresh\", they mean\n  rebuild from scratch: that's just `export` (it overwrites). Do not invent flags.\n- **When a request is genuinely ambiguous, ASK** \u2014 do not silently pick a\n  conservative default. \"Everything\" means everything; if you're unsure of scope,\n  ask the user rather than quietly narrowing it.\n\nOutput lives under `.powerpacks/logbook/` (gitignored):\n\n```\n.powerpacks/logbook/\n  <slug>/                      slug = person name OR group name\n    gmail/<year>-<subject>-<hash>.md   one file per email thread\n    imessage/dm.md\n    whatsapp/dm.md\n  <group-slug>/whatsapp/group.md       groups are their own top-level entry\n  index.md                     catalog (entries, files, message counts, channels)\n  manifest.json                counts + per-container stable-id watermarks (sync state)\n```\n\nEach file has YAML frontmatter (`entry, channel, kind, container_id, title,\ncreated_at`), then `## YYYY` sections of `**<date> \u00b7 <sender>:** <verbatim body>`.\n\n## Privacy\n\nThis skill reads AND persists **verbatim message bodies**, including **group\nchats** \u2014 a deliberate, second scoped exception to the metadata-only privacy\ncontract (`$deep-context` is the first, but it's DM-only and synthesized). Bodies\nare written to `.powerpacks/logbook/` which is **gitignored**; nothing is sent\nanywhere. **Groups are included by default** (this is \"everything\"); pass\n`--no-groups` to limit to DMs/threads. Surface this once so the user knows\nverbatim group bodies are being archived.\n\n## Run it in YOUR terminal (Full Disk Access)\n\niMessage reads need `chat.db`, which requires **Full Disk Access**. The Claude\nCode Bash tool runs under a helper that does NOT inherit your terminal's FDA, so\niMessage reads can come back empty there. For the iMessage channel, run\n`bin/logbook ...` directly in a terminal that has Full Disk Access (e.g. Ghostty).\nGmail (msgvault) and WhatsApp (wacli) read fine from anywhere.\n\n## Flow\n\n1. **Ask for the CSV.** \"Point me to your CSV of people to build a logbook for.\"\n   Accepted shapes (auto-detected):\n   - founder CSV: `Founder, Cell, Emails, WhatsApp Groups` (Cell = comma-separated\n     phones; Emails = `;`-separated; the group cell names one group to archive).\n   - the merged `people.csv` (canonical network-import schema).\n\n2. **Check reachability** (read-only, free) \u2014 confirms we can actually reach these\n   people per channel and how deep each store goes:\n   ```bash\n   bin/logbook check --csv \"<path>\"\n   ```\n   Report per-channel `status` + earliest/latest dates. If iMessage is\n   `unreadable_full_disk_access`, tell the user to grant FDA (or run in their\n   terminal) before relying on iMessage.\n\n3. **Deepen the local stores \u2014 ALWAYS. Not optional, do not ask, do not offer to\n   skip.** \"Everything\" means deepest-available, so deepen is part of every run. It\n   is FREE (no per-message cost). Just run it:\n   ```bash\n   bin/logbook deepen --csv \"<path>\" --run --rounds 3\n   ```\n   `deepen` is **scoped to the CSV people's chats** (their DMs + groups, by jid) \u2014 it\n   does NOT backfill the user's entire WhatsApp. Do NOT print an estimate as a gate\n   and do NOT ask \"skip deepen?\" \u2014 just deepen, then export. (WhatsApp may connect to\n   the user's phone; mention that in passing, but still run it.) Per-channel depth:\n   - **iMessage** \u2014 `chat.db` is already complete locally (beginning-of-time); deepen is a no-op.\n   - **Gmail (msgvault)** \u2014 backfills the whole mailbox (`gmail.py discover --fresh`, OAuth, free).\n   - **WhatsApp (wacli)** \u2014 shallow by default; deepen runs scoped\n     `wacli history backfill --chat <jid> --requests <rounds>` (on-demand sync\n     from the primary phone). Depth is bounded by what the phone still holds, so\n     full WhatsApp history is not guaranteed.\n\n4. **Export** (full build \u2014 all channels + all groups by default):\n   ```bash\n   bin/logbook export --csv \"<path>\"                     # everything (all channels + groups)\n   bin/logbook export --csv \"<path>\" --channels gmail    # one channel\n   bin/logbook export --csv \"<path>\" --no-groups         # DMs/threads only\n   bin/logbook export --csv \"<path>\" --slug <one-slug>   # just one person/group\n   ```\n   Then point the user at `.powerpacks/logbook/index.md`.\n\n5. **Sync** later (incremental, **append-only** \u2014 never overwrites). Reads the\n   per-channel watermark from `manifest.json`, pulls only newer messages, and\n   appends them to the existing files:\n   ```bash\n   bin/logbook sync --csv \"<path>\"\n   ```\n   Re-running with nothing new is a no-op.\n\n## Notes\n\n- **Memory:** one ordered cursor per (entry, channel), streamed row-by-row; one\n  output file open at a time. Peak RSS stays in the tens of MB even for a contact\n  with 100k+ messages \u2014 bounded by the work, not the corpus.\n- **Stable ids for dedupe/sync** live in each file's frontmatter (`container_id`)\n  and the manifest watermark map: Gmail thread id + message id (+ `sources.sync_cursor`\n  historyId), wacli `chat_jid` + `msg_id` + monotonic `rowid`, chat.db `chat.guid`\n  + monotonic `ROWID`. Sync filters on the monotonic id, so appends never duplicate.\n- **Raw fidelity:** bodies are kept verbatim (quoted reply chains, signatures,\n  `[cid:...]` image refs and all) \u2014 this is a raw archive, not a summary.\n- Group entries are keyed by group name (their own top-level slug), so a shared\n  group is written once, not duplicated under every member.\n", "mcp_count": 0, "mcp_refs": [], "name": "logbook", "pack": "ingestion", "path": "packs/ingestion/skills/logbook/SKILL.md", "primitive_count": 2, "primitive_refs": ["deep_context", "logbook"]}, {"description": "Set up msgvault for local Gmail archive access, including install/status, browser-assisted Google OAuth Desktop app creation, client_secret config, account auth, and Codex MCP registration. Use for `$msgvault`, `$local-msg-vault`, `msgvault setup`, `msgvault status`, `msgvault add-account`, `msgvault mcp install`, or `powerset create oauth app` when the target is Gmail/msgvault OAuth.", "display_name": "powerset:msgvault", "heading": "msgvault", "markdown": "---\nname: msgvault\ndescription: Set up msgvault for local Gmail archive access, including install/status, browser-assisted Google OAuth Desktop app creation, client_secret config, account auth, and Codex MCP registration. Use for `$msgvault`, `$local-msg-vault`, `msgvault setup`, `msgvault status`, `msgvault add-account`, `msgvault mcp install`, or `powerset create oauth app` when the target is Gmail/msgvault OAuth.\n---\n\n# msgvault\n\nUse this skill when the user wants local Gmail archive setup through msgvault or\nasks to create a Google OAuth app for msgvault.\n\n## Commands\n\nRun from the Powerpacks repo root:\n\n```bash\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py status\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py browser-setup --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py setup --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py setup --client-secret <client_secret.json> --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py create-oauth-app --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-test-users <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-account --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py mcp-install\n```\n\nFrom an installed skill bundle, replace `packs/...` with\n`powerpacks/packs/...`.\n\n## Routing\n\n- `$msgvault`, `$local-msg-vault`, status requests: run `status` and summarize readiness.\n- `$msgvault setup`, `$local-msg-vault setup`, onboarding Gmail archive setup:\n  run `browser-setup`; include `--email` if the user supplied one. Then run\n  `add-account --email <gmail>` when the user is ready to authorize the Gmail\n  account.\n- `$msgvault create oauth app` or `$powerset create oauth app`: run\n  `browser-setup` if the user wants automation, otherwise `create-oauth-app`;\n  the Google OAuth Desktop client name should be `local-msg-vault`.\n- User provides a downloaded `client_secret*.json`: run `setup --client-secret\n  <path>` and add `--email` if known.\n- Workspace org needs its own app: add `--oauth-app <short-name>`.\n- Add OAuth test users: run `add-test-users <gmail>`; add `--project <id>`\n  or `--oauth-app <short-name>` when targeting a non-default app.\n- Headless machine: add `--headless` when authorizing the account.\n- Reruns: `browser-setup` skips Google Console automation when a valid local\n  client secret is already configured. Use `--force-browser-setup` only when\n  intentionally creating/replacing the OAuth client.\n\n## User-facing wording\n\nKeep it direct:\n\n- `msgvault is installed.`\n- `Creating the Google OAuth app in Chrome.`\n- `Downloaded client secret configured.`\n- `OAuth app already configured.`\n- `msgvault account authorized.`\n- `msgvault MCP installed. Restart Codex to load it.`\n\nDo not print client secret values or token paths beyond the configured JSON\nfile path. msgvault stores and searches Gmail message data locally; make that\nclear before starting a sync, but do not over-explain when the user only asked\nfor setup.\n", "mcp_count": 0, "mcp_refs": [], "name": "msgvault", "pack": "ingestion", "path": "packs/ingestion/skills/msgvault/SKILL.md", "primitive_count": 1, "primitive_refs": ["msgvault_setup"]}, {"description": "Walk a user through linking/exporting all local network ingestion sources and persist non-secret status in .powerpacks/ingestion/accounts.json.", "display_name": "powerset:onboard", "heading": "Ingestion Onboarding", "markdown": "---\nname: onboard\ndescription: Walk a user through linking/exporting all local network ingestion sources and persist non-secret status in .powerpacks/ingestion/accounts.json.\n---\n\n# Ingestion Onboarding\n\nOnboarding is the top-level Codex-run state machine. Task 2 onboarding is\n**link-only**: it records source links in `.powerpacks/ingestion/accounts.json`\nand must not run `gmail_network_import`, `msgvault sync-full`,\n`linkedin_network_import`, `discover_contacts_pipeline`, Twitter crawls, messages\nimport/research, or downstream enrichment. Keep human/browser account linking in the main thread,\nthen hand long local import/index work to worker sub-agents only after the\ncompleted handoff and user confirmation.\n\nUse the onboarding primitive for status/plan checks:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py check\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py plan\n```\n\nFor guided CLI operation, prefer the idempotent `step` loop. Keep calling the\nsame command until it returns `completed`, `needs_input`, `waiting`, or\n`blocked_approval`; then echo the emitted prompt/commands, ask the operator to\nadd/confirm/skip, and rerun `step`.\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step\n```\n\nGmail is msgvault-backed. The Gmail step should be dead simple for the user:\non a first run, ask which Gmail address they want to link first. Do not infer\nthe email from gcloud, Powerset login, git config, local status, or old\nartifacts. After the user answers, run `step --gmail-add-email <email>`.\n\nIf msgvault already has local checkpoints, ask which discovered accounts to\nlink. Otherwise, `--gmail-add-email` records a pending authorization request and\nreturns authorization commands without marking the account import-ready or\nstarting sync. Multiple discovered source accounts are supported by repeating\n`--gmail-account`; `--gmail-all` records every discovered source account;\n`--gmail-add-email` starts the add-account flow for new addresses;\n`--skip-source gmail` records an explicit skip.\n\nFresh Gmail start:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --gmail-add-email me@gmail.com\n```\n\nFor first-run Gmail linking, the email supplied with `--gmail-add-email` is also\nthe Google account that should own/create the local OAuth project. The returned\nsetup command should pass an explicit deterministic `--project` derived from\nthat email and must require/login as the same email before project creation. Do\nnot pick a project from the active local `gcloud` state.\n\nRecord discovered Gmail accounts:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --gmail-db ~/.msgvault/msgvault.db \\\n  --gmail-account me@gmail.com \\\n  --gmail-account work@example.com\n```\n\nIf `step` returns `status: needs_agent_action` with `commands`, Codex must run\nthe returned commands in order. Do not tell the user to run them. For extra\nGmail addresses this means Codex runs the Google OAuth test-user browser\nautomation and authorizes each Gmail account in msgvault as user-action/linking.\nThese commands may include `msgvault_setup.py add-test-users`, `add-account`, or\n`browser-setup --add-account`; they are not network imports and must not start\n`msgvault sync-full`. After those commands succeed, rerun the emitted command\nwith `--gmail-authorized-email <email>` so the account moves from pending to\nlinked; `$setup` import workers own msgvault sync for selected accounts.\nOnly ask the user to complete browser login/consent when Google requires human\naction. If msgvault has no OAuth client configured yet, the first returned\ncommand will be `browser-setup --email <gmail> --add-account`; run that before\ntest-user or additional add-account commands.\n\nLinkedIn CSV remains the primary LinkedIn path:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --linkedin-csv ~/Downloads/Connections.csv \\\n  --linkedin-source-user <label>\n```\n\nThe LinkedIn step only validates and records the CSV path/source label; it does\nnot run enrichment or imports. Messages onboarding is also link-only: it runs\nthe scoped iMessage/Contacts permission check and checks WhatsApp auth/link\nstatus. If WhatsApp is not linked, run the returned `import_whatsapp_wacli.py\nauth` command or rerun with `--skip-messages-whatsapp`; neither path runs\nWhatsApp sync or exports contacts. `--messages-contacts-csv <path>` remains a\nlegacy/manual override for recording an existing contacts CSV. Twitter records a\nhandle with `--twitter-handle <handle>`. Other missing sources can be marked\ndone with `--skip-source <messages|gmail|linkedin_csv|twitter>`.\n\nIt tracks non-secret state in `.powerpacks/ingestion/accounts.json`.\n\n## After Linking\n\nWhen `step` returns `status: completed`, read the emitted `handoff` object.\nShow the `confirmation_prompt` and ask once before long work. After approval:\n\n- Run `handoff.handoff_command`. That command is the only post-link handoff path\n  and delegates import worker planning, approval confirmations, fan-in, and indexing\n  readiness to `$setup` / `setup.py handoff`.\n- Dispatch import/index workers only from the setup handoff response. Do not use\n  legacy direct onboarding worker phases.\n- Keep the main thread user-friendly: report connected sources, approval confirmations,\n  current counts, final local paths, and real failures. Do not describe ledgers,\n  fan-in/fan-out, or implementation details unless the user asks.\n\nDo not put account-linking browser flows in a worker. The top-level Codex\norchestrator owns Gmail/msgvault linking, Google browser actions, LinkedIn CSV\nhandoff, message/WhatsApp linking, Twitter linking, and user confirmations.\n\nThe setup handoff is the first post-link place that plans imports. Onboarding\nitself never runs imports. Never store tokens/passwords/cookies there. The v2\nregistry stores non-secret config (`gmail.msgvault_db/account_emails/oauth_app/oauth_test_users/available_accounts/selected_accounts`,\n`linkedin_csv.csv_path/source_label`, `twitter.handle`,\n`messages.imessage/whatsapp/planned_contacts_csv`) while preserving v1\n`usernames`/`artifacts` mirrors.\n", "mcp_count": 0, "mcp_refs": [], "name": "onboard", "pack": "ingestion", "path": "packs/ingestion/skills/onboard/SKILL.md", "primitive_count": 4, "primitive_refs": ["discover_contacts_pipeline", "gmail_network_import", "linkedin_network_import", "msgvault_setup"]}, {"description": "Deterministic LinkedIn-only Powerpacks setup. Use for $setup. Steps through update, a supported Powerset workspace or an already-prepared custom Modal workspace, LinkedIn Connections.csv import on Modal, source merge, Modal indexing, and local search-index validation. Always reruns the full checklist; overwrites in place. For Gmail use $import-gmail; for iMessage/WhatsApp use $import-messages.", "display_name": "powerset:setup", "heading": "setup", "markdown": "---\nname: setup\ndescription: Deterministic LinkedIn-only Powerpacks setup. Use for $setup. Steps through update, a supported Powerset workspace or an already-prepared custom Modal workspace, LinkedIn Connections.csv import on Modal, source merge, Modal indexing, and local search-index validation. Always reruns the full checklist; overwrites in place. For Gmail use $import-gmail; for iMessage/WhatsApp use $import-messages.\n---\n\n<!--\nCreated: 2026-06-17\nChangelog:\n- 2026-06-17: Rewrote setup as a deterministic, rerunnable checklist.\n- 2026-06-17: Promoted to a unified LinkedIn+Gmail+Messages multi-source flow.\n- 2026-06-20: Split back to LinkedIn-only. Gmail moved to $import-gmail and\n  iMessage/WhatsApp to $import-messages (each does its source + fan-in merge +\n  Modal index). $setup now: update -> login -> keys -> import LinkedIn ->\n  fan-in -> index -> validate. Uses the modern import -> fan-in -> index path so\n  the $import-* skills can merge their sources on top of LinkedIn.\n- 2026-07-09: Step 0 runs the updater for the CURRENT harness (bin/update-codex\n  was hardcoded \u2014 a Claude Code run refreshed Codex's skills, never its own).\n  Step 6: note the status.json path's historical name (index-people reuses the\n  Gmail progress dir; the path is correct for LinkedIn runs).\n- 2026-07-12: Step 1 is now an explicit choice \u2014 ask whether the user has a\n  Powerset account to log in with (initializing .env from the hosted template\n  on yes) instead of silently defaulting into Powerset login. The original\n  custom-workspace route skipped login and checked local keys.\n- 2026-07-13: Corrected the custom-workspace contract: local keys alone do not\n  mount provider secrets into a sandbox. A custom Modal workspace must already\n  contain the named OpenAI and RapidAPI secrets. Documented the current need\n  for a unique `POWERPACKS_OPERATOR_ID` in shared workspaces.\n-->\n\n# setup\n\n`$setup` connects **LinkedIn** and builds one local search index: update, Powerset\nlogin, runtime keys, then import your LinkedIn `Connections.csv` (enriched on\nModal), merge, index, and validate.\n\nIt runs a **fixed checklist and always reruns it end to end**. Reruns are\nidempotent against fixed paths; rely on the primitives to overwrite.\n\n**Other sources are their own skills** (each adds its source on top of whatever\nis already imported, then re-merges + re-indexes):\n- **Gmail** \u2192 `$import-gmail`\n- **iMessage / WhatsApp** \u2192 `$import-messages`\n\n## How to run this skill\n\n**FIRST, before running anything: create a literal, visible checklist with all\neight steps below and step through it, marking each item complete as you go.**\nMandatory. Use your harness's plan/todo/task tool:\n\n- **Claude Code:** `TaskCreate` one task per step (0\u20137), then `TaskUpdate` each\n  to `in_progress` then `completed`.\n- **Codex:** `update_plan` with the eight steps, updating status as you go.\n- **Any other harness:** its equivalent todo/plan mechanism.\n\nSeed the checklist with these exact item titles:\n\n```\n0. Update Powerpacks (this harness's updater)\n1. Choose credentials (Powerset or prepared Modal workspace)\n2. Log in to Powerset (Powerset route, only if not logged in)\n3. Pull or verify Modal access and provider secrets\n4. Import LinkedIn Connections.csv\n5. Merge all sources\n6. Index the merged network\n7. Validate the search index\n```\n\nSteps 2 and 3 depend on the Step 1 choice (Step 2 is a no-op on the\ncustom-workspace route or when already logged in) \u2014 keep them in the checklist\nand mark them complete.\n\nThen:\n\n1. **Work the checklist in order 0 \u2192 7.** Exactly one item `in_progress` at a\n   time; mark it `completed` before the next. No batching, reordering, skipping.\n   One-line result per step.\n2. **Run from the canonical repo root.** Resolve once and `cd` there (see *Repo\n   root*). `.powerpacks/...` paths are relative to that root.\n3. **Deterministic & in-place.** Overwrite the fixed derived paths\n   (`.powerpacks/network-import/...`, `.powerpacks/search-index/...`); rely on\n   the primitives to overwrite. Don't pre-delete with `rm` and don't invent\n   timestamped/alternate folders.\n\n### Guardrails (hard rules)\n\n- **No context pass. Do not go exploring.** This skill is self-contained and\n  authoritative. Do not read agent memory, prior state, other docs, or primitive\n  source to re-derive paths. Build the checklist and execute it directly.\n- **Do not edit code.** Only if you hit an actual blocking bug, and say so.\n  Otherwise only invoke the primitives below.\n- **Do not write scripts to do the work.** Reuse the exact primitive commands.\n  Plain shell for `cp`/`test`/`wc`/`cat` is fine.\n- **Consent gates (pause for the user):** the Step 1 Powerset-account question\n  (when the request didn't already answer it) and the Powerset browser login\n  (Step 2). The LinkedIn import runs enrichment on Modal (no local key, no\n  extra spend prompt). Everything else runs without asking.\n\n### Repo root\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -x \"$candidate/bin/update-codex\" && -d \"$candidate/packs\" ]]; then\n      printf '%s\\n' \"$candidate\"; return 0\n    fi\n  done\n  return 1\n}\nREPO=\"$(resolve_powerpacks_root)\" || { echo \"Install Powerpacks to ~/powerpacks first.\" >&2; exit 1; }\ncd \"$REPO\"\n```\n\n---\n\n## The checklist\n\n### Step 0 \u2014 Update Powerpacks\n\nRun the updater for the harness you are running in:\n\n```bash\ncd \"$REPO\" && bin/update-codex          # Codex\ncd \"$REPO\" && bin/update-claude-code    # Claude Code\ncd \"$REPO\" && adapters/pi/install.sh    # Pi\n```\n\n### Step 1 \u2014 Choose credentials (Powerset or prepared Modal workspace)\n\nThe import + index steps need access to a Modal workspace whose sandboxes can\nmount the provider secrets used by the driver. A provisioned Powerset account\nis the supported path. An advanced custom workspace works only when it already\ncontains Modal secrets named `powerset-openai` and `powerset-rapidapi` (or the\nRapidAPI backup override is configured). A local `OPENAI_API_KEY` alone is not\nforwarded into the sandbox. Decide the route in this order:\n\n1. **The request already answered it.** \"\u2026 using my Powerset account\" (or any\n   explicit ask to use Powerset) \u2192 **Powerset route**, no question. An explicit\n   \"without Powerset\" / \"my own workspace\" \u2192 **custom-workspace route**, no question.\n2. **Already logged in.** If `.env` exists, check:\n\n   ```bash\n   test -f \"$HOME/.powerpacks/credentials.json\" && echo \"credentials.json: present\" || echo \"credentials.json: MISSING\"\n   cd \"$REPO\" && uv run --env-file .env --project . python packs/powerset/primitives/auth/auth.py whoami\n   ```\n\n   If `whoami` succeeds, say \"already logged in to Powerset as <email> \u2014 using\n   that account\" and take the **Powerset route**.\n3. **Otherwise ask the user and wait** (consent gate):\n\n   > Do you have a Powerset account you'd like to log in with? It provisions\n   > the supported Modal workspace this setup needs. If not, you need your own\n   > Modal workspace with `powerset-openai` and `powerset-rapidapi` secrets\n   > already configured, plus a working token or Modal profile.\n\n   Yes \u2192 **Powerset route**. No \u2192 **custom-workspace route**.\n\n**Powerset route only** \u2014 make sure `.env` carries the hosted Powerset config:\n\n```bash\ncd \"$REPO\"\n[ -f .env ] || { cp packs/powerset/templates/env.powerset.example .env; chmod 600 .env; }\n```\n\nIf `.env` already exists, preserve its secrets and other settings; only align\nthe public Powerset URL/Auth0 values with\n`packs/powerset/templates/env.powerset.example` if they drifted.\n\n### Step 2 \u2014 Log in (Powerset route, only if Step 1 said not logged in)\n\nCustom-workspace route, or already logged in: mark complete as a no-op. Otherwise:\n\n```bash\ncd \"$REPO\" && uv run --env-file .env --project . python packs/powerset/primitives/auth/auth.py login\n```\n\nBrowser consent. If it can't open, print the URL for the user. Re-run `whoami`.\n\n### Step 3 \u2014 Pull or verify Modal access and provider secrets\n\n**Powerset route** \u2014 pull the user's provisioned keys:\n\n```bash\ncd \"$REPO\" && uv run --env-file .env --project . python packs/powerset/primitives/pull_runtime_keys/pull_runtime_keys.py pull --env-file .env\n```\n\nVerify: `\u2026 pull_runtime_keys.py check --env-file .env`.\n\n**Custom-workspace route** \u2014 no provisioning call. The driver accepts Modal\ncredentials from `.env` or an existing `~/.modal.toml` profile. Verify that the\nselected workspace is reachable and already contains the named\n`powerset-openai` secret. It also needs either a `powerset-rapidapi` secret or a\nnon-empty local `RAPIDAPI_LINKEDIN_KEY_BACKUP` override. Create the local env\nfile if the Modal profile is the only credential source, because the remaining\nsetup commands consistently load it. `secret list --json` returns names and\nmetadata, not secret values:\n\n```bash\ncd \"$REPO\"\n[ -f .env ] || { touch .env; chmod 600 .env; }\nuv run --env-file .env --project . modal secret list --json\n```\n\nDo not proceed until `powerset-openai` is present and either\n`powerset-rapidapi` is present or `RAPIDAPI_LINKEDIN_KEY_BACKUP` is configured.\nCheck only whether the override is non-empty; never print its value. A local\n`OPENAI_API_KEY` does not create or replace the workspace OpenAI secret.\n\n**Current namespace limitation for either route:** `$setup` does not provision\na user-specific `POWERPACKS_OPERATOR_ID`. If a workspace administrator supplied\none, put it in `.env` before upload. Otherwise the driver uses an all-zero\nnamespace. Surface that as single-operator/development behavior and do not\nclaim multi-user input/run isolation.\n\n### Step 4 \u2014 Import LinkedIn Connections.csv\n\nAsk the user for their `Connections.csv` path. Place it at the canonical input\n(overwrite), then enrich it **on Modal** \u2014 the same shared enrichment + cache\nprod uses \u2014 which writes the enriched people.csv to the path the merge reads:\n\n```bash\ncd \"$REPO\"\nDEST=\".powerpacks/network-import/discover/linkedin/Connections.csv\"\nmkdir -p \"$(dirname \"$DEST\")\"\ncp -f \"<user-csv-path>\" \"$DEST\"\nuv run --env-file .env --project . python packs/indexing/modal/linkedin_modal_pipeline.py import-linkedin --csv \"$DEST\"\n```\n\nThis runs only the Modal import/enrich stage (no local DuckDB) and writes the\nenriched `.powerpacks/network-import/import/linkedin/people.csv` for the merge.\nBecause enrichment runs on Modal it needs no local RapidAPI key, and the shared\nvolume cache keeps reruns cheap. It can take a few minutes; the command prints\nprogress.\n\n### Step 5 \u2014 Merge all sources\n\nFan-in merges the per-source `import/<source>/people.csv` files into one network\n(LinkedIn here; also Gmail/Messages if you've run those skills):\n\n```bash\ncd \"$REPO\" && uv run --env-file .env --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py fan-in \\\n  --people-csv .powerpacks/network-import/merged/people.csv\n```\n\nWrites `.powerpacks/network-import/merged/people.csv` (default\n`--include-existing-artifacts` picks up every imported source).\n\n### Step 6 \u2014 Index the merged network\n\nIndex the merged people.csv on Modal (generic indexer, no import stage) and\ndownload the duckdb:\n\n```bash\ncd \"$REPO\" && uv run --env-file .env --project . python packs/indexing/modal/linkedin_modal_pipeline.py index-people \\\n  --people-csv .powerpacks/network-import/merged/people.csv\n```\n\nRun it in the background and keep Step 6 `in_progress` until the command\n**exits 0**. This stage is long and mostly quiet \u2014 set expectations and don't\npanic:\n\n- **Expect 5\u201330+ minutes.** Most of the work (embeddings, role/company\n  classification, duckdb build) runs **server-side on Modal**, so the local\n  process can print little or nothing for **many minutes at a stretch**. A long\n  silence with the process still alive is **normal and expected \u2014 not a hang**.\n  Do not interrupt it, do not retry, do not declare failure on quiet.\n- **The authoritative signal is the process itself**, not a status file: it stays\n  running until done and prints a final `{\"status\": \"completed\", ...}` on\n  success. `index-people` writes progress to\n  `.powerpacks/runs/setup-gmail-modal/status.json` (the path name is historical \u2014\n  index-people reuses the Gmail progress dir for every vertical, including this\n  LinkedIn run; stages `enriching` \u2192 `importing` \u2192 `indexing` \u2192 `completed`) \u2014\n  poll that, but if it lags the live stdout, **trust the running process and its\n  stdout.**\n- **Do not treat pre-existing files in `.powerpacks/search-index/` as this run's\n  output.** They may be left over from a prior run. The index is done only when\n  the command exits 0 and has freshly downloaded `local-search.duckdb` +\n  `manifest.json`. Confirm with Step 7, not by eyeballing the directory.\n\nWhile it runs, reassure the user every poll, e.g. \"Still indexing on Modal\n(~N min in) \u2014 quiet by design; the job is alive.\" Then proceed to Step 7 once it\nexits 0.\n\n### Step 7 \u2014 Validate the search index\n\n```bash\ncd \"$REPO\" && uv run --env-file .env --project . python packs/indexing/primitives/validate_search_index/validate_search_index.py\n```\n\nJSON with `status` (`ok`/`fail`/`missing`), per-table row counts,\n`total_people`, `summary`. Pass only on `status: ok` (exit 0); on `fail`/\n`missing` (exit 1) report the `errors`. Echo the `summary`.\n\n---\n\n## Done\n\nReport a terse summary: credential route (logged in as <email> + keys pulled,\nor prepared custom Modal workspace verified), LinkedIn imported, merged network of M\npeople, index validated. Remind the user that rerunning\n`$setup` reruns the whole checklist, and that **Gmail** (`$import-gmail`) and\n**iMessage/WhatsApp** (`$import-messages`) are separate skills that add their\nsource on top and re-merge + re-index.\n", "mcp_count": 0, "mcp_refs": [], "name": "setup", "pack": "ingestion", "path": "packs/ingestion/skills/setup/SKILL.md", "primitive_count": 4, "primitive_refs": ["auth", "index_contacts_pipeline", "pull_runtime_keys", "validate_search_index"]}, {"description": "Add iMessage/WhatsApp contacts to your local search index. Use for $import-messages. Discovers message contacts (Full Disk Access + WhatsApp QR), matches LinkedIn/Gmail people, deep-researches eligible unresolved contacts, and requires review before any Messages rows materialize. Then fan-in merges sources and rebuilds the index through a workspace-shared Modal volume. Never uploads to a Powerset set.", "display_name": "powerset:import-messages", "heading": "import-messages", "markdown": "---\nname: import-messages\ndescription: Add iMessage/WhatsApp contacts to your local search index. Use for $import-messages. Discovers message contacts (Full Disk Access + WhatsApp QR), matches LinkedIn/Gmail people, deep-researches eligible unresolved contacts, and requires review before any Messages rows materialize. Then fan-in merges sources and rebuilds the index through a workspace-shared Modal volume. Never uploads to a Powerset set.\n---\n\n<!--\nCreated: 2026-06-20\nChangelog:\n- 2026-07-13: Added the product architecture guide; documented both OpenRouter\n  calls, Parallel and Modal payloads, Contacts.app inclusion, provider gates, and\n  the current explicit-exclusion review semantics.\n- 2026-06-20: New skill, split out of $setup (replaces $import-contacts for the\n  local-index use case). Carries the Messages block (choose channels -> discover\n  -> match vs gmail+linkedin -> deep-research -> review -> import) plus the shared\n  fan-in + Modal index + validate. Local only: no Powerset sync and no upload.\n-->\n\n# import-messages\n\n`$import-messages` adds **iMessage / WhatsApp** contacts to your local search\nindex: discover who you've messaged, match them against your already-imported\nLinkedIn/Gmail people (free), deep-research the rest, **review and approve**, then\n**merge all imported sources + rebuild the index**. Run `$setup` (LinkedIn) and\n`$import-gmail` first for the best matching \u2014 Messages merges on top of whatever\nis already imported.\n\nFor a product-level walkthrough, source-specific privacy map, provider payloads,\napproval gates, and architecture diagram, see\n[`message-import-pipeline.md`](../../docs/message-import-pipeline.md).\n\nIt runs a **fixed checklist and always reruns it end to end**, idempotent against\nfixed paths.\n\n## How to run this skill\n\n**FIRST, create a literal, visible checklist with all ten steps below and step\nthrough it, marking each complete as you go.** Mandatory (TaskCreate / update_plan\n/ your harness's todo tool). Seed it with these exact titles:\n\n```\n0. Check prereqs (Powerset login + runtime keys)\n1. Choose Messages sources (iMessage / WhatsApp)\n2. Link & discover message contacts (Full Disk Access + WhatsApp QR)\n3. Match contacts against LinkedIn & Gmail\n4. Deep-research discovered contacts\n5. Review contacts & approve for import\n6. Import approved message contacts\n7. Merge all sources\n8. Index the merged network\n9. Validate the search index\n```\n\nThen: **work the checklist 0 \u2192 9, one item `in_progress` at a time**; run from the\ncanonical repo root (resolve once, see *Repo root*); overwrite fixed derived paths\nand rely on the primitives.\n\n### Guardrails (hard rules)\n\n- **No context pass. Do not go exploring.** Self-contained and authoritative.\n  Build the checklist and execute it directly.\n- **Do not edit code.** Only invoke the primitives below. Plain shell for\n  `cp`/`test`/`wc`/`cat` is fine; no glue scripts.\n- **No Powerset set upload.** Resolve message contacts using your already-imported\n  Gmail + LinkedIn data plus approved provider calls. Never call\n  `sync_powerset_candidates`. Powerpacks never selects message bodies, but wacli\n  owns its local provider store; OpenRouter/Parallel receive the stated metadata,\n  and the reviewed merged `people.csv` is uploaded to a workspace-shared Modal\n  volume to build the downloadable index. Inputs/runs are operator-prefixed,\n  caches are shared, and a missing operator ID uses the all-zero path.\n- **Review is required whenever a row can be materialized.** Message contacts are **never** persist
