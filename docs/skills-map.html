e", "pack": "search", "path": "packs/search/primitives/local_search_pipeline"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "merge_candidate_frontier", "pack": "search", "path": "packs/search/primitives/merge_candidate_frontier"}, {"entrypoint": null, "file_count": 2, "has_readme": true, "name": "persist_search_results", "pack": "search", "path": "packs/search/primitives/persist_search_results"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "plan_adjacency_search", "pack": "search", "path": "packs/search/primitives/plan_adjacency_search"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "plan_candidate_review", "pack": "search", "path": "packs/search/primitives/plan_candidate_review"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "query_postgres_profiles", "pack": "search", "path": "packs/search/primitives/query_postgres_profiles"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "refine_search_results", "pack": "search", "path": "packs/search/primitives/refine_search_results"}, {"entrypoint": "packs/search/primitives/resolve_companies/resolve_companies.py", "file_count": 3, "has_readme": true, "name": "resolve_companies", "pack": "search", "path": "packs/search/primitives/resolve_companies"}, {"entrypoint": "packs/search/primitives/resolve_education/resolve_education.py", "file_count": 2, "has_readme": true, "name": "resolve_education", "pack": "search", "path": "packs/search/primitives/resolve_education"}, {"entrypoint": "packs/search/primitives/resolve_investors/resolve_investors.py", "file_count": 2, "has_readme": true, "name": "resolve_investors", "pack": "search", "path": "packs/search/primitives/resolve_investors"}, {"entrypoint": "packs/search/primitives/resolve_set_operators/resolve_set_operators.py", "file_count": 2, "has_readme": true, "name": "resolve_set_operators", "pack": "search", "path": "packs/search/primitives/resolve_set_operators"}, {"entrypoint": "packs/search/primitives/search_network_pipeline/search_network_pipeline.py", "file_count": 2, "has_readme": true, "name": "search_network_pipeline", "pack": "search", "path": "packs/search/primitives/search_network_pipeline"}, {"entrypoint": "packs/search/primitives/task_state/task_state.py", "file_count": 2, "has_readme": true, "name": "task_state", "pack": "search", "path": "packs/search/primitives/task_state"}], "skills": [{"description": "Browse Powerset contacts through the Powerset Search MCP. Natural-language routing for my contacts vs set contacts, app-native search fields, app-native sorting, pagination, and field projection.", "display_name": "powerset:search-contacts", "heading": "Search Contacts", "markdown": "---\nname: search-contacts\ndescription: Browse Powerset contacts through the Powerset Search MCP. Natural-language routing for my contacts vs set contacts, app-native search fields, app-native sorting, pagination, and field projection.\n---\n\n# Search Contacts\n\nUse this skill when the user asks for `/search-contacts <request>`, \"show my\ncontacts\", \"show the most messaged contacts in my Powerset set\", or \"show my\ncontacts with emails, LinkedIn, and Twitter\".\n\nThis is a pure MCP representation of the existing Powerset app contacts views.\nDo **not** convert this into semantic people search. Do **not** call `search`,\n`count`, `query_results`, Sales Nav tools, or company-directory tools from this\nskill.\n\n## Tools\n\nCall the remote `powerset-search` MCP tools directly:\n\n- `list_contacts` \u2014 app-equivalent `GET /v2/contacts` for the authenticated\n  user's own contacts.\n- `list_sets` \u2014 enumerate accessible sets when the user names a set.\n- `list_set_contacts` \u2014 app-equivalent `GET /v2/set-contacts/{set_id}` for\n  contacts across a set.\n\nIf the MCP is missing, route the user through `$powerset setup` / `mcp_install`\nrather than pretending to fetch contacts.\n\n## Routing\n\n### 1. Decide own contacts vs set contacts\n\nUse `list_contacts` unless the user explicitly names a set.\n\nSet language examples:\n\n- \"in my Powerset set\"\n- \"in the Powerset set\"\n- \"for the Powerset set\"\n- \"from the Founders set\"\n\nIf the user names a set:\n\n1. Call `list_sets`.\n2. Resolve the set name using this exact tie-breaker:\n   1. exact case-insensitive name match\n   2. prefer non-personal sets\n   3. prefer highest `member_count`\n   4. then personal sets\n   5. if still ambiguous, ask the user to choose\n3. Call `list_set_contacts` with that `set_id`.\n\nDo not invent set ids. Do not call local `resolve_set_operators` from this\nskill; the MCP set list is the source of truth for this UX.\n\n### 2. Parse app-native sort intent\n\nOnly use sort fields the contacts APIs expose.\n\nFor `list_contacts`:\n\n- \"most messaged\", \"most messages\", \"most interactions\" \u2192\n  `sort_field: \"total_messages\"`, `sort_dir: \"desc\"`\n  (`list_contacts` accepts `total_messages` as an alias for the app's\n  `total_interactions` sort field.)\n- \"least messaged\" \u2192 `sort_field: \"total_messages\"`, `sort_dir: \"asc\"`\n- \"by first name\", \"alphabetical\" \u2192 `sort_field: \"first_name\"`, `sort_dir: \"asc\"`\n- \"by last name\" \u2192 `sort_field: \"last_name\"`, `sort_dir: \"asc\"`\n- \"by headline/title\" \u2192 `sort_field: \"headline\"`, `sort_dir: \"asc\"`\n- \"by location\" \u2192 `sort_field: \"location_raw\"`, `sort_dir: \"asc\"`\n\nFor `list_set_contacts`:\n\n- allowed sort fields: `first_name`, `last_name`, `headline`, `total_messages`\n- default for set contacts: `sort_field: \"total_messages\"`, `sort_dir: \"desc\"`\n\nIf the user gives no sort preference:\n\n- own contacts: use tool defaults (`first_name asc`)\n- set contacts: use `total_messages desc`\n\n### 3. Parse app-native search filters\n\nOnly use the search syntax supported by the app contacts routes:\n\n- plain text \u2192 name search, e.g. `search: \"arthur chen\"`\n- `email:<text>` for email/domain filtering, e.g. `email:@powerset.co`\n- `phone:<digits>` for phone filtering, or `phone:` for contacts with phones\n- `headline:<text>` for title/headline filtering\n- `company:<text>` only when the user explicitly asks to filter contacts by a\n  company field in the contacts view\n\nNo Twitter search exists in the app search syntax today. If the user asks to\n\"show twitter\", treat Twitter as an output field, not a search filter.\n\nDo not interpret phrases like \"AI engineers\" semantically. If the user clearly\nasks for a headline/title filter, use `headline:engineer`; otherwise ask a\nclarifying question.\n\n### 4. Parse output fields\n\nIf the user does not specify fields, show the default useful columns:\n\n- name/display_name\n- headline/title\n- location\n- total_messages or interaction_level\n- LinkedIn when available\n\nIf the user asks for fields, pass `include_fields` only to `list_contacts`.\n`list_set_contacts` returns the app's set-contact lead shape; project fields in\nthe final answer rather than passing `include_fields`.\n\nField aliases for own contacts:\n\n- \"name\" \u2192 `display_name`, `first_name`, `last_name`\n- \"email\" / \"emails\" \u2192 `emails`\n- \"linkedin\" \u2192 `confirmed_linkedin_url`, `public_profile_url`, `public_identifier`\n- \"twitter\" / \"x\" \u2192 `x_twitter_handle`\n- \"phone\" \u2192 `phone_number`\n- \"messages\" / \"interactions\" \u2192 `total_messages`\n- \"headline\" / \"title\" \u2192 `headline`\n- \"location\" \u2192 `location_raw`\n\nAlways include enough identity fields to make the output readable even when the\nuser requests only contact fields. For example, \"show emails and LinkedIn\" still\nneeds `display_name` or `first_name`/`last_name`.\n\n### 5. Pagination\n\nDefault to page 0 and page size 50 unless the user asks otherwise. Present the\nfirst 20-50 rows as a compact markdown table. If `has_more` / `hasMore` is true,\ntell the user how to ask for the next page.\n\nDo not auto-page through all contacts unless the user explicitly asks to export\nor retrieve all pages.\n\n## Examples\n\n### My contacts, most messaged, selected fields\n\nUser:\n\n```text\n/search-contacts show me my contacts ordered by most messages and show emails, twitter, and linkedin\n```\n\nTool:\n\n```text\nlist_contacts(\n  sort_field=\"total_messages\",\n  sort_dir=\"desc\",\n  page=0,\n  page_size=50,\n  include_fields=[\n    \"display_name\", \"first_name\", \"last_name\", \"emails\",\n    \"confirmed_linkedin_url\", \"public_profile_url\", \"public_identifier\",\n    \"x_twitter_handle\", \"total_messages\"\n  ]\n)\n```\n\n### Set contacts, most messaged\n\nUser:\n\n```text\n/search-contacts show me the most messaged contacts in my Powerset set\n```\n\nTools:\n\n```text\nlist_sets()\n# resolve \"Powerset\" with exact \u2192 non-personal \u2192 most members \u2192 personal \u2192 ask\nlist_set_contacts(set_id=\"...\", sort_field=\"total_messages\", sort_dir=\"desc\", page=0, page_size=50)\n```\n\n### Email domain filter\n\nUser:\n\n```text\n/search-contacts show my contacts with @powerset.co emails\n```\n\nTool:\n\n```text\nlist_contacts(search=\"email:@powerset.co\", page=0, page_size=50)\n```\n", "mcp_count": 3, "mcp_refs": ["list_contacts", "list_set_contacts", "list_sets"], "name": "search-contacts", "pack": "contacts", "path": "packs/contacts/skills/search-contacts/SKILL.md", "primitive_count": 1, "primitive_refs": ["mcp_install"]}, {"description": "Build deterministic local search-index artifacts from the canonical network-import people.csv. Use when the user asks to prepare or inspect a local indexing pipeline without uploads, embeddings, LLM, Postgres, Supabase, or TurboPuffer calls.", "display_name": "powerset:build-local-search-index", "heading": "Build Local Search Index", "markdown": "---\nname: build-local-search-index\ndescription: Build deterministic local search-index artifacts from the canonical network-import people.csv. Use when the user asks to prepare or inspect a local indexing pipeline without uploads, embeddings, LLM, Postgres, Supabase, or TurboPuffer calls.\n---\n\n# Build Local Search Index\n\nBuild local indexing artifacts from canonical Powerpacks people data.\n\n## Canonical input\n\nPrefer the canonical merged people CSV from `$discover-contacts`:\n\n```text\n.powerpacks/network-import/merged/people.csv\n```\n\nIf the aggregate merge output is missing or stale, run the contacts indexing\npipeline. It performs fan-in first, promotes the canonical\n`.powerpacks/network-import/merged/people.csv`, then indexes that file.\n\n## Run locally\n\nPlan inspection is local-only and safe:\n\n```bash\nuv run --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py plan --operator-id <operator-id>\n```\n\nRun the full local contacts indexing pipeline:\n\n```bash\nuv run --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py run --operator-id <operator-id>\n```\n\nIf the pipeline reports provider work above the approval threshold, rerun with\nexplicit approval:\n\n```bash\nuv run --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py run --operator-id <operator-id> --approve-provider-spend\n```\n\nThe run is single-index and idempotent: a partial index resumes from\n`.powerpacks/search-index/ledger.json`; a completed index refreshes the same\ndirectory instead of creating a new one.\n\nThe stage manifest is written to:\n\n```text\n.powerpacks/network-import/index/contacts/manifest.json\n```\n\nUse the resulting local search DB:\n\n```bash\nexport POWERPACKS_LOCAL_SEARCH_DB=.powerpacks/search-index/local-search.duckdb\n```\n\nContinue a partial run:\n\n```bash\nuv run --project . python packs/indexing/primitives/build_processing_pipeline/build_processing_pipeline.py continue --ledger .powerpacks/search-index/ledger.json\n```\n\nStatus:\n\n```bash\nuv run --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py status\n```\n\nArtifacts are written under `.powerpacks/search-index/`. The local DuckDB is\n`.powerpacks/search-index/local-search.duckdb`.\n\n## Constraints\n\n- local files only\n- `plan`, `status`, and `run --dry-run` are local inspection only\n- no LLM/provider calls unless the user explicitly approves the required allow flags\n- no network calls unless explicitly approved by the generated plan\n- no Supabase/Postgres calls\n- no TurboPuffer calls\n- all generated people, company, school, position, education-edge, and summary IDs are stable UUIDv5 strings\n", "mcp_count": 0, "mcp_refs": [], "name": "build-local-search-index", "pack": "indexing", "path": "packs/indexing/skills/build-local-search-index/SKILL.md", "primitive_count": 2, "primitive_refs": ["build_processing_pipeline", "index_contacts_pipeline"]}, {"description": "Discover local LinkedIn CSV, msgvault email, existing messages, and Twitter source artifacts. Use for $discover-contacts.", "display_name": "powerset:discover-contacts", "heading": "discover-contacts", "markdown": "---\nname: discover-contacts\ndescription: Discover local LinkedIn CSV, msgvault email, existing messages, and Twitter source artifacts. Use for $discover-contacts.\n---\n\n# discover-contacts\n\nUse this skill for `$discover-contacts` source discovery.\n\n## User-facing tone\n\nBe clear and calm. The user should hear what is happening in product terms, not\npipeline jargon. Do not normally say fan-out, fan-in, ledgers, artifacts,\nsub-agents, or DuckDB. Use those terms only in internal execution notes or if the\nuser asks for technical details.\n\nUse this style instead:\n\n```text\nI found these connected sources:\n- Gmail: 2 accounts\n- LinkedIn: Connections.csv\n- Messages: contacts.csv\n\nI\u2019m going to discover each source in parallel where possible. Import/enrichment\nand indexing run as separate stages.\n\nI won\u2019t upload anything automatically. I\u2019ll only stop if I need a browser login,\na QR/device link, an overwrite approval, or approval for a paid provider step.\n```\n\nFor progress updates, report user-visible progress and counts:\n\n```text\nGmail discovery is running for 2 accounts. LinkedIn discovery is also running.\n```\n\n```text\nDiscovery finished. Next run import/enrichment, then indexing.\n```\n\nIf a provider/spend step blocks, explain the choice plainly:\n\n```text\nI found contacts that need paid LinkedIn/profile enrichment before I can improve\ntheir profiles. I won\u2019t run that automatically. Do you want me to approve this\nstep, skip it for now, or continue with only the local data?\n```\n\n## After Onboarding\n\nIf `$onboard` has linked sources, propose the concrete import command and ask\nfor one confirmation before long sync/import work:\n\n```text\nYour sources are connected. I can now discover local source contacts. Large\nmailboxes or large networks can take a while. I won\u2019t upload anything\nautomatically. Continue?\n```\n\nAfter confirmation, run discovery until it completes or reaches a real approval\nconfirmation. Do not ask again for routine local metadata work.\n\n## Inputs\n\n- `--linkedin-csv <Connections.csv>` and `--linkedin-source-user <label>` for LinkedIn.\n- `--gmail-account-email <email>` / repeated `--gmail-account-emails <email>` and optional `--msgvault-db <path>` for email/msgvault.\n  The Gmail import worker owns `msgvault sync-full` for each selected account\n  before reading the local msgvault DB. Do not run this sync from onboarding.\n  Use `--skip-msgvault-sync` only for tests or known pre-synced local DBs.\n- `--from-accounts .powerpacks/ingestion/accounts.json` or `--from-setup .powerpacks/setup/setup-run.json` to consume link-only state from `$setup` / `$onboard`.\n- `--include-existing-artifacts` is legacy and should not be used for merge.\n\n## Command\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py run \\\n  --from-accounts .powerpacks/ingestion/accounts.json\n```\n\n`run --dry-run --from-accounts ...` reports source discovery jobs with\n`parallelizable: true/false`. LinkedIn, Gmail/msgvault accounts, approved\nTwitter imports, and existing messages/iMessage/WhatsApp artifacts have no\ncross-source dependency, so `$setup` may dispatch them in parallel sub-agents.\nMerge and indexing are owned by `index_contacts_pipeline.py`, not this skill.\n\nThat paragraph is for execution planning. Do not repeat it to the user. Say:\n\n```text\nThese sources can be discovered at the same time, so I\u2019ll run them in parallel.\n```\n\nFor manual source discovery, run workers with `--only-source`; each source\nwrites to its fixed `.powerpacks/network-import/discover/<source>/` folder. Do\nnot approve RapidAPI/Parallel/OpenAI spend confirmations inside workers; return\nthose confirmations to the main thread.\n\n## Bootstrap Prior Checkpoints\n\nWhen existing operator export/checkpoint CSVs are available, first generate a\nPowerpacks bootstrap bundle:\n\n```bash\nuv run --project . python packs/ingestion/primitives/bootstrap_network_from_exports/bootstrap_network_from_exports.py generate \\\n  --operator-mapping <operator_mapping.json> \\\n  --source-dir <existing-export-csv-dir> \\\n  --operators <operator-slug> \\\n  --linkedin-csv <Connections.csv> \\\n  --gmail-account-email <email> \\\n  --seed-profile-cache \\\n  --force\n```\n\nThen run the command printed in\n`.powerpacks/network-bootstrap/operators/<operator-slug>/outputs/commands.txt`.\n\nResume after a child approval confirmation:\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py approve\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py continue\n```\n\n## Long Runs\n\nRun the command in a visible shell and keep `[discover-contacts]` /\n`[enrich-people]` progress lines visible. For large mailboxes or profile sets,\nuse the status command every few minutes instead of treating silence as failure:\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py status \\\n  --ledger .powerpacks/network-import/discover/ledger.json\n```\n\nRapidAPI LinkedIn hydration now runs directly when a RapidAPI key is configured.\nIf the pipeline blocks on another spend-bearing step, show the count and ask for\napproval before running `approve`.\n\n## Outputs\n\nDiscovery writes stable per-source artifacts only:\n\n```text\n.powerpacks/network-import/discover/gmail/contacts.csv\n.powerpacks/network-import/discover/gmail/linkedin_resolution_queue.csv\n.powerpacks/network-import/discover/linkedin/contacts.csv\n.powerpacks/network-import/discover/messages/contacts.csv\n```\n\nImport/enrichment owns `directory.csv` and source `people.csv` outputs. Indexing\nowns merged `people.csv`, network DuckDB, and local search-index artifacts.\n\nDo not upload automatically. Report artifact paths and counts only.\n", "mcp_count": 0, "mcp_refs": [], "name": "discover-contacts", "pack": "ingestion", "path": "packs/ingestion/skills/discover-contacts/SKILL.md", "primitive_count": 3, "primitive_refs": ["bootstrap_network_from_exports", "discover_contacts_pipeline", "index_contacts_pipeline"]}, {"description": "Import Gmail/email network metadata from local msgvault into Powerpacks network artifacts and DuckDB. Use for $import-email or Gmail/msgvault import testing.", "display_name": "powerset:import-email", "heading": "import-email", "markdown": "---\nname: import-email\ndescription: Import Gmail/email network metadata from local msgvault into Powerpacks network artifacts and DuckDB. Use for $import-email or Gmail/msgvault import testing.\n---\n\n# import-email\n\nUse this skill for `$import-email`, Gmail, email, or msgvault network import testing.\n\n## Contract\n\nEmail import is msgvault-only. Do not call Powerset Gmail OAuth or backend gmail-sync endpoints.\nPowerpacks reads local msgvault SQLite metadata only and never reads message bodies, subjects, snippets, raw MIME, or attachments.\n\n## Default command\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py run \\\n  --gmail-account-email <email>\n```\n\nIf the user provides a DB path:\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py run \\\n  --msgvault-db <path/to/msgvault.db> \\\n  --gmail-account-email <email>\n```\n\nFor Arthur smoke testing:\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py run \\\n  --msgvault-db ~/.msgvault/msgvault.db \\\n  --gmail-account-email arthur@powerset.co \\\n  --force\n```\n\n## Optional LinkedIn resolution/enrichment\n\nThe msgvault import writes `linkedin_resolution_queue.csv`. To recover the email\npipeline shape (email metadata -> LinkedIn URL resolution -> RapidAPI profile\nenrichment), use the orchestrator bridge. It first applies the canonical\n`.powerpacks/network-import/directory.csv` checkpoint restored from operator\nbootstrap or updated by successful stage outputs. Only rows still unresolved by\nthe directory are prepared for a LinkedIn-resolution provider.\n\n```bash\n# no spend/network: prepare harness prompts\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py run \\\n  --gmail-account-email <email> \\\n  --gmail-linkedin-provider harness\n\n# after a linkedin_resolutions.csv exists, apply it and delegate to enrich_people\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py run \\\n  --gmail-account-email <email> \\\n  --gmail-resolutions-csv <linkedin_resolutions.csv>\n```\n\n`--gmail-linkedin-provider parallel` is spend-bearing and must stop for explicit\napproval. `enrich_people.py` then hydrates resolved LinkedIn rows through the\nRapidAPI cache/fetch path; cache misses run immediately when a RapidAPI key is\nconfigured. Resolved directory/provider rows are combined per Gmail account\nbefore `enrich_people.py` runs.\n\n## Expected outputs\n\n- `.powerpacks/network-import/directory.csv`\n- `.powerpacks/network-import/discover/gmail/<account>/people.csv`\n- `.powerpacks/network-import/discover/gmail/<account>/linkedin_resolution_queue.csv`\n- `.powerpacks/network-import/final/merged/people.csv`\n- `.powerpacks/network-import/final/merged/network_contacts.csv`\n- `.powerpacks/network-import/final/merged/network_contact_sources.csv`\n- `.powerpacks/network-import/final/merged/network_companies.csv`\n- `.powerpacks/network-import/final/duckdb/network.local.duckdb`\n\nReport counts only; do not print contact rows or email datasets.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-email", "pack": "ingestion", "path": "packs/ingestion/skills/import-email/SKILL.md", "primitive_count": 2, "primitive_refs": ["discover_contacts_pipeline", "enrich_people"]}, {"description": "Gmail network import from local msgvault metadata. Uses msgvault SQLite, writes .powerpacks artifacts, and avoids Powerset-hosted Gmail OAuth/sync.", "display_name": "powerset:import-gmail-network", "heading": "Import Gmail Network", "markdown": "---\nname: import-gmail-network\ndescription: Gmail network import from local msgvault metadata. Uses msgvault SQLite, writes .powerpacks artifacts, and avoids Powerset-hosted Gmail OAuth/sync.\n---\n\n# Import Gmail Network\n\nUse this skill when the user wants to import Gmail/network contacts into\nPowerpacks.\n\nV1 scope is intentionally narrow: `.powerpacks/` artifacts only, backed by\nlocal msgvault metadata. Do not use Powerset-hosted Gmail OAuth/sync helpers,\ntask JSON, or `../aleph-mvp`; code must live inside Powerpacks.\n\n## Consent / approval model\n\nCurrent V1 has no spend/write approval confirmations because it only reads local\nmsgvault metadata and writes local artifacts. Stop for explicit approval before\nany uploads, source seeding, production mutation, or paid enrichment.\n\nDo not assume EnrichLayer/RapidAPI keys exist. Do not call Powerset Gmail OAuth\nor backend gmail-sync endpoints for this flow.\n\n## msgvault metadata import\n\nmsgvault by Wes McKinney stores Gmail metadata in a local SQLite database,\nusually `~/.msgvault/msgvault.db`. Powerpacks reads only `sources`,\n`participants`, `messages`, and `message_recipients` to derive email/name/count\nmetadata; it never reads message bodies, subjects, snippets, raw MIME, or\nattachments.\n\nFirst list local msgvault Gmail source accounts so the harness can echo them\nback and ask the operator which ones to add:\n\n```bash\nuv run --project . python packs/ingestion/primitives/gmail_network_import/gmail_network_import.py msgvault-accounts \\\n  --db ~/.msgvault/msgvault.db\n```\n\nThen import one selected account at a time:\n\n```bash\nuv run --project . python packs/ingestion/primitives/gmail_network_import/gmail_network_import.py msgvault \\\n  --db ~/.msgvault/msgvault.db \\\n  --account-email <gmail-account-email>\n```\n\nThis writes legacy Gmail CSV artifacts plus canonical\n`.powerpacks/network-import/discover/gmail/<account>/people.csv`.\n\n## Legacy one-person seed\n\nThe primitive still has `run` / `continue` / `approve` for deterministic local\nfixtures. Do not use those commands for real Gmail sync; use `msgvault`.\n\n## Multi-account model\n\nmsgvault stores Gmail accounts in `sources`. Pass `--account-email` to filter to\none source account, or omit it to import metadata across all msgvault sources.\nLater orchestrators can merge by email, LinkedIn URL, or resolved person ID. Do\nnot ask OpenAI to infer that multiple emails are the same person in V1.\n\n## Sub-agent orchestration\n\nFor future long approved steps, the main agent can delegate `continue` to a\nsub-agent and ask it to return only status, step id, artifacts, return code, and\nlog tail. Keep the main chat clean; never paste full CSVs or secrets.\n\n## Output summary\n\nEnd with:\n\n- run ledger path\n- run artifact directory\n- generated CSV paths\n- confirmation that no external APIs, DVC, uploads, or prod writes ran\n", "mcp_count": 0, "mcp_refs": [], "name": "import-gmail-network", "pack": "ingestion", "path": "packs/ingestion/skills/import-gmail-network/SKILL.md", "primitive_count": 1, "primitive_refs": ["gmail_network_import"]}, {"description": "Import a LinkedIn Connections.csv export into Powerpacks-local people.csv artifacts using shared enrich_people delegation and run/continue/approve.", "display_name": "powerset:import-linkedin-network", "heading": "Import LinkedIn Network", "markdown": "---\nname: import-linkedin-network\ndescription: Import a LinkedIn Connections.csv export into Powerpacks-local people.csv artifacts using shared enrich_people delegation and run/continue/approve.\n---\n\n# Import LinkedIn Network\n\nUse this skill when the user wants to import LinkedIn connections.\n\nDo not depend on `../aleph-mvp`. All code and artifacts live in Powerpacks.\nExternal API enrichment via the shared RapidAPI-only `enrich_people` primitive is spend-bearing only for cache misses and must be approved after the local CSV conversion step. Seed `--profile-cache-dir` to avoid paid calls when possible. A hidden row cap exists only for tiny local smoke tests; do not use caps in real workflows.\n\n## Main loop\n\n```bash\nuv run --project . python packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py run \\\n  --csv <Connections.csv> \\\n  --source-user <user-label> \\\n  --operator-id <operator-id-or-local>\n```\n\nIf blocked and the user approves spend:\n\n```bash\nuv run --project . python packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py approve\nuv run --project . python packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py continue\n```\n\n## Output summary\n\nReport only:\n\n- ledger path\n- run directory\n- parsed connection count\n- whether enrichment is blocked/completed\n- canonical `people.csv` path when produced\n- cache hit / paid call counts from the delegated enrichment summary\n\nDo not paste CSV contents or raw provider JSON into chat.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-linkedin-network", "pack": "ingestion", "path": "packs/ingestion/skills/import-linkedin-network/SKILL.md", "primitive_count": 2, "primitive_refs": ["enrich_people", "linkedin_network_import"]}, {"description": "Import or smoke-test Twitter/X network artifacts through the RapidAPI + MOE + LinkedIn resolution pipeline. Use for $import-twitter.", "display_name": "powerset:import-twitter", "heading": "import-twitter", "markdown": "---\nname: import-twitter\ndescription: Import or smoke-test Twitter/X network artifacts through the RapidAPI + MOE + LinkedIn resolution pipeline. Use for $import-twitter.\n---\n\n# import-twitter\n\nUse this skill for `$import-twitter` or Twitter/X network import testing.\n\nThis is an alias/wrapper around `twitter_network_import`. The production source\ncrawl is RapidAPI-backed and requires approval. Keep artifacts under\n`.powerpacks/network-import/discover/twitter/`.\n\n## Jake 10-row sanity command\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py run \\\n  --handle jake_zeller \\\n  --max-pages 1 \\\n  --limit 10 \\\n  --min-score 0 \\\n  --linkedin-workers 10 \\\n  --aggregator-workers 10\n```\n\nThen approve/continue as the primitive requests:\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py approve\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py continue\n```\n\n## Notes\n\n- Requires a RapidAPI Twitter key subscribed to `twitter241` (`RAPIDAPI_TWITTER_KEY` or `RAPIDAPI_KEY`).\n- MOE uses OpenAI and requires approval; do not run deep research for this smoke.\n- RapidAPI LinkedIn validation uses `RAPIDAPI_LINKEDIN_KEY` or `RAPIDAPI_KEY` and requires approval.\n- Final output should include `people.csv`; summarize as `x/10 linkedins` plus counts, not raw rows.\n\nAfter Twitter finishes, run `$discover-contacts --include-existing-artifacts` to merge into local network contacts and DuckDB.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-twitter", "pack": "ingestion", "path": "packs/ingestion/skills/import-twitter/SKILL.md", "primitive_count": 1, "primitive_refs": ["twitter_network_import"]}, {"description": "Import a Twitter/X network into Powerpacks-local ingestion artifacts using the RapidAPI-backed crawl and local review pipeline.", "display_name": "powerset:import-twitter-network", "heading": "import-twitter-network", "markdown": "---\nname: import-twitter-network\ndescription: Import a Twitter/X network into Powerpacks-local ingestion artifacts using the RapidAPI-backed crawl and local review pipeline.\n---\n\n# import-twitter-network\n\nUse this skill when the user asks to import a Twitter/X network into Powerpacks-local ingestion artifacts.\n\n## Workflow\n\nUse the primitive at:\n\n```bash\npacks/ingestion/primitives/twitter_network_import/twitter_network_import.py\n```\n\nThe source crawl is RapidAPI-backed only; do not ask for or use a local Twitter CSV as the production source. All artifacts must remain under `.powerpacks/network-import/discover/twitter/`.\n\nPipeline stages: RapidAPI Twitter crawl \u2192 local heuristic score \u2192 OpenAI MOE expert evaluation \u2192 free parallel LinkedIn pre-resolution \u2192 parallel RapidAPI LinkedIn validation \u2192 canonical `people.csv` formatting with temporary legacy alias.\n\n## Commands\n\nStart a run:\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py run --handle <operator_handle> --max-pages <n>\n```\n\nThe run stops before spend-bearing API calls. After explicit user approval:\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py approve\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py continue\n```\n\nCheck status:\n\n```bash\nuv run --project . python packs/ingestion/primitives/twitter_network_import/twitter_network_import.py status\n```\n\n## Guardrails\n\n- Ask before RapidAPI Twitter crawl, OpenAI MOE evaluation, or RapidAPI LinkedIn validation.\n- Never print API keys.\n- No Postgres writes.\n- No browser URLs containing bearer tokens.\n- A hidden row cap exists only for tiny local smoke tests. Do not use it in real workflows.\n- If using secrets from another local repo for a smoke test, source them into the process environment only and do not paste values into chat.\n\n## Outputs\n\nSummarize only counts and paths, not full datasets:\n\n- `followers_dump.csv`\n- `candidates.csv`\n- `moe_evaluated.csv`\n- `linkedin_resolved.csv`\n- `linkedin_resolution_queue.csv`\n- `linkedin_validated.csv`\n- `people.csv`\n- `people_harmonic_all.csv` temporary compatibility alias\n", "mcp_count": 0, "mcp_refs": [], "name": "import-twitter-network", "pack": "ingestion", "path": "packs/ingestion/skills/import-twitter-network/SKILL.md", "primitive_count": 1, "primitive_refs": ["twitter_network_import"]}, {"description": "Walk a user through linking/exporting all local network ingestion sources and persist non-secret status in .powerpacks/ingestion/accounts.json.", "display_name": "powerset:ingestion-onboarding", "heading": "Ingestion Onboarding", "markdown": "---\nname: ingestion-onboarding\ndescription: Walk a user through linking/exporting all local network ingestion sources and persist non-secret status in .powerpacks/ingestion/accounts.json.\n---\n\n# Ingestion Onboarding\n\nUse the onboarding primitive for status/plan checks. Current onboarding is\n**link-only**: record source links in `.powerpacks/ingestion/accounts.json` and\ndo not run Gmail/LinkedIn network imports, `msgvault sync-full`,\n`discover_contacts_pipeline`, Twitter crawls, messages import/research, or\nenrichment until the completed handoff.\n\nStart/resume the conversational setup flow:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py run\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --input <user-reply>\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py skip\n```\n\nHarnesses should prefer structured `continue --action ...` / `--csv ...` flags\nover free-form replies whenever possible:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action yes\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action no\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action skip\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action done\n```\n\nFor the LinkedIn CSV handoff, use the `harness_actions` commands returned by the\nprimitive, or these equivalent flags:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action scan-linkedin-downloads\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action open-downloads\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action open-linkedin-drop-folder\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --action check-linkedin-drop-folder\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py continue --csv <Connections.csv>\n```\n\nWhen a primitive response has `status: needs_agent_action`, Codex must run the\nreturned `command` itself. Do not tell the user to run it. After the command\nfinishes, run the returned `continue_command` when present, or continue with\n`done`.\n\nWhen a primitive response has `status: needs_user_action`, perform any returned\nlocal `command` that Codex can run, then tell the user only the human action\nthat remains, such as browser OAuth or QR/device linking.\n\nWhen a primitive response has `status: needs_user_input`, ask the question\ndirectly and continue with the user's reply.\n\nCheck/plan without entering the flow:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py check\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py plan\n```\n\nFor guided CLI operation, prefer the idempotent `step` loop. The harness should\nkeep calling the same command until it returns `completed`, `needs_input`,\n`waiting`, or `blocked_approval`; then echo the emitted prompt/commands, ask the\noperator to add/confirm/skip, and rerun `step`.\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step\n```\n\nGmail is msgvault-backed. The Gmail step should be dead simple for the user:\nask which discovered accounts to link and what other Gmail addresses they want\nto add. Multiple discovered source accounts are supported by repeating\n`--gmail-account`; `--gmail-all` records every discovered source account;\n`--gmail-add-email` starts the OAuth/test-user/add-account authorization flow\nfor new addresses as pending accounts without starting msgvault sync or marking\nthem import-ready; `--skip-source gmail` records an explicit skip.\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --gmail-db ~/.msgvault/msgvault.db \\\n  --gmail-account me@gmail.com \\\n  --gmail-account work@example.com\n```\n\nIf `step` returns `status: needs_agent_action` with `commands`, Codex must run\nthe returned commands in order. Do not tell the user to run them. For extra\nGmail addresses this means Codex runs the Google OAuth test-user browser\nautomation and authorizes each Gmail account in msgvault as user-action/linking.\nThe returned commands route through `msgvault_setup.py add-test-users`,\n`add-account`, or `browser-setup --add-account`; they are not network imports\nand must not run `msgvault sync-full`. After those commands succeed, rerun the\nemitted command with `--gmail-authorized-email <email>` so the account moves\nfrom pending to linked; `$setup` import workers own `msgvault sync-full` before\nreading the local msgvault DB.\nOnly ask the user to complete browser login/consent when Google requires human\naction.\n\nLinkedIn CSV remains the primary LinkedIn path:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --linkedin-csv ~/Downloads/Connections.csv \\\n  --linkedin-source-user <label>\n```\n\nThe LinkedIn step only records `--linkedin-csv` and `--linkedin-source-user`; it\ndoes not run provider enrichment/import. Messages and Twitter are also\nlink-only: use `--messages-contacts-csv <path>` and optional `--twitter-handle\n<handle>`, or skip sources with `--skip-source <messages|gmail|linkedin_csv|twitter>`.\n\nIt tracks non-secret v2 state in `.powerpacks/ingestion/accounts.json`:\n`gmail.msgvault_db/account_emails/oauth_app/oauth_test_users/available_accounts/selected_accounts/pending_accounts`,\n`linkedin_csv.csv_path/source_label`, `twitter.handle`, and\n`messages.contacts_csv`, while preserving v1 `usernames`/`artifacts` mirrors.\nWhen `step` returns completed, use the emitted handoff; its import phase calls\n`discover_contacts_pipeline.py run --from-accounts ...` after user confirmation.\n\nNever store tokens/passwords/cookies there. Only store usernames, linked status,\nartifact paths, and notes.\n", "mcp_count": 0, "mcp_refs": [], "name": "ingestion-onboarding", "pack": "ingestion", "path": "packs/ingestion/skills/ingestion-onboarding/SKILL.md", "primitive_count": 2, "primitive_refs": ["msgvault_setup", "onboarding"]}, {"description": "Import LinkedIn network data from LinkedIn's Connections.csv export into local Powerpacks artifacts.", "display_name": "powerset:linkedin-sync-csv", "heading": "LinkedIn Sync CSV", "markdown": "---\nname: linkedin-sync-csv\ndescription: Import LinkedIn network data from LinkedIn's Connections.csv export into local Powerpacks artifacts.\n---\n\n# LinkedIn Sync CSV\n\nUse `packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py`.\n\nThis is the stable LinkedIn ingestion path today.\n\n```bash\nuv run --project . python packs/ingestion/primitives/linkedin_network_import/linkedin_network_import.py run \\\n  --csv <Connections.csv> \\\n  --source-user <label>\n```\n\nAfter a successful run, update account registry:\n\n```bash\nuv run --project . python packs/ingestion/primitives/account_registry/account_registry.py mark \\\n  --channel linkedin_csv --username <label> --artifact <people_csv> --success\n```\n\nExternal provider enrichment requires approval.\n", "mcp_count": 0, "mcp_refs": [], "name": "linkedin-sync-csv", "pack": "ingestion", "path": "packs/ingestion/skills/linkedin-sync-csv/SKILL.md", "primitive_count": 2, "primitive_refs": ["account_registry", "linkedin_network_import"]}, {"description": "Configure a LinkedIn MCP server and track local non-secret LinkedIn MCP account state.", "display_name": "powerset:linkedin-sync-mcp", "heading": "LinkedIn Sync MCP", "markdown": "---\nname: linkedin-sync-mcp\ndescription: Configure a LinkedIn MCP server and track local non-secret LinkedIn MCP account state.\n---\n\n# LinkedIn Sync MCP\n\nUse when a user wants to connect LinkedIn through an MCP rather than uploading a CSV.\n\nCurrent recommended MCP candidate:\n\n- https://github.com/stickerdaniel/linkedin-mcp-server\n- package: `linkedin-scraper-mcp@latest`\n\nThis is WIP for connection export, so do not represent it as equivalent to CSV ingestion yet.\nUse it for setup, authenticated profile/search tools, and future connection export once upstream exposes it.\n\n```bash\nuv run --project . python packs/ingestion/primitives/linkedin_mcp_import/linkedin_mcp_import.py instructions\nuvx linkedin-scraper-mcp@latest --login\nuv run --project . python packs/ingestion/primitives/linkedin_mcp_import/linkedin_mcp_import.py mark-linked --username <profile-url-or-username>\n```\n\nDo not store LinkedIn credentials or cookies in Powerpacks.\n", "mcp_count": 0, "mcp_refs": [], "name": "linkedin-sync-mcp", "pack": "ingestion", "path": "packs/ingestion/skills/linkedin-sync-mcp/SKILL.md", "primitive_count": 1, "primitive_refs": ["linkedin_mcp_import"]}, {"description": "Alias for msgvault local Gmail archive setup. Use for `$local-msg-vault`, local message vault setup, browser-assisted Google OAuth Desktop app creation named `local-msg-vault`, msgvault account auth, and msgvault MCP registration.", "display_name": "powerset:local-msg-vault", "heading": "local-msg-vault", "markdown": "---\nname: local-msg-vault\ndescription: Alias for msgvault local Gmail archive setup. Use for `$local-msg-vault`, local message vault setup, browser-assisted Google OAuth Desktop app creation named `local-msg-vault`, msgvault account auth, and msgvault MCP registration.\n---\n\n# local-msg-vault\n\nThis is an alias for the `msgvault` skill. Load and follow\n`packs/ingestion/skills/msgvault/SKILL.md`.\n\nDefault setup command:\n\n```bash\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py browser-setup --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-test-users <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-account --email <gmail>\n```\n", "mcp_count": 0, "mcp_refs": [], "name": "local-msg-vault", "pack": "ingestion", "path": "packs/ingestion/skills/local-msg-vault/SKILL.md", "primitive_count": 1, "primitive_refs": ["msgvault_setup"]}, {"description": "Set up msgvault for local Gmail archive access, including install/status, browser-assisted Google OAuth Desktop app creation, client_secret config, account auth, and Codex MCP registration. Use for `$msgvault`, `$local-msg-vault`, `msgvault setup`, `msgvault status`, `msgvault add-account`, `msgvault mcp install`, or `powerset create oauth app` when the target is Gmail/msgvault OAuth.", "display_name": "powerset:msgvault", "heading": "msgvault", "markdown": "---\nname: msgvault\ndescription: Set up msgvault for local Gmail archive access, including install/status, browser-assisted Google OAuth Desktop app creation, client_secret config, account auth, and Codex MCP registration. Use for `$msgvault`, `$local-msg-vault`, `msgvault setup`, `msgvault status`, `msgvault add-account`, `msgvault mcp install`, or `powerset create oauth app` when the target is Gmail/msgvault OAuth.\n---\n\n# msgvault\n\nUse this skill when the user wants local Gmail archive setup through msgvault or\nasks to create a Google OAuth app for msgvault.\n\n## Commands\n\nRun from the Powerpacks repo root:\n\n```bash\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py status\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py browser-setup --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py setup --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py setup --client-secret <client_secret.json> --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py create-oauth-app --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-test-users <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-account --email <gmail>\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py mcp-install\n```\n\nFrom an installed skill bundle, replace `packs/...` with\n`powerpacks/packs/...`.\n\n## Routing\n\n- `$msgvault`, `$local-msg-vault`, status requests: run `status` and summarize readiness.\n- `$msgvault setup`, `$local-msg-vault setup`, onboarding Gmail archive setup:\n  run `browser-setup`; include `--email` if the user supplied one. Then run\n  `add-account --email <gmail>` when the user is ready to authorize the Gmail\n  account.\n- `$msgvault create oauth app` or `$powerset create oauth app`: run\n  `browser-setup` if the user wants automation, otherwise `create-oauth-app`;\n  the Google OAuth Desktop client name should be `local-msg-vault`.\n- User provides a downloaded `client_secret*.json`: run `setup --client-secret\n  <path>` and add `--email` if known.\n- Workspace org needs its own app: add `--oauth-app <short-name>`.\n- Add OAuth test users: run `add-test-users <gmail>`; add `--project <id>`\n  or `--oauth-app <short-name>` when targeting a non-default app.\n- Headless machine: add `--headless` when authorizing the account.\n- Reruns: `browser-setup` skips Google Console automation when a valid local\n  client secret is already configured. Use `--force-browser-setup` only when\n  intentionally creating/replacing the OAuth client.\n\n## User-facing wording\n\nKeep it direct:\n\n- `msgvault is installed.`\n- `Creating the Google OAuth app in Chrome.`\n- `Downloaded client secret configured.`\n- `OAuth app already configured.`\n- `msgvault account authorized.`\n- `msgvault MCP installed. Restart Codex to load it.`\n\nDo not print client secret values or token paths beyond the configured JSON\nfile path. msgvault stores and searches Gmail message data locally; make that\nclear before starting a sync, but do not over-explain when the user only asked\nfor setup.\n", "mcp_count": 0, "mcp_refs": [], "name": "msgvault", "pack": "ingestion", "path": "packs/ingestion/skills/msgvault/SKILL.md", "primitive_count": 1, "primitive_refs": ["msgvault_setup"]}, {"description": "Walk a user through linking/exporting all local network ingestion sources and persist non-secret status in .powerpacks/ingestion/accounts.json.", "display_name": "powerset:onboard", "heading": "Ingestion Onboarding", "markdown": "---\nname: onboard\ndescription: Walk a user through linking/exporting all local network ingestion sources and persist non-secret status in .powerpacks/ingestion/accounts.json.\n---\n\n# Ingestion Onboarding\n\nOnboarding is the top-level Codex-run state machine. Task 2 onboarding is\n**link-only**: it records source links in `.powerpacks/ingestion/accounts.json`\nand must not run `gmail_network_import`, `msgvault sync-full`,\n`linkedin_network_import`, `discover_contacts_pipeline`, Twitter crawls, messages\nimport/research, or downstream enrichment. Keep human/browser account linking in the main thread,\nthen hand long local import/index work to worker sub-agents only after the\ncompleted handoff and user confirmation.\n\nUse the onboarding primitive for status/plan checks:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py check\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py plan\n```\n\nFor guided CLI operation, prefer the idempotent `step` loop. Keep calling the\nsame command until it returns `completed`, `needs_input`, `waiting`, or\n`blocked_approval`; then echo the emitted prompt/commands, ask the operator to\nadd/confirm/skip, and rerun `step`.\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step\n```\n\nGmail is msgvault-backed. The Gmail step should be dead simple for the user:\non a first run, ask which Gmail address they want to link first. Do not infer\nthe email from gcloud, Powerset login, git config, local status, or old\nartifacts. After the user answers, run `step --gmail-add-email <email>`.\n\nIf msgvault already has local checkpoints, ask which discovered accounts to\nlink. Otherwise, `--gmail-add-email` records a pending authorization request and\nreturns authorization commands without marking the account import-ready or\nstarting sync. Multiple discovered source accounts are supported by repeating\n`--gmail-account`; `--gmail-all` records every discovered source account;\n`--gmail-add-email` starts the add-account flow for new addresses;\n`--skip-source gmail` records an explicit skip.\n\nFresh Gmail start:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --gmail-add-email me@gmail.com\n```\n\nFor first-run Gmail linking, the email supplied with `--gmail-add-email` is also\nthe Google account that should own/create the local OAuth project. The returned\nsetup command should pass an explicit deterministic `--project` derived from\nthat email and must require/login as the same email before project creation. Do\nnot pick a project from the active local `gcloud` state.\n\nRecord discovered Gmail accounts:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --gmail-db ~/.msgvault/msgvault.db \\\n  --gmail-account me@gmail.com \\\n  --gmail-account work@example.com\n```\n\nIf `step` returns `status: needs_agent_action` with `commands`, Codex must run\nthe returned commands in order. Do not tell the user to run them. For extra\nGmail addresses this means Codex runs the Google OAuth test-user browser\nautomation and authorizes each Gmail account in msgvault as user-action/linking.\nThese commands may include `msgvault_setup.py add-test-users`, `add-account`, or\n`browser-setup --add-account`; they are not network imports and must not start\n`msgvault sync-full`. After those commands succeed, rerun the emitted command\nwith `--gmail-authorized-email <email>` so the account moves from pending to\nlinked; `$setup` import workers own msgvault sync for selected accounts.\nOnly ask the user to complete browser login/consent when Google requires human\naction. If msgvault has no OAuth client configured yet, the first returned\ncommand will be `browser-setup --email <gmail> --add-account`; run that before\ntest-user or additional add-account commands.\n\nLinkedIn CSV remains the primary LinkedIn path:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --linkedin-csv ~/Downloads/Connections.csv \\\n  --linkedin-source-user <label>\n```\n\nThe LinkedIn step only validates and records the CSV path/source label; it does\nnot run enrichment or imports. Messages onboarding is also link-only: it runs\nthe scoped iMessage/Contacts permission check and checks WhatsApp auth/link\nstatus. If WhatsApp is not linked, run the returned `import_whatsapp_wacli.py\nauth` command or rerun with `--skip-messages-whatsapp`; neither path runs\nWhatsApp sync or exports contacts. `--messages-contacts-csv <path>` remains a\nlegacy/manual override for recording an existing contacts CSV. Twitter records a\nhandle with `--twitter-handle <handle>`. Other missing sources can be marked\ndone with `--skip-source <messages|gmail|linkedin_csv|twitter>`.\n\nIt tracks non-secret state in `.powerpacks/ingestion/accounts.json`.\n\n## After Linking\n\nWhen `step` returns `status: completed`, read the emitted `handoff` object.\nShow the `confirmation_prompt` and ask once before long work. After approval:\n\n- Run `handoff.handoff_command`. That command is the only post-link handoff path\n  and delegates import worker planning, approval confirmations, fan-in, and indexing\n  readiness to `$setup` / `setup.py handoff`.\n- Dispatch import/index workers only from the setup handoff response. Do not use\n  legacy direct onboarding worker phases.\n- Keep the main thread user-friendly: report connected sources, approval confirmations,\n  current counts, final local paths, and real failures. Do not describe ledgers,\n  fan-in/fan-out, or implementation details unless the user asks.\n\nDo not put account-linking browser flows in a worker. The top-level Codex\norchestrator owns Gmail/msgvault linking, Google browser actions, LinkedIn CSV\nhandoff, message/WhatsApp linking, Twitter linking, and user confirmations.\n\nThe setup handoff is the first post-link place that plans imports. Onboarding\nitself never runs imports. Never store tokens/passwords/cookies there. The v2\nregistry stores non-secret config (`gmail.msgvault_db/account_emails/oauth_app/oauth_test_users/available_accounts/selected_accounts`,\n`linkedin_csv.csv_path/source_label`, `twitter.handle`,\n`messages.imessage/whatsapp/planned_contacts_csv`) while preserving v1\n`usernames`/`artifacts` mirrors.\n", "mcp_count": 0, "mcp_refs": [], "name": "onboard", "pack": "ingestion", "path": "packs/ingestion/skills/onboard/SKILL.md", "primitive_count": 4, "primitive_refs": ["discover_contacts_pipeline", "gmail_network_import", "linkedin_network_import", "msgvault_setup"]}, {"description": "Unified Powerpacks ingestion setup. Use for $setup, one-time setup, operator bootstrap restore, account/source linking, import/enrichment fan-out, and local search-index/DuckDB readiness.", "display_name": "powerset:setup", "heading": "setup", "markdown": "---\nname: setup\ndescription: Unified Powerpacks ingestion setup. Use for $setup, one-time setup, operator bootstrap restore, account/source linking, import/enrichment fan-out, and local search-index/DuckDB readiness.\n---\n\n# setup\n\nUse this skill for `$setup` and first-run Powerpacks ingestion setup. This is\nan ingestion/product setup flow, not a generic `$powerset login` alias.\n\n## Phase model\n\n1. **bootstrap** \u2014 inspect/pull/apply operator bootstrap bundles as prior local\n   artifacts/checkpoints.\n2. **link** \u2014 run onboarding as source linking only; record non-secret state in\n   `.powerpacks/ingestion/accounts.json`.\n3. **import** \u2014 automatically refresh linked sources when setup has not already\n   done a recent live sync, reusing existing artifacts by default.\n4. **index** \u2014 after import fan-in, run processing/indexing and local DuckDB\n   materialization when safe or approved.\n\nOnboarding must remain link-only. Do not run Gmail metadata import,\n`msgvault sync-full`, LinkedIn RapidAPI enrichment, Twitter crawl,\n`$import-contacts` research/upload, merge, or indexing from the onboarding\nphase. Gmail import workers own `msgvault sync-full` for selected accounts\nbefore they read the local msgvault DB.\n\nSources are optional. The link phase records whatever the user has connected or\nexplicitly skipped, but empty/unlinked source entries are not blockers. Setup\nimports and enriches linked sources only, and can use restored or existing local\nnetwork/index artifacts even when no sources are currently linked.\n\nMessages onboarding checks iMessage/Contacts permissions and WhatsApp auth/link\nstate only. WhatsApp link uses `import_whatsapp_wacli.py auth`; it must not run\nWhatsApp sync or export contacts in the link phase. Messages import workers\nlater call `import_contacts_pipeline.py run` with explicit include flags: local\niMessage/WhatsApp extraction, contact merge, Powerset candidate match, LLM\nENRICH/SKIP triage, and the reviewed contacts UI. Setup must not include\nmessages deep research, retarget research, upload, or datalake sync flags.\nThose setup-only message steps produce a reviewed local `research_review.csv`\nartifact. Network fan-in may use only rows with explicit approval markers such\nas `exclude=no`, `approved=true`, or an include upload decision; bucket defaults\nalone are not approval.\n\n## How to explain setup to the user\n\nKeep the user's view simple. Use plain product language first, and keep internal\nterms like ledgers, fan-out/fan-in, worker jobs, artifacts, and DuckDB out of\nnormal updates unless the user asks for technical details.\n\nGood opening summary:\n\n```text\nI\u2019m going to get your local Powerpacks search ready in four steps:\n1. Restore any safe prior progress we already have for you.\n2. Connect the sources you choose, like Gmail, LinkedIn, Messages, Twitter, or WhatsApp.\n3. Import each connected source in parallel where possible.\n4. Combine everything into one local network and make it searchable on this machine.\n\nI won\u2019t upload anything automatically, and I\u2019ll only stop to ask you when a login,\nQR/device link, overwrite, or paid provider step needs your approval.\n```\n\nWhen reporting status, say what changed for the user:\n\n```text\nGmail is connected for 2 accounts. LinkedIn is connected from your Connections.csv.\nSetup will import anything that is stale or missing, reuse what is already current,\nthen finish quietly if there is nothing to do.\n```\n\nAvoid saying this to a normal user:\n\n```text\nI will dispatch fan-out workers with isolated ledgers and run fan-in after all jobs complete.\n```\n\nInstead say:\n\n```text\nI\u2019ll run the independent imports in parallel so setup finishes sooner, then merge the results into one local network.\n```\n\nUse jargon only in hidden/internal notes, command logs, or when asking another\nagent to execute a precise command.\n\n## Canonical install/root rule\n\nAlways run setup from the canonical Powerpacks installation directory, not from\nan agent harness checkout such as `~/.codex/powerpacks` or `~/.codex/powerpacks-*`.\nThe canonical repo is the first valid non-`.codex` path among:\n\n1. `$POWERPACKS_REPO_ROOT` when it points to a Powerpacks repo;\n2. the current working directory when it is a Powerpacks repo and is not under\n   `.codex`;\n3. `~/powerpacks`;\n4. `~/workspace/powerpacks`.\n\nIf useful state was created under a `.codex` checkout, do **not** keep running\nthere. Prefer `$fix-powerpacks`, which reads `config/powerpacks-state-paths.json`,\nchecks linked source wiring, and copies missing/newer managed state into the\ncanonical repo. For a direct one-off adoption, use:\n\n```bash\ncd <canonical-powerpacks-repo>\nuv run --project . python scripts/fix-powerpacks-state.py --json\n```\n\nUse `--backup` or `--quarantine-legacy-state` only when the user explicitly wants\nlegacy state to replace existing canonical files or wants stale `.codex` state\nrenamed after adoption, for example when an authenticated WhatsApp store was\naccidentally created under `.codex` and the canonical store is just an\nunauthenticated placeholder.\n\nThis keeps msgvault DB paths, WhatsApp/wacli stores, setup ledgers, import\nartifacts, and DuckDB/index state repeatable under one `.powerpacks/` root.\n\n## Commands\n\n`$setup` is the product command. By default, launch the local Powerpacks Console\nfrom the canonical repo on the guided setup page and let the user click through\nlinking, import, enrichment, and indexing from the app:\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -x \"$candidate/scripts/run-powerpacks-console.sh\" && -d \"$candidate/packs\" ]]; then\n      printf '%s\\n' \"$candidate\"\n      return 0\n    fi\n  done\n  return 1\n}\nrepo=\"$(resolve_powerpacks_root)\" || {\n  echo \"Powerpacks is not installed in a canonical location. Install or copy it to ~/powerpacks, then rerun $setup.\" >&2\n  exit 1\n}\ncd \"$repo\"\nscripts/run-powerpacks-console.sh start --path /setup --open\n```\n\nIf the script reports that the app is already running, use the printed `Open:`\nURL. If macOS cannot open the browser from the current shell, tell the user the\nprinted URL instead of falling back to `setup.py run`.\n\nDo not run `scripts/run-powerpacks-console.sh` relative to an arbitrary Codex\ncwd. If the only available checkout is under `.codex`, stop and ask to install\nor copy Powerpacks to `~/powerpacks` or set `POWERPACKS_REPO_ROOT` to a\ncanonical non-`.codex` path. Then adopt any `.codex` state with\n`scripts/adopt-powerpacks-state.py` as shown above.\n\nThe app uses the same setup primitives through `/local-api/setup/*`, so this\nstill runs the real setup flow. It just avoids one giant Codex-driven chain and\nmakes user actions visible.\n\nUse the setup runner only when the user explicitly asks for `$setup cli`, a\ndeterministic CLI run, or a specific phase. It is idempotent: it restores a safe\nmatching bootstrap when needed, refreshes whatever sources are already linked,\nthen reuses completed recent work. If no sources are linked and no local\nnetwork/index artifacts exist yet, setup may suggest linking a source, but it\nmust not require skip markers for every unused source. `$setup` does not do\nPowerset login, env pull, MCP registration, or remote GCS bootstrap discovery.\nIf a published Powerset operator bootstrap exists, `$powerset setup` syncs it\ninto `.powerpacks/operator-bootstrap/bundles/` first; `$setup` then treats that\nlocal bundle like any other previous-run artifact. If no local matching bundle\nexists, setup simply continues with source linking/import.\n\nFor debugging, operator testing, or resuming after a blocker, use the\ndeterministic phase entrypoints below instead of rerunning the product app flow\nblindly.\n\n`$setup cli`:\n\n```bash\ncd \"${POWERPACKS_REPO_ROOT:-$HOME/powerpacks}\"\nuv run --project . python packs/ingestion/primitives/setup/setup.py run \\\n  --operator-id <operator-id> \\\n  --accounts .powerpacks/ingestion/accounts.json \\\n  --setup-ledger .powerpacks/setup/setup-run.json\n```\n\nThe read-only next-action command tells agents exactly which phase should run\nnext and returns the concrete command to run:\n\n```bash\ncd \"${POWERPACKS_REPO_ROOT:-$HOME/powerpacks}\"\nuv run --project . python packs/ingestion/primitives/setup/setup.py next \\\n  --operator-id <operator-id> \\\n  --accounts .powerpacks/ingestion/accounts.json \\\n  --setup-ledger .powerpacks/setup/setup-run.json\n```\n\nPhase entrypoints use the same underlying logic as `run`; they only narrow the\nscope so agents can test or resume one layer at a time:\n\n```bash\ncd \"${POWERPACKS_REPO_ROOT:-$HOME/powerpacks}\"\nuv run --project . python packs/ingestion/primitives/setup/setup.py bootstrap \\\n  --operator-id <operator-id> \\\n  --setup-ledger .powerpacks/setup/setup-run.json\n\nuv run --project . python packs/ingestion/primitives/setup/setup.py link \\\n  --operator-id <operator-id> \\\n  --accounts .powerpacks/ingestion/accounts.json\n\nuv run --project . python packs/ingestion/primitives/setup/setup.py import \\\n  --operator-id <operator-id> \\\n  --accounts .powerpacks/ingestion/accounts.json \\\n  --setup-ledger .powerpacks/setup/setup-run.json\n\nuv run --project . python packs/ingestion/primitives/setup/setup.py index \\\n  --operator-id <operator-id> \\\n  --accounts .powerpacks/ingestion/accounts.json \\\n  --setup-ledger .powerpacks/setup/setup-run.json\n```\n\nDo not change the product behavior by default: when `setup.py run` sees linked\nsources, it should run the setup refresh path for those sources without asking\nabout empty optional sources. If no sources are linked and no restored/existing\nlocal artifacts can be indexed, `setup.py run` can return the next link action\nas a first-source suggestion. Use phase commands to avoid repeating completed or\nunrelated phases during debugging.\n\nFor inspection without running refresh work, use local status:\n\n```bash\ncd \"${POWERPACKS_REPO_ROOT:-$HOME/powerpacks}\"\nuv run --project . python packs/ingestion/primitives/setup/setup.py status \\\n  --operator-id <operator-id> \\\n  --accounts .powerpacks/ingestion/accounts.json \\\n  --setup-ledger .powerpacks/setup/setup-run.json\n```\n\nIf the user has a local operator bootstrap bundle, inspect before applying:\n\n```bash\nuv run --project . python packs/ingestion/primitives/setup/setup.py inspect-bootstrap \\\n  --bundle .powerpacks/operator-bootstrap/bundles/<operator>.operator-bootstrap.tar.gz\n```\n\nOnly after explicit approval, apply with `--force` if overwrites are required:\n\n```bash\nuv run --project . python packs/ingestion/primitives/setup/setup.py apply-bootstrap \\\n  --bundle .powerpacks/operator-bootstrap/bundles/<operator>.operator-bootstrap.tar.gz \\\n  --operator-id <operator-id> \\\n  --force\n```\n\nManual exact-object GCS bootstrap pulls require explicit approval. The normal\nPowerset path is `$powerset setup`; use this only when someone gives an exact\nobject URI:\n\n```bash\nuv run --project . python packs/ingestion/primitives/setup/setup.py pull-bootstrap \\\n  --gcs-uri gs://bucket/path/operator-bootstrap.tar.gz \\\n  --output .powerpacks/operator-bootstrap/bundles/<operator>.operator-bootstrap.tar.gz \\\n  --allow-gcs-download\n```\n\n`pull-bootstrap` defaults to `--download-backend auto`: it uses `gcloud storage\ncp` when Google Cloud CLI is installed, and can fall back to the project\n`google-cloud-storage` dependency when run through `uv run --project .` with\n`--download-backend python`. Raw service-account JSON in\n`GOOGLE_APPLICATION_CREDENTIALS` is materialized to a temporary 0600 key and\ncleaned up after either backend.\n\nTo link or add sources later:\n\n```bash\nuv run --project . python packs/ingestion/primitives/onboarding/onboarding.py step \\\n  --accounts .powerpacks/ingestion/accounts.json \\\n  --operator-id <operator-id>\n```\n\n## Gmail/msgvault multi-account linking\n\nFor Gmail, route through existing msgvault automation. Browser/GCP actions are\nuser-action/linking steps, not import steps:\n\n- `packs/ingestion/primitives/msgvault_setup/msgvault_setup.py browser-setup`\n  creates/configures the Google OAuth Desktop app and can authorize the first\n  account with `--add-account`.\n- `msgvault_setup.py add-test-users <emails...>` uses browser automation to add\n  more OAuth test users.\n- `msgvault_setup.py add-account --email <email>` authorizes each additional\n  Gmail account.\n\nAfter msgvault is configured and local accounts are discoverable, ask once:\n\n```text\nWhich other Gmail accounts should we link now?\n```\n\nRecord selected accounts in `gmail.config.selected_accounts` /\n`gmail.config.account_emails`. Newly requested Gmail accounts stay in\n`gmail.config.pending_accounts` until the returned `--gmail-authorized-email\n<email>` rerun records them as linked. Do not create\n`.powerpacks/network-import/discover/gmail` outputs or run `msgvault sync-full` during\nlinking; Gmail sync/import runs later in the import phase for linked accounts.\n\n## Import phase: automatic refresh, then fan-in\n\nDo not ask for a separate \"continue import\" confirmation after setup has linked\nsources available. `$setup` should run the refresh when it is due, include\nexisting artifacts by default, and complete without ceremony when there is no\nnew work.\nUse normal user language:\n\n```text\nI\u2019ll refresh the sources you have connected, reuse the current local data, and\nthen combine everything into one local network.\n\nI won\u2019t upload anything automatically. I\u2019ll only interrupt you if a browser\nlogin, QR/device link, overwrite, or paid provider approval is needed.\n```\n\n`setup.py run` is the CLI path. `setup.py handoff` remains available for\ndebugging or for agents that need to inspect worker commands:\n\n```bash\nuv run --project . python packs/ingestion/primitives/setup/setup.py handoff \\\n  --operator-id <operator-id> \\\n  --accounts .powerpacks/ingestion/accounts.json \\\n  --setup-ledger .powerpacks/setup/setup-run.json\n```\n\nIf using the handoff output directly, the generated `discover-contacts` commands\nmust include `--include-existing-artifacts`. Use the\n`worker_groups.import.jobs` output to spin up parallel worker sub-agents where\npossible:\n\n- Gmail/msgvault workers per selected account; each worker runs\n  `msgvault sync-full <email>` before `gmail_network_import.py msgvault` when\n  msgvault is available.\n- LinkedIn CSV import/enrichment worker.\n- Twitter worker only when explicitly linked/approved.\n- Messages/iMessage/WhatsApp contacts worker using explicit include flags.\n  WhatsApp may require a QR/device-linking approval before contacts exist.\n  Setup should run local match, LLM triage, and the reviewed contacts UI, then\n  stop before deep research, retargeting, upload, or datalake sync. Raw contacts\n  are not fan-in inputs for network DuckDB. If a reviewed messages CSV is\n  present, only explicitly approved rows can join the network fan-in.\n\nWorkers must write to the fixed `.powerpacks/network-import/discover/<source>/`\nfolders for `--only-source` source jobs and must return blocked approvals to the\nmain thread. Merge/network DuckDB fan-in runs only after all selected network\nsource workers complete or block; message contact metadata stays outside that\nfan-in until it has passed review.\n\n## Consent boundaries\n\nThe main thread owns these approvals. Never let workers approve them silently:\n\n- browser/Gmail OAuth and gcloud login;\n- GCP Desktop OAuth app creation and OAuth test-user additions;\n- adding/authing each extra Gmail account;\n- WhatsApp QR/device linking;\n- manual exact-object GCS bootstrap download;\n- destructive bootstrap restore/overwrite (`--force`);\n- RapidAPI, Parallel, OpenAI/TLM, embedding, or other provider spend;\n- `$import-contacts` research/review/upload or any upload/prod write.\n\nLocal status, msgvault account listing, discover-contacts dry-run, processing\n`plan`, processing `run --dry-run`, local merge, and local DuckDB\nmaterialization may run without spend approval.\n\n## Index phase\n\nIf bootstrap restored `.powerpacks/search-index/local-search.duckdb` and a\nverified ledger/records, report local search ready. If records exist without\nDuckDB, run only local materialization:\n\n```bash\nuv run --project . python scripts/build-local-duckdb-shim.py \\\n  --records-dir .powerpacks/search-index \\\n  --derive-positions-from-person-profiles \\\n  --operator-id <operator-id> \\\n  --force\n```\n\nIf only `.powerpacks/network-import/merged/people.csv` exists,\n`build_processing_pipeline.py plan` is safe for structure inspection, but run\n`build_processing_pipeline.py run --dry-run` before any paid provider flags so\nthe user sees the total estimated cost and per-stage cost breakdown. Real\nprovider stages require precomputed artifacts or explicit paid/provider approval\nflags.\n", "mcp_count": 0, "mcp_refs": [], "name": "setup", "pack": "ingestion", "path": "packs/ingestion/skills/setup/SKILL.md", "primitive_count": 6, "primitive_refs": ["build_processing_pipeline", "gmail_network_import", "import_contacts_pipeline", "import_whatsapp_wacli", "msgvault_setup", "setup"]}, {"description": "One-command guided contact import workflow. Orchestrates iMessage, WhatsApp, merge, Powerset matching, research, review, retarget feedback, and upload confirmations.", "display_name": "powerset:import-contacts", "heading": "Import Contacts", "markdown": "---\nname: import-contacts\ndescription: One-command guided contact import workflow. Orchestrates iMessage, WhatsApp, merge, Powerset matching, research, review, retarget feedback, and upload confirmations.\n---\n\n# Import Contacts\n\nUse this skill for `$import-contacts` or any request to import iMessage /\nWhatsApp contacts into the Powerset messages research workflow.\n\n## Rule\n\nWhen the user literally types `$import-contacts`, treat that command as explicit\nconsent to start a fresh import in this turn. Run the fresh-run command\nimmediately. Do not print this skill file, ask what command to run, or ask the\nlocal metadata consent question again.\n\n`$import-contacts` starts with a fresh run:\n\n```bash\nuv run --project . python packs/messages/primitives/import_contacts_pipeline/import_contacts_pipeline.py run\n```\n\nAfter that, only use:\n\n```bash\nuv run --project . python packs/messages/primitives/import_contacts_pipeline/import_contacts_pipeline.py continue\nuv run --project . python packs/messages/primitives/import_contacts_pipeline/import_contacts_pipeline.py approve\n```\n\nDo not ask the user to choose flags. Do not walk them through primitive\ncommands. Use primitives directly only for narrow debugging after the\norchestrator reports a concrete failure.\n\n## Fresh Slate\n\n`run` starts a new import and archives stale run-owned files first:\n\n- active ledger\n- merged contacts CSV\n- channel exports and manifests\n- Powerset candidate cache\n- research queue\n- review CSV\n- retarget queue and ledger\n\nIt keeps expensive files:\n\n- WhatsApp message-count cache for unchanged live chats\n- deep research files, especially\n`.powerpacks/messages/research/<handle>/01_research_parallel.json` and\n`03_network_review.json`\n\nSo fresh runs rescan live WhatsApp but do not recount unchanged chats, and\nalready-researched handles are reused.\nWhen a prior review CSV is archived, the regenerated review carries forward\nexplicit human decisions (`exclude`, `enrich_decision`) and `retarget_hint`\nvalues for matching handles/phones.\n\n`continue` resumes the active run and does not clear anything.\n\n## Consent\n\nFor natural-language import requests that do not include the literal\n`$import-contacts` command, ask once before starting:\n\n```text\nImport contacts\n\n- Imports only local iMessage and WhatsApp message/contact metadata; message bodies are never read.\n- Reads contact names for matching.\n- WhatsApp may require a QR scan to link your device.\n- Downloads Powerset Contacts and matches locally.\n- Sends contact names only to OpenRouter for enrichment triage.\n- Runs Parallel/RapidAPI research only after you approve it.\n\n**Your explicit permission will be required before retarget research or uploading/syncing approved contacts.**\n\nContinue?\n```\n\nAfter consent, do not ask again for local extraction, normalization, merge,\nPowerset login, candidate sync, or matching. Stop only for:\n\n- macOS Full Disk Access / Contacts permission\n- Docker/WhatsApp QR action\n- LLM cost approval when estimate is at least `$10.00`\n- retarget re-research approval after feedback, using RapidAPI for exact\n  LinkedIn URL hints and Parallel.ai for anything still unresolved\n- final upload approval\n\nNever upload automatically.\n\n## Execution\n\nIn Codex CLI, use the main shell for `$import-contacts` when the user expects\nlive progress updates. Sub-agents do not stream intermediate messages back to\nthe parent; the parent only sees running/completed state unless it polls the\nledger, which creates noisy tool-call blocks.\n\nFor live progress, run the orchestrator command directly, not through a Python\nwrapper or here-doc. Poll the running shell session frequently, about every\n5-10 seconds during active work. After each poll, copy any new\n`[import-contacts] ...` lines into the main chat as assistant messages, with the\nprefix removed. Do not rely on the Codex tool transcript as the user-facing\nstatus surface, because it may be collapsed.\n\nUse a worker sub-agent only when the user explicitly wants a quiet/background\nrun. After consent, the main-chat handoff line for that background mode should\nbe exactly:\n\n`Starting work through sub-agent.`\n\nClose the worker with `close_agent` after it reports a terminal state, including\nreview opened, approval needed, upload approval needed, completion, or failure.\nIf spawning the worker fails because the sub-agent pool is full, close stale\ncompleted sub-agents and retry the worker once before running the orchestrator\nin the main shell.\n\nThe worker handoff must explicitly say consent was already granted in the main\nthread, and that the worker must not ask for consent again. Give it the exact\norchestrator command to run.\n\nTell the worker to relay only user-facing orchestrator status lines that begin\nwith `[import-contacts]`. These are progress broadcasts, not reasoning. The\nworker must not share chain-of-thought, planning, speculation, raw logs, JSON\npayloads, contact data, phone numbers, or message data.\n\nDo not poll `.powerpacks/messages/import-run.json` just to simulate live\nsub-agent status unless the user asks for that tradeoff; it creates visible\ntool-call noise in Codex CLI. For live status, run the orchestrator in the main\nshell and relay `[import-contacts] ...` lines.\n\nThe main chat should show only:\n\n- user-facing orchestrator status broadcasts\n- QR / permission actions\n- spend prompts, with cost only\n- upload prompts, with approved contact count only\n- final result, exactly `Uploaded X contacts`\n\nDo not stream primitive JSON, terminal transcripts, progress logs, local file\npaths, row counts, matched/unmatched counts, or implementation details unless a\nfailure needs diagnosis or the user asks.\n\nThe terminal may show terse primitive progress lines while long steps run, but\nonly `[import-contacts] ...` lines should be relayed as normal progress. Use\nother lines only to diagnose a real stall or failure.\n\nFor WhatsApp, use plain user-facing status:\n\n- `Syncing WhatsApp Messages and Contacts.`\n- `WhatsApp needs a QR scan.`\n- `Refreshed WhatsApp QR page.`\n- `WhatsApp sync finished.`\n\nThe default WhatsApp provider is wacli. Use WAHA only when explicitly requested\nor when running with `POWERPACKS_WHATSAPP_PROVIDER=waha`.\n\n## Timing\n\nDo not treat long-running stages as failures just because they are quiet.\n\n- iMessage, merge, match, and queue prep are usually seconds to a few minutes.\n- WhatsApp live sync can take several minutes. Large accounts can take much\n  longer; the primitive writes heartbeat/progress events while counting changed\n  direct chats.\n- LLM skip/enrich review auto-runs under the cost threshold and can take\n  minutes on thousands of named unmatched contacts.\n- Parallel deep research uses the estimate block as the timing source. For\n  `core2x`, expect about 10-15 minutes after approval.\n- Network-review scoring writes `03_network_review.json` cache f
