back after the\n  structured current/past company paths are empty or unavailable.\n\nMode defaults:\n\n- \"who works at Brookfield\" / \"who's in my extended network at Cisco\" \u2192 company\n  search. Resolve company, search it, ingest full artifact content, enrich the\n  visible page, export.\n- \"who works at Brookfield in the finance department\" \u2192 same company search plus\n  finance intent. Use reliable Sales Nav filters if known (`function_ids`), and\n  also pass targeted `keywords`/`title` when helpful. If the first query is too\n  sparse, retry once or twice by relaxing the weakest text filter while keeping\n  the company/set fixed.\n- \"show me people with real estate exposure\" after a Sales Nav run \u2192 run a new\n  Sales Nav search with the updated criteria. Do not scan previous `leads.jsonl`\n  or local artifacts for refinement.\n\n### Step 2 \u2014 Run the search (always with persistence)\n\nInitialize the local file store before the MCP call if you have not already.\n\n```text\nTool: sales_nav_search\nArgs: {\n  \"set_id\":         \"<the user's set>\",\n  \"conversation_id\":\"<UUID \u2014 see conversation_id playbook>\",\n  \"persist_artifact\": true,\n  \"company_ids\":    [...],         // from sales_nav_resolve\n  \"company_names\":  {\"<org_id>\": \"<display name>\"},\n  \"past_company_ids\": [...],       // alumni / worked-at searches\n  \"past_company_names\": {\"<org_id>\": \"<display name>\"},\n  \"title\":          \"staff engineer\",\n  \"function_ids\":   [...],\n  \"seniority_ids\":  [...],\n  \"geography_ids\":  [...],\n  \"headcount_ids\":  [...],\n  \"keywords\":       \"distributed systems\",\n  \"count\":          25,            // max 25 per page\n  \"start_offset\":   0\n}\n```\n\nResponse shape (with persistence):\n\n```jsonc\n{\n  \"artifact_id\": \"...\",\n  \"artifact\": { /* metadata */ },\n  \"total_count\": 1342,\n  \"max_total_count\": 2500,\n  \"results_returned\": 25,\n  \"has_more\": true,\n  \"next_start_offset\": 25,\n  \"filters_used\": { /* what the server actually filtered on */ },\n  \"reconnect_required\": false,\n  \"leads\": [\n    {\n      \"name\": \"...\",\n      \"headline\": \"...\",\n      \"linkedin_url\": \"...\",\n      \"company\": \"...\",\n      \"location\": \"...\",\n      \"mutual_count\": 3,\n      \"mutual_member_ids\": [\"...\", \"...\"]\n    }\n  ]\n}\n```\n\n`reconnect_required: true` means the user's Unipile/LinkedIn session\nneeds upstream re-auth; tell the user and stop. Do not retry.\n\nSave the MCP response for audit, but ingest the full artifact content: call\n`get_artifact` with `include_content: true`, save that response, then run\n`sales_nav_artifacts ingest-page --prefer-content` on it. The primitive records\n`artifact_id`, lead rows, mutual edges, and source/operator metadata in local\nhandoff files.\n\nThen enrich the visible leads by default:\n\n```text\nTool: enrich_extended_profiles\nArgs: {\n  \"conversation_id\": \"<same conversation_id>\",\n  \"member_ids\": [<member_ids from this visible page>],\n  \"set_id\": \"<same set_id>\"\n}\n```\n\nAfter enrichment, call `get_artifact(include_content=true)` again and ingest\nwith `--prefer-content`. This is what puts full profile data (`summary`,\n`experiences`, `education`) into `leads.jsonl`.\n\nEvery follow-up retrieval (next page, mutual lookup, re-display) should use the\nlocal state path plus `get_artifact` / `sales_nav_resolve_member_ids` as needed.\n\n### Step 3 \u2014 Present the first page\n\n- Lead with `total_count`, `results_returned`, and any non-zero `mutual`\n  counts.\n- For each lead present `name`, `headline`, `company`, `location`,\n  `mutual_count`, and `linkedin_url`.\n- Mention `artifact_id` to the user (they may want to reference it across\n  turns / sessions).\n- If `has_more`, ask if they want page N+1 \u2014 do **not** auto-fetch.\n\n### Step 4 \u2014 Paginate via get_artifact\n\nSubsequent pages of the same result set should go through\n`get_artifact`, not a fresh `sales_nav_search`. Save each page response and\nappend it to the same local files with `sales_nav_artifacts ingest-page`:\n\n```text\nTool: get_artifact\nArgs: {\n  \"artifact_id\":     \"<from step 2>\",\n  \"offset\":          25,\n  \"limit\":           25,\n  \"include_content\": true    // prefer full accumulated lead shape for local files\n}\n```\n\nThis avoids re-running an expensive Sales Nav fetch and keeps the\nfilters/result-set stable across pages. For each retrieved page, prefer\n`include_content=true` + `ingest-page --prefer-content` so local files keep the\nfull accumulated lead shape. The local primitive dedupes by `member_id` and\nappends new lead\u2194mutual edges to `mutuals.jsonl`.\n\n### Step 5 \u2014 Refining filters\n\nRefining upstream Sales Nav filters is a **new search**, not pagination. Re-call\n`sales_nav_search` with the new args, the same `conversation_id`, and\n`persist_artifact: true`. You'll get back a new `artifact_id`. Tell the\nuser the artifact id changed.\n\nRefining over already-loaded people is a **new Sales Nav search**. For\nquestions like \"which of these have real estate exposure\", \"who is in NYC\", or\n\"show the Brookfield VPs with mutuals\", do not scan local state first. Re-call\n`sales_nav_search` with the updated filters and `persist_artifact: true`.\n\n| User says | What changes |\n| --- | --- |\n| \"next page\" | `get_artifact` with `offset += 25` |\n| \"narrow to NYC\" | new `sales_nav_search` with `geography_ids` |\n| \"only senior+ folks\" | new `sales_nav_search` with `seniority_ids` |\n| \"filter to mid-stage companies\" | new `sales_nav_search` with `headcount_ids` |\n| \"show me their mutual\" | use current-run `mutual_member_ids`; do not scan prior artifacts |\n\n### Step 6 \u2014 Resuming a previous search\n\nDo not resume previous searches. If the user references a prior `artifact_id`\nwhile asking for search results, run a new search instead. Only call\n`get_artifact` for an old artifact when the user explicitly asks to inspect that\nartifact rather than run a search.\n\n## What this skill does NOT do\n\n- It does not write leads to your local `contacts.csv`. Lead \u2192 contact\n  promotion is a separate (future) `import-sales-nav-leads` skill, likely\n  also under `packs/sales-nav`.\n- It does not promote leads into the Powerset main set. That UI affordance\n  is on the web app today.\n- It does not run a sequence of pages on its own. Pagination is always\n  user-confirmed and goes through `get_artifact`.\n", "mcp_count": 4, "mcp_refs": ["enrich_extended_profiles", "sales_nav_resolve", "sales_nav_resolve_member_ids", "sales_nav_search"], "name": "sales-nav-search", "pack": "sales-nav", "path": "packs/sales-nav/skills/sales-nav-search/SKILL.md", "primitive_count": 4, "primitive_refs": ["resolve_set_operators", "sales_nav_artifacts", "sales_nav_pipeline", "score_sales_nav_leads"]}, {"description": "The single people-search door for Powerpacks. You decide surface/backend/depth and record it (decision.json): explicit words pick the backend (powerset uses TurboPuffer/Postgres; local uses DuckDB); a JD or job-posting URL runs the deep multi-profile engine; company / relational-SQL / my-contacts requests go to their surfaces. Formerly $search-network.", "display_name": "powerset:search", "heading": "Search", "markdown": "---\nname: search\ndescription: \"The single people-search door for Powerpacks. You decide surface/backend/depth and record it (decision.json): explicit words pick the backend (powerset uses TurboPuffer/Postgres; local uses DuckDB); a JD or job-posting URL runs the deep multi-profile engine; company / relational-SQL / my-contacts requests go to their surfaces. Formerly $search-network.\"\n---\n\n<!--\nChangelog:\n- 2026-07-08: Checklist step 3 is now \"Review \u2014 confirm requirements with the user\" (was \"GATE \u2014\").\n  Plain \"Review\" instead of \"GATE\"/\"GATE 1\" in the printed tasks; the core-gate keeps its name.\n- 2026-07-01: Replaced the Step-0 classifier (route_query.py, deleted) with an agent-made decision\n  contract \u2014 you decide surface/backend/depth and record decision.json before anything runs. Added\n  the mandatory native-task checklist and the universal confirm-before-execute gate. Explicit\n  \"powerset\"/\"local\" words now bind the backend end-to-end. Decision quality is benchmarked by the\n  agent decision eval (packs/search/evals/run_decision_eval.py) instead of the offline classifier eval.\n- 2026-06-30: Renamed from `search-network` to `search` (search consolidation Stage 3). Added the\n  Step-0 router that dispatches deep JD/URL/brief/shortlist to $search's deep mode and\n  company/sql/contacts to their surfaces; ordinary people searches stay on the fast local/TurboPuffer\n  path. $search-network is a deprecated alias. The retrieval primitive (search_network_pipeline.py)\n  and search-network-jd-* schemas/tasks keep their names.\n- 2026-07-10: Quality-superlative hiring asks (\"best\", \"strongest\", \"cracked\") enter deep mode.\n  Deep mode now builds and critiques its recruiter plan before sourcing, then uses the approved\n  core/nice criteria and explicit recruiter defaults to generate epoch-0 probes.\n-->\n\n# Search\n\nThe single entry point for people search. `$search` routes every query to the right surface, then\nruns fast local/TurboPuffer retrieval itself for ordinary people searches.\n\nFor the product and system walkthrough, read\n[`packs/search/docs/search-architecture.md`](../../docs/search-architecture.md).\nThis file remains the executable agent contract.\n\nUse this for any people search request:\n\n- `$search software engineers in sf`\n- `$search local: product managers in nyc`\n- `$search https://jobs.lever.co/company/abc123`   \u2190 deep JD \u2192 runs deep mode\n- `$search senior engineers at series a fintech companies`\n- `$search stanford engineers with 3-5 yoe in new york`\n- `$search people who work at OpenAI`\n\n> `$search` supersedes `$search-network` (the old name still works as an alias). The retrieval\n> primitive is still `search_network_pipeline.py` \u2014 only the skill/route was renamed.\n\n## How to run this skill\n\n**FIRST, before running anything: create a literal, visible checklist with the five steps\nbelow and step through it, marking each item complete as you go.** This is mandatory. Use\nyour harness's plan/todo/task tool:\n\n- **Claude Code:** `TaskCreate` one task per step (1\u20135), then `TaskUpdate` each to\n  `in_progress` then `completed` as you go.\n- **Codex:** `update_plan` with the five steps, updating status as you go.\n- **Any other harness:** its equivalent todo/plan mechanism.\n\nSeed the checklist with these exact item titles:\n\n    1. Decide + record the search decision (decision.json)\n    2. Prepare the search (payload preview or deep plan)\n    3. Review \u2014 confirm requirements with the user\n    4. Execute the search\n    5. Present results\n\nWork the checklist in order 1 \u2192 5. Exactly one item `in_progress` at a time; mark it\n`completed` before starting the next. No batching, no reordering, no skipping, no invented\nextra steps. If Step 1 decides surface `company`/`sql`/`contacts`, mark items 2\u20135 as handed\noff and load that surface's SKILL \u2014 it owns its own flow. If Step 1 decides depth `deep`,\nitems 2\u20134 are owned by deep mode's own checklist (`deep-mode.md`) \u2014 load it right after\nrecording the decision.\n\n## Step 1 \u2014 Decide the route (you are the router)\n\nYou make this decision \u2014 there is no classifier to run. A one-liner, a pasted JD, and a\njob-posting URL all come through this same step and the same rules. Decide three things,\nrecord them, and only then act.\n\n<!-- decision-rules:start -->\nDecide `surface`, `backend`, and `depth` for the query:\n\n1. **surface** \u2014 where the query belongs:\n   - `people` \u2014 any search for people. The default when unsure.\n   - `company` \u2014 the subject is companies (lookup / IDs / investors / funding / sector) and\n     no people are asked for. \"Engineers at companies backed by Sequoia\" is `people`.\n   - `sql` \u2014 the predicate needs cross-row or cross-person logic: per-person aggregates\n     (\"2+ startup stints\"), role ordering (\"engineers who became PMs\"), or a join against\n     another person (\"overlapped with Jane at Stripe\"). A person's name alone is NOT sql:\n     \"look up Jane Doe\" and \"who is Jane Doe\" are `people` lookups. Common words like\n     \"career\" or \"worked with <a technology>\" do not make a query sql.\n   - `contacts` \u2014 \"my contacts\" / \"set contacts\" plus contact-field filtering.\n2. **backend** \u2014 which index runs the search. The user's explicit words always win:\n   - `powerset` \u2014 the user says \"powerset\", names a set, or says \"team/shared network\"\n     (even if they also say \"my network\": \"search my Powerset network\" is `powerset`).\n   - `local` \u2014 the user says \"local\", \"offline\", or \"my imported network/contacts\",\n     even if remote credentials exist.\n   - Unstated \u2192 environment default: if `POWERPACKS_LOCAL_SEARCH_DB` is set, or\n     `.powerpacks/search-index/local-search.duckdb` exists with no TurboPuffer credentials\n     configured, pick `local`; otherwise `powerset`. Both configured \u2192 `powerset`, and say\n     which you picked in one line so the user can flip it.\n   - Forced values: `sql` is always `local`; `company` and `contacts` are always `powerset`.\n3. **depth** \u2014 how hard to search (people surface only):\n   - `deep` \u2014 the input is a pasted JD or a job-posting URL, or the user asks for a\n     deep/thorough/judged run or names the deliverable (\"recruit ...\", \"build a shortlist\",\n     \"source candidates\"). Quality-superlative hiring intent also means deep when the request\n     supplies a role/domain to judge: \"best\", \"strongest\",\n     \"most exceptional\", \"top-tier\", or \"cracked\" candidates. A bare \"find me candidates\" with\n     no role context remains fast/clarify; do not fabricate a hiring profile.\n     A raw profile URL is not yet a supported deep-search intake: ask for the role/domain rather\n     than claiming the internal shortlist-anchor expansion can start from that URL.\n   - `fast` \u2014 everything else: one expansion \u2192 retrieval \u2192 rerank pass.\n   - Deep is the multi-profile engine: decompose the role into diverse candidate archetypes,\n     run each as a probe through the same retrieval pipeline, union, judge, converge.\n4. Uncertain on any axis \u2192 `people` / the environment default / `fast`, and state the\n   uncertainty in `reason`. Never block on routing.\n<!-- decision-rules:end -->\n\nRecord the decision before anything runs (checklist item 1). Create the run dir with a short\nstable slug from the query (e.g. `swe-sf-stanford`) and write `decision.json`:\n\n```json\n{\"surface\": \"people\", \"backend\": \"powerset\", \"depth\": \"fast\",\n \"reason\": \"<one sentence on why>\"}\n```\n\n- fast \u2192 `.powerpacks/search/<slug>/decision.json`, and pass the same dir as `--output-dir`\n  to `prepare` so the decision, payload, and outputs live together.\n- deep \u2192 `.powerpacks/deep-search/<jd-slug>/decision.json` (the engine's existing run dir).\n\nThen dispatch \u2014 this table is the whole routing contract:\n\n| decision | action |\n|---|---|\n| surface `company` | load `packs/search/skills/search-company/SKILL.md` (decision.json still written first) |\n| surface `sql` | load `packs/search/skills/search-sql/SKILL.md` (decision.json still written first) |\n| surface `contacts` | load `packs/contacts/skills/search-contacts/SKILL.md` (decision.json still written first) |\n| `people` + `fast` + `local` | **Local Happy Path** below (`search_network_pipeline.py prepare --backend local --db <db>`) |\n| `people` + `fast` + `powerset` | **TurboPuffer Happy Path** below (`search_network_pipeline.py prepare`) |\n| `people` + `deep` | load `packs/search/skills/search/deep-mode.md` (`--jd-file` / `--jd-url` as it documents; on backend `local` add `--backend local --db <db>` to `deep_search_loop.py`) |\n\nThe deep engine owns its own orchestration and delegates capped per-profile searches back to\nthis skill's selected backend path with a per-search `limit` and `--search-only` - do not run\n`search_network_pipeline.py` directly for a deep input yourself.\n\nInput shapes normalize before `prepare`, never before the decision:\n\n- **backend directives are directives, not query text** \u2014 strip words like `local:`, \"offline\",\n  \"in powerset\", \"search powerset for\", or a set name from the text you pass as `--query`; they\n  bound the decision, and leaving them in pollutes query expansion.\n\n- **job-posting URL** \u2014 deep mode fetches it itself (`--jd-url`). Only when the user\n  explicitly forces `fast` on a URL, fetch first with\n  `uv run --project . python packs/search/primitives/deep_search/fetch_jd.py --url <url> --out <run>/jd.txt`\n  (a thin fetch under ~400 chars \u2192 ask for a paste; Ashby URLs resolve via the public\n  posting API automatically) and use the fetched text as the query.\n- **pasted JD forced to `fast`** \u2014 use the JD text directly as `--query`; expansion condenses it.\n- **one-liner** \u2014 the query as-is.\n\n**The gate (checklist item 3):** every search stops exactly once for user confirmation before\nexecuting \u2014 fast mode at the prepare preview (`Execute this search or modify it?`, or the local\npath's `Execute this local search or modify it?`), deep mode at Review (plan approval). Never\nrun an `execute_command` without that answer; never ask twice.\n\n### Retrieval surface boundary\n\n`$search` people retrieval means the Powerpacks network surface: the `powerset` backend is\nset-scoped TurboPuffer/Postgres and the `local` backend is DuckDB. It is not Sales Navigator.\n\n- An explicit Powerset/network request stays on `$search` with `surface: people` and\n  `backend: powerset`, including retries, wider probes, adjacency, and sparse-result diagnosis.\n- Never treat Sales Nav or LinkedIn leads as an implicit fallback for a failed or weak `$search`\n  run. Ask before changing retrieval surfaces and keep artifacts/results separate unless the user\n  explicitly requests both.\n- If the user says only \"extended search\" and the conversation has not defined the surface, ask:\n  `Do you mean Sales Nav extended search, or regular Powerset network search?`\n\n---\n\n## Hiring seniority & hireability defaults\n\nThese apply to every hiring-intent search (a JD, a role brief, \"find\ncandidates\", \"people like X for this role\") in both local and TurboPuffer\nmodes, and they bind any fallback behavior too:\n\nDeep mode resolves these through the versioned recruiter policy at\n`packs/search/policies/recruiter-defaults.json` and embeds the resolved values plus provenance in\n`epoch0/plan.json`. The order is **explicit user preferences > JD-supported inference > defaults**.\nDefaults rank; they do not silently become JD hard requirements. Review shows them once so the\nuser can override them before sourcing.\n\n- **Derive the seniority target from level language, else from the title's\n  conventional range.** Map stated levels (\"senior\", \"staff+\", \"director and\n  above\") to seniority bands. When a hiring JD/title states no explicit\n  level, propose the title's conventional band range (e.g. \"Member of\n  Technical Staff\" or a bare \"Software Engineer\" \u2192 mid/senior \u2014 MTS is not\n  the `staff` band despite the word) and show it in the preview's\n  `Targeting:` line for correction. Never derive bands from years of\n  experience, team size, scope, or impact language \u2014 YOE is unreliable\n  (\"8+ years\" does not mean senior). Preserve extractor-inferred bands\n  unless they contradict the query.\n- **Exclude current founders / co-founders / CEOs / C-suite by default**\n  for role searches. They are rarely hireable for an IC or leadership\n  hire. State the default in the preview (one line such as\n  `Excluding current founders/C-suite \u2014 say \"include founders\" to keep\n  them`) so the user can flip it. Include them only when the user\n  explicitly asks for founder-type profiles or \"builders regardless of\n  current title\".\n- **Never silently exclude VP / director / manager / head.** Some are\n  hands-on and appropriate depending on company stage. Keep them unless\n  the user excludes them; the rerank judges hands-on fit.\n- **\"People like <person>\"** anchors seniority to that person's current\n  role and band (same rule as the deep-search engine). If the anchor is still\n  ambiguous, ask exactly one question before executing: \"Hands-on IC\n  engineers only, or are technical leaders (VP/director/CTO) acceptable\n  if still hands-on?\"\n- **Preserve the user's stated constraints exactly; never add hidden\n  exclusions beyond the founder default above without asking.** When the\n  user corrects a seniority interpretation, that correction binds every\n  subsequent search in the session \u2014 repeating a corrected mistake is the\n  worst outcome.\n- **On pipeline failure, do not improvise retrieval.** Report the failure\n  (the \"do not write new retrieval scripts\" rule still holds). If the\n  user explicitly asks for a manual fallback over the local index, the\n  fallback must apply these same seniority defaults \u2014 in particular,\n  never put founder/CEO/CTO into a technical-title pattern by default.\n\n---\n\n## Local Happy Path\n\nUses the local DuckDB search index - no TurboPuffer, Postgres, or set\nresolution. Retrieval stays local, but LLM filtering/reranking runs by default\nand sends the required candidate evidence to the configured OpenAI boundary.\nUse `--search-only` to skip those model stages entirely.\n\n### Local person lookup fast path\n\nIf the query is a bare person identifier with no role/filter intent \u2014 a\nname (\"John Doe\", \"who is John Doe\"), an email, a phone number, a Twitter/X\nhandle, or a LinkedIn profile URL \u2014 do **not** run the pipeline. Names and\nidentifiers are not indexed by any retrieval stage; run one direct lookup\ninstead:\n\n```bash\nuv run --project . python packs/search/primitives/local_duckdb_query/local_duckdb_query.py query \\\n  --sql \"SELECT person_id, full_name, headline, current_title, current_company, city, linkedin_url FROM local_person_profiles WHERE full_name ILIKE '%john doe%'\"\n```\n\nMatch emails against `primary_email`/`all_emails`, phones against\n`primary_phone`/`all_phones`, handles against\n`twitter_handle`/`x_twitter_handle`, LinkedIn URLs against\n`linkedin_url`/`public_identifier` (normalize to the slug). Show the\nmatches compactly; if several people match, list them all. If zero match,\nsay so and offer a normal search. Skip extraction, task state, retrieval,\nhydration, and all LLM stages \u2014 this is a deterministic lookup, not a\nsearch. If the query combines a person with anything else (\"engineers who\nworked with John Doe\"), it is not this fast path \u2014 use the normal flow and\nthe agentic SQL fan-out gate.\n\n1. Determine the DuckDB path:\n   - `$POWERPACKS_LOCAL_SEARCH_DB` if set\n   - Otherwise `.powerpacks/search-index/local-search.duckdb`\n\n2. If the DB file does not exist, tell the user to run\n   `$build-local-search-index` first and stop.\n\n3. Run:\n\n   ```bash\n   uv run --env-file .env --project . python packs/search/primitives/search_network_pipeline/search_network_pipeline.py prepare \\\n     --backend local \\\n     --query \"<user query>\" \\\n     --db \"<db-path>\" \\\n     --output-dir \".powerpacks/search/<slug>\"\n   ```\n\n   Use the same `<slug>` run dir where `decision.json` was recorded.\n\n4. Show the preview compactly (it will include `scope: local_duckdb` and a\n   `pool_estimate` with `matched_people` / `total_people`). Include one line\n   like `Pool: 150 of 500 people`. When the extracted filters include\n   `seniority_bands` (or the query names a band), include one compact line\n   such as `Targeting: senior/staff ICs` so the user can correct the band\n   before executing \u2014 a role noun like \"product managers\" must not silently\n   become a `manager` seniority band. If `runtime_notes` flags a broad search\n   (hard filters match more than ~60% of the index), surface that note and\n   recommend narrowing before executing \u2014 running LLM stages over most of\n   the index is usually a query problem, not a retrieval problem. If it\n   flags 0 matches or a suspiciously narrow pool, recommend `modify` (or\n   expect the zero-result fallback below). Then ask exactly:\n\n   `Execute this local search or modify it?`\n\n5. If the user chooses `execute`, run the returned `execute_command` exactly.\n\n6. Keep execution quiet until the command finishes.\n\n### Agentic SQL fan-out (local mode only)\n\nIn parallel with steps 3\u20136, fan out to the `search-sql` skill\n(`packs/search/skills/search-sql/SKILL.md`) via a sub-agent \u2014 but only when\nthe gate below passes. Default is OFF; most searches must not fan out.\n\nDecision test: **could the need be expressed as filters over one position\nrow at a time?** If yes, do not fan out \u2014 the main retrieval stages own it.\nFan out only when the query needs one of:\n\n- **counting/aggregation across a person's rows** \u2014 \"2+ stints at\n  startups\", \"average tenure under 2 years\", \"worked at 3+ FAANG companies\"\n- **ordering/sequence between a person's roles** \u2014 \"engineers who became\n  product managers\", \"promoted internally\", \"IC before manager\"\n- **a join against another person** \u2014 \"worked with X\", \"overlapped with X\n  at Y\", \"schoolmates of X\", \"people similar to X's career path\"\n- **set algebra over two sub-populations** \u2014 \"ex-Stripe folks now at infra\n  startups\"\n- **cross-trait evidence living on different rows or tables** \u2014 \"designers\n  who can code\" (the design role is one position row; the coding evidence\n  is a different engineering row or `local_summaries.tech_skills`),\n  \"recruiters with a technical background\", \"founders who were previously\n  sales\". One position row cannot satisfy both traits, so per-row filters\n  cannot express the conjunction \u2014 still run hybrid in parallel, since\n  profile prose sometimes carries both signals.\n- **interaction history** \u2014 \"people I've actually messaged\" (requires\n  `local_person_source_summary`; skip if the table is absent)\n- **explicit user request** \u2014 \"also run the sql vertical\", \"sql:\"\n\nNever fan out for role/title/seniority/location/company/education/date\nfilters, however many are combined \u2014 \"senior Stanford engineers at series A\nfintechs in NYC since 2020\" is still one-row-at-a-time and stays in the\nmain path. When unsure, do not fan out; the user can ask for `sql:` on a\nfollow-up.\n\nGive the sub-agent the user query verbatim plus any already-resolved person\nor company ids, and have it follow `search-sql`'s output contract. Do not\nfan out for plain row-level searches \u2014 the main retrieval stages own those.\n\nFan-in goes through the pipeline, not around it:\n\n1. Run `prepare` and fan out the sub-agent while the user reviews the\n   preview.\n2. Write the sub-agent's output JSON to `agentic-sql-candidates.json` inside\n   the run's output directory.\n3. Append `--extra-candidates-json <that path>` to the returned\n   `execute_command` before running it. The pipeline unions the SQL people\n   into retrieval (tagged `agentic_sql` in `vertical_sources`), so they flow\n   through the **same** `hydrate_people`, `llm_filter_candidates`, and\n   `llm_rerank_candidates` steps as every other candidate \u2014 no separate\n   ranking path.\n4. If the sub-agent has not finished by the time the user approves\n   execution, wait briefly for it; if it fails or returns an empty `people`\n   list, run the `execute_command` without the flag and note the vertical\n   was skipped. The SQL vertical is additive evidence \u2014 never block or fail\n   the search on it.\n\n### Zero-result SQL fallback (local mode only)\n\nIf the pipeline completes with 0 found (or the preview's `pool_estimate`\nalready shows 0 matched), fan out one `search-sql` sub-agent with the user\nquery **and** the payload's `role_search_filters`, asking it to:\n\n1. probe the actual value spaces of each hard-filtered column,\n2. identify which constraint zeroed the pool (e.g. a filter value that does\n   not exist in the index taxonomy),\n3. return candidates matching the user's intent with corrected values, in\n   the standard output contract.\n\nPresent the diagnosis in one line (\"`seniority_bands: [manager]` matched 0\nbecause this index uses ...\"), plus the recovered candidates if any. Offer\nto re-run the proper pipeline with corrected filters; do not silently\nsubstitute SQL results for a full search.\n\n### Local Summary\n\n- Say `<N> found (local)`.\n- Say `Run artifacts: <artifact-dir>`.\n- Show top 10 candidates from the CSV: rank, name, current title/company,\n  location, LinkedIn URL when present.\n- If the SQL fan-out ran, say `<M> sql-vertical candidates merged` (read\n  `agentic_sql_tagged` from the execute_role_search step summary). SQL-only\n  people appear in the main ranked CSV like everyone else; their rows carry\n  `agentic_sql` in `vertical_sources`.\n\n### Local Constraints\n\n- LLM filter/rerank run by default and need `OPENAI_API_KEY`; if it is\n  missing, rerun with `--search-only` instead of failing the search\n- No set/operator resolution\n- No TurboPuffer or Postgres calls\n- Investor filters are not supported locally\n\n---\n\n## TurboPuffer Happy Path\n\nDo not inspect repo docs, source, memory, prior transcripts, or prior result\nfiles on the happy path. Start a fresh run for every search request.\n\n1. Run:\n\n   ```bash\n   uv run --env-file .env --project . python packs/search/primitives/search_network_pipeline/search_network_pipeline.py prepare \\\n     --query \"<user query>\" \\\n     --output-dir \".powerpacks/search/<slug>\"\n   ```\n\n   Use the same `<slug>` run dir where `decision.json` was recorded. (Deep-engine delegated\n   profile searches pass their own output dir; follow the engine's instructions there.)\n\n2. If `prepare` returns `status: company_directory_fast_path`, follow the\n   returned tool request and skip semantic retrieval.\n3. If `prepare` returns a preview, show it compactly. When the extracted\n   filters include `seniority_bands` (or the query names a band), include one\n   compact line such as `Targeting: senior/staff ICs` so the user can correct\n   the band before executing. If there is no seniority target, omit the line\n   \u2014 do not invent one. Then ask exactly:\n\n   `Execute this search or modify it?`\n\n4. If the user chooses `execute`, run the returned `execute_command` exactly.\n   It already includes `--execute-approved`; do not ask for another approval.\n   - If a **limit** was provided (e.g. by the deep-search engine for a\n     capped profile search), append `--limit <N>` to the execute_command (or\n     pass `--limit` to `prepare`, which threads it through). This caps\n     retrieval and the whole downstream pipeline. For standalone user\n     searches, do not add a limit unless the user asks for one.\n   - If **filter-only mode** was requested (profile searches do this), append\n     `--filter-only`. The run keeps the cheap conservative LLM filter but\n     skips the expensive per-search LLM rerank; final ranking is owned by the\n     caller's evaluation pass. Never use `--filter-only` for standalone user\n     searches \u2014 they need the rerank for good ordering.\n5. Keep execution quiet until the command finishes or emits a concrete\n   `blocked_approval` / `blocked_user_action`.\n\n## Final Summary\n\n- Say `<N> found`.\n- Say `Run artifacts: <artifact-dir>`.\n- Read only the `csv` path from the final `artifacts` object and show the top\n  10 candidates, or fewer if fewer than 10 rows were returned. Keep each row\n  compact: rank, name, current title/company, location, and LinkedIn URL when\n  present.\n- Other run files are internal handoff/debug artifacts. Inspect them only for a\n  failed or inconsistent run, or when the user asks to debug.\n\n## Execution Rules\n\n- Never run an `execute_command` without the gate confirmation (checklist item 3).\n  One gate per search \u2014 no auto-execution, and no second approval after it.\n- Do not run doctor or setup checks before a normal search unless the primitive\n  fails with an unclear auth/env/setup error.\n- Do not use sub-agents for ordinary single-query searches. (Exception: the\n  local-mode agentic SQL fan-out above, only when its trigger conditions are\n  met.)\n- Do not write new retrieval scripts during a search run.\n- Do not filter or reuse prior artifacts for refinements; create a new search\n  with the updated query or constraints.\n- Do not mention skip-rerank, alternate execution modes, internal ledgers, or\n  internal artifact paths in the user-facing preview.\n\n## Primitive-Owned Behavior\n\nThe packaged primitives own extraction, company-only detection, company and set\nresolution, structured traits, hard-filter/filter-only handling, LLM filtering,\nreranking, and persistence. Treat primitive output as the source of truth.\n\nThe neighboring `network-search-api` is the reference implementation for newer\nsearch behavior, including structured traits (`value`, `temporal`, `meaning`),\ngrouped scoring for hard-filter-backed traits, filter-only fallback for\nhard-filter-only queries, and rerank skip behavior when no traits/candidates are\navailable. Do not reimplement those behaviors in the skill; port or update the\npackaged primitives when behavior needs to change.\n\n## Debugging\n\nUse internals only after a blocker, failed run, inconsistent final summary, or\nexplicit user request. Useful internal surfaces include the task state, ledger,\nhydration outputs, rerank handoff files, manifest, and primitive source.\n\nFor the old manual normal-search orchestration notes, see:\n`packs/search/skills/search-network-legacy-normal-strategy-loop.txt`.\n", "mcp_count": 0, "mcp_refs": [], "name": "search", "pack": "search", "path": "packs/search/skills/search/SKILL.md", "primitive_count": 6, "primitive_refs": ["deep_search", "execute_role_search", "hydrate_people", "llm_filter_candidates", "llm_rerank_candidates", "local_duckdb_query"]}, {"description": "Resolve company names, company descriptions, investor/funding filters, or vertical queries into canonical TurboPuffer company IDs for downstream people search.", "display_name": "powerset:search-company", "heading": "Search Company", "markdown": "---\nname: search-company\ndescription: Resolve company names, company descriptions, investor/funding filters, or vertical queries into canonical TurboPuffer company IDs for downstream people search.\n---\n\n# Search Company\n\nUse this when the user asks for company search directly, or when they want the\ncompany set behind a people search inspected first.\n\nExamples:\n\n- `/search-company database companies`\n- `/search-company series b fintech startups in california`\n- `/search-company companies backed by sequoia`\n\n## Workflow\n\nFresh company resolution only: do not scan, discover, reuse, or resume prior\ncompany search artifacts, state files, CSVs, JSONL, or manifests. Resolve the\ncompany set from the user's current request every time.\n\n1. Decompose the request into the `role-search-filters` company fields only:\n   `company_names`, `company_semantic_queries`, `entity_types`, `sector_types`,\n   funding/headcount filters, company geography, `investor_names`, and\n   resolved `investors`. Preserve `set_id` when the user provides one.\n2. Resolve set scoping before company resolution. If the user did not provide a\n   `set_id`, run `resolve_set_operators` without `--set-id` so it inherits\n   `POWERPACKS_DEFAULT_SET_ID` / `POWERSET_DEFAULT_SET_ID`, or falls back to the\n   logged-in operator's active personal set. Copy the returned `operator_ids`\n   into the company resolver payload. Do not pass the raw set UUID as\n   `allowed_operator_ids`.\n3. If `investor_names` are present, run `resolve_investors` first and record or\n   copy the returned `investor_urns` into `investors`.\n4. Run `resolve_companies`.\n5. Present the returned company count, sample companies, set scope, and the company IDs\n   artifact/state path when available.\n6. If the user wants people at those companies, pass `company_ids` and\n   `operator_ids` into\n   `search`; for large company sets, use `apply_prefilters` so people\n   search batches company IDs instead of sending one giant `company_id In [...]`.\n\n## Query Guidance\n\nUse `company_semantic_queries` for vertical/domain intent, not just\n`sector_types`. Coarse sectors are useful, but the resolver needs an explicit\nsector strategy:\n\n- Use `company_sector_strategy: \"staged\"` by default for ambiguous domain\n  searches. This starts with sector-intersected semantic search and broadens if\n  the hard frontier is too small.\n- Use `company_sector_strategy: \"soft_union\"` when recall matters more than\n  precision or labels are known to be incomplete. This matches semantic results\n  OR sector-filter matches.\n- Use `company_sector_strategy: \"hard_filter\"` when the user explicitly wants\n  sector labels as a strict constraint.\n- Use `company_sector_strategy: \"semantic_only\"` when sector labels are too\n  noisy for the requested company domain.\n\nGood:\n\n```json\n{\n  \"company_semantic_queries\": [\n    \"Companies building database systems, hosted databases, data storage engines, database infrastructure, SQL or NoSQL databases, or developer platforms for managing application data.\"\n  ],\n  \"sector_types\": [\"data\"],\n  \"company_sector_strategy\": \"staged\",\n  \"company_sector_min_results\": 500\n}\n```\n\nBad:\n\n```json\n{ \"sector_types\": [\"data\"] }\n```\n\n## Commands\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_set_operators/resolve_set_operators.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_investors/resolve_investors.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/turbopuffer/turbopuffer_resolve_companies.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n", "mcp_count": 1, "mcp_refs": ["resolve_companies"], "name": "search-company", "pack": "search", "path": "packs/search/skills/search-company/SKILL.md", "primitive_count": 4, "primitive_refs": ["apply_prefilters", "resolve_investors", "resolve_set_operators", "turbopuffer"]}, {"description": "Agentic SQL search vertical over the local search DuckDB. Use for relational/aggregate people queries the structured filter DSL cannot express (per-person aggregates, overlap joins, career-shape predicates), or as a sub-agent fan-out from search. Read-only; local only.", "display_name": "powerset:search-sql", "heading": "Search SQL (agentic SQL vertical)", "markdown": "---\nname: search-sql\ndescription: \"Agentic SQL search vertical over the local search DuckDB. Use for relational/aggregate people queries the structured filter DSL cannot express (per-person aggregates, overlap joins, career-shape predicates), or as a sub-agent fan-out from search. Read-only; local only.\"\n---\n\n# Search SQL (agentic SQL vertical)\n\n> Created: 2026-06-11\n>\n> Change log:\n> - 2026-06-11: Initial version.\n\nRun read-only SQL against the local search DuckDB to answer people-search\nquestions that row-at-a-time filters and BM25/vector/regex retrieval cannot\nexpress. This skill is used two ways:\n\n1. **Sub-agent vertical** \u2014 `search` (local mode) fans out to a\n   sub-agent running this skill when the query has a relational or aggregate\n   component. The sub-agent returns candidate `person_id`s + evidence, which\n   the parent fans in to the main candidate pool before reranking.\n2. **Direct** \u2014 the user asks a relational question outright\n   (`$search-sql who overlapped with <person> at <company>?`).\n\n## When this vertical applies\n\n- **Per-person aggregates / career shape**: \"2+ stints at seed-stage\n  companies\", \"average tenure under 2 years\", \"was an engineer before\n  becoming a PM\", \"promoted internally at the same company\".\n- **Person-to-person joins**: \"people who overlapped with X at a company\",\n  \"schoolmates of X\", set algebra across two sub-populations.\n- **Safety net / diagnostics**: re-derive a population from raw columns when\n  the main pipeline's extraction/filters may have missed (only when asked to\n  debug, on the zero-result fallback, or when fan-out is requested).\n- **Network analytics**: aggregate questions about the network itself, not a\n  people list \u2014 \"which companies do I know the most people at\", \"how many of\n  my contacts changed jobs in the last 6 months\", \"what share of my network\n  is in SF\". Answer with the aggregate table, not candidates.\n- **Cohort/event queries**: \"everyone who left Acme Corp in 2023\"\n  (`end_date_epoch` windows per company), \"YC founders in my network\"\n  (`local_companies.yc_batches` joined to founder-titled positions).\n- **Intro pathfinding (experimental)**: \"who can intro me to John Doe\" \u2014\n  resolve John Doe's companies and date ranges, then overlap self-join to\n  find shared-tenure colleagues. Flag clearly that this is overlap-based\n  inference, not a verified relationship graph.\n\nPlain row-level searches (\"senior PMs in SF\") do NOT need this vertical \u2014\nthe main retrieval stages own those.\n\n## The only tool\n\n```bash\nuv run --project . python packs/search/primitives/local_duckdb_query/local_duckdb_query.py schema\nuv run --project . python packs/search/primitives/local_duckdb_query/local_duckdb_query.py query --sql \"<one SELECT/WITH statement>\" [--max-rows N]\n```\n\n- DB path defaults to `$POWERPACKS_LOCAL_SEARCH_DB` or\n  `.powerpacks/search-index/local-search.duckdb`; override with `--db`.\n- Read-only connection; only a single SELECT/WITH statement is accepted.\n- Default row cap 200 (`truncated: true` signals more rows exist).\n- Do not write files, do not open the DuckDB any other way, and do not\n  `SELECT *` on tables with `vector` / `*_tokens` columns \u2014 project explicit\n  columns.\n\nRun `schema` first only if this cheat sheet seems stale (missing table or\ncolumn errors); otherwise trust the cheat sheet and go straight to queries.\n\n## Schema cheat sheet\n\nGrain note: `local_people_positions` is one row per **position** (a person\nrepeats across rows). `person_id` == `base_id` is the person key used\neverywhere; results must be deduped to person grain.\n\n- **local_people_positions** \u2014 position_id, person_id, base_id,\n  position_title, raw_title, role_track, role_type_category, seniority_band,\n  role_ids, description, city, state, country, macro_region, metro_areas,\n  is_current (boolean), start_date_epoch, end_date_epoch (unix seconds; `0`\n  or NULL = unknown/open-ended), tenure_years, total_years_experience,\n  inferred_birth_year, company_id, company_name, company_domain,\n  company_stage, company_headcount, company_funding_total,\n  company_sector_types, company_entity_types, investor_names.\n  (Avoid: vector, word_tokens, char_tokens, d2q_tokens, phrase_tokens,\n  dense_text.)\n- **local_person_profiles** \u2014 person_id, base_id, full_name, first_name,\n  last_name, headline, summary, current_title, current_company, city, state,\n  country, location_raw, linkedin_url, public_identifier, source_channels,\n  twitter_handle, linkedin_followers, linkedin_connections,\n  work_experiences (typed STRUCT array: company_name, title, description,\n  location, is_current_position, starts_at/ends_at as {day,month,year}\n  structs \u2014 UNNEST directly, no JSON parsing), education (same style).\n  Coverage may be partial (enriched subset of people).\n- **local_summaries** \u2014 person_id, base_id, summary, tech_skills.\n  (Avoid: vector, summary_tokens, word_tokens, phrase_tokens.)\n- **local_people_education** \u2014 person_id, base_id, school_name,\n  school_canonical_key, canonical_education_id, degree, degree_normalized,\n  field_of_study, start_year, end_year, graduation_year.\n- **local_education** \u2014 canonical_education_id, school_name, display_value,\n  person_count (school directory).\n- **local_companies** \u2014 id/company_urn, company_name, name_aliases_text,\n  website_domain, sector_types, entity_types, stage, funding_stage,\n  headcount, funding_total, founded_year, city, state, country,\n  investor_urns, yc_batches, description. (Avoid: vector.)\n- **local_person_source_summary** \u2014 optional; per person \u00d7 source channel\n  message counts and interaction dates. Check `schema` before relying on it;\n  many indexes do not include it yet.\n\n## Worked patterns\n\nPer-person aggregate (\u22652 startup stints):\n\n```sql\nSELECT person_id, count(*) AS startup_stints,\n       list(DISTINCT company_name) AS companies\nFROM local_people_positions\nWHERE company_stage IN ('seed', 'series_a')   -- verify values with a DISTINCT probe first\nGROUP BY person_id\nHAVING count(*) >= 2\n```\n\nCoverage warning: company enrichment columns (`company_stage`,\n`company_funding_total`, `company_headcount`) can be entirely empty in a\ngiven index. Probe coverage first; if empty, approximate via\n`local_companies` (stage, funding_stage, headcount, yc_batches) joined on\n`local_people_positions.company_id = local_companies.id` (both UUID;\n`company_urn` is a separate VARCHAR urn), or via sector/headcount proxies,\nand say so in `notes`.\n\nOverlap self-join (worked with person Y at the same company at the same\ntime; `end_date_epoch = 0` means still there \u2014 treat as open interval):\n\n```sql\nWITH target AS (\n  SELECT company_id, start_date_epoch AS s,\n         CASE WHEN end_date_epoch = 0 THEN 32503680000 ELSE end_date_epoch END AS e\n  FROM local_people_positions\n  WHERE person_id = '<target-person-id>' AND company_id IS NOT NULL AND start_date_epoch > 0\n)\nSELECT DISTINCT p.person_id, p.company_name, p.position_title\nFROM local_people_positions p\nJOIN target t ON p.company_id = t.company_id\nWHERE p.person_id <> '<target-person-id>'\n  AND p.start_date_epoch > 0\n  AND p.start_date_epoch <= t.e\n  AND (CASE WHEN p.end_date_epoch = 0 THEN 32503680000 ELSE p.end_date_epoch END) >= t.s\n```\n\nOverlap caveat: company resolution in imported data is noisy \u2014 a shared or\nmis-mapped `company_id` can produce implausible overlaps (e.g. unrelated\ntitles under one small company). Include `company_name` and\n`position_title` in the output, drop rows that are obviously implausible,\nand keep the company name in each `evidence` line so the parent/rerank can\njudge.\n\nCareer ordering (engineer before PM):\n\n```sql\nWITH ordered AS (\n  SELECT person_id, role_track, start_date_epoch,\n         min(CASE WHEN role_track ILIKE '%engineering%' THEN start_date_epoch END) OVER (PARTITION BY person_id) AS first_eng,\n         min(CASE WHEN role_track ILIKE '%product%' OR role_track = 'pm' THEN start_date_epoch END) OVER (PARTITION BY person_id) AS first_pm\n  FROM local_people_positions\n  WHERE start_date_epoch > 0\n)\nSELECT DISTINCT person_id FROM ordered\nWHERE first_eng IS NOT NULL AND first_pm IS NOT NULL AND first_eng < first_pm\n```\n\nValue-space probe before filtering on a categorical column (always do this\nbefore trusting literals \u2014 e.g. `role_track` is a long, messy tail of ~95\nvalues like `engineering`, `engineering_ic`, `technical_ic`,\n`product_management`, `pm`; exact-match filters silently miss):\n\n```sql\nSELECT company_stage, count(*) FROM local_people_positions GROUP BY 1 ORDER BY 2 DESC\n```\n\nResolve a person mentioned by name:\n\n```sql\nSELECT person_id, full_name, current_title, current_company\nFROM local_person_profiles\nWHERE full_name ILIKE '%<name>%'\n```\n\n(If not in profiles, fall back to a title/company probe on\n`local_people_positions` \u2014 profiles cover an enriched subset.)\n\n## Method\n\n1. Interpret the request; identify the relational/aggregate core.\n2. Probe value spaces for any categorical literal you intend to filter on.\n3. Build the query iteratively (max ~6 query calls); start narrow, inspect,\n   refine. Join `local_person_profiles` at the end to attach names/URLs.\n4. Dedupe to person grain.\n\n## Output contract (sub-agent mode)\n\nReturn ONLY this JSON object as the final message \u2014 no prose around it:\n\n```json\n{\n  \"vertical\": \"agentic_sql\",\n  \"interpretation\": \"<one sentence: what was queried and why>\",\n  \"sql\": \"<the final statement that produced the results>\",\n  \"people\": [\n    {\"person_id\": \"...\", \"base_id\": \"...\", \"full_name\": \"...\", \"evidence\": \"<one short factual line from the data>\"}\n  ],\n  \"notes\": \"<caveats: truncation, partial profile coverage, empty probes>\"\n}\n```\n\n- Cap `people` at 100; order by strength of evidence.\n- This object is consumed verbatim: the parent writes it to a file and\n  passes it to the local pipeline as `--extra-candidates-json`, which unions\n  `people` into retrieval so they go through the same hydration and LLM\n  filter/rerank as every other candidate. Optional extra keys per person\n  (`position_title`, `company_name`, `city`, `seniority_band`, ...) are\n  carried onto the candidate when present.\n- `evidence` must come from queried columns (titles, companies, dates,\n  counts) \u2014 never inferred.\n- If the question has no relational/aggregate component or the data cannot\n  answer it, return the object with an empty `people` list and say why in\n  `notes`. Do not fall back to guessing.\n\n## Hard rules\n\n- For hiring/recruiting-intent queries, never include founder, co-founder,\n  CEO, or chief-titled positions in technical-title patterns or candidate\n  SQL by default \u2014 founders often carry technical evidence but are not\n  recruitable for a role hire. Include them only when the parent search or\n  user explicitly asks for founder-type profiles, and state the\n  inclusion/exclusion assumption in `notes` either way. Do not\n  blanket-exclude VP/director/manager titles; leave that judgment to the\n  rerank.\n- Read-only. Never modify the DuckDB, never write artifact files, never run\n  other primitives or network calls from this skill.\n- One statement per call; respect the guard errors instead of working around\n  them.\n- This vertical is additive evidence \u2014 never present it as a replacement for\n  the main search results.\n", "mcp_count": 0, "mcp_refs": [], "name": "search-sql", "pack": "search", "path": "packs/search/skills/search-sql/SKILL.md", "primitive_count": 2, "primitive_refs": ["local", "local_duckdb_query"]}]}</script>
  <script>
    const data = JSON.parse(document.getElementById('data').textContent);
    const q = document.getElementById('q');
    const pack = document.getElementById('pack');
    const sort = document.getElementById('sort');
    const sections = document.getElementById('sections');
    const stats = document.getElementById('stats');
    const detail = document.getElementById('detail');
    let selected = data.skills[0]?.name;

    function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function normalize(s) { return String(s ?? '').toLowerCase(); }
    function skillHaystack(s) { return normalize([s.name, s.display_name, s.pack, s.description, ...s.primitive_refs, ...s.mcp_refs].join(' ')); }

    function initFilters() {
      const packs = [...new Set(data.skills.map(s => s.pack))].sort();
      pack.innerHTML = '<option value="all">All packs</option>' + packs.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
    }

    function filteredSkills() {
      const query = normalize(q.value.trim());
      let list = data.skills.filter(s => (pack.value === 'all' || s.pack === pack.value) && (!query || skillHaystack(s).includes(query)));
      if (sort.value === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
      else if (sort.value === 'prims') list.sort((a,b) => (b.primitive_count + b.mcp_count) - (a.primitive_count + a.mcp_count));
      else list.sort((a,b) => a.pack.localeCompare(b.pack) || a.name.localeCompare(b.name));
      return list;
    }

    function renderStats(list) {
      const prims = new Set(list.flatMap(s => s.primitive_refs));
      const mcp = new Set(list.flatMap(s => s.mcp_refs));
      stats.innerHTML = `
        <div class="stat"><strong>${list.length}</strong> skills</div>
        <div class="stat"><strong>${Object.keys(data.packs).length}</strong> packs</div>
        <div class="stat"><strong>${data.primitives.length}</strong> primitives total</div>
        <div class="stat"><strong>${prims.size}</strong> primitives referenced</div>
        <div class="stat"><strong>${mcp.size}</strong> MCP/tool refs</div>
        <div class="stat">generated <strong>${esc(data.generated_at)}</strong></div>`;
    }

    function card(s) {
      const chips = [...s.primitive_refs.slice(0, 3).map(p => `<span class="chip">${esc(p)}</span>`), ...s.mcp_refs.slice(0, 2).map(t => `<span class="chip">mcp:${esc(t)}</span>`)].join('');
      return `<article class="card ${s.name === selected ? 'active' : ''}" tabindex="0" role="button" data-skill="${esc(s.name)}">
        <div class="kicker">${esc(s.pack)} · ${s.primitive_count} prim · ${s.mcp_count} tool</div>
        <div class="title">${esc(s.display_name)}</div>
        <div class="desc">${esc(s.description || s.heading)}</div>
        <div class="chips">${chips || '<span class="chip">no refs inferred</span>'}</div>
      </article>`;
    }

    function renderSections() {
      const list = filteredSkills();
      renderStats(list);
      if (!list.length) { sections.innerHTML = '<div class="empty">No skills match the current filters.</div>'; renderDetail(null); return; }
      const grouped = new Map();
      for (const s of list) { if (!grouped.has(s.pack)) grouped.set(s.pack, []); grouped.get(s.pack).push(s); }
      sections.innerHTML = [...grouped.entries()].map(([p, skills]) => `<div class="section"><h2>${esc(p)} - ${skills.length} skills</h2><div class="grid">${skills.map(card).join('')}</div></div>`).join('');
      if (!list.some(s => s.name === selected)) selected = list[0].name;
      renderDetail(data.skills.find(s => s.name === selected));
    }

    function renderDetail(s) {
      if (!s) { detail.innerHTML = '<div class="empty">Select a skill card.</div>'; return; }
      const primitiveRows = s.primitive_refs.map(name => {
        const p = data.primitive_by_name[name] || {name};
        return `<div class="row"><strong>${esc(name)}</strong><small>${esc(p.path || '')}${p.entrypoint ? '<br>' + esc(p.entrypoint) : ''}</small></div>`;
      }).join('') || '<div class="empty">No primitive references inferred from SKILL.md.</div>';
      const mcpRows = s.mcp_refs.map(name => `<div class="row"><strong>mcp:${esc(name)}</strong><small>Referenced by skill body</small></div>`).join('') || '<div class="empty">No MCP/tool references inferred.</div>';
      detail.innerHTML = `
        <div class="kicker">${esc(s.pack)} pack</div>
        <h3>${esc(s.display_name)}</h3>
        <p>${esc(s.description)}</p>
        <div class="label">Skill file</div>
        <div class="row"><strong>${esc(s.name)}</strong><small>${esc(s.path)}</small></div>
        <pre class="markdown">${esc(s.markdown || '')}</pre>
        <div class="label">Primitives used</div>
        <div class="list">${primitiveRows}</div>
        <div class="label">MCP / tool refs</div>
        <div class="list">${mcpRows}</div>`;
    }

    sections.addEventListener('click', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      selected = card.dataset.skill;
      renderSections();
    });
    sections.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const card = e.target.closest('.card');
      if (!card) return;
      e.preventDefault();
      selected = card.dataset.skill;
      renderSections();
    });
    [q, pack, sort].forEach(el => el.addEventListener('input', renderSections));
    initFilters();
    renderSections();
  </script>
