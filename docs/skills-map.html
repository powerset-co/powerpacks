acks to set up my local network search using my Powerset account\"\n- \"Set up powerpacks\" / \"install powerpacks fully\"\n- \"Import my LinkedIn/Gmail/iMessage network with powerpacks\"\n- \"Search my network for ...\" (when Powerpacks skills are not installed yet)\n\nDo the following, in order:\n\n1. **Resolve or clone the repo.** Use the first that exists: `$POWERPACKS_REPO_ROOT`,\n   `~/powerpacks`, `~/workspace/powerpacks`. Otherwise clone the public repo:\n\n   ```bash\n   git clone https://github.com/powerset-co/powerpacks.git ~/powerpacks\n   ```\n\n2. **Run the installer for THIS harness** from the repo root (it pulls latest main\n   when safe, sets up the Python env via uv, installs/refreshes every Powerpacks\n   skill, and cleans stale ones):\n\n   ```bash\n   ./install.sh claude-code   # Claude Code -> ~/.claude/skills\n   ./install.sh codex         # Codex       -> ~/.codex/skills\n   adapters/pi/install.sh     # Pi\n   ```\n\n   Local-only: git + uv/Python setup, no paid APIs, no uploads. Downstream skills\n   gate their own spend and logins.\n\n3. **Initialize the hosted config only when the user chose Powerset.** If the\n   ask said \"using my Powerset account\" (or otherwise named Powerset), work in\n   the canonical repo. If `.env` does not exist, copy the public hosted config\n   and restrict its permissions:\n\n   ```bash\n   cp packs/powerset/templates/env.powerset.example .env\n   chmod 600 .env\n   ```\n\n   If `.env` already exists, preserve its secrets and other settings. Ensure its\n   public Powerset URL/Auth0 keys match\n   `packs/powerset/templates/env.powerset.example`; do not replace the whole file.\n\n   If the ask did NOT mention Powerset (plain \"set up my local network\n   search\"), skip this step \u2014 `$setup` Step 1 asks the user whether they have\n   a Powerset account to log in with and initializes `.env` on a yes (own\n   Modal/OpenAI keys are the alternative).\n\n4. **Continue in THIS session \u2014 no restart.** The harness's skill registry is\n   snapshotted at session start, but you do not need it: the skills are now plain\n   files on disk. Read the one that matches the user's ask directly (e.g.\n   `~/.claude/skills/setup/SKILL.md`) and follow it as if it had been routed.\n   New sessions pick up the full skill list automatically.\n\n5. **Route the ask:**\n   - \"set up my local network search\" with or without \"using my Powerset\n     account\" -> follow `$setup` (LinkedIn export -> merge -> search index).\n     Its Steps 1-3 authenticate the Powerset user and pull that user's\n     provisioned Modal/OpenAI keys before the LinkedIn import; when the prompt\n     didn't name Powerset, its Step 1 first asks whether to log in with a\n     Powerset account (the user's own keys are the alternative). Do not run a\n     separate `$powerset setup`; that would duplicate the same login/key pull.\n   - broader source linking/onboarding -> `onboard`; Gmail -> `import-gmail`;\n     iMessage/WhatsApp -> `import-messages`; then searches -> `search`.\n\n## Notes\n\n- The repo is public; no credentials are needed to install. Powerset login,\n  Google OAuth, Full Disk Access, and any spend are asked for by the specific\n  skills that need them, never during install.\n- To refresh later: `$update-powerpacks` (installed with everything else).\n- Keep these URLs distinct:\n  - Install skill: `https://powerset.dev/powerpacks`\n  - Provisioning API base: `https://search-api-7wk4uhe77q-uw.a.run.app`\n  - Auth0 audience identifier only: `https://api.powerset.dev`\n- The provisioning calls are\n  `/v2/integrations/modal/token` and `/v2/integrations/openai/key` on the\n  provisioning API base. \"Using my Powerset account\" means authenticate that\n  user and pull those allowlisted values into local `.env`.\n", "mcp_count": 0, "mcp_refs": [], "name": "install-powerpacks", "pack": "powerset", "path": "packs/powerset/skills/install-powerpacks/SKILL.md", "primitive_count": 0, "primitive_refs": []}, {"description": "Run the local Powerpacks Console web app for browsing .powerpacks artifacts, including network search and rerank results. Use when the user asks to preview, inspect, browse, or view Powerpacks results locally in a browser.", "display_name": "powerset:powerpacks-console", "heading": "Powerpacks Console", "markdown": "---\nname: powerpacks-console\ndescription: Run the local Powerpacks Console web app for browsing .powerpacks artifacts, including network search and rerank results. Use when the user asks to preview, inspect, browse, or view Powerpacks results locally in a browser.\n---\n\n# Powerpacks Console\n\nPowerpacks Console is the local browser UI in `app/`. It reads artifacts from\n`.powerpacks/` via a Vite dev-server middleware and is intended to become the\nshared top-level console for search, rerank/review, Sales Nav, messages, and\ncontact import outputs.\n\n## Start in the background\n\nFrom the Powerpacks repo root, run:\n\n```bash\nscripts/run-powerpacks-console.sh start\n```\n\nIf the current Codex cwd is not the Powerpacks repo, resolve the installed\nbundle first:\n\n```bash\nif [[ -n \"${POWERPACKS_REPO_ROOT:-}\" ]]; then\n  \"$POWERPACKS_REPO_ROOT/scripts/run-powerpacks-console.sh\" start\nelif [[ -x \"scripts/run-powerpacks-console.sh\" && -d \"packs\" ]]; then\n  scripts/run-powerpacks-console.sh start\nelse\n  \"$HOME/.codex/powerpacks/scripts/run-powerpacks-console.sh\" start\nfi\n```\n\nThe script:\n\n- installs `app/` npm dependencies if needed\n- starts Vite in the background\n- binds to `0.0.0.0` by default for LAN/Tailscale preview\n- reads `.powerpacks` from the repo root by default\n- writes logs/PID under `.powerpacks/servers/`\n\nUseful commands:\n\n```bash\nscripts/run-powerpacks-console.sh status\nscripts/run-powerpacks-console.sh restart\nscripts/run-powerpacks-console.sh stop\n```\n\nOpen a specific app route:\n\n```bash\nscripts/run-powerpacks-console.sh start --path /onboarding --open\nscripts/run-powerpacks-console.sh start --path /setup\n```\n\nDefault URL is usually:\n\n```text\nhttp://localhost:5177/\n```\n\nVite may choose the next open port if 5177 is already busy. Check the script\noutput or `.powerpacks/servers/powerpacks-console.log` for the actual URL.\n\n## Alternate artifact root\n\nTo point the console at a different Powerpacks checkout or artifact directory\nlayout, set `POWERPACKS_REPO_ROOT`:\n\n```bash\nPOWERPACKS_REPO_ROOT=/path/to/powerpacks /path/to/powerpacks/scripts/run-powerpacks-console.sh start\n```\n\nThe app expects content in:\n\n```text\n$POWERPACKS_REPO_ROOT/.powerpacks/\n```\n\n## Current scope\n\nCurrent implemented views:\n\n- `/onboarding` guided setup flow for account linking, import, enrichment, and\n  local indexing\n- `/setup` detailed setup tables and stage controls\n- `/setup/imessage/review` local messages review\n- lists `.powerpacks/runs/search-network-*.json`\n- reads run state and `expand_search_request` query expansion\n- reads persisted result CSV in pages of 50\n- reads hydrated profiles for the visible page only\n- shows app-style person/results table with tags, trait scores, overall score,\n  and reasoning\n\nDo not add Sales Nav review or unrelated write flows unless the user explicitly\nasks. Setup and messages review are now first-class local console surfaces.\n", "mcp_count": 0, "mcp_refs": [], "name": "powerpacks-console", "pack": "powerset", "path": "packs/powerset/skills/powerpacks-console/SKILL.md", "primitive_count": 2, "primitive_refs": ["expand_search_request", "setup"]}, {"description": "Unified Powerset command surface. Use for `$powerset setup`, `$powerset login`, `$powerset status`, `$powerset whoami`, `$powerset sets list`, `$powerset sets use [id-or-name]`, `$powerset mcp install`, `$powerset env pull`, `$powerset create oauth app`, and `$powerset help`.", "display_name": "powerset:powerset", "heading": "Powerset", "markdown": "---\nname: powerset\ndescription: Unified Powerset command surface. Use for `$powerset setup`, `$powerset login`, `$powerset status`, `$powerset whoami`, `$powerset sets list`, `$powerset sets use [id-or-name]`, `$powerset mcp install`, `$powerset env pull`, `$powerset create oauth app`, and `$powerset help`.\n---\n\n# Powerset\n\nUse this skill when the user asks for `$powerset ...` or wants Powerset setup,\nstatus, identity, MCP registration, runtime key pull, or default set selection.\n`$powerset setup` is the preferred one-command first-run path: it does Auth0\nlogin, pulls provisioned runtime keys from the Powerset API, and registers the\nMCP so users do not need to run multiple smaller commands.\n\n## Command routing\n\n| User command | Do this |\n| --- | --- |\n| `$powerset`, `$powerset help` | Print the supported subcommands below. |\n| `$powerset setup` | Run the setup workflow below: ensure login, pull runtime keys, and install/refresh MCP. The explicit command is consent to write `.env`. |\n| `$powerset login` | Run the login workflow below. |\n| `$powerset status` | Run the setup check quietly and summarize only blockers. |\n| `$powerset whoami` | Run the Auth0 `whoami` primitive. |\n| `$powerset sets`, `$powerset sets list` | List sets via the Powerset Search MCP. |\n| `$powerset sets use <id|name>` | Resolve a set via MCP and write `POWERPACKS_DEFAULT_SET_ID` to local `.env`. |\n| `$powerset mcp install` | Register/refresh the `powerset-search` MCP for local hosts. |\n| `$powerset env pull` | Pull your Modal token + OpenAI key from the Powerset API (using your Auth0 login) into `.env`. The explicit command is consent to write `.env`. |\n| `$powerset create oauth app` | Route to the msgvault setup primitive for Gmail OAuth Desktop app guidance. |\n\nAliases remain valid for backcompat: `$powerset-login` means `$powerset login`;\n`$powerset-set` means `$powerset sets` / `$powerset sets use`. If the user asks\nfor Powerset setup, runtime setup, or API key setup without naming a\nsubcommand, prefer `$powerset setup` over separate login/env commands. Keep\nplain `$setup` routed to the ingestion/product setup skill, not this command.\n\n## Help text\n\nWhen asked for help, respond with:\n\n```text\n$powerset setup                 log in, pull runtime keys, and install/refresh MCP\n$powerset login                 refresh Auth0 credentials and MCP config\n$powerset status                check local setup\n$powerset whoami                show current Powerset/Auth0 identity\n$powerset sets list             list visible Powerset sets\n$powerset sets use <id|name>    set local default set in .env\n$powerset mcp install           install/refresh powerset-search MCP\n$powerset env pull              pull Modal/OpenAI keys into .env\n$powerset create oauth app      guide Gmail OAuth app setup for msgvault\n$powerset help                  show this help\n```\n\n## Canonical repo setup\n\nFor mutating commands (`$powerset setup`, `$powerset login`, `$powerset env\npull`, `$powerset sets use`, `$powerset mcp install`, and `$powerset create\noauth app`), first resolve and enter the canonical non-`.codex` Powerpacks repo.\nThis ensures `.env` and any local Powerpacks state are written under the\ninstalled checkout such as `~/powerpacks`, not under an agent skill bundle like\n`~/.codex/powerpacks`.\n\nPrefer, in order:\n\n1. `$POWERPACKS_REPO_ROOT` if it points to a Powerpacks repo;\n2. current working directory if it is a Powerpacks repo and not under `.codex`;\n3. `~/powerpacks`;\n4. `~/workspace/powerpacks`.\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -d \"$candidate/packs\" && -f \"$candidate/pyproject.toml\" ]]; then\n      printf '%s\\n' \"$candidate\"\n      return 0\n    fi\n  done\n  return 1\n}\nrepo=\"$(resolve_powerpacks_root)\" || {\n  echo \"No canonical non-.codex Powerpacks repo found. Install/copy Powerpacks to ~/powerpacks first.\" >&2\n  exit 1\n}\ncd \"$repo\"\n```\n\nFor read-only commands (`$powerset status`, `$powerset whoami`, `$powerset sets\nlist`), still prefer the canonical repo when available. If no canonical repo is\navailable, stop instead of writing or syncing from `~/.codex/powerpacks`.\n\nRun primitives from the canonical repo with `uv run --env-file .env --project . python\npacks/...`. Prefer `python3` only when invoking a local helper outside `uv`.\n\n## `$powerset setup`\n\nThis is the preferred one-command setup path. It combines the user-facing pieces\npeople otherwise had to run separately:\n\n1. ensure Powerset/Auth0 login is present;\n2. pull allowlisted runtime env keys into local `.env`;\n3. install/refresh the `powerset-search` MCP for local hosts.\n\nThe explicit `$powerset setup` request is consent to write `.env`; do not ask\nfor a separate env-write confirmation. It is not the same as bare `$setup`,\nwhich stays the ingestion/product setup flow. Modal handles hosted processing\nfor provisioned Powerset users.\n\nUser-facing output must be terse:\n\n- Start with exactly: `Setting up Powerset...`\n- Do not narrate setup checks, missing check names, token formats, MCP config\n  details, or successful substeps.\n- If a browser/code login is needed, show only the auth URL/code prompt.\n- On success, say exactly:\n  `Powerset setup complete. Please restart Codex to reload the Powerset MCP token.`\n- If still blocked, give one short sentence with the required action. Do not\n  paste raw reports or secret values.\n\nRun one internal setup check first:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env\n```\n\nHandle `fix_kind` values exactly as in the `$powerset login` workflow below.\nIn particular, run direct primitives/CLIs from this shell rather than nested\ndoctor fix commands so browser/code prompts stay visible.\n\nIf `auth0_login` is missing or expired, run the Auth0 login directly:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/auth/auth.py login\n```\n\nAfter Auth0 login, always run the env pull so rotated or newly added keys land\nin `.env`, even if the initial setup check was already healthy. This pulls your\nModal token + OpenAI key from the Powerset API using your Auth0 bearer:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/pull_runtime_keys/pull_runtime_keys.py pull \\\n  --env-file .env\n```\n\nIf it reports `not_provisioned`, an admin must provision your Modal token out of\nband; relay that one-line action and continue.\n\nThen install/refresh MCP:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nRe-run the setup check at the end and use the success/blocker message above. If\n`runtime_keys` is still missing, the env pull reported `not_provisioned` \u2014 tell\nthe user an admin must provision their Modal token / OpenAI key for their\nPowerset user (the endpoints never mint).\n\n## `$powerset login`\n\nUser-facing output must be terse:\n\n- Start with exactly: `Updating your credentials...`\n- Do not narrate setup checks, missing check names, token formats, MCP config\n  details, or successful substeps.\n- If a browser/code login is needed, show only the auth URL/code prompt.\n- On success, say exactly:\n  `Credentials updated. Please restart Codex to reload the Powerset MCP token.`\n- If everything was already valid, say:\n  `Credentials are already up to date. Restart Codex if the Powerset MCP still fails.`\n- For unresolved human-action blockers, give one short sentence with the action\n  required. Do not paste raw reports.\n\nRun one internal setup check:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env\n```\n\nIf `overall == \"ok\"`, use the already-valid success sentence above and stop.\nOtherwise handle `fix_kind` values internally:\n\n- `auto`: run the primitive directly from this shell.\n- `interactive`: run the CLI directly from this shell. For browser/code flows,\n  keep prompts visible to the user.\n- `shell_install`: ask before running any OS-level install command.\n- `human_action`: tell the user what maintainer/Slack action is required.\n\nCommon direct fixes:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/auth/auth.py login\nuv run --env-file .env --project . python packs/powerset/primitives/pull_runtime_keys/pull_runtime_keys.py pull --env-file .env\nuv run --env-file .env --project . python packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nDo not run nested fix commands in the normal login flow; they can hide\ninteractive work inside a subprocess. Run the direct primitives above instead.\nNever print secret values.\n\nRe-run the setup check at the end and use one of the terse final messages above.\nIf `runtime_keys` is still missing after the env pull, the API returned\n`not_provisioned` \u2014 tell the user an admin must provision their Modal token /\nOpenAI key for their Powerset user (the endpoints never mint).\n\n## `$powerset status`\n\nRun the setup check read-only with the requested or default profile:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env\n```\n\nSummarize only `Ready` or the concise blocker/action. Do not mention the checker,\nraw counts or individual passed checks unless the user explicitly asks for\ndebugging detail.\n\n## `$powerset whoami`\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/auth/auth.py whoami\n```\n\nReport the email and authorization/role. Do not print raw tokens.\n\n## `$powerset mcp install`\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nIf the user asks only to inspect MCP state, run:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\n## `$powerset env pull`\n\nPulls the keys the local machine needs into `.env` from the Powerset API using\nyour Auth0 login. Heavy work runs on Modal (which holds\nRapidAPI/Parallel/etc. as workspace secrets), so the laptop only needs a Modal\ntoken (to dispatch) and an OpenAI key (local search LLM steps). The explicit\n`$powerset env pull` request is consent to write `.env`; do not ask for separate\nconfirmation. Run:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/pull_runtime_keys/pull_runtime_keys.py pull \\\n  --env-file .env\n```\n\nThis fetches `MODAL_TOKEN_ID` / `MODAL_TOKEN_SECRET` and `OPENAI_API_KEY`. If the\npull reports `not_provisioned` for a key, an admin must provision it for your\nPowerset user out of band (the endpoints never mint) \u2014 relay that one-line\naction and continue. Requires a valid Auth0 login (`$powerset login`).\n\n## `$powerset create oauth app`\n\nThis alias is for msgvault/Gmail OAuth setup. Prefer browser automation:\n\n```bash\nuv run --env-file .env --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py browser-setup\n```\n\nIf the user only wants instructions, run:\n\n```bash\nuv run --env-file .env --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py create-oauth-app\n```\n\nIf the user provided an email, add `--email <gmail>`. If they provided a Google\nCloud project, add `--project <project>`. Report the browser action and the\ncontinuation command with `--client-secret`.\n\n## `$powerset sets list` / `$powerset sets use <id|name>`\n\nUse the Powerset Search MCP for set retrieval and name resolution. Do not use\nlocal SQL for normal set listing.\n\nFor `sets list`, call the MCP `list_sets` tool and show concise rows with name,\nset ID, role, and counts.\n\nFor `sets use <id|name>`:\n\n1. Call MCP `list_sets`.\n2. Resolve the user's value against set IDs and names.\n3. Upsert exactly one local `.env` line:\n\n```dotenv\nPOWERPACKS_DEFAULT_SET_ID=<set_id>\n```\n\nIf `POWERPACKS_DEFAULT_SET_ID=` already exists, replace that line; otherwise\nappend it. Do not append duplicates. If only legacy `POWERSET_DEFAULT_SET_ID`\nexists, leave it alone and add the preferred `POWERPACKS_DEFAULT_SET_ID` line.\n\nAfter setting, report the selected set name, `set_id`, `person_count`,\n`member_count`, and `sales_nav_account_count` when available.\n", "mcp_count": 1, "mcp_refs": ["list_sets"], "name": "powerset", "pack": "powerset", "path": "packs/powerset/skills/powerset/SKILL.md", "primitive_count": 5, "primitive_refs": ["auth", "doctor", "mcp_install", "msgvault_setup", "pull_runtime_keys"]}, {"description": "One-command Powerset login flow. Quietly refreshes Auth0 credentials, pulls provisioned runtime keys from the Powerset API, refreshes MCP registration, and only stops for OS installs, visible auth codes, or human actions.", "display_name": "powerset:powerset-login", "heading": "Powerset Login", "markdown": "---\nname: powerset-login\ndescription: One-command Powerset login flow. Quietly refreshes Auth0 credentials, pulls provisioned runtime keys from the Powerset API, refreshes MCP registration, and only stops for OS installs, visible auth codes, or human actions.\n---\n\n# Powerset Login\n\nUse this skill when the user asks for `$powerset login`, `$powerset-login`,\nor \"log me in to Powerset\". For first-run Powerset setup, runtime setup, or\nAPI key setup, prefer the unified `$powerset setup` command in\n`packs/powerset/skills/powerset/SKILL.md`; it intentionally runs login plus\nruntime key pull plus MCP registration. This alias remains the right skill when\nan unrelated Powerpacks command failed because of a missing key or expired\nsession.\n\n**This skill is built to be fast and quiet.** The user said \"log me in\" - do\nthat. Don't ask permission for every step. Use setup-check classifications to\ndecide what needs asking, but run fixes yourself from the current\ninvocation/shell so prompts, URLs, and failures are visible.\n\nUser-facing output must be terse:\n\n- Start with exactly: `Updating your credentials...`\n- Do not narrate setup checks, missing check names, token formats, MCP config\n  details, or successful substeps.\n- If a browser/code login is needed, show only the auth URL/code prompt.\n- On success, say exactly:\n  `Credentials updated. Please restart Codex to reload the Powerset MCP token.`\n- If everything was already valid, say:\n  `Credentials are already up to date. Restart Codex if the Powerset MCP still fails.`\n- For unresolved human-action blockers, give one short sentence with the action\n  required. Do not paste raw reports.\n\n## Core Rule\n\nUse the read-only setup checker for diagnosis. In the normal skill flow, do not\nrun nested fix commands; they can hide interactive work inside a subprocess and\nswallow browser/code prompts. Let the skill self-heal by running the relevant\nprimitive or CLI command directly.\n\nOnly use install commands when something is actually missing. Do not reinstall\nPowerpacks adapters, MCP config, or credentials when the setup check says the\ncheck is already `ok`.\n\n## Canonical Repo Setup\n\nResolve and enter the canonical non-`.codex` Powerpacks repo before running any\nPowerset login/setup command. This ensures `.env` and local Powerpacks state are\nwritten under the installed checkout such as `~/powerpacks`, not under an agent\nskill bundle like `~/.codex/powerpacks`.\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -d \"$candidate/packs\" && -f \"$candidate/pyproject.toml\" ]]; then\n      printf '%s\\n' \"$candidate\"\n      return 0\n    fi\n  done\n  return 1\n}\nrepo=\"$(resolve_powerpacks_root)\" || {\n  echo \"No canonical non-.codex Powerpacks repo found. Install/copy Powerpacks to ~/powerpacks first.\" >&2\n  exit 1\n}\ncd \"$repo\"\n```\n\nRun primitives from the canonical repo with `uv run --env-file .env --project . python packs/...`.\n\n## Happy Path\n\nRun one internal read-only setup check:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env\n```\n\nIf `overall == \"ok\"`, use the already-valid success sentence above and stop.\n\n## How To Handle The Setup Report\n\nThe setup check returns one JSON object. The fields you care about are `checks`,\n`by_fix_kind`, and `next_actions`. Each missing/fail check has a `fix_kind`:\n\n| `fix_kind` | What to do | Ask the user? |\n| --- | --- | --- |\n| `auto` | Run the specific primitive directly from this shell. | no |\n| `interactive` | Run the CLI directly from this shell. For browser/code flows, keep prompts visible. | no, except asking for an auth code if the CLI requires one |\n| `shell_install` | OS-level install (`brew install`, etc.). | yes, with the exact command shown |\n| `human_action` | Cannot be fixed by the skill. | tell the user, don't loop |\n\n## Workflow\n\n### Step 1 - Install only when missing\n\nIf the Powerpacks skill bundle or host adapter is missing and you are in the\nPowerpacks repo, run the repo installer for the current host instead of trying\nto repair it through a nested fix command:\n\n```bash\n./install.sh codex\n./install.sh claude-code\n```\n\nPick the host the user is currently using. If both hosts need repair, run both.\n\n### Step 2 - Login directly from this shell\n\nIf `auth0_login` is missing or expired, run:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/auth/auth.py login\n```\n\n### Step 3 - Pull runtime keys and register MCP directly\n\nIf `runtime_keys` is missing, run:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/pull_runtime_keys/pull_runtime_keys.py pull \\\n  --env-file .env\n```\n\nThis pulls `MODAL_TOKEN_ID`, `MODAL_TOKEN_SECRET`, and `OPENAI_API_KEY` from the\nauthenticated Powerset API when the user has been provisioned. Modal handles\nhosted processing for Powerset users. The Google Cloud CLI remains relevant\nonly to the separate msgvault/Gmail OAuth app setup flow.\n\nIf `mcp_powerset_search` is missing but a host CLI exists, run:\n\n```bash\nuv run --env-file .env --project . python packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nIf `mcp_powerset_search` says no MCP host CLI is on PATH, that is an install\ngap: use `./install.sh codex` or `./install.sh claude-code` only for the host\nthe user is using, or tell the user which host CLI is missing.\n\n### Step 4 - Human-action blockers\n\n`human_action` entries:\n\n- `auth0_role` warn: \"You're logged in but haven't been granted a Powerpacks\n  role. Ask a Powerset admin to add your account to the Powerpacks Auth0 role.\"\n- `runtime_keys` `not_provisioned`: \"You're logged in, but your Modal/OpenAI\n  runtime keys have not been provisioned for the Powerset API yet. Ask a\n  Powerset admin to provision them, then rerun `$powerset login`.\"\n\nThese are not blockers for unrelated workflows unless that workflow needs the\nmissing runtime key.\n\n### Step 5 - Final state\n\nRe-run the setup check and report a terse final message:\n\n- `overall: ok` -> \"Credentials updated. Please restart Codex to reload the\n  Powerset MCP token.\"\n- `overall: warn` -> same, but mention the remaining warning in one short phrase.\n- `overall: needs_setup` -> list the still-blocked items and what the user\n  needs to do.\n\n## Hard Rules\n\n- Never print secret values. Every primitive redacts.\n- Never run an OS install command without explicit user approval.\n- Never write `.env` unless the user explicitly requested `$powerset setup`,\n  `$powerset login`, or `$powerset env pull`.\n- Runtime-key authorization is enforced by the Powerset API using the cached\n  Auth0 bearer token; do not add a separate email-domain gate.\n", "mcp_count": 0, "mcp_refs": [], "name": "powerset-login", "pack": "powerset", "path": "packs/powerset/skills/powerset-login/SKILL.md", "primitive_count": 4, "primitive_refs": ["auth", "doctor", "mcp_install", "pull_runtime_keys"]}, {"description": "List accessible Powerset sets, show the active default set, or set POWERPACKS_DEFAULT_SET_ID so local Powerpacks search primitives inherit the desired set scope.", "display_name": "powerset:powerset-set", "heading": "Powerset Set", "markdown": "---\nname: powerset-set\ndescription: List accessible Powerset sets, show the active default set, or set POWERPACKS_DEFAULT_SET_ID so local Powerpacks search primitives inherit the desired set scope.\n---\n\n# Powerset Set\n\nUse this skill when the user wants to choose, inspect, retrieve, list, switch,\nor set the active Powerset set for local Powerpacks search.\n\nThe skill uses the Powerset Search MCP for set retrieval and name resolution.\nIt only manages local set scope:\n\n- lists sets accessible to the logged-in Powerset user\n- shows the resolved default set and operator IDs\n- writes `POWERPACKS_DEFAULT_SET_ID` into the local ignored `.env`\n- does not upload contacts, run searches, or mutate server-side set membership\n\n## Canonical repo setup\n\nFor `$powerset sets use <id|name>`, resolve and enter the canonical non-`.codex`\nPowerpacks repo before writing `.env`:\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -d \"$candidate/packs\" && -f \"$candidate/pyproject.toml\" ]]; then\n      printf '%s\\n' \"$candidate\"\n      return 0\n    fi\n  done\n  return 1\n}\nrepo=\"$(resolve_powerpacks_root)\" || {\n  echo \"No canonical non-.codex Powerpacks repo found. Install/copy Powerpacks to ~/powerpacks first.\" >&2\n  exit 1\n}\ncd \"$repo\"\n```\n\nFor read-only set listing, still prefer the canonical repo when available.\n\n## Workflow\n\n1. Ensure Powerset setup exists. If credentials or MCP registration are missing,\n   route the user to `$powerset setup`.\n2. Confirm the Powerset Search MCP is installed when needed:\n\n```bash\nuv run --project . python packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\n3. List sets by calling the Powerset Search MCP `list_sets` tool directly.\n   Do not use local SQL or `set_scope.py` for normal set retrieval.\n\n4. Show the current default by reading `POWERPACKS_DEFAULT_SET_ID` from the\n   local `.env`, then matching that ID against the MCP `list_sets` result.\n   If `POWERPACKS_DEFAULT_SET_ID` is unset, check legacy\n   `POWERSET_DEFAULT_SET_ID`.\n\n5. Set the default by ID or name:\n\n- call MCP `list_sets`\n- resolve the user's `<name>` or `<set_id>` against the returned sets\n- upsert only this local `.env` line. If `POWERPACKS_DEFAULT_SET_ID=` already\n  exists, replace that line; otherwise append it. Do not append duplicates.\n\n```dotenv\nPOWERPACKS_DEFAULT_SET_ID=<set_id>\n```\n\n6. After setting, report the selected set name, `set_id`, `person_count`,\n   `member_count`, and `sales_nav_account_count` from MCP. Only run\n   `resolve_set_operators` if the user specifically asks to validate local\n   TurboPuffer operator scoping.\n\n## Notes\n\n- `set_id` is a Powerset set UUID.\n- Local search primitives resolve it to `operator_ids` before applying\n  TurboPuffer `allowed_operator_ids`.\n- `POWERPACKS_DEFAULT_SET_ID` is preferred. `POWERSET_DEFAULT_SET_ID` is still\n  accepted as a legacy alias by search primitives.\n- The remote MCP owns set listing. The local repo owns only the default choice\n  stored in `.env`.\n", "mcp_count": 1, "mcp_refs": ["list_sets"], "name": "powerset-set", "pack": "powerset", "path": "packs/powerset/skills/powerset-set/SKILL.md", "primitive_count": 2, "primitive_refs": ["mcp_install", "resolve_set_operators"]}, {"description": "Force-update the canonical Powerpacks checkout to origin/main and reinstall skills while preserving .powerpacks. Use for $update-powerpacks.", "display_name": "powerset:update-powerpacks", "heading": "update-powerpacks", "markdown": "---\nname: update-powerpacks\ndescription: Force-update the canonical Powerpacks checkout to origin/main and reinstall skills while preserving .powerpacks. Use for $update-powerpacks.\n---\n\n# update-powerpacks\n\nRun exactly one command for the current harness:\n\n**Codex**\n\n```bash\n\"${CODEX_HOME:-$HOME/.codex}/skills/update-powerpacks/update-powerpacks\" codex\n```\n\n**Claude Code**\n\n```bash\n\"${CLAUDE_CONFIG_DIR:-$HOME/.claude}/skills/update-powerpacks/update-powerpacks\" claude-code\n```\n\n**Pi**\n\n```bash\n\"${PI_HOME:-$HOME/.pi/agent}/skills/update-powerpacks/update-powerpacks\" pi\n```\n\nDo not inspect Git state first. Do not run any other Git command. Do not pop or\nrepair the stash. Do not run setup, doctor, imports, or state repair afterward.\nReport the script's final key/value lines.\n", "mcp_count": 0, "mcp_refs": [], "name": "update-powerpacks", "pack": "powerset", "path": "packs/powerset/skills/update-powerpacks/SKILL.md", "primitive_count": 0, "primitive_refs": []}, {"description": "Run a Sales Navigator search through the Powerset Search MCP. Resolves company / title filters to LinkedIn IDs, runs a paginated lead search with server-side artifact persistence on by default, and offers paginated retrieval via get_artifact.", "display_name": "powerset:sales-nav-search", "heading": "Sales Nav Search", "markdown": "---\nname: sales-nav-search\ndescription: Run a Sales Navigator search through the Powerset Search MCP. Resolves company / title filters to LinkedIn IDs, runs a paginated lead search with server-side artifact persistence on by default, and offers paginated retrieval via get_artifact.\n---\n\n# Sales Nav Search\n\nUse this skill when the user asks for `/sales-nav-search <query>`,\n\"find LinkedIn leads at <company>\", \"show me sales nav results for <title>\",\nor any other Sales Navigator search request scoped to the user's set.\n\nThe skill is in its own pack (`packs/sales-nav`) but **depends on\n`packs/powerset`** for Auth0 login and MCP install. If those aren't ready,\nroute the user to `$powerset setup` first.\n\nIt calls these MCP tools served by the remote `powerset-search` MCP configured in\n`POWERPACKS_MCP_URL`:\n\n- `sales_nav_resolve` \u2014 turn company names + titles into LinkedIn\n  `company_ids` / canonical title strings\n- `sales_nav_search` \u2014 paginated lead search scoped to the user's set;\n  with `conversation_id` + `persist_artifact: true` the server writes a\n  Supabase artifact row and returns an `artifact_id`\n- `get_artifact` \u2014 paginated retrieval of a persisted artifact\n- `enrich_extended_profiles` \u2014 enrich selected lead member IDs with profile\n  fields, then persist them back to the latest Sales Nav artifact\n- `sales_nav_resolve_member_ids` \u2014 resolve mutual member IDs to LinkedIn URLs\n  through cache/free layers by default\n\nThe skill itself does not call HTTP \u2014 Claude Code / Codex invoke the MCP\ntools directly once `mcp_install` (in `packs/powerset`) has registered the\nserver.\n\n## Hard rules\n\n- This skill **requires** the `powerset-search` MCP. If it is not\n  registered, route the user through `$powerset setup` \u2192\n  `mcp_install install --host all`.\n- Every Sales Nav call is **scoped to a `set_id`**. The MCP server enforces\n  the set context. Pass the one the user specifies. If the user does not\n  specify one, resolve the default with\n  `packs/search/primitives/resolve_set_operators/resolve_set_operators.py`\n  so it can inherit `POWERPACKS_DEFAULT_SET_ID` / `POWERSET_DEFAULT_SET_ID`, or\n  fall back to the logged-in operator's active personal set. Do not invent or\n  guess `set_id`s.\n- **Default to `persist_artifact: true` on every `sales_nav_search` call.**\n  Persistence is cheap and lets the user (or the agent in a later turn) page\n  large result sets via `get_artifact`. Only pass `persist_artifact: false`\n  when the user explicitly asks for an ephemeral search.\n- Persistence requires a `conversation_id`. See the conversation_id playbook\n  below \u2014 without one, persistence is silently skipped server-side and you\n  only get the inline `leads` list back.\n- Lead profiles can include LinkedIn URLs and contact metadata. Treat them\n  as sensitive: keep them in local `.powerpacks/` handoff files and present only\n  compact summaries in chat unless the user asks for details.\n- Do not pass accumulated lead/mutual payloads through chat or command args.\n  Save each MCP page response to a small JSON file, then run\n  `sales_nav_artifacts ingest-page --response <path>` so later steps pass only\n  paths/state.\n- **Default to the orchestrator.** For normal runs, do not hand-compose a long\n  MCP/tool sequence in chat. Create a search args/plan JSON, run\n  `sales_nav_pipeline`, execute only the `blocked_tool_call` it emits, save the\n  response to the requested path, then continue until completed or blocked.\n  Use primitives directly only for narrow debugging or power-user requested\n  edits.\n- For clear, unambiguous searches, do not ask approval/clarifying questions.\n  Resolve filters, build a one-or-more-query search plan, let the orchestrator\n  search, ingest full artifact content, enrich the visible leads, resolve mutual\n  URLs locally, export CSVs, and present a compact summary. Ask only when a\n  filter is genuinely ambiguous (for example multiple plausible \"Cisco\"\n  companies) or when the user asks to page/enrich far beyond the visible result\n  set.\n- Start a fresh Sales Nav search for each search request. Do not scan, discover,\n  reuse, resume, or refine from previous `.powerpacks/sales-nav`, artifact,\n  `artifact_id`, CSV, JSONL, manifest, or state files. You may use artifacts\n  created by the current run for ingestion, enrichment, pagination, and export.\n- Do not auto-page endlessly. It is OK for the orchestrator search plan to\n  include deliberate same-turn fallback queries/pages for robustness (for\n  example strict role + company-only fallback), but otherwise surface\n  `has_more` / `next_start_offset` and ask before loading more.\n- Keep fallback searches structured before falling back to free text. If an\n  exact current-company query returns 0, retry with the same org ID in\n  `past_company_ids` before using `keywords`. Keywords are the last fallback.\n\n## Prereqs\n\nRun this once. It starts Auth0 login if credentials are missing or expired,\nthen installs the MCP into the chosen host:\n\n```bash\n./install-powerset-mcp.sh --host all\n```\n\nIf on Codex, rerun MCP install when the Auth0 token needs to be refreshed.\nThe installer writes a fresh `Authorization` header into `~/.codex/config.toml`:\n\n```bash\n./install-powerset-mcp.sh --host codex\n```\n\n## conversation_id playbook\n\n`conversation_id` is a Supabase `conversations.id`. The MCP server uses it\nto scope artifact reads/writes to a specific conversation. Three ways to\nget one:\n\n1. **From search.powerset.dev** \u2014 copy the conversation id from the URL\n   when the user has an open chat.\n2. **REST API** \u2014 `POST /v2/conversations` with the user's bearer token\n   returns `{ \"id\": \"...\" }`.\n3. **Per-skill ephemeral session** \u2014 generate a UUID4 the first time you\n   need one in the current skill invocation and reuse it for follow-ups\n   in the same turn. The artifact rows still persist in Supabase keyed by\n   that id; they just won't be linked to a webapp conversation.\n\nAlways pass the same `conversation_id` to subsequent `sales_nav_search`\ncalls and the matching `get_artifact` call.\n\n## Fast path runner\n\nPrefer the resumable Sales Nav orchestrator for normal runs:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_pipeline/sales_nav_pipeline.py run \\\n  --query \"<user query>\" \\\n  --set-id \"<set_id>\" \\\n  --search-plan-json .powerpacks/sales-nav/<run>/search_plan.json\n```\n\nFor a single simple pass, `--search-args-json` is still accepted. Prefer\n`--search-plan-json` because robust Sales Nav recall often needs multiple\nqueries.\n\nThe runner owns local state for the current invocation and exits with\n`status: blocked_tool_call` whenever the harness should call a `powerset-search`\nMCP tool. The block includes the `tool_name`, `tool_args`, `save_response_to`,\nand `continue_command`. The harness/agent should call the MCP tool natively,\nwrite the JSON response to the specified path, then run the continue command.\nLocal ingest, lead enrichment, mutual URL resolution, export, scoring approvals,\nand the ledger are handled by the runner.\n\nFor follow-up qualitative search criteria, run a new Sales Nav search. Only pass\n`--criteria` when the user explicitly asks to score or analyze the current run's\nloaded leads rather than search again.\n\nSearch plan shape:\n\n```json\n{\n  \"score_criteria\": \"investment/endowment team\",\n  \"queries\": [\n    {\"id\": \"finance\", \"label\": \"parent company + finance\", \"args\": {\"company_ids\": [163348], \"function_ids\": [\"10\"]}},\n    {\"id\": \"company_only\", \"label\": \"parent company only\", \"args\": {\"company_ids\": [163348]}}\n  ]\n}\n```\n\nThe MCP `sales_nav_search` schema accepts current-company IDs via\n`company_ids`, past-company IDs via `past_company_ids`, optional display-name\nmaps for both, and text filters. Keep unrelated agent-only annotations in plan\nmetadata; the orchestrator strips unsupported fields from tool args.\n\n## Local file handoff\n\nNormally `sales_nav_pipeline` performs these local handoffs. Use the primitives\nbelow directly only when debugging a failed block in the current run or honoring\na power-user request to operate at the primitive level.\n\nUse `packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py` as\nthe durable local store for each skill invocation. It normalizes MCP page output\ninto these files:\n\n- `leads.jsonl` \u2014 internal handoff, one row per lead with `member_id`,\n  `profile_id`, `source_account_ids`, `operators`, `mutual_member_ids`,\n  `total_interactions` when present, `linkedin_url`, title/company/location,\n  enriched profile fields (`summary`, `experiences`, `education`, `enriched`)\n  when available, artifact/source metadata, and seen counts.\n- `mutuals.jsonl` \u2014 internal handoff, one row per lead\u2194mutual edge with\n  `lead_member_id`, `mutual_member_id`, mutual LinkedIn URL if resolved,\n  `total_interactions` when present, operator/source metadata, and\n  artifact/source metadata.\n- `member_urls.json` \u2014 `member_id -> LinkedIn URL` results from\n  `sales_nav_resolve_member_ids`.\n- `manifest.json` / `state.json` \u2014 paths, counts, artifact ids, pages.\n- `exports/leads.csv` and `exports/mutuals.csv` \u2014 final user-facing CSVs written\n  only when you run `export`.\n\nInitialize once per search:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py init \\\n  --query \"<user query>\" \\\n  --set-id \"<set_id>\" \\\n  --conversation-id \"<conversation_id>\"\n```\n\nDo not ingest compact MCP preview rows when full artifact content is available.\nAfter each MCP `sales_nav_search`, save the response for audit, then immediately\ncall `get_artifact(include_content=true)` for the returned `artifact_id`, save\nthat full artifact response, and ingest with `--prefer-content`:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py ingest-page \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json \\\n  --response .powerpacks/sales-nav/runs/<run>/pages/artifact-full-000.json \\\n  --prefer-content\n```\n\nWhen the user asks for mutual LinkedIn URLs, first get pending IDs from the\nlocal file store:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py pending-mutual-ids \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json --limit 100\n```\n\nPass those IDs to MCP `sales_nav_resolve_member_ids`, save the MCP response,\nthen merge it:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py ingest-member-urls \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json \\\n  --response .powerpacks/sales-nav/runs/<run>/member_urls.response.json\n```\n\nAfter `enrich_extended_profiles`, call `get_artifact(include_content=true)` again\nand ingest with `--prefer-content` so `leads.jsonl` contains the full enriched\nprofile fields (`summary`, `experiences`, `education`).\n\nFor final files:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py export \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json\n```\n\nDo not use local lookup to answer search/refinement requests. The lookup\nprimitive is only for explicit inspection of the current run's local files, not\nfor deciding whether to avoid a new Sales Nav search:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py lookup \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json --query \"<name/company/title>\"\n```\n\nFor explicit current-run analysis requests (for example \"score these current\nresults for real estate exposure\"), use the scoring primitive instead of\ngrepping manually. For search/refinement requests, run a new Sales Nav search:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/score_sales_nav_leads/score_sales_nav_leads.py \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json \\\n  --criteria \"real estate exposure\" \\\n  --threshold 0.7\n```\n\nIt fans out over `leads.jsonl`, includes joined mutual context, writes only\nmatching leads to `scores/<criteria>/matches.jsonl`, and writes the user-facing\n`matches.csv`. Non-matches are not written unless `--dump-debug` is passed.\n\n## Manual workflow / debugging reference\n\nThe normal workflow is the orchestrator loop above. The lower-level sequence\nbelow documents what the orchestrator is doing and is useful when a block fails\nor a power user wants to call primitives directly.\n\n### Step 0 \u2014 Confirm prereqs\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\nIf `installed: false` for the host the user is on, route to\n`$powerset setup` first.\n\n### Step 0b \u2014 Resolve set scope\n\nIf the user provided a `set_id`, use it. Otherwise run:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_set_operators/resolve_set_operators.py \\\n  --env-file .env\n```\n\nUse the returned `set_id` in Sales Nav MCP calls. The returned\n`operator_ids` are useful for parity with local TurboPuffer searches, but the\nSales Nav MCP is still scoped by `set_id`.\n\n### Step 1 \u2014 Decide whether to resolve filters\n\nIf the user gave you free-text companies or titles, call\n`sales_nav_resolve` first to convert them into stable IDs / canonical\nstrings. If there is a single obvious recommended company/title match, proceed\nwithout asking. Ask the user only when multiple plausible matches are genuinely\nambiguous (for example many unrelated \"Cisco\" entities and no exact/obvious\nmatch):\n\n```text\nTool: sales_nav_resolve\nArgs: {\n  \"set_id\": \"<the user's set>\",\n  \"companies\": [\"Stripe\", \"Ramp\"],\n  \"titles\": [\"staff engineer\", \"principal engineer\"]\n}\n```\n\nIf the user already gave you a `company_id` or `function_id`, skip this\nand go straight to step 2.\n\nResolution robustness:\n\n- LinkedIn company URLs should be passed directly to `sales_nav_resolve`; the\n  server can resolve vanity slugs such as `linkedin.com/company/genies-inc`.\n- Endowment / investment office / foundation phrases often name a team rather\n  than a LinkedIn company. Resolve the parent institution too. Example:\n  `\"Dartmouth endowment\"` should be tried with `\"Dartmouth\"` /\n  `\"Dartmouth College\"`, then the search plan should use the parent org ID plus\n  finance/investment keywords and a parent company-only fallback.\n- If the first resolve call returns no company matches, do not stop. Retry once\n  in the same turn with cleaned parent/name variants before telling the user it\n  cannot be resolved.\n- If a current-company search returns 0 for a resolved org, keep the same org\n  ID and run a past-company query next. Only use keyword fallback after the\n  structured current/past company paths are empty or unavailable.\n\nMode defaults:\n\n- \"who works at Brookfield\" / \"who's in my extended network at Cisco\" \u2192 company\n  search. Resolve company, search it, ingest full artifact content, enrich the\n  visible page, export.\n- \"who works at Brookfield in the finance department\" \u2192 same company search plus\n  finance intent. Use reliable Sales Nav filters if known (`function_ids`), and\n  also pass targeted `keywords`/`title` when helpful. If the first query is too\n  sparse, retry once or twice by relaxing the weakest text filter while keeping\n  the company/set fixed.\n- \"show me people with real estate exposure\" after a Sales Nav run \u2192 run a new\n  Sales Nav search with the updated criteria. Do not scan previous `leads.jsonl`\n  or local artifacts for refinement.\n\n### Step 2 \u2014 Run the search (always with persistence)\n\nInitialize the local file store before the MCP call if you have not already.\n\n```text\nTool: sales_nav_search\nArgs: {\n  \"set_id\":         \"<the user's set>\",\n  \"conversation_id\":\"<UUID \u2014 see conversation_id playbook>\",\n  \"persist_artifact\": true,\n  \"company_ids\":    [...],         // from sales_nav_resolve\n  \"company_names\":  {\"<org_id>\": \"<display name>\"},\n  \"past_company_ids\": [...],       // alumni / worked-at searches\n  \"past_company_names\": {\"<org_id>\": \"<display name>\"},\n  \"title\":          \"staff engineer\",\n  \"function_ids\":   [...],\n  \"seniority_ids\":  [...],\n  \"geography_ids\":  [...],\n  \"headcount_ids\":  [...],\n  \"keywords\":       \"distributed systems\",\n  \"count\":          25,            // max 25 per page\n  \"start_offset\":   0\n}\n```\n\nResponse shape (with persistence):\n\n```jsonc\n{\n  \"artifact_id\": \"...\",\n  \"artifact\": { /* metadata */ },\n  \"total_count\": 1342,\n  \"max_total_count\": 2500,\n  \"results_returned\": 25,\n  \"has_more\": true,\n  \"next_start_offset\": 25,\n  \"filters_used\": { /* what the server actually filtered on */ },\n  \"reconnect_required\": false,\n  \"leads\": [\n    {\n      \"name\": \"...\",\n      \"headline\": \"...\",\n      \"linkedin_url\": \"...\",\n      \"company\": \"...\",\n      \"location\": \"...\",\n      \"mutual_count\": 3,\n      \"mutual_member_ids\": [\"...\", \"...\"]\n    }\n  ]\n}\n```\n\n`reconnect_required: true` means the user's Unipile/LinkedIn session\nneeds upstream re-auth; tell the user and stop. Do not retry.\n\nSave the MCP response for audit, but ingest the full artifact content: call\n`get_artifact` with `include_content: true`, save that response, then run\n`sales_nav_artifacts ingest-page --prefer-content` on it. The primitive records\n`artifact_id`, lead rows, mutual edges, and source/operator metadata in local\nhandoff files.\n\nThen enrich the visible leads by default:\n\n```text\nTool: enrich_extended_profiles\nArgs: {\n  \"conversation_id\": \"<same conversation_id>\",\n  \"member_ids\": [<member_ids from this visible page>],\n  \"set_id\": \"<same set_id>\"\n}\n```\n\nAfter enrichment, call `get_artifact(include_content=true)` again and ingest\nwith `--prefer-content`. This is what puts full profile data (`summary`,\n`experiences`, `education`) into `leads.jsonl`.\n\nEvery follow-up retrieval (next page, mutual lookup, re-display) should use the\nlocal state path plus `get_artifact` / `sales_nav_resolve_member_ids` as needed.\n\n### Step 3 \u2014 Present the first page\n\n- Lead with `total_count`, `results_returned`, and any non-zero `mutual`\n  counts.\n- For each lead present `name`, `headline`, `company`, `location`,\n  `mutual_count`, and `linkedin_url`.\n- Mention `artifact_id` to the user (they may want to reference it across\n  turns / sessions).\n- If `has_more`, ask if they want page N+1 \u2014 do **not** auto-fetch.\n\n### Step 4 \u2014 Paginate via get_artifact\n\nSubsequent pages of the same result set should go through\n`get_artifact`, not a fresh `sales_nav_search`. Save each page response and\nappend it to the same local files with `sales_nav_artifacts ingest-page`:\n\n```text\nTool: get_artifact\nArgs: {\n  \"artifact_id\":     \"<from step 2>\",\n  \"offset\":          25,\n  \"limit\":           25,\n  \"include_content\": true    // prefer full accumulated lead shape for local files\n}\n```\n\nThis avoids re-running an expensive Sales Nav fetch and keeps the\nfilters/result-set stable across pages. For each retrieved page, prefer\n`include_content=true` + `ingest-page --prefer-content` so local files keep the\nfull accumulated lead shape. The local primitive dedupes by `member_id` and\nappends new lead\u2194mutual edges to `mutuals.jsonl`.\n\n### Step 5 \u2014 Refining filters\n\nRefining upstream Sales Nav filters is a **new search**, not pagination. Re-call\n`sales_nav_search` with the new args, the same `conversation_id`, and\n`persist_artifact: true`. You'll get back a new `artifact_id`. Tell the\nuser the artifact id changed.\n\nRefining over already-loaded people is a **new Sales Nav search**. For\nquestions like \"which of these have real estate exposure\", \"who is in NYC\", or\n\"show the Brookfield VPs with mutuals\", do not scan local state first. Re-call\n`sales_nav_search` with the updated filters and `persist_artifact: true`.\n\n| User says | What changes |\n| --- | --- |\n| \"next page\" | `get_artifact` with `offset += 25` |\n| \"narrow to NYC\" | new `sales_nav_search` with `geography_ids` |\n| \"only senior+ folks\" | new `sales_nav_search` with `seniority_ids` |\n| \"filter to mid-stage companies\" | new `sales_nav_search` with `headcount_ids` |\n| \"show me their mutual\" | use current-run `mutual_member_ids`; do not scan prior artifacts |\n\n### Step 6 \u2014 Resuming a previous search\n\nDo not resume previous searches. If the user references a prior `artifact_id`\nwhile asking for search results, run a new search instead. Only call\n`get_artifact` for an old artifact when the user explicitly asks to inspect that\nartifact rather than run a search.\n\n## What this skill does NOT do\n\n- It does not write leads to your local `contacts.csv`. Lead \u2192 contact\n  promotion is a separate (future) `import-sales-nav-leads` skill, likely\n  also under `packs/sales-nav`.\n- It does not promote leads into the Powerset main set. That UI affordance\n  is on the web app today.\n- It does not run a sequence of pages on its own. Pagination is always\n  user-confirmed and goes through `get_artifact`.\n", "mcp_count": 4, "mcp_refs": ["enrich_extended_profiles", "sales_nav_resolve", "sales_nav_resolve_member_ids", "sales_nav_search"], "name": "sales-nav-search", "pack": "sales-nav", "path": "packs/sales-nav/skills/sales-nav-search/SKILL.md", "primitive_count": 4, "primitive_refs": ["resolve_set_operators", "sales_nav_artifacts", "sales_nav_pipeline", "score_sales_nav_leads"]}, {"description": "The single people-search door for Powerpacks. You decide surface/backend/depth and record it (decision.json): explicit words pick the backend (powerset uses TurboPuffer/Postgres; local uses DuckDB); a JD or job-posting URL runs the deep multi-profile engine; company / relational-SQL / my-contacts requests go to their surfaces. Formerly $search-network.", "display_name": "powerset:search", "heading": "Search", "markdown": "---\nname: search\ndescription: \"The single people-search door for Powerpacks. You decide surface/backend/depth and record it (decision.json): explicit words pick the backend (powerset uses TurboPuffer/Postgres; local uses DuckDB); a JD or job-posting URL runs the deep multi-profile engine; company / relational-SQL / my-contacts requests go to their surfaces. Formerly $search-network.\"\n---\n\n<!--\nChangelog:\n- 2026-07-08: Checklist step 3 is now \"Review \u2014 confirm requirements with the user\" (was \"GATE \u2014\").\n  Plain \"Review\" instead of \"GATE\"/\"GATE 1\" in the printed tasks; the core-gate keeps its name.\n- 2026-07-01: Replaced the Step-0 classifier (route_query.py, deleted) with an agent-made decision\n  contract \u2014 you decide surface/backend/depth and record decision.json before anything runs. Added\n  the mandatory native-task checklist and the universal confirm-before-execute gate. Explicit\n  \"powerset\"/\"local\" words now bind the backend end-to-end. Decision quality is benchmarked by the\n  agent decision eval (packs/search/evals/run_decision_eval.py) instead of the offline classifier eval.\n- 2026-06-30: Renamed from `search-network` to `search` (search consolidation Stage 3). Added the\n  Step-0 router that dispatches deep JD/URL/brief/shortlist to $search's deep mode and\n  company/sql/contacts to their surfaces; ordinary people searches stay on the fast local/TurboPuffer\n  path. $search-network is a deprecated alias. The retrieval primitive (search_network_pipeline.py)\n  and search-network-jd-* schemas/tasks keep their names.\n- 2026-07-10: Quality-superlative hiring asks (\"best\", \"strongest\", \"cracked\") enter deep mode.\n  Deep mode now builds and critiques its recruiter plan before sourcing, then uses the approved\n  core/nice criteria and explicit recruiter defaults to generate epoch-0 probes.\n-->\n\n# Search\n\nThe single entry point for people search. `$search` routes every query to the right surface, then\nruns fast local/TurboPuffer retrieval itself for ordinary people searches.\n\nFor the product and system walkthrough, read\n[`packs/search/docs/search-architecture.md`](../../docs/search-architecture.md).\nThis file remains the executable agent contract.\n\nUse this for any people search request:\n\n- `$search software engineers in sf`\n- `$search local: product managers in nyc`\n- `$search https://jobs.lever.co/company/abc123`   \u2190 deep JD \u2192 runs deep mode\n- `$search senior engineers at series a fintech companies`\n- `$search stanford engineers with 3-5 yoe in new york`\n- `$search people who work at OpenAI`\n\n> `$search` supersedes `$search-network` (the old name still works as an alias). The retrieval\n> primitive is still `search_network_pipeline.py` \u2014 only the skill/route was renamed.\n\n## How to run this skill\n\n**FIRST, before running anything: create a literal, visible checklist with the five steps\nbelow and step through it, marking each item complete as you go.** This is mandatory. Use\nyour harness's plan/todo/task tool:\n\n- **Claude Code:** `TaskCreate` one task per step (1\u20135), then `TaskUpdate` each to\n  `in_progress` then `completed` as you go.\n- **Codex:** `update_plan` with the five steps, updating status as you go.\n- **Any other harness:** its equivalent todo/plan mechanism.\n\nSeed the checklist with these exact item titles:\n\n    1. Decide + record the search decision (decision.json)\n    2. Prepare the search (payload preview or deep plan)\n    3. Review \u2014 confirm requirements with the user\n    4. Execute the search\n    5. Present results\n\nWork the checklist in order 1 \u2192 5. Exactly one item `in_progress` at a time; mark it\n`completed` before starting the next. No batching, no reordering, no skipping, no invented\nextra steps. If Step 1 decides surface `company`/`sql`/`contacts`, mark items 2\u20135 as handed\noff and load that surface's SKILL \u2014 it owns its own flow. If Step 1 decides depth `deep`,\nitems 2\u20134 are owned by deep mode's own checklist (`deep-mode.md`) \u2014 load it right after\nrecording the decision.\n\n## Step 1 \u2014 Decide the route (you are the router)\n\nYou make this decision \u2014 there is no classifier to run. A one-liner, a pasted JD, and a\njob-posting URL all come through this same step and the same rules. Decide three things,\nrecord them, and only then act.\n\n<!-- decision-rules:start -->\nDecide `surface`, `backend`, and `depth` for the query:\n\n1. **surface** \u2014 where the query belongs:\n   - `people` \u2014 any search for people. The default when unsure.\n   - `company` \u2014 the subject is companies (lookup / IDs / investors / funding / sector) and\n     no people are asked for. \"Engineers at companies backed by Sequoia\" is `people`.\n   - `sql` \u2014 the predicate needs cross-row or cross-person logic: per-person aggregates\n     (\"2+ startup stints\"), role ordering (\"engineers who became PMs\"), or a join against\n     another person (\"overlapped with Jane at Stripe\"). A person's name alone is NOT sql:\n     \"look up Jane Doe\" and \"who is Jane Doe\" are `people` lookups. Common words like\n     \"career\" or \"worked with <a technology>\" do not make a query sql.\n   - `contacts` \u2014 \"my contacts\" / \"set contacts\" plus contact-field filtering.\n2. **backend** \u2014 which index runs the search. The user's explicit words always win:\n   - `powerset` \u2014 the user says \"powerset\", names a set, or says \"team/shared network\"\n     (even if they also say \"my network\": \"search my Powerset network\" is `powerset`).\n   - `local` \u2014 the user says \"local\", \"offline\", or \"my imported network/contacts\",\n     even if remote credentials exist.\n   - Unstated \u2192 environment default: if `POWERPACKS_LOCAL_SEARCH_DB` is set, or\n     `.powerpacks/search-index/local-search.duckdb` exists with no TurboPuffer credentials\n     configured, pick `local`; otherwise `powerset`. Both configured \u2192 `powerset`, and say\n     which you picked in one line so the user can flip it.\n   - Forced values: `sql` is always `local`; `company` and `contacts` are always `powerset`.\n3. **depth** \u2014 how hard to search (people surface only):\n   - `deep` \u2014 the input is a pasted JD or a job-posting URL, or the user asks for a\n     deep/thorough/judged run or names the deliverable (\"recruit ...\", \"build a shortlist\",\n     \"source candidates\"). Quality-superlative hiring intent also means deep when the request\n     supplies a role/domain to judge: \"best\", \"strongest\",\n     \"most exceptional\", \"top-tier\", or \"cracked\" candidates. A bare \"find me candidates\" with\n     no role context remains fast/clarify; do not fabricate a hiring profile.\n     A raw profile URL is not yet a supported deep-search intake: ask for the role/domain rather\n     than claiming the internal shortlist-anchor expansion can start from that URL.\n   - `fast` \u2014 everything else: one expansion \u2192 retrieval \u2192 rerank pass.\n   - Deep is the multi-profile engine: decompose the role into diverse candidate archetypes,\n     run each as a probe through the same retrieval pipeline, union, judge, converge.\n4. Uncertain on any axis \u2192 `people` / the environment default / `fast`, and state the\n   uncertainty in `reason`. Never block on routing.\n<!-- decision-rules:end -->\n\nRecord the decision before anything runs (checklist item 1). Create the run dir with a short\nstable slug from the query (e.g. `swe-sf-stanford`) and write `decision.json`:\n\n```json\n{\"surface\": \"people\", \"backend\": \"powerset\", \"depth\": \"fast\",\n \"reason\": \"<one sentence on why>\"}\n```\n\n- fast \u2192 `.powerpacks/search/<slug>/decision.json`, and pass the same dir as `--output-dir`\n  to `prepare` so the decision, payload, and outputs live together.\n- deep \u2192 `.powerpacks/deep-search/<jd-slug>/decision.json` (the engine's existing run dir).\n\nThen dispatch \u2014 this table is the whole routing contract:\n\n| decision | action |\n|---|---|\n| surface `company` | load `packs/search/skills/search-company/SKILL.md` (decision.json still written first) |\n| surface `sql` | load `packs/search/skills/search-sql/SKILL.md` (decision.json still written first) |\n| surface `contacts` | load `packs/contacts/skills/search-contacts/SKILL.md` (decision.json still written first) |\n| `people` + `fast` + `local` | **Local Happy Path** below (`search_network_pipeline.py prepare --backend local --db <db>`) |\n| `people` + `fast` + `powerset` | **TurboPuffer Happy Path** below (`search_network_pipeline.py prepare`) |\n| `people` + `deep` | load `packs/search/skills/search/deep-mode.md` (`--jd-file` / `--jd-url` as it documents; on backend `local` add `--backend local --db <db>` to `deep_search_loop.py`) |\n\nThe deep engine owns its own orchestration and delegates capped per-profile searches back to\nthis skill's selected backend path with a per-search `limit` and `--search-only` - do not run\n`search_network_pipeline.py` directly for a deep input yourself.\n\nInput shapes normalize before `prepare`, never before the decision:\n\n- **backend directives are directives, not query text** \u2014 strip words like `local:`, \"offline\",\n  \"in powerset\", \"search powerset for\", or a set name from the text you pass as `--query`; they\n  bound the decision, and leaving them in pollutes query expansion.\n\n- **job-posting URL** \u2014 deep mode fetches it itself (`--jd-url`). Only when the user\n  explicitly forces `fast` on a URL, fetch first with\n  `uv run --project . python packs/search/primitives/deep_search/fetch_jd.py --url <url> --out <run>/jd.txt`\n  (a thin fetch under ~400 chars \u2192 ask for a paste; Ashby URLs resolve via the public\n  posting API automatically) and use the fetched text as the query.\n- **pasted JD forced to `fast`** \u2014 use the JD text directly as `--query`; expansion condenses it.\n- **one-liner** \u2014 the query as-is.\n\n**The gate (checklist item 3):** every search stops exactly once for user confirmation before\nexecuting \u2014 fast mode at the prepare preview (`Execute this search or modify it?`, or the local\npath's `Execute this local search or modify it?`), deep mode at Review (plan approval). Never\nrun an `execute_command` without that answer; never ask twice.\n\n### Retrieval surface boundary\n\n`$search` people retrieval means the Powerpacks network surface: the `powerset` backend is\nset-scoped TurboPuffer/Postgres and the `local` backend is DuckDB. It is not Sales Navigator.\n\n- An explicit Powerset/network request stays on `$search` with `surface: people` and\n  `backend: powerset`, including retries, wider probes, adjacency, and sparse-result diagnosis.\n- Never treat Sales Nav or LinkedIn leads as an implicit fallback for a failed or weak `$search`\n  run. Ask before changing retrieval surfaces and keep artifacts/results separate unless the user\n  explicitly requests both.\n- If the user says only \"extended search\" and the conversation has not defined the surface, ask:\n  `Do you mean Sales Nav extended search, or regular Powerset network search?`\n\n---\n\n## Hiring seniority & hireability defaults\n\nThese apply to every hiring-intent search (a JD, a role brief, \"find\ncandidates\", \"people like X for this role\") in both local and TurboPuffer\nmodes, and they bind any fallback behavior too:\n\nDeep mode resolves these through the versioned recruiter policy at\n`packs/search/policies/recruiter-defaults.json` and embeds the resolved values plus provenance in\n`epoch0/plan.json`. The order is **explicit user preferences > JD-supported inference > defaults**.\nDefaults rank; they do not silently become JD hard requirements. Review shows them once so the\nuser can override them before sourcing.\n\n- **Derive the seniority target from level language, else from the title's\n  conventional range.** Map stated levels (\"senior\", \"staff+\", \"director and\n  above\") to seniority bands. When a hiring JD/title states no explicit\n  level, propose the title's conventional band range (e.g. \"Member of\n  Technical Staff\" or a bare \"Software Engineer\" \u2192 mid/senior \u2014 MTS is not\n  the `staff` band despite the word) and show it in the preview's\n  `Targeting:` line for correction. Never derive bands from years of\n  experience, team size, scope, or impact language \u2014 YOE is unreliable\n  (\"8+ years\" does not mean senior). Preserve extractor-inferred bands\n  unless they contradict the query.\n- **Exclude current founders / co-founders / CEOs / C-suite by default**\n  for role searches. They are rarely hireable for an IC or leadership\n  hire. State the default in the preview (one line such as\n  `Excluding current founders/C-suite \u2014 say \"include founders\" to keep\n  them`) so the user can flip it. Include them only when the user\n  explicitly asks for founder-type profiles or \"builders regardless of\n  current title\".\n- **Never silently exclude VP / director / manager / head.** Some are\n  hands-on and appropriate depending on company stage. Keep them unless\n  the user excludes them; the rerank judges hands-on fit.\n- **\"People like <person>\"** anchors seniority to that person's current\n  role and band (same rule as the deep-search engine). If the anchor is still\n  ambiguous, ask exactly one question before executing: \"Hands-on IC\n  engineers only, or are technical leaders (VP/director/CTO) acceptable\n  if still hands-on?\"\n- **Preserve the user's stated constraints exactly; never add hidden\n  exclusions beyond the founder default above without asking.** When the\n  user corrects a seniority interpretation, that correction binds every\n  subsequent search in the session \u2014 repeating a corrected mistake is the\n  worst outcome.\n- **On pipeline failure, do not improvise retrieval.** Report the failure\n  (the \"do not write new retrieval scripts\" rule still holds). If the\n  user explicitly asks for a manual fallback over the local index, the\n  fallback must apply these same seniority defaults \u2014 in particular,\n  never put founder/CEO/CTO into a technical-title pattern by default.\n\n---\n\n## Local Happy Path\n\nUses the local DuckDB search index - no TurboPuffer, Postgres, or set\nresolution. Retrieval stays local, but LLM filtering/reranking runs by default\nand sends the required candidate evidence to the configured OpenAI boundary.\nUse `--search-only` to skip those model stages entirely.\n\n### Local person lookup fast path\n\nIf the query is a bare person identifier with no role/filter intent \u2014 a\nname (\"John Doe\", \"who is John Doe\"), an email, a phone number, a Twitter/X\nhandle, or a LinkedIn profile URL \u2014 do **not** run the pipeline. Names and\nidentifiers are not indexed by any retrieval stage; run one direct lookup\ninstead:\n\n```bash\nuv run --project . python packs/search/primitives/local_duckdb_query/local_duckdb_query.py query \\\n  --sql \"SELECT person_id, full_name, headline, current_title, current_company, city, linkedin_url FROM local_person_profiles WHERE full_name ILIKE '%john doe%'\"\n```\n\nMatch emails against `primary_email`/`all_emails`, phones against\n`primary_phone`/`all_phones`, handles against\n`twitter_handle`/`x_twitter_handle`, LinkedIn URLs against\n`linkedin_url`/`public_identifier` (normalize to the slug). Show the\nmatches compactly; if several people match, list them all. If zero match,\nsay so and offer a normal search. Skip extraction, task state, retrieval,\nhydration, and all LLM stages \u2014 this is a deterministic lookup, not a\nsearch. If the query combines a person with anything else (\"engineers who\nworked with John Doe\"), it is not this fast path \u2014 use the normal flow and\nthe agentic SQL fan-out gate.\n\n1. Determine the DuckDB path:\n   - `$POWERPACKS_LOCAL_SEARCH_DB` if set\n   - Otherwise `.powerpacks/search-index/local-search.duckdb`\n\n2. If the DB file does not exist, tell the user to run\n   `$build-local-search-index` first and stop.\n\n3. Run:\n\n   ```bash\n   uv run --env-file .env --project . python packs/search/primitives/search_network_pipeline/search_network_pipeline.py prepare \\\n     --backend local \\\n     --query \"<user query>\" \\\n     --db \"<db-path>\" \\\n     --output-dir \".powerpacks/search/<slug>\"\n   ```\n\n   Use the same `<slug>` run dir where `decision.json` was recorded.\n\n4. Show the preview compactly (it will include `scope: local_duckdb` and a\n   `pool_estimate` with `matched_people` / `total_people`). Include one line\n   like `Pool: 150 of 500 people`. When the extracted filters include\n   `seniority_bands` (or the query names a band), include one compact line\n   such as `Targeting: senior/staff ICs` so the user can correct the band\n   before executing \u2014 a role noun like \"product managers\" must not silently\n   become a `manager` seniority band. If `runtime_notes` flags a broad search\n   (hard filters match more than ~60% of the index), surface that note and\n   recommend narrowing before executing \u2014 running LLM stages over most of\n   the index is usually a query problem, not a retrieval problem. If it\n   flags 0 matches or a suspiciously narrow pool, recommend `modify` (or\n   expect the zero-result fallback below). Then ask exactly:\n\n   `Execute this local search or modify it?`\n\n5. If the user chooses `execute`, run the returned `execute_command` exactly.\n\n6. Keep execution quiet until the command finishes.\n\n### Agentic SQL fan-out (local mode only)\n\nIn parallel with steps 3\u20136, fan out to the `search-sql` skill\n(`packs/search/skills/search-sql/SKILL.md`) via a sub-agent \u2014 but only when\nthe gate below passes. Default is OFF; most searches must not fan out.\n\nDecision test: **could the need be expressed as filters over one position\nrow at a time?** If yes, do not fan out \u2014 the main retrieval stages own it.\nFan out only when the query needs one of:\n\n- **counting/aggregation across a person's rows** \u2014 \"2+ stints at\n  startups\", \"average tenure under 2 years\", \"worked at 3+ FAANG companies\"\n- **ordering/sequence between a person's roles** \u2014 \"engineers who became\n  product managers\", \"promoted internally\", \"IC before manager\"\n- **a join against another person** \u2014 \"worked with X\", \"overlapped with X\n  at Y\", \"schoolmates of X\", \"people similar to X's career path\"\n- **set algebra over two sub-populations** \u2014 \"ex-Stripe folks now at infra\n  startups\"\n- **cross-trait evidence living on different rows or tables** \u2014 \"designers\n  who can code\" (the design role is one position row; the coding evidence\n  is a different engineering row or `local_summaries.tech_skills`),\n  \"recruiters with a technical background\", \"founders who were previously\n  sales\". One position row cannot satisfy both traits, so per-row filters\n  cannot express the conjunction \u2014 still run hybrid in parallel, since\n  profile prose sometimes carries both signals.\n- **interaction history** \u2014 \"people I've actually messaged\" (requires\n  `local_person_source_summary`; skip if the table is absent)\n- **explicit user request** \u2014 \"also run the sql vertical\", \"sql:\"\n\nNever fan out for role/title/seniority/location/company/education/date\nfilters, however many are combined \u2014 \"senior Stanford engineers at series A\nfintechs in NYC since 2020\" is still one-row-at-a-time and stays in the\nmain path. When unsure, do not fan out; the user can ask for `sql:` on a\nfollow-up.\n\nGive the sub-agent the user query verbatim plus any already-resolved person\nor company ids, and have it follow `search-sql`'s output contract. Do not\nfan out for plain row-level searches \u2014 the main retrieval stages own those.\n\nFan-in goes through the pipeline, not around it:\n\n1. Run `prepare` and fan out the sub-agent while the user reviews the\n   preview.\n2. Write the sub-agent's output JSON to `agentic-sql-candidates.json` inside\n   the run's output directory.\n3. Append `--extra-candidates-json <that path>` to the returned\n   `execute_command` before running it. The pipeline unions the SQL people\n   into retrieval (tagged `agentic_sql` in `vertical_sources`), so they flow\n   through the **same** `hydrate_people`, `llm_filter_candidates`, and\n   `llm_rerank_candidates` steps as every other candidate \u2014 no separate\n   ranking path.\n4. If the sub-agent has not finished by the time the user approves\n   execution, wait briefly for it; if it fails or returns an empty `people`\n   list, run the `execute_command` without the flag and note the vertical\n   was skipped. The SQL vertical is additive evidence \u2014 never block or fail\n   the search on it.\n\n### Zero-result SQL fallback (local mode only)\n\nIf the pipeline completes with 0 found (or the preview's `pool_estimate`\nalready shows 0 matched), fan out one `search-sql` sub-agent with the user\nquery **and** the payload's `role_search_filters`, asking it to:\n\n1. probe the actual value spaces of each hard-filtered column,\n2. identify which constraint zeroed the pool (e.g. a filter value that does\n   not exist in the index taxonomy),\n3. return candidates matching the user's intent with corrected values, in\n   the standard output contract.\n\nPresent the diagnosis in one line (\"`seniority_bands: [manager]` matched 0\nbecause this index uses ...\"), plus the recovered candidates if any. Offer\nto re-run the proper pipeline with corrected filters; do not silently\nsubstitute SQL results for a full search.\n\n### Local Summary\n\n- Say `<N> found (local)`.\n- Say `Run artifacts: <artifact-dir>`.\n- Show top 10 candidates from the CSV: rank, name, current title/company,\n  location, LinkedIn URL when present.\n- If the SQL fan-out ran, say `<M> sql-vertical candidates merged` (read\n  `agentic_sql_tagged` from the execute_role_search step summary). SQL-only\n  people appear in the main ranked CSV like everyone else; their rows carry\n  `agentic_sql` in `vertical_sources`.\n\n### Local Constraints\n\n- LLM filter/rerank run by default and need `OPENAI_API_KEY`; if it is\n  missing, rerun with `--search-only` instead of failing the search\n- No set/operator resolution\n- No TurboPuffer or Postgres calls\n- Investor filters are not supported locally\n\n---\n\n## TurboPuffer Happy Path\n\nDo not inspect repo docs, source, memory, prior transcripts, or prior result\nfiles on the happy path. Start a fresh run for every search request.\n\n1. Run:\n\n   ```bash\n   uv run --env-file .env --project . python packs/search/primitives/search_network_pipeline/search_network_pipeline.py prepare \\\n     --query \"<user query>\" \\\n     --output-dir \".powerpacks/search/<slug>\"\n   ```\n\n   Use the same `<slug>` run dir where `decision.json` was recorded. (Deep-engine delegated\n   profile searches pass their own output dir; follow the engine's instructions there.)\n\n2. If `prepare` returns `status: company_directory_fast_path`, follow the\n   returned tool request and skip semantic retrieval.\n3. If `prepare` returns a preview, show it compactly. When the extracted\n   filters include `seniority_bands` (or the query names a band), include one\n   compact line such as `Targeting: senior/staff ICs` so the user can correct\n   the band before executing. If there is no seniority target, omit the line\n   \u2014 do not invent one. Then ask exactly:\n\n   `Execute this searc
