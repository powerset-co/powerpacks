: 8, "has_readme": false, "name": "local", "pack": "search", "path": "packs/search/primitives/local"}, {"entrypoint": "packs/search/primitives/local_duckdb_query/local_duckdb_query.py", "file_count": 1, "has_readme": false, "name": "local_duckdb_query", "pack": "search", "path": "packs/search/primitives/local_duckdb_query"}, {"entrypoint": "packs/search/primitives/merge_candidate_frontier/merge_candidate_frontier.py", "file_count": 2, "has_readme": true, "name": "merge_candidate_frontier", "pack": "search", "path": "packs/search/primitives/merge_candidate_frontier"}, {"entrypoint": null, "file_count": 2, "has_readme": true, "name": "persist_search_results", "pack": "search", "path": "packs/search/primitives/persist_search_results"}, {"entrypoint": "packs/search/primitives/resolve_investors/resolve_investors.py", "file_count": 2, "has_readme": true, "name": "resolve_investors", "pack": "search", "path": "packs/search/primitives/resolve_investors"}, {"entrypoint": "packs/search/primitives/resolve_set_operators/resolve_set_operators.py", "file_count": 2, "has_readme": true, "name": "resolve_set_operators", "pack": "search", "path": "packs/search/primitives/resolve_set_operators"}, {"entrypoint": "packs/search/primitives/search_network_pipeline/search_network_pipeline.py", "file_count": 2, "has_readme": true, "name": "search_network_pipeline", "pack": "search", "path": "packs/search/primitives/search_network_pipeline"}, {"entrypoint": null, "file_count": 8, "has_readme": false, "name": "shared", "pack": "search", "path": "packs/search/primitives/shared"}, {"entrypoint": "packs/search/primitives/task_state/task_state.py", "file_count": 2, "has_readme": true, "name": "task_state", "pack": "search", "path": "packs/search/primitives/task_state"}, {"entrypoint": null, "file_count": 5, "has_readme": false, "name": "turbopuffer", "pack": "search", "path": "packs/search/primitives/turbopuffer"}, {"entrypoint": "packs/search/primitives/validate_artifact/validate_artifact.py", "file_count": 1, "has_readme": false, "name": "validate_artifact", "pack": "search", "path": "packs/search/primitives/validate_artifact"}], "skills": [{"description": "Script-backed Apollo outbound workflow. Use for `$build-outbound setup`, `$build-outbound status`, `$build-outbound prepare-leads`, previewing copy from Sales Nav leads, creating inactive Apollo sequences, and activation after exact campaign confirmation.", "display_name": "powerset:build-outbound", "heading": "Build Outbound", "markdown": "---\nname: build-outbound\ndescription: Script-backed Apollo outbound workflow. Use for `$build-outbound setup`, `$build-outbound status`, `$build-outbound prepare-leads`, previewing copy from Sales Nav leads, creating inactive Apollo sequences, and activation after exact campaign confirmation.\n---\n\n# Build Outbound\n\nUse this skill when the user asks to turn `$sales-nav-search` leads into an Apollo outbound sequence, or asks for Apollo setup/status. The sequence build is backed by `packs/apollo/primitives/build_outbound/build_outbound.py`; setup/status stay on `packs/apollo/primitives/apollo_mcp/apollo_mcp.py`.\n\n## Prerequisites\n\n- `APOLLO_API_KEY` in `.env` or the shell. Use a Master API key for sequence/email-account endpoints.\n- A connected Apollo sending mailbox and an Apollo emailer schedule.\n- A Sales Nav run under `.powerpacks/sales-nav/runs/` or an explicit Sales Nav `manifest.json` / `state.json`.\n- Never paste API keys, full lead lists, raw Apollo responses, or unmasked emails into chat.\n\n## Setup and status routes\n\n```bash\nuv run --project . python packs/apollo/primitives/apollo_mcp/apollo_mcp.py status --host codex\nuv run --project . python packs/apollo/primitives/apollo_mcp/apollo_mcp.py install --host codex\n# add --host claude or --host all when requested\n```\n\n- `$build-outbound status`: run status and report only whether key, Node/npx, and MCP registration are present. Never print the key.\n- `$build-outbound setup`: if `APOLLO_API_KEY` exists, run install for the requested host; otherwise tell the user how to add it locally.\n- `$build-outbound prepare-leads`: legacy/manual handoff route; run `apollo_mcp.py prepare-leads --input <export.csv>` and report counts/paths.\n\n## Normal `$build-outbound <instructions>` route\n\n1. Resolve the Sales Nav input:\n\n   ```bash\n   uv run --project . python packs/apollo/primitives/build_outbound/build_outbound.py resolve-sales-nav \\\n     --query-hint \"<user instructions>\"\n   # or include --sales-nav-manifest <path> / --state <path> when the user points to one\n   ```\n\n2. Print the selected search query, state/manifest path, lead count, and exactly: \u201cIf this is the wrong search, point me to the right manifest/state.\u201d\n\n3. Draft or use reviewed copy, then create a local preview:\n\n   ```bash\n   uv run --project . python packs/apollo/primitives/build_outbound/build_outbound.py preview \\\n     --instructions \"<user instructions>\" \\\n     --query-hint \"<user instructions>\"\n   ```\n\n   This writes `sequence_input.json` and `sequence_preview.md`. Print the exact subject/body preview for every step.\n\n4. Preview checkpoint: because enrichment spends Apollo credits and build mutates Apollo (sequence/contact creation and enrollment), ask for \u201cproceed with build\u201d confirmation unless the original request unambiguously asked to build/create/enrich now.\n\n5. Build the inactive Apollo campaign from the reviewed copy:\n\n   ```bash\n   uv run --project . python packs/apollo/primitives/build_outbound/build_outbound.py build \\\n     --instructions \"<user instructions>\" \\\n     --query-hint \"<user instructions>\" \\\n     --sequence-json <reviewed sequence_input.json>\n   ```\n\n   Use `--sales-nav-manifest <path>` or `--state <path>` instead of `--query-hint` when applicable. The build discovers default sender/schedule unless explicit IDs are supplied. Report campaign id, counts, masked email counts, and local artifact paths under `.powerpacks/apollo/build-outbound/<run>/`.\n\n6. Activation is separate. Do not run activation until the user explicitly confirms activation for the exact returned `campaign_id`.\n\n## Activation command\n\nOnly after exact campaign confirmation, run:\n\n```bash\nuv run --project . python packs/apollo/primitives/build_outbound/build_outbound.py activate \\\n  --manifest .powerpacks/apollo/build-outbound/<run>/manifest.json \\\n  --confirm-activation <campaign_id>\n```\n\nThe command requires the confirmation id to match the manifest campaign id, activates through Apollo, polls message status, and writes `activation_status.json`.\n\n## Safety rules\n\n- Do not run live Apollo mutations without explicit user approval: enrichment, contact create/dedupe, sequence/campaign creation, contact enrollment, and activation are spend-bearing or mutating.\n- Preview and resolve commands are safe local/read-only steps.\n- Non-dry-run build creates an inactive campaign only; it must not activate sending.\n- `activate` is the only route that can approve/activate the campaign, and it requires exact campaign id confirmation.\n- Use `--dry-run` for local smoke checks. Do not run live activation tests.\n- Console output must keep API keys redacted and emails masked; raw Apollo artifacts stay local under `.powerpacks/`.\n", "mcp_count": 0, "mcp_refs": [], "name": "build-outbound", "pack": "apollo", "path": "packs/apollo/skills/build-outbound/SKILL.md", "primitive_count": 2, "primitive_refs": ["apollo_mcp", "build_outbound"]}, {"description": "Browse Powerset contacts through the Powerset Search MCP. Natural-language routing for my contacts vs set contacts, app-native search fields, app-native sorting, pagination, and field projection.", "display_name": "powerset:search-contacts", "heading": "Search Contacts", "markdown": "---\nname: search-contacts\ndescription: Browse Powerset contacts through the Powerset Search MCP. Natural-language routing for my contacts vs set contacts, app-native search fields, app-native sorting, pagination, and field projection.\n---\n\n# Search Contacts\n\nUse this skill when the user asks for `/search-contacts <request>`, \"show my\ncontacts\", \"show the most messaged contacts in my Powerset set\", or \"show my\ncontacts with emails, LinkedIn, and Twitter\".\n\nThis is a pure MCP representation of the existing Powerset app contacts views.\nDo **not** convert this into semantic people search. Do **not** call `search`,\n`count`, `query_results`, Sales Nav tools, or company-directory tools from this\nskill.\n\n## Tools\n\nCall the remote `powerset-search` MCP tools directly:\n\n- `list_contacts` \u2014 app-equivalent `GET /v2/contacts` for the authenticated\n  user's own contacts.\n- `list_sets` \u2014 enumerate accessible sets when the user names a set.\n- `list_set_contacts` \u2014 app-equivalent `GET /v2/set-contacts/{set_id}` for\n  contacts across a set.\n\nIf the MCP is missing, route the user through `$powerset setup` / `mcp_install`\nrather than pretending to fetch contacts.\n\n## Routing\n\n### 1. Decide own contacts vs set contacts\n\nUse `list_contacts` unless the user explicitly names a set.\n\nSet language examples:\n\n- \"in my Powerset set\"\n- \"in the Powerset set\"\n- \"for the Powerset set\"\n- \"from the Founders set\"\n\nIf the user names a set:\n\n1. Call `list_sets`.\n2. Resolve the set name using this exact tie-breaker:\n   1. exact case-insensitive name match\n   2. prefer non-personal sets\n   3. prefer highest `member_count`\n   4. then personal sets\n   5. if still ambiguous, ask the user to choose\n3. Call `list_set_contacts` with that `set_id`.\n\nDo not invent set ids. Do not call local `resolve_set_operators` from this\nskill; the MCP set list is the source of truth for this UX.\n\n### 2. Parse app-native sort intent\n\nOnly use sort fields the contacts APIs expose.\n\nFor `list_contacts`:\n\n- \"most messaged\", \"most messages\", \"most interactions\" \u2192\n  `sort_field: \"total_messages\"`, `sort_dir: \"desc\"`\n  (`list_contacts` accepts `total_messages` as an alias for the app's\n  `total_interactions` sort field.)\n- \"least messaged\" \u2192 `sort_field: \"total_messages\"`, `sort_dir: \"asc\"`\n- \"by first name\", \"alphabetical\" \u2192 `sort_field: \"first_name\"`, `sort_dir: \"asc\"`\n- \"by last name\" \u2192 `sort_field: \"last_name\"`, `sort_dir: \"asc\"`\n- \"by headline/title\" \u2192 `sort_field: \"headline\"`, `sort_dir: \"asc\"`\n- \"by location\" \u2192 `sort_field: \"location_raw\"`, `sort_dir: \"asc\"`\n\nFor `list_set_contacts`:\n\n- allowed sort fields: `first_name`, `last_name`, `headline`, `total_messages`\n- default for set contacts: `sort_field: \"total_messages\"`, `sort_dir: \"desc\"`\n\nIf the user gives no sort preference:\n\n- own contacts: use tool defaults (`first_name asc`)\n- set contacts: use `total_messages desc`\n\n### 3. Parse app-native search filters\n\nOnly use the search syntax supported by the app contacts routes:\n\n- plain text \u2192 name search, e.g. `search: \"alex chen\"`\n- `email:<text>` for email/domain filtering, e.g. `email:@powerset.co`\n- `phone:<digits>` for phone filtering, or `phone:` for contacts with phones\n- `headline:<text>` for title/headline filtering\n- `company:<text>` only when the user explicitly asks to filter contacts by a\n  company field in the contacts view\n\nNo Twitter search exists in the app search syntax today. If the user asks to\n\"show twitter\", treat Twitter as an output field, not a search filter.\n\nDo not interpret phrases like \"AI engineers\" semantically. If the user clearly\nasks for a headline/title filter, use `headline:engineer`; otherwise ask a\nclarifying question.\n\n### 4. Parse output fields\n\nIf the user does not specify fields, show the default useful columns:\n\n- name/display_name\n- headline/title\n- location\n- total_messages or interaction_level\n- LinkedIn when available\n\nIf the user asks for fields, pass `include_fields` only to `list_contacts`.\n`list_set_contacts` returns the app's set-contact lead shape; project fields in\nthe final answer rather than passing `include_fields`.\n\nField aliases for own contacts:\n\n- \"name\" \u2192 `display_name`, `first_name`, `last_name`\n- \"email\" / \"emails\" \u2192 `emails`\n- \"linkedin\" \u2192 `confirmed_linkedin_url`, `public_profile_url`, `public_identifier`\n- \"twitter\" / \"x\" \u2192 `x_twitter_handle`\n- \"phone\" \u2192 `phone_number`\n- \"messages\" / \"interactions\" \u2192 `total_messages`\n- \"headline\" / \"title\" \u2192 `headline`\n- \"location\" \u2192 `location_raw`\n\nAlways include enough identity fields to make the output readable even when the\nuser requests only contact fields. For example, \"show emails and LinkedIn\" still\nneeds `display_name` or `first_name`/`last_name`.\n\n### 5. Pagination\n\nDefault to page 0 and page size 50 unless the user asks otherwise. Present the\nfirst 20-50 rows as a compact markdown table. If `has_more` / `hasMore` is true,\ntell the user how to ask for the next page.\n\nDo not auto-page through all contacts unless the user explicitly asks to export\nor retrieve all pages.\n\n## Examples\n\n### My contacts, most messaged, selected fields\n\nUser:\n\n```text\n/search-contacts show me my contacts ordered by most messages and show emails, twitter, and linkedin\n```\n\nTool:\n\n```text\nlist_contacts(\n  sort_field=\"total_messages\",\n  sort_dir=\"desc\",\n  page=0,\n  page_size=50,\n  include_fields=[\n    \"display_name\", \"first_name\", \"last_name\", \"emails\",\n    \"confirmed_linkedin_url\", \"public_profile_url\", \"public_identifier\",\n    \"x_twitter_handle\", \"total_messages\"\n  ]\n)\n```\n\n### Set contacts, most messaged\n\nUser:\n\n```text\n/search-contacts show me the most messaged contacts in my Powerset set\n```\n\nTools:\n\n```text\nlist_sets()\n# resolve \"Powerset\" with exact \u2192 non-personal \u2192 most members \u2192 personal \u2192 ask\nlist_set_contacts(set_id=\"...\", sort_field=\"total_messages\", sort_dir=\"desc\", page=0, page_size=50)\n```\n\n### Email domain filter\n\nUser:\n\n```text\n/search-contacts show my contacts with @powerset.co emails\n```\n\nTool:\n\n```text\nlist_contacts(search=\"email:@powerset.co\", page=0, page_size=50)\n```\n", "mcp_count": 3, "mcp_refs": ["list_contacts", "list_set_contacts", "list_sets"], "name": "search-contacts", "pack": "contacts", "path": "packs/contacts/skills/search-contacts/SKILL.md", "primitive_count": 1, "primitive_refs": ["mcp_install"]}, {"description": "Build or inspect the local search index from the canonical merged people.csv without Modal, Postgres, Supabase, or TurboPuffer. Planning and dry-run are local-only; a full build reuses caches and may call configured classification/embedding providers for uncovered work after its estimate.", "display_name": "powerset:build-local-search-index", "heading": "Build Local Search Index", "markdown": "---\nname: build-local-search-index\ndescription: Build or inspect the local search index from the canonical merged people.csv without Modal, Postgres, Supabase, or TurboPuffer. Planning and dry-run are local-only; a full build reuses caches and may call configured classification/embedding providers for uncovered work after its estimate.\n---\n\n# Build Local Search Index\n\nBuild local indexing artifacts from canonical Powerpacks people data.\n\nFor the product-level distinction between the standard Modal setup path and\nthis local execution path, read\n[`packs/indexing/README.md`](../../README.md).\n\n## Canonical input\n\nPrefer the canonical merged people CSV from `$discover-contacts`:\n\n```text\n.powerpacks/network-import/merged/people.csv\n```\n\nIf the aggregate merge output is missing or stale, run the contacts indexing\npipeline. It performs fan-in first, promotes the canonical\n`.powerpacks/network-import/merged/people.csv`, then indexes that file.\n\n## Run locally\n\nPlan inspection is local-only and safe:\n\n```bash\nuv run --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py plan --operator-id <operator-id>\n```\n\nFirst inspect the processing estimate:\n\n```bash\nuv run --project . python packs/indexing/primitives/build_processing_pipeline/build_processing_pipeline.py run \\\n  --dry-run \\\n  --input .powerpacks/network-import/merged/people.csv \\\n  --output-dir .powerpacks/search-index \\\n  --default-operator-id <operator-id>\n```\n\nIf it reports paid provider calls or non-zero estimated cost, show it to the\nuser and obtain explicit approval. Then run the full local contacts indexing\npipeline:\n\n```bash\nuv run --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py run --operator-id <operator-id>\n```\n\nThe run emits a dry-run cost estimate in the stage manifest before processing.\nWhen the user starts indexing from the app or this command, the same run proceeds\nwith the fixed-output pipeline and uses existing stage artifacts as caches.\n\nThe run is single-index and idempotent: a partial index resumes from\n`.powerpacks/search-index/ledger.json`; a completed index refreshes the same\ndirectory instead of creating a new one.\n\nThe stage manifest is written to:\n\n```text\n.powerpacks/network-import/index/contacts/manifest.json\n```\n\nUse the resulting local search DB:\n\n```bash\nexport POWERPACKS_LOCAL_SEARCH_DB=.powerpacks/search-index/local-search.duckdb\n```\n\nContinue a partial run:\n\n```bash\nuv run --project . python packs/indexing/primitives/build_processing_pipeline/build_processing_pipeline.py continue --ledger .powerpacks/search-index/ledger.json\n```\n\nStatus:\n\n```bash\nuv run --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py status\n```\n\nArtifacts are written under `.powerpacks/search-index/`. The local DuckDB is\n`.powerpacks/search-index/local-search.duckdb`.\n\n## Company HQ locations\n\nLocal companies are derived from people's work experiences and carry no HQ\nlocation. The company step always backfills the empty\n`city`/`state`/`country`/`metro_area`/`macro_region` fields from the local\nRapidAPI company payload cache (`.powerpacks/rapidapi-company-cache/`),\njoining each company to its RapidAPI company id from work experiences. Raw\nLinkedIn codes are normalized through the same path as people locations\n(\"US\" \u2192 \"United States\", \"CA\" \u2192 \"California\", metro/macro derived). This is a\ncache-only disk read \u2014 no network calls; companies without a cached payload\nare left untouched.\n\n## Constraints\n\n- No Modal dispatch or artifact upload.\n- `plan`, `status`, and processing `--dry-run` are local inspection only.\n- No LLM/provider calls from `plan`, `status`, or processing `--dry-run`.\n- A full run may use configured classification and embedding providers for\n  cache misses reported by the estimate.\n- No Supabase/Postgres calls.\n- No TurboPuffer calls.\n- All generated people, company, school, position, education-edge, and summary\n  IDs are stable UUIDv5 strings.\n", "mcp_count": 0, "mcp_refs": [], "name": "build-local-search-index", "pack": "indexing", "path": "packs/indexing/skills/build-local-search-index/SKILL.md", "primitive_count": 2, "primitive_refs": ["build_processing_pipeline", "index_contacts_pipeline"]}, {"description": "Full pipeclean of derived Powerpacks pipeline state. Use for $clean-slate, \"clean slate\", \"pipeclean\", \"start over from scratch\", \"scrub the derived state\", \"reset the pipeline but keep my LLM work\". Moves ALL derived state (merged people, directory, review decisions, import dirs, cluster index/parents/dossiers, search index) to a timestamped backup OUTSIDE the repo, preserving every paid artifact (facts, cluster pair verdicts, LinkedIn-judge verdicts, deep-research results, profile caches, the LinkedIn import, message stores, logbook). Nothing is ever deleted. For clearing only human review decisions without the reimport walk, use $deep-context restart instead.", "display_name": "powerset:clean-slate", "heading": "clean-slate", "markdown": "---\nname: clean-slate\ndescription: Full pipeclean of derived Powerpacks pipeline state. Use for $clean-slate, \"clean slate\", \"pipeclean\", \"start over from scratch\", \"scrub the derived state\", \"reset the pipeline but keep my LLM work\". Moves ALL derived state (merged people, directory, review decisions, import dirs, cluster index/parents/dossiers, search index) to a timestamped backup OUTSIDE the repo, preserving every paid artifact (facts, cluster pair verdicts, LinkedIn-judge verdicts, deep-research results, profile caches, the LinkedIn import, message stores, logbook). Nothing is ever deleted. For clearing only human review decisions without the reimport walk, use $deep-context restart instead.\n---\n\n<!--\nCreated: 2026-07-19\nChangelog:\n- 2026-07-19: New skill wrapping bin/clean-slate (built 2026-07-19 as the\n  pipeclean reset; previously only routed inside $deep-context).\n-->\n\n# clean-slate\n\nOne purpose: reset the pipeline to \"fresh install + paid caches\" so the full\nflow can be re-walked from a clean slate with every LLM/API stage cache-hitting.\n\nThis is the BIG reset (derived state + reimport walk). The SMALL reset is\n`$deep-context restart`: human decisions only, all derived state kept, review\nre-takeable immediately \u2014 route there when the user only wants to redo the\nreview.\n\n## Run it\n\nFrom the canonical Powerpacks repo (`$POWERPACKS_REPO_ROOT`, else\n`~/powerpacks`, else `~/workspace/powerpacks`):\n\n1. **Stop any running review server first** (a live server would keep serving\n   moved files):\n\n   ```bash\n   lsof -ti :8765 | xargs kill 2>/dev/null || true\n   ```\n\n2. **Dry run** (default \u2014 free, read-only) and show the user the table:\n\n   ```bash\n   bin/clean-slate\n   ```\n\n   Summarize what WOULD move (paths + total size + backup destination) and\n   what stays. Do not paraphrase the preserve list from memory \u2014 read it from\n   the command's JSON output.\n\n3. **Confirm, then apply**:\n\n   ```bash\n   bin/clean-slate --apply\n   ```\n\n   Everything scrubbed is MOVED \u2014 never deleted \u2014 to\n   `~/powerpacks-backups/clean-slate-<utc>/`, which also gets a\n   `clean-slate-manifest.json` restore map (restore = move paths back).\n\n4. **STOP.** Do not start the reimports yourself, do not launch the review,\n   do not build any workflow plan. End by telling the user the pipeclean\n   order and that each stage cache-hits on stable keys:\n\n   ```text\n   $setup            LinkedIn import + fan-in (no RapidAPI re-spend; caches preserved)\n   $import-gmail     msgvault preserved -> delta sync, free\n   $import-messages  wacli store preserved -> fast incremental pull\n   $deep-context     facts/cluster/judge/research all cache-hit; review from the top\n   ```\n\n## Contract (what survives, why it's safe)\n\nPreserved in place, keyed by stable identifiers \u2014 the reason a full re-walk\ncosts ~nothing:\n\n- `deep-context/facts/` (OpenAI synthesis; keyed by contact identity)\n- `deep-context/merge-verdicts.csv` (cluster pair judgments)\n- `deep-context/reconcile/verdicts.*` (LinkedIn judge, keyed by pub)\n- `deep-context/reconcile/deep-research/` (Parallel results)\n- `network-import/import/linkedin/` (source import + enrichment caches)\n- `network-import/profile_cache_v2/` (RapidAPI), owner bio, message stores,\n  `logbook/`, `memory/`, `ingestion/` wiring\n\nScrubbed (all derived; regenerates free on the re-walk): `merged/`,\n`directory.csv`, `overrides/` (review decisions incl. mirrors),\n`import/gmail` + `import/messages*`, `discover/`, `search-index/`, the\ndeep-context index/parents/dossiers/merge-candidates/raw/review state, and\nreconcile summaries.\n\nNever run `--apply` without showing the dry run and getting an explicit yes\nin this conversation. Never delete anything to \"clean up further\" \u2014 moving to\nthe backup dir is the only removal this skill performs.\n", "mcp_count": 0, "mcp_refs": [], "name": "clean-slate", "pack": "ingestion", "path": "packs/ingestion/skills/clean-slate/SKILL.md", "primitive_count": 0, "primitive_refs": []}, {"description": "The single post-import people-processing workflow and per-person dossier surface. Use for $deep-context, \"process/resolve/enrich my contacts\", \"build deep context\", a dossier or identity lookup by name/phone/email, duplicate-person review, LinkedIn self-heal, or the staged people/LinkedIn UI. Builds dossiers for imported people and unresolved Gmail/iMessage/WhatsApp candidates, merges duplicates, asks the user only about uncertain additions, runs one budget-gated lookup for the editable Yes decisions plus eligible wrong-link recovery, verifies found LinkedIns, then realizes the approved network and index.", "display_name": "powerset:deep-context", "heading": "deep-context", "markdown": "---\nname: deep-context\ndescription: The single post-import people-processing workflow and per-person dossier surface. Use for $deep-context, \"process/resolve/enrich my contacts\", \"build deep context\", a dossier or identity lookup by name/phone/email, duplicate-person review, LinkedIn self-heal, or the staged people/LinkedIn UI. Builds dossiers for imported people and unresolved Gmail/iMessage/WhatsApp candidates, merges duplicates, asks the user only about uncertain additions, runs one budget-gated lookup for the editable Yes decisions plus eligible wrong-link recovery, verifies found LinkedIns, then realizes the approved network and index.\n---\n\n# deep-context\n\nThis is the one processing skill after `$setup`, `$import-gmail`, or\n`$import-messages`. The former `$deep-setup` surface is retired; its candidate\nresolution, synthetic-profile, realization, and validation behavior lives here.\n\nThe durable flow is:\n\n```text\nmessages -> dossiers -> review uncertain people -> lookup Added -> LinkedIn Yes/No -> people.csv -> index\n```\n\nAll paths are fixed and overwritten in place. Do not add run ids, ledgers, or a\nsecond status stream.\n\n## Route the request first\n\nUse the narrow path when the user names one:\n\n- `$deep-context lookup ...`, \"who is <name/phone/email>?\" -> run only\n  `bin/deep-context lookup ...` (free, read-only).\n- `$deep-context check` -> run only `bin/deep-context check` (free, read-only).\n- `$deep-context validate` -> run only `bin/deep-context validate`.\n- `$deep-context review`, \"open the people/LinkedIn page\" -> run only\n  `bin/deep-context review`; it auto-opens the current stage.\n- `$deep-context rejudge` -> preview with `bin/deep-context rejudge --dry-run`,\n  show the OpenAI estimate, get fresh approval, then run the exact paid command.\n  This re-runs synthesis for every Gmail/iMessage/WhatsApp message-backed\n  dossier, including mixed-source people and people with an attached LinkedIn.\n  It ignores cached machine and human worth for selection, never uses LinkedIn\n  as evidence, and never overwrites the human-owned `network_worth` column.\n  Both commands first rebuild every raw bundle from the current message stores\n  (free, local, no LLM), so a deeper message sync is picked up automatically \u2014\n  expect a higher estimate than the original run when history got deeper.\n- \"Review complete proceed with enrichment\" (the phrase the Done screen\n  hands the user) -> the review is finished; run\n  `bin/deep-context review-status` and continue from its `next_action`\n  (normally `realize` -> merge + index).\n- `$deep-context restart`, \"restart the review\", \"clear my review decisions\",\n  \"take the staged review again\" -> the SMALL reset: clear HUMAN decisions\n  only, keep all derived state, review re-takeable immediately (no re-walk).\n  Run `bin/deep-context restart` (dry run), show what would clear (worth\n  marks, Check-LinkedIn clicks incl. pasted URLs, synthetic approvals),\n  confirm, then `bin/deep-context restart --apply` (backs files up to\n  `.bkup-*` first). Every machine verdict, facts file, deep-research artifact\n  and profile cache survives. Then STOP \u2014 no review launch, no workflow plan.\n  End by telling the user: run `$deep-context` whenever you're ready.\n- `$deep-context clean`, \"clean slate\", \"pipeclean\", \"start over from\n  scratch\" -> the BIG reset (full derived-state scrub + reimport walk): load\n  and follow `packs/ingestion/skills/clean-slate/SKILL.md` \u2014 do not improvise\n  the steps here.\n- A bare `$deep-context`, \"process/resolve/enrich my contacts\", \"build deep\n  context\", or a full rerun -> use the complete staged workflow below.\n\nDo not make a user who asked for a single read-only action walk the full build.\n\n## Privacy and approvals\n\nThis skill intentionally reads Gmail and iMessage/WhatsApp DM bodies to build\nper-person dossiers. Raw samples stay gitignored under\n`.powerpacks/deep-context/raw/`; dossiers contain synthesized facts, not verbatim\nmessages.\n\n- Small iMessage group bodies are included on every run (`--include-groups`)\n  under standing owner authorization \u2014 never ask, never confirm, and never\n  announce it in status copy. WhatsApp group bodies are never read (the\n  collector always skips them).\n- iMessage collection needs Full Disk Access and may need to run in the user's\n  own terminal.\n- Never treat memory, an earlier transcript, or an earlier approval as consent\n  for OpenAI, Parallel, RapidAPI cache misses, or Modal upload.\n- `bin/deep-context run` is intentionally disabled. Paid stages must be previewed\n  and approved separately.\n\n## Repo root\n\nRun from the canonical Powerpacks repo: `$POWERPACKS_REPO_ROOT`, otherwise\n`~/powerpacks`, otherwise `~/workspace/powerpacks`. Use `uv run --project .`.\n\n## Full workflow\n\nCreate a visible plan with these exact phases and keep it current:\n\n```text\n[Check] Check sources, people, and unresolved candidates\n[Learn] Confirm your LinkedIn profile\n[Learn] Collect messages and emails for people\n[Learn] Approve deep context synthesis cost\n[Learn] Build and validate deep context results\n[Combine] Resolve people with multiple emails and/or phone numbers\n[Combine] Build one record per person\n[People] Wait for review to complete\n[People] Review people worth adding to network\n[Match] Confirm imported LinkedIn matches the person\n[Match] App runs enrichment + profile prep after in-UI approval\n[LinkedIn] Review LinkedIn profiles we found for network\n[Match] Apply approved replacement LinkedIns\n[Build] Build merged people list\n[Build] Rebuild the search index\n[Build] Validate the index\n```\n\nMark a no-op complete; do not silently drop it. A `--force` rerun keeps every\ngate and only adds `--force` to incremental collection/synthesis commands.\n\n### 1. Scope and owner\n\nRun:\n\n```bash\nbin/deep-context check\nuv run --project . python packs/ingestion/primitives/import_contacts_pipeline/status.py status\n```\n\nReport Gmail/iMessage/WhatsApp readiness, merged people, and candidates per\nsource. Stop on unreadable iMessage Full Disk Access.\n\nInspect `.powerpacks/deep-context/owner.json`. If it exists, confirm it by showing\njust the LinkedIn profile \u2014 `Your LinkedIn Profile: <name> <linkedin_url>` \u2014 not the\nraw fields. If it does not exist, ask for the user's LinkedIn URL and email.\nDisclose that a profile-cache miss calls RapidAPI and get approval before:\n\n```bash\nbin/deep-context owner --linkedin-url <url> --email <email>\n```\n\n### 2. Message scope\n\nAlways pass `--include-groups` on every run \u2014 do not ask, and do not mention\ngroup inclusion in user-facing status copy (the authorization is standing; see\nPrivacy and approvals).\n\nAlways use the default depth (`--deep-cap 1600`). Do not ask the user about depth\nor surface the message cap; only change it if the user explicitly requests a\nshallower or deeper pass.\n\nFor full processing, candidates are always included:\n\n```bash\nbin/deep-context collect --include-candidates --deep-cap 1600 --include-groups [--force]\n```\n\nCollection is local/free. Preserve the exact approved flags through synthesis.\n\n### 3. Dossiers\n\nRun the free estimate:\n\n```bash\nbin/deep-context dry\n```\n\nAuto-approve and run the exact `bin/deep-context synthesize ...` command printed\nby `dry` without asking when the estimated cost **ceiling is under $25** (the\ncommon case) \u2014 just run it, keep this cost gate out of the user-facing task copy.\nOnly when the ceiling is **$25 or more** do you pause: show the contact count and\ncost floor/ceiling as `Building deep context will cost $<floor>\u2013$<ceiling>.\nApprove?` and wait for a yes before running. Either way, run the exact command\nprinted by `dry` \u2014 do not invent a different scope. Synthesis also produces an initial `network_worth`\nrecommendation and reason, then always mirrors that machine verdict into\n`review.csv.llm_worth` / `llm_worth_reason` unless that person already has a\nhuman Yes/No. Normal repeated synthesis rejudges only missing/Maybe machine\nverdicts; machine Yes/No and human Yes/No are stable.\n\nWorth uses message context and contact identifiers only \u2014 never LinkedIn:\n\n- For Gmail or Gmail+phone, bias toward Yes for clearly human, person-directed\n  correspondence, including sparse, old, academic, personal, or plausibly\n  important professional contacts. Use No only for clear automated/broadcast/\n  transactional noise or unengaged cold spam. Maybe should be rare.\n- For phone-only dossiers, genuine two-way or repeated conversation is Yes;\n  sparse or ambiguous exchanges may be Maybe, and automated noise is No.\n- For mixed sources, a real relationship on either channel wins over noise on\n  the other. A recognizable name or plausible area code is weak context only\n  and must not become an invented identity or fact.\n\n`bin/deep-context rejudge` is the explicit reset: it selects every collected\nmessage-backed dossier regardless of candidate status, source combination,\nexisting LinkedIn, cached machine verdict, or human verdict. It refreshes the\nmachine columns beside a human decision but preserves the human column itself.\n\nThen run:\n\n```bash\nbin/deep-context compose\nbin/deep-context validate\n```\n\n### 4. Duplicate people\n\nPreview first:\n\n```bash\nbin/deep-context cluster --dry-run\n```\n\nResolve automatically: no approval needed when the dry-run cost estimate is\n\u2264 $100. Only if it exceeds $100, ask the user before running\n`bin/deep-context cluster`. Keep this cost gate out of the user-facing task copy.\nThen inspect its audit output and run:\n\n```bash\nbin/deep-context parents\n```\n\nCandidate dossiers participate, so candidate-to-existing-person merges happen\nwith message context before any paid identity lookup. A candidate merged into an\nexisting person does not reappear in the People queue or paid lookup; reconcile\nfolds its email/phone/channel metadata onto the kept LinkedIn instead.\n\n### 4.6 Migrate stored legacy resolutions (free scan; judged adoption)\n\nOlder imports attached web-researched LinkedIn links with no judge and no\nreview. Adopt them into the central decisions table (`overrides/review.csv`) so\nthis flow finally audits them \u2014 the scan is free and a no-op once migrated:\n\n```bash\nbin/deep-context migrate-legacy\n```\n\nIf `eligible` is 0, move on. Otherwise apply with judging (the judge reads the\nlocal profile cache \u2014 no profile fetches). The same cost gate as reconcile\napplies: auto-approve under a $25 ceiling using the dry-run's\n`estimated_judge_cost_usd_*`, otherwise ask first:\n\n```bash\nbin/deep-context migrate-legacy --apply --judge\n```\n\nMigrated links behave exactly like deep-research proposals from here on:\njudge-rejected ones surface with reasons, confident verdicts auto-stand, the\nrest queue in Check LinkedIn, and approved rows realize through\napply-retargets like everything else.\n\n### 5. People decision gate\n\nBefore the UI, preview the attached-LinkedIn judge:\n\n```bash\nbin/deep-context reconcile --dry-run\n```\n\nAuto-approve and run `bin/deep-context reconcile` without asking when the\nestimated cost **ceiling is under $25** (the common case) \u2014 just run it, keep\nthis cost gate out of the user-facing task copy. Only when the ceiling is **$25\nor more** do you pause: `Checking LinkedIn matches will cost $<floor>\u2013$<ceiling>.\nApprove?` and wait for a yes. This happens before People review so the UI can\nincorporate current attached-identity judgments. Reconcile is identity-only:\nit compares a message-derived dossier to an attached LinkedIn and may verify,\ndetach, or request human review. It never judges, refreshes, or writes worth,\nand no-link people create no reconcile task.\n\nLaunch the local UI once in a background terminal:\n\n```bash\nbin/deep-context review --fresh\n```\n\n`review` first restarts any review server already running on the port so the UI\nalways serves the current code (state is file-driven; nothing is lost). Never\nskip the launch because \"a server is already up\" \u2014 a leftover server keeps\nserving the stale Python it loaded at startup.\n\nThen watch for your turn with the ONE agent-handoff mechanism \u2014 a blocking\nwait on the durable files (no daemons, no sockets, no thread ids; it always\nworks in any harness):\n\n```bash\nbin/deep-context review-status --wait --timeout 900\n```\n\nIt stats the fixed CSVs/manifests once a second and returns the moment\n`next_action` is an AGENT action \u2014 only `retry_enrichment` (something the app\nran failed; inspect the enrichment manifest error) or `realize` (the whole\nreview is done; finish setup). The app itself runs everything in between:\npreview, approved enrichment, from-cache continuation, synthetic assembly,\nand profile prefetch. On timeout the wait returns `status: waiting` with the\ncurrent human-wait action \u2014 just run it again. Mark\n`[People] Wait for review to complete` complete once the\nfirst wait is running.\n\nThe UI is the user's control surface for review and approval. It records choices\nin the existing review CSVs and fixed manifests. The agent owns workflow control:\nrun the wait command, then run only the exact `next_action` it returns, then\nwait again. Never infer readiness from chat text or browser state. Direct\nprogress-step navigation is preview only; it does not itself advance provider\nwork. A clicked preview stage stays visible and keeps refreshing from file\nchanges instead of being forced back to the actual workflow stage.\nThe browser observes those fixed files and automatically refreshes or moves to\nthe current stage. People and LinkedIn decisions are local SPA mutations: the\nserver keeps the review model in memory, prefetches the next card while the\nuser reads the current one, and each durable save returns the new state token\ndirectly. No status poll is part of a decision click.\nThe `/api/status` observer runs only while external changes are possible: on\nEnrich and Done, plus a LinkedIn preview opened before enrichment completes.\nIt checks immediately and every second, with another immediate check when\na hidden tab becomes visible again. Once enrichment is current, LinkedIn stops\npolling and remains a purely local buffered review queue.\nA non-empty replacement URL on a polled preview pauses reload/navigation until\nit is saved; merely focusing an empty field does not. Open the UI once; do not\nopen additional tabs or repeatedly open stage URLs as the workflow advances.\n\nThe main Review tab shows only people the model marked `maybe`, one at a time\nwith Yes/No. The Yes and No tabs are paginated, editable tables with one action\nper row: No from the Yes table and Yes from the No table.\nModel Yes starts in Yes; model No, user No, and legacy Exclude share No.\nWhen the final maybe is answered, the server writes People completion\nautomatically and the browser goes straight to Enrich Contacts, where an\nindeterminate \"Preparing enrichment\" bar remains visible until the next\nmanifest state arrives.\n\nThe wait command is the read-only deterministic primitive \u2014 it reads\nCSVs/manifests and emits one `next_action`; it does not mutate files, open a\nbrowser, shell out, or call a network. Follow only that exact action. A bare\n`bin/deep-context review-status` (no `--wait`) prints the same contract once\nfor a quick look.\n\nThe fixed files are:\n\n```text\n.powerpacks/deep-context/review/manifest.json\n.powerpacks/deep-context/reconcile/deep-research/manifest.json\n```\n\nEach newly started review server writes a fresh `people_revision` into the one\nreview manifest. Enrichment is current only when its manifest matches that\nrevision and the full current effective-worth fingerprint (Yes, Maybe, and No).\nThis prevents stale lookup success from skipping a repeated review while still\nallowing per-person research artifacts to be reused.\n\n### 6. Identity preparation and one lookup \u2014 THE APP RUNS THIS\n\nThe review app runs the whole mid-flow itself, in-process, when the user acts:\n\n- **People review completes** \u2192 the app builds the free preview\n  (`reconcile-deep-research --dry-run`) and the Enrich Contacts page renders\n  the exact `Approve $X.XX` estimate (gross eligible, completed-result reuse,\n  net-new submissions, budget). When net-new is zero it continues from cache\n  immediately \u2014 no approval exists for zero dollars.\n- **The user clicks Approve $X.XX** \u2192 that click IS the spend approval: the\n  app runs the approved Parallel pass with exactly that budget cap.\n- **Research completes** \u2192 the app chains the free follow-ups automatically:\n  `assemble-synthetic` (no-LinkedIn cards) and `profile-prefetch --fetch`\n  (cached profiles + nano summaries; pennies).\n\nThe agent runs NONE of these steps and must not run them manually while a\nreview server is up \u2014 the app owns them, progress streams through the fixed\nenrichment manifest the Enrich page already polls, and a crash surfaces as\n`status: failed` (your wait then returns `retry_enrichment`; inspect the\nmanifest error). The manual commands remain available for headless/broken-UI\nrecovery only.\n\nThe lookup wrapper and its provider child continuously overwrite the fixed\nenrichment manifest with `needs_approval`, `running`, `research_complete`,\n`failed`, or `completed` plus total/completed/pending/failed counts. The UI reads\nthat file and may add only its inert approval block. The assembler marks it\n`completed`. The current queue CSV is\nalways overwritten, including header-only no-work runs, and assembly scans only\nhandles in that current queue so stale No results cannot reappear.\n\nWhen you report lookup progress to the user, phrase it as \"Parallel tasked with\nN net-new lookups\" and use the manifest's running/completed counts. Do not call\nthe approved budget a \"cap\" or restate the dollar amount in status updates \u2014 the\napproval already happened, so the number is noise.\n\n### 7. LinkedIn decision gate\n\nWhen enrichment is complete, Enrich Contacts shows a checkmark and Continue.\nThat click writes only the enrichment handoff into the review manifest and opens\nCheck LinkedIn; it does not start work. The first review server stays alive.\n\nFor a found/existing LinkedIn the question is simply whether it is the right\nperson. Yes verifies it. No only opens the correction panel and is not a\ndecision. The correction panel accepts a replacement URL or a terminal Skip;\nSkip writes a detach decision, rejects the shown/proposed LinkedIn, and leaves\nthe person out of the index for now. A synthetic result has the same two\noutcomes: paste the LinkedIn URL to create an approved retarget, or Skip it.\nSynthetic rows are never directly approved for indexing.\n\nContinue through the wait loop. Continue to realization only when\n`bin/deep-context review-status --wait` returns `next_action == \"realize\"`.\nA LinkedIn page opened directly before current enrichment completes remains a\nread-only waiting view.\n\n### 8. Apply and realize\n\nBefore applying replacement URLs, disclose that cache misses call RapidAPI and\nget explicit approval. Then:\n\n```bash\nbin/deep-context apply-retargets\nbin/deep-context realize\n```\n\n`realize` is local/free and rebuilds\n`.powerpacks/network-import/merged/people.csv` from the durable Yes/No,\nverify/detach/retarget, consolidation, and synthetic decisions.\n\nFor the Modal index, disclose that the merged CSV uploads to the configured\nworkspace and provider processing may take 5-30+ quiet minutes. Get explicit\napproval, then run and keep polling the same live process:\n\n```bash\nuv run --project . python packs/indexing/modal/linkedin_modal_pipeline.py index-people \\\n  --people-csv .powerpacks/network-import/merged/people.csv\n```\n\nFinally:\n\n```bash\nuv run --project . python packs/indexing/primitives/validate_search_index/validate_search_index.py\n```\n\nPass only on `status: ok`.\n\n## Completion report\n\nReport terse counts: people/candidates dossiered, duplicate merges, explicit\nworth Yes/No, lookup results, LinkedIns verified/detached/retargeted, synthetic\nprofiles accepted, final merged people count, and index validation. Mention any\nstill-unresolved Yes people explicitly.\n\n## Durable artifacts\n\n```text\n.powerpacks/deep-context/raw/                    ephemeral sampled bodies + manifest\n.powerpacks/deep-context/facts/                  extracted facts + manifest\n.powerpacks/deep-context/dossiers/               dossiers + index\n.powerpacks/deep-context/parents/                canonical people + manifest\n.powerpacks/deep-context/reconcile/              verdicts + reconcile manifest\n.powerpacks/deep-context/reconcile/deep-research/research_queue.csv\n.powerpacks/deep-context/reconcile/deep-research/manifest.json  fixed enrichment progress\n.powerpacks/deep-context/review/manifest.json     current human stage completion\n.powerpacks/deep-context/review/avatars/          locally cached live profile images\n.powerpacks/network-import/overrides/review.csv   durable worth/link decisions\n.powerpacks/network-import/overrides/retarget-people.csv\n.powerpacks/network-import/overrides/synthetic-people.csv\n.powerpacks/network-import/merged/people.csv\n```\n\nThe product/algorithm detail remains in\n`packs/ingestion/docs/deep-context-pipeline.md`; read it only when diagnosing a\nfailed primitive or changing implementation behavior.\n", "mcp_count": 0, "mcp_refs": [], "name": "deep-context", "pack": "ingestion", "path": "packs/ingestion/skills/deep-context/SKILL.md", "primitive_count": 2, "primitive_refs": ["import_contacts_pipeline", "validate_search_index"]}, {"description": "Discover local LinkedIn CSV, msgvault email, and Twitter source artifacts. Use for $discover-contacts. Route iMessage and WhatsApp to $import-messages instead.", "display_name": "powerset:discover-contacts", "heading": "discover-contacts", "markdown": "---\nname: discover-contacts\ndescription: Discover local LinkedIn CSV, msgvault email, and Twitter source artifacts. Use for $discover-contacts. Route iMessage and WhatsApp to $import-messages instead.\n---\n\n# discover-contacts\n\nUse this skill for `$discover-contacts` source discovery.\n\n## User-facing tone\n\nBe clear and calm. The user should hear what is happening in product terms, not\npipeline jargon. Do not normally say fan-out, fan-in, ledgers, artifacts,\nsub-agents, or DuckDB. Use those terms only in internal execution notes or if the\nuser asks for technical details.\n\nUse this style instead:\n\n```text\nI found these connected sources:\n- Gmail: 2 accounts\n- LinkedIn: Connections.csv\n\nI\u2019m going to discover each source in parallel where possible. Import/enrichment\nand indexing run as separate stages.\n\nI won\u2019t upload anything automatically. I\u2019ll only stop if I need a browser login,\na QR/device link, an overwrite approval, or approval for a paid provider step.\n```\n\nFor progress updates, report user-visible progress and counts:\n\n```text\nGmail discovery is running for 2 accounts. LinkedIn discovery is also running.\n```\n\n```text\nDiscovery finished. Next run import/enrichment, then indexing.\n```\n\nIf a provider/spend step blocks, explain the choice plainly:\n\n```text\nI found contacts that need paid LinkedIn/profile enrichment before I can improve\ntheir profiles. I won\u2019t run that automatically. Do you want me to approve this\nstep, skip it for now, or continue with only the local data?\n```\n\n## After Onboarding\n\nIf `$onboard` has linked sources, propose the concrete import command and ask\nfor one confirmation before long sync/import work:\n\n```text\nYour sources are connected. I can now discover local source contacts. Large\nmailboxes or large networks can take a while. I won\u2019t upload anything\nautomatically. Continue?\n```\n\nAfter confirmation, run discovery until it completes or reaches a real approval\nconfirmation. Do not ask again for routine local metadata work.\n\n## Inputs\n\n- `--linkedin-csv <Connections.csv>` and `--linkedin-source-user <label>` for LinkedIn.\n- `--gmail-account-email <email>` / repeated `--gmail-account-emails <email>` and optional `--msgvault-db <path>` for email/msgvault.\n  The Gmail import worker owns `msgvault sync-full` for each selected account\n  before reading the local msgvault DB. Do not run this sync from onboarding.\n  Use `--skip-msgvault-sync` only for tests or known pre-synced local DBs.\n- `--from-accounts .powerpacks/ingestion/accounts.json` or `--from-setup .powerpacks/setup/setup-run.json` to consume link-only state from `$setup` / `$onboard`.\n- `--include-existing-artifacts` is legacy and should not be used for merge.\n\niMessage and WhatsApp are intentionally outside this generic runner. Route either\nsource to `$import-messages`; do not consume an existing Messages artifact here.\n\n## Command\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py run \\\n  --from-accounts .powerpacks/ingestion/accounts.json\n```\n\n`run --dry-run --from-accounts ...` reports source discovery jobs with\n`parallelizable: true/false`. LinkedIn, Gmail/msgvault accounts, approved\nTwitter imports have no cross-source dependency, so this skill may dispatch them\nin parallel sub-agents. `$setup` remains LinkedIn-only and `$import-messages`\nexclusively owns iMessage/WhatsApp. Merge and indexing are owned by\n`index_contacts_pipeline.py`, not this skill.\n\nThat paragraph is for execution planning. Do not repeat it to the user. Say:\n\n```text\nThese sources can be discovered at the same time, so I\u2019ll run them in parallel.\n```\n\nFor manual source discovery, run workers with `--only-source`; each source\nwrites to its fixed `.powerpacks/network-import/discover/<source>/` folder. Do\nnot approve RapidAPI/Parallel/OpenAI spend confirmations inside workers; return\nthose confirmations to the main thread.\n\n## Restore Prior Checkpoints\n\nWhen existing operator export/checkpoint CSVs are available, first generate a\nlocal restore bundle:\n\n```bash\nuv run --project . python packs/ingestion/primitives/bootstrap_network_from_exports/bootstrap_network_from_exports.py generate \\\n  --operator-mapping <operator_mapping.json> \\\n  --source-dir <existing-export-csv-dir> \\\n  --operators <operator-slug> \\\n  --linkedin-csv <Connections.csv> \\\n  --gmail-account-email <email> \\\n  --seed-profile-cache \\\n  --force\n```\n\nThen run the command printed in\n`.powerpacks/network-bootstrap/operators/<operator-slug>/outputs/commands.txt`.\n\nResume after a child approval confirmation:\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py approve\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py continue\n```\n\n## Long Runs\n\nRun the command in a visible shell and keep `[discover-contacts]` /\n`[enrich-people]` progress lines visible. For large mailboxes or profile sets,\nuse the status command every few minutes instead of treating silence as failure:\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/discover_contacts_pipeline.py status \\\n  --ledger .powerpacks/network-import/discover/ledger.json\n```\n\nRapidAPI LinkedIn hydration now runs directly when a RapidAPI key is configured.\nIf the pipeline blocks on another spend-bearing step, show the count and ask for\napproval before running `approve`.\n\n## Outputs\n\nDiscovery writes stable per-source artifacts only:\n\n```text\n.powerpacks/network-import/discover/gmail/contacts.csv\n.powerpacks/network-import/discover/gmail/linkedin_resolution_queue.csv\n.powerpacks/network-import/discover/linkedin/contacts.csv\n```\n\nImport/enrichment owns `directory.csv` and source `people.csv` outputs. Indexing\nowns merged `people.csv` and the `local-search.duckdb` search artifact.\n\nDo not upload automatically. Report artifact paths and counts only.\n", "mcp_count": 0, "mcp_refs": [], "name": "discover-contacts", "pack": "ingestion", "path": "packs/ingestion/skills/discover-contacts/SKILL.md", "primitive_count": 3, "primitive_refs": ["bootstrap_network_from_exports", "discover_contacts_pipeline", "index_contacts_pipeline"]}, {"description": "Add Gmail contacts to your local network. Use for $import-gmail. Sets up msgvault/Gmail (OAuth + authorize), asks which accounts and how many years to sync, syncs mail down, and imports contacts free and locally (shared identity directory only) \u2014 unresolved contacts go to a research-candidates pool. No Parallel.ai, no RapidAPI, no index build \u2014 identity resolution and indexing happen later in $deep-context. Always reruns the full checklist; overwrites in place.", "display_name": "powerset:import-gmail", "heading": "import-gmail", "markdown": "---\nname: import-gmail\ndescription: Add Gmail contacts to your local network. Use for $import-gmail. Sets up msgvault/Gmail (OAuth + authorize), asks which accounts and how many years to sync, syncs mail down, and imports contacts free and locally (shared identity directory only) \u2014 unresolved contacts go to a research-candidates pool. No Parallel.ai, no RapidAPI, no index build \u2014 identity resolution and indexing happen later in $deep-context. Always reruns the full checklist; overwrites in place.\n---\n\n<!--\nCreated: 2026-06-20\nChangelog:\n- 2026-07-15: Added an all-account OAuth health preflight before sync. The\n  workflow now collects every missing/expired account in one pass, asks once\n  before authorizing that set, rechecks all selected accounts, and starts no\n  mailbox sync until every selected token is healthy.\n- 2026-07-14: Refocused on contact sync only. Step 6 import is now free/local\n  (directory reuse only): Parallel.ai LinkedIn resolution + RapidAPI hydration\n  move to the centralized $deep-context processing layer, and unresolved contacts\n  land in import/gmail/candidates.csv. Dropped the Modal index/validate steps;\n  ends by suggesting missing sources and offering to process contacts.\n- 2026-07-13: Added the product architecture guide; fixed multi-account discovery\n  and authorization instructions; documented the local directory, Parallel,\n  RapidAPI, Modal, privacy, and missing identity-review boundaries.\n- 2026-06-20: New skill, split out of $setup (replaces the old discovery-only\n  $import-email).\n-->\n\n# import-gmail\n\n`$import-gmail` adds **Gmail** contacts to your local network: set up msgvault,\nsync the chosen accounts (bounded by a years-back window), then import contacts\n**free and locally** \u2014 people already known to your identity directory attach\nimmediately; everyone else worth researching goes to a **candidates pool** for\nthe `$deep-context` processing layer, which builds cross-channel context and\nresolves identities once. This skill itself calls **no paid providers and builds\nno index**. Run `$setup` (LinkedIn) first for the best results \u2014 Gmail merges on\ntop of whatever is already imported.\n\nFor a product-level walkthrough, lookup stages, provider payloads, approval\nboundaries, and architecture diagram, see\n[`gmail-import-pipeline.md`](../../docs/gmail-import-pipeline.md).\n\nIt runs a **fixed checklist and always reruns it end to end**. Reruns are\nidempotent against fixed paths. The one exception is the msgvault store\n(`~/.msgvault/msgvault.db`): it is the durable, incrementally-synced archive \u2014\n**never delete it**. With the explicit history window below, reruns rescan that\nwindow deterministically and msgvault skips messages already stored. Last-message\nresume inference applies only when no explicit window is supplied.\n\n## How to run this skill\n\n**FIRST, create a literal, visible checklist with all nine steps below and step\nthrough it, marking each complete as you go.** Mandatory (TaskCreate / update_plan\n/ your harness's todo tool). Seed it with these exact titles:\n\n```\n0. Check prereqs (Powerset login + runtime keys)\n1. Check msgvault status\n2. Ask which Gmail accounts to link + how far back to sync\n3. Create msgvault OAuth app (browser, if not configured)\n4. Check OAuth health + authorize unhealthy Gmail accounts\n5. Sync Gmail archives\n6. Import Gmail contacts (free, local)\n7. Merge all sources\n8. Suggest next sources & processing\n```\n\nStep 3 is conditional (no-op if OAuth already configured). Keep it in the\nchecklist and mark it complete as a no-op when it doesn't apply.\n\nThen: **work the checklist 0 \u2192 8, one item `in_progress` at a time**; run from the\ncanonical repo root (resolve once, see *Repo root*); overwrite fixed derived\npaths and rely on the primitives \u2014 don't pre-delete or invent folders.\n**Never delete `~/.msgvault/msgvault.db`.**\n\n### Guardrails (hard rules)\n\n- **No context pass. Do not go exploring.** Self-contained and authoritative.\n  Build the checklist and execute it directly.\n- **Do not edit code.** Only invoke the primitives below (flag an actual blocking\n  bug if you hit one). Plain shell for `cp`/`test`/`wc`/`cat` is fine; no glue\n  scripts.\n- **Never call `msgvault` (or `msgvault sync-full`) directly.** Gmail syncing\n  happens *only* through Step 5's `gmail.py discover --sync-after \"$SYNC_AFTER\"`.\n  A bare `msgvault sync-full <email>` has no date bound and pulls the entire\n  mailbox, ignoring the chosen window. **Re-authorizing a lapsed token is\n  `msgvault_setup.py add-account --force-auth` (OAuth only, no sync) \u2014 see Step 4;\n  it is never a `sync-full`.** If discover fails, recover by syncing *less* (a\n  narrower `--sync-after`), never the full mailbox.\n- **No paid providers, no index.** This skill never calls Parallel.ai, RapidAPI,\n  OpenAI, or Modal. Identity resolution for unresolved contacts and the index\n  rebuild belong to `$deep-context`. (The import primitive keeps a\n  `--resolve-legacy` escape hatch for the old in-import behavior; do not use it\n  in this flow.)\n- **Consent gates (pause for the user):** msgvault browser/gcloud OAuth-app\n  creation and Gmail account authorization (Steps 3-4). Everything after OAuth\n  is free and local.\n- **Check every selected token before syncing any mailbox.** Step 1's local\n  status proves only that an account row/token file exists; it cannot prove a\n  refresh token is still accepted by Google. Step 4's `auth-check` is the\n  authority for token health. It checks the complete selected set without\n  downloading mail or opening a browser. Step 5 starts only after it returns\n  `status: ok` for that exact set.\n\n### Repo root\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -x \"$candidate/bin/update-codex\" && -d \"$candidate/packs\" ]]; then\n      printf '%s\\n' \"$candidate\"; return 0\n    fi\n  done\n  return 1\n}\nREPO=\"$(resolve_powerpacks_root)\" || { echo \"Install Powerpacks to ~/powerpacks first.\" >&2; exit 1; }\ncd \"$REPO\"\n```\n\n---\n\n## The checklist\n\n### Step 0 \u2014 Check prereqs (Powerset login + runtime keys)\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/powerset/primitives/auth/auth.py whoami\ncd \"$REPO\" && uv run --project . python packs/powerset/primitives/pull_runtime_keys/pull_runtime_keys.py check --env-file .env\n```\n\nIf `whoami` fails or keys are missing, tell the user to run **`$setup`** first (or\n`auth.py login` + `pull_runtime_keys.py pull --env-file .env`) and stop here.\n\n### Step 1 \u2014 Check msgvault status\n\nSafe, local. Drives the next two steps:\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py status\n```\n\nThe JSON reports `gcloud`, `config.oauth_configured`, `database.exists`, and\nstored `accounts`. This is a **local configuration/presence check only**: an\naccount can appear here even when Google has revoked or expired its refresh\ntoken. If `oauth_configured` is true and the db exists, Step 3 is a no-op. Do\nnot call an account healthy until Step 4's explicit `auth-check` passes.\n\n### Step 2 \u2014 Ask which Gmail accounts to link (and how far back to sync)\n\nAsk the user for **every** Gmail address they want searchable, in one prompt.\nTreat the first as the **primary** (used to create the OAuth app in Step 3); the\nrest are additional accounts authorized in Step 4. Compare against the already\n`accounts` from Step 1 \u2014 only accounts not already authorized need Steps 3\u20134.\nRecord the list. Do not guess emails.\n\n**In the same prompt, ask how far back to sync.** How many years of mail should be\narchived? **Default is 3 years.** The user may answer **`all`** (full mailbox\nhistory) or any number of years (e.g. **1**, **2**, **5**). Record the answer as\n`$SYNC_YEARS` and carry it into Step 5. A wide window \u2014 especially `all` \u2014 makes\nthe first sync much longer; if the user asks for more than 3 years, confirm before\nrunning Step 5.\n\n### Step 3 \u2014 Create msgvault OAuth app (browser, if not configured)\n\nOnly if Step 1 showed OAuth not configured. One-time browser setup for the\n**primary** Gmail account from Step 2 \u2014 **consent: drives Chrome + gcloud, creates\nthe Google OAuth Desktop app, inits the db, authorizes the primary account**:\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py browser-setup \\\n  --email <primary-gmail> --add-account --init-db\n```\n\nWrites `~/.msgvault/config.toml`, the client secret, and `~/.msgvault/msgvault.db`\n(do not delete the db). If already configured, mark this step a no-op.\n\n### Step 4 \u2014 Check OAuth health + authorize unhealthy Gmail accounts\n\nRe-run `msgvault_setup.py status` after Step 3, because a fresh\n`browser-setup --add-account` already authorized the primary. Then check **every\nrequested account in one command** before syncing anything:\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py auth-check \\\n  --email <first-email> \\\n  --email <second-email>\n```\n\nRepeat `--email` for the exact Step 2 selection. `auth-check` runs msgvault's\nzero-download verification probe (`verify --skip-db-check --sample 0`) with\nnon-interactive stdin. It may refresh a still-valid access token, but it does\nnot sync/download mail, inspect message bodies, or open a browser. It aggregates\nthe whole requested set instead of stopping at the first bad account:\n\n- `healthy` \u2192 no action.\n- `missing_token` \u2192 needs a normal `add-account` grant.\n- `reauthorization_required` \u2192 needs `add-account --force-auth`.\n- `transient_error` \u2192 stop and surface the error; never destroy/replace a token\n  because of a timeout, DNS failure, or Google 5xx.\n\nIf any accounts need authorization, show the **complete list** (missing and\nexpired separately) and ask once for explicit consent to open OAuth for all of\nthem sequentially. After approval, run the normal grant for every missing\naccount:\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-account --email <email>\n```\n\nFor every expired/revoked account, use `--force-auth` (OAuth only; it downloads\nno mail and preserves already archived messages):\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py add-account --email <email> --force-auth\n```\n\nAfter all grants complete, rerun the **same all-account `auth-check`**. Do not\nadvance until it reports `status: ok` and every selected account is `healthy`.\nThe accounts keep every previously-synced message; Step 5's bounded `discover`\nrescans the chosen window and deduplicates stored messages. **Never**\nre-authorize with `msgvault sync-full <email>` \u2014 it re-pulls the mailbox.\n\n### Step 5 \u2014 Sync Gmail archives\n\nHard precondition: Step 4's `auth-check` returned `status: ok` for the exact\nselected account list. If any account is missing, expired, or in transient\nerror, start **none** of the mailbox syncs.\n\nSync all authorized accounts and build the discover artifacts in **one command**,\nusing the window from Step 2. Passing one account per separate invocation rewrites\nthe stable discovery manifest and can leave only the last account available to\nStep 6. Compute `SYNC_AFTER` from `$SYNC_YEARS` (default `3`; `all` = full history)\nand repeat `--account-email` once per selected account:\n\n```bash\ncd \"$REPO\"\n# $SYNC_YEARS from Step 2: a number (default 3) or the word \"all\".\nif [ \"${SYNC_YEARS:-3}\" = \"all\" ]; then\n  SYNC_AFTER=\"2004-01-01\"   # pre-Gmail = the entire mailbox\nelse\n  SYNC_AFTER=\"$(date -v-${SYNC_YEARS:-3}y +%Y-%m-%d 2>/dev/null || date -d \"${SYNC_YEARS:-3} years ago\" +%Y-%m-%d)\"\nfi\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/gmail/discover.py discover \\\n  --account-email <first-email> \\\n  --account-email <second-email> \\\n  --sync-after \"$SYNC_AFTER\"\n```\n\nOmit extra repeated flags when only one account was selected. Writes\n`.powerpacks/network-import/discover/gmail/<account>/`. **Only sync through this\n`discover` command** \u2014 never `msgvault sync-full` (no `--after` bound \u2192 entire\nmailbox). If `discover` errors or the sync is too slow/large, recover by syncing\n**less, never more** (a more recent `--sync-after`). If a narrower window still\nfails, surface the error and stop. A large first sync can take a while; msgvault\nskips already-downloaded messages on reruns.\n\nContent boundary: the bounded `msgvault sync-full` child downloads messages into\nmsgvault's local full-message archive. The current command does not request\nattachment suppression, so supported msgvault builds may also store attachments.\nPowerpacks' subsequent SQLite reader selects contact/interaction metadata only and\ndoes not send bodies, subjects, snippets, MIME, or attachments to identity providers.\n\n### Step 6 \u2014 Import Gmail contacts (free, local)\n\nImport applies the **local identity directory** to the discovered Gmail queues\n(people already resolved by prior imports attach immediately), writes\n`.powerpacks/network-import/import/gmail/people.csv`, and stages every\nstill-unresolved contact worth researching in\n`.powerpacks/network-import/import/gmail/candidates.csv` for `$deep-context`.\nNo Parallel.ai, no RapidAPI, no spend prompt:\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/import_contacts_pipeline/gmail/importer.py run\n```\n\nReport the manifest's `stats`: people imported and candidates staged. Identity\nresolution for the candidates (Parallel.ai with dossier context, judged and\nuser-reviewable) happens in `$deep-context`, not here.\n\n### Step 7 \u2014 Merge all sources\n\nFan-in merges the per-source `import/<source>/people.csv` files into one network\n(Gmail here, plus LinkedIn/Messages if already imported):\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/indexing/primitives/index_contacts_pipeline/index_contacts_pipeline.py fan-in \\\n  --people-csv .powerpacks/network-import/merged/people.csv\n```\n\nWrites `.powerpacks/network-import/merged/people.csv` (default\n`--include-existing-artifacts` picks up every imported source).\n\n### Step 8 \u2014 Suggest next sources & processing\n\nCheck which sources are imported and suggest the missing ones (skip the ones\nalready present):\n\n```bash\ncd \"$REPO\" && uv run --project . python packs/ingestion/primitives/import_contacts_pipeline/status.py status\n```\n\n- `messages.import.imported: false` \u2192 suggest **`$import-messages`**\n  (iMessage/WhatsApp contacts give `$deep-context` cross-channel context).\n- `linkedin.import.imported: false` \u2192 suggest **`$setup`** (LinkedIn is the\n  identity backbone).\n- Report candidate counts (`import.candidates` per source) so the user knows how\n  many contacts are waiting for research.\n\nThen ask, **in plain product words grounded in what the status check just\nfound \u2014 name the imported sources, never the skill**. Pattern:\n\n> \"I see iMessage and WhatsApp are imported alongside Gmail \u2014 do you want to\n> enrich your contacts?\"\n\n(Adapt the source list to what's actually imported; `$deep-context` is the\ninternal route \u2014 do not say its name or describe its machinery in the ask.)\nIf yes \u2192 run the `$deep-context` flow. If no \u2192 say their new contacts become\nsearchable after the next enrichment run; nothing is lost, the candidates\nstay staged.\n\n---\n\n## Done\n\nReport a terse summary: N Gmail accounts synced, K contacts imported (directory\nhits), C research candidates staged, merged network of M people, and whether the\nuser chose to process now. Remind the user that rerunning `$import-gmail` reruns\nthe whole checklist: an explicit history window is rescanned with `--noresume`,\nwhile msgvault deduplicates stored messages and preserves its db. LinkedIn\n(`$setup`) and iMessage/WhatsApp (`$import-messages`) are separate skills.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-gmail", "pack": "ingestion", "path": "packs/ingestion/skills/import-gmail/SKILL.md", "primitive_count": 5, "primitive_refs": ["discover_contacts_pipeline", "import_contacts_pipeline", "index_contacts_pipeline", "msgvault_setup", "pull_runtime_keys"]}, {"description": "Gmail network import from local msgvault metadata. Uses msgvault SQLite, writes .powerpacks artifacts, and avoids Powerset-hosted Gmail OAuth/sync.", "display_name": "powerset:import-gmail-network", "heading": "Import Gmail Network", "markdown": "---\nname: import-gmail-network\ndescription: Gmail network import from local msgvault metadata. Uses msgvault SQLite, writes .powerpacks artifacts, and avoids Powerset-hosted Gmail OAuth/sync.\n---\n\n# Import Gmail Network\n\nUse this skill when the user wants to import Gmail/network contacts into\nPowerpacks.\n\nV1 scope is intentionally narrow: `.powerpacks/` artifacts only, backed by\nlocal msgvault metadata. Do not use Powerset-hosted Gmail OAuth/sync helpers,\ntask JSON, or an external legacy app checkout; code must live inside Powerpacks.\n\n## Consent / approval model\n\nCurrent V1 has no spend/write approval confirmations because it only reads local\nmsgvault metadata and writes local artifacts. Stop for explicit approval before\nany uploads, source seeding, production mutation, or paid enrichment.\n\nDo not assume EnrichLayer/RapidAPI keys exist. Do not call Powerset Gmail OAuth\nor backend gmail-sync endpoints for this flow.\n\n## msgvault metadata import\n\nmsgvault by Wes McKinney stores Gmail metadata in a local SQLite database,\nusually `~/.msgvault/msgvault.db`. Powerpacks reads only `sources`,\n`participants`, `messages`, and `message_recipients` to derive email/name/count\nmetadata; it never reads message bodies, subjects, snippets, raw MIME, or\nattachments.\n\nFirst list local msgvault Gmail source accounts so the harness can echo them\nback and ask the operator which ones to add:\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/gmail/network_import.py msgvault-accounts \\\n  --db ~/.msgvault/msgvault.db\n```\n\nThen import one selected account at a time:\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/gmail/network_import.py msgvault \\\n  --db ~/.msgvault/msgvault.db \\\n  --account-email <gmail-account-email>\n```\n\nThis writes legacy Gmail CSV artifacts plus canonical\n`.powerpacks/network-import/discover/gmail/<account>/people.csv`.\n\n## Legacy one-person seed\n\nThe primitive still has `run` / `continue` / `approve` for deterministic local\nfixtures. Do not use those commands for real Gmail sync; use `msgvault`.\n\n## Multi-account model\n\nmsgvault stores Gmail accounts in `sources`. Pass `--account-email` to filter to\none source account, or omit it to import metadata across all msgvault sources.\nLater orchestrators can merge by email, LinkedIn URL, or resolved person ID. Do\nnot ask OpenAI to infer that multiple emails are the same person in V1.\n\n## Sub-agent orchestration\n\nFor future long approved steps, the main agent can delegate `continue` to a\nsub-agent and ask it to return only status, step id, artifacts, return code, and\nlog tail. Keep the main chat clean; never paste full CSVs or secrets.\n\n## Output summary\n\nEnd with:\n\n- run ledger path\n- run artifact directory\n- generated CSV paths\n- confirmation that no external APIs, DVC, uploads, or prod writes ran\n", "mcp_count": 0, "mcp_refs": [], "name": "import-gmail-network", "pack": "ingestion", "path": "packs/ingestion/skills/import-gmail-network/SKILL.md", "primitive_count": 1, "primitive_refs": ["discover_contacts_pipeline"]}, {"description": "Import a LinkedIn Connections.csv export into Powerpacks-local people.csv artifacts using shared enrich_people delegation and run/continue/approve.", "display_name": "powerset:import-linkedin-network", "heading": "Import LinkedIn Network", "markdown": "---\nname: import-linkedin-network\ndescription: Import a LinkedIn Connections.csv export into Powerpacks-local people.csv artifacts using shared enrich_people delegation and run/continue/approve.\n---\n\n# Import LinkedIn Network\n\nUse this skill when the user wants to import LinkedIn connections.\n\nDo not depend on an external legacy app checkout. All code and artifacts live in Powerpacks.\nExternal API enrichment via the shared RapidAPI-only `enrich_people` primitive is spend-bearing only for cache misses and must be approved after the local CSV conversion step. Seed `--profile-cache-dir` to avoid paid calls when possible. A hidden row cap exists only for tiny local smoke tests; do not use caps in real workflows.\n\n## Main loop\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/linkedin/network_import.py run \\\n  --csv <Connections.csv> \\\n  --source-user <user-label> \\\n  --operator-id <operator-id-or-local>\n```\n\nIf blocked and the user approves spend:\n\n```bash\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/linkedin/network_import.py approve\nuv run --project . python packs/ingestion/primitives/discover_contacts_pipeline/linkedin/network_import.py continue\n```\n\n## Output summary\n\nReport only:\n\n- ledger path\n- run directory\n- parsed connection count\n- whether enrichment is blocked/completed\n- canonical `people.csv` path when produced\n- cache hit / paid call counts from the delegated enrichment summary\n\nDo not paste CSV contents or raw provider JSON into chat.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-linkedin-network", "pack": "ingestion", "path": "packs/ingestion/skills/import-linkedin-network/SKILL.md", "primitive_count": 2, "primitive_refs": ["discover_contacts_pipeline", "enrich_people"]}, {"description": "Add iMessage/WhatsApp contacts to your local network. Use for $import-messages. Sets up access (Full Disk Access + WhatsApp QR), syncs message contacts down, matches them against already-imported LinkedIn/Gmail people (free), and imports matched people plus a research-candidates pool. No LLM calls, no paid research, no index build \u2014 identity resolution and indexing happen later in $deep-context. Never uploads to a Powerset set.", "display_name": "powerset:import-messages", "heading": "import-messages", "markdown": "---\nname: import-messages\ndescription: Add iMessage/WhatsApp contacts to your local network. Use for $import-messages. Sets up access (Full Disk Access + WhatsApp QR), syncs message contacts down, matches them against already-imported LinkedIn/Gmail people (free), and imports matched people plus a research-candidates pool. No LLM calls, no paid research, no index build \u2014 identity resolution and indexing happen later in $deep-context. Never uploads to a Powerset set.\n---\n\n<!--\nCreated: 2026-06-20\nChangelog:\n- 2026-07-18: Documented first-backfill duration (30 min up to a few hours;\n  3 h hard cap, raised from ~2 h) and the never-kill-mid-backfill rule with\n  `$import-messages full` recovery.\n- 2026-07-17: Added smart-default incremental WhatsApp sync. First import full-\n  backfills; later runs auto-detect the populated wacli store and pull only the\n  delta. New verbs: `$import-messages sync` (explicit incremental) and\n  `$import-messages full` (force a full re-backfill), forwarded as\n  `--wacli-sync-mode` to discovery. iMessage is unchanged (local chat.db read).\n- 2026-07-14: Refocused on contact sync only. Dropped the in-skill LLM triage,\n  Parallel deep-research, LLM-scored review UI, and the Modal index/validate\n  steps \u2014 identity research + index building move to the centralized $deep-context\n  processing layer. Import is now contacts-direct: matched contacts land in\n  people.csv, floor-passing unmatched contacts land in candidates.csv. Ends by\n  suggesting missing sources and offering to process contacts.\n- 2026-07-13: Added the product architecture guide; documented both OpenRouter\n  calls, Parallel and Modal payloads, Contacts.app inclusion, provider gates, and\n  the current explicit-exclusion review semantics.\n- 2026-06-20: New skill, split out of $setup (replaces $import-contacts for the\n  local-index use case).\n-->\n\n# import-messages\n\n`$import-messages` adds **iMessage / WhatsApp** contacts to your local network:\nset up access, sync message contacts down, match them against your\nalready-imported LinkedIn/Gmail people (free), then import \u2014 matched contacts\nattach their message activity to people you already have; unmatched contacts\nworth researching go to a **candidates pool** for the `$deep-context` processing\nlayer, which builds cross-channel context and resolves identities once. This\nskill itself makes **no LLM calls, no paid research, and no index build**.\n\nRun `$setup` (LinkedIn) and `$import-gmail` first for the best matching \u2014\nMessages merges on top of whatever is already imported.\n\nFor the pipeline walkthrough and privacy map, see\n[`message-import-pipeline.md`](../../docs/message-import-pipeline.md).\n\nIt runs a **fixed checklist and always reruns it end to end**, idempotent against\nfixed paths.\n\n## How to run this skill\n\n**FIRST, create a literal, visible checklist with all seven steps below and step\nthrough it, marking each complete as you go.** Mandatory (TaskCreate / update_plan\n/ your harness's todo tool). Seed it with these exact titles:\n\n```\n0. Check Powerset runtime credentials\n1. Choose Messages sources (iMes
