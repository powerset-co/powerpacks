iles and can\n  take minutes when many new researched profiles need scoring.\n\nAt 10k contacts, expect local steps to remain viable but LLM and research\nconfirmations to dominate. At 100k contacts, do not assume the current one-shot flow is the\nright path; pause and inspect counts/estimates before approving spend.\n\n## Loop\n\n1. Run `run`.\n2. If blocked on a user action, tell the user the action, then run `continue`.\n3. If blocked on spend/upload approval, ask the exact approval question. If the\n   user approves, run `approve`, then `continue`.\n4. If review opens, tell the user:\n   `Review opened: <url>. When done, say: done with review, upload`\n5. On review completion, run `continue`. Retarget feedback is automatic:\n   edited `retarget_hint` rows use one re-research approval; exact LinkedIn URL\n   hints refresh that profile through RapidAPI where possible, then small\n   remaining retarget batches run through the Codex/Claude harness before\n   falling back to Parallel, results merge back into the review CSV, then upload\n   approval is requested.\n\n## Output\n\nBe terse.\n\n- Retarget: `Feedback found; approve another re-research pass? Completion time is up to 10-15 min.`\n- Review: `Review opened: <url>. When done, say: done with review, upload`\n- Upload: `Please approve upload of X approved contacts to Powerset.`\n- Done: `Uploaded X contacts`\n", "mcp_count": 0, "mcp_refs": [], "name": "import-contacts", "pack": "messages", "path": "packs/messages/skills/import-contacts/SKILL.md", "primitive_count": 1, "primitive_refs": ["import_contacts_pipeline"]}, {"description": "Isolated WhatsApp metadata import flow using openclaw/wacli instead of WAHA.", "display_name": "powerset:import-whatsapp", "heading": "Import WhatsApp", "markdown": "---\nname: import-whatsapp\ndescription: Isolated WhatsApp metadata import flow using openclaw/wacli instead of WAHA.\n---\n\n# Import WhatsApp\n\nUse this skill for `$import-whatsapp` or when the user asks to sync WhatsApp\nthrough `openclaw/wacli` in isolation.\n\n## Rule\n\nWhen the user literally types `$import-whatsapp`, treat that command as explicit\nconsent to run the isolated WhatsApp flow in this turn. Do not ask another\nconsent question.\n\nRun:\n\n```bash\nuv run --project . python packs/messages/primitives/import_whatsapp_wacli/import_whatsapp_wacli.py run\n```\n\nThis flow:\n\n- installs `wacli` with Homebrew if it is missing\n- uses `.powerpacks/messages/wacli` as an isolated local store\n- authenticates with a WhatsApp QR scan if needed\n- runs one WhatsApp sync\n- exports `.powerpacks/messages/wacli.contacts.csv`\n\nThe Powerpacks export reads metadata only: phone, name, source, group metadata,\ndirect-chat message counts, and timestamps. It does not read message bodies.\n\n## Execution\n\nRun the primitive directly in the main shell so QR/login output is visible.\nRelay only user-facing lines that begin with `[import-whatsapp]`, with the\nprefix removed. Do not stream raw JSON, local contact data, phone numbers,\nmessage data, or terminal transcripts unless a failure needs diagnosis.\n\nExpected user-facing status:\n\n- `Installing WhatsApp sync helper.`\n- `WhatsApp needs a QR scan.`\n- `Refreshed WhatsApp QR page.`\n- `Syncing WhatsApp Messages and Contacts.`\n- `WhatsApp sync finished.`\n\nIf WhatsApp says it cannot link new devices right now, tell the user:\n\n`WhatsApp cannot link new devices right now. Try again later in WhatsApp, then rerun $import-whatsapp.`\n\n## Output\n\nBe terse. On completion, report:\n\n`Imported X WhatsApp contacts.`\n", "mcp_count": 0, "mcp_refs": [], "name": "import-whatsapp", "pack": "messages", "path": "packs/messages/skills/import-whatsapp/SKILL.md", "primitive_count": 1, "primitive_refs": ["import_whatsapp_wacli"]}, {"description": "Diagnose and repair local Powerpacks install/state path problems. Use for $fix-powerpacks, canonical repo enforcement, moving newer .powerpacks state out of .codex, validating linked msgvault/messages/WhatsApp/LinkedIn paths, and cleaning stale duplicate state roots after approval.", "display_name": "powerset:fix-powerpacks", "heading": "fix-powerpacks", "markdown": "---\nname: fix-powerpacks\ndescription: Diagnose and repair local Powerpacks install/state path problems. Use for $fix-powerpacks, canonical repo enforcement, moving newer .powerpacks state out of .codex, validating linked msgvault/messages/WhatsApp/LinkedIn paths, and cleaning stale duplicate state roots after approval.\n---\n\n# fix-powerpacks\n\nUse this skill for `$fix-powerpacks` and for requests like:\n\n- \u201cPowerpacks is running from the wrong install path\u201d;\n- \u201cCodex used `.codex/powerpacks` and now setup is brittle\u201d;\n- \u201cmove/copy the right local data into the real Powerpacks install\u201d;\n- \u201ccheck if Gmail/msgvault, WhatsApp/wacli, Messages review CSV, and network\n  artifacts are wired correctly\u201d;\n- \u201ccheck whether operator bootstrap restored `directory.csv`, whether expected\n  bootstrap files are present, and whether discovery/import manifests exist for\n  each vertical\u201d;\n- \u201creport stale run-id / temp artifact directories under `.powerpacks` so they\n  can be triaged or cleaned up deliberately\u201d;\n- \u201cclean up stale duplicate state directories so future sessions stop using\n  them.\u201d\n\nThis is a repair workflow. Its default command applies safe local repairs:\ncopy/adopt newer canonical state and copy `.env` only if canonical `.env` is missing, repair `accounts.json` from local msgvault,\nadopt an authenticated wacli store, move aside a bad unauthenticated wacli\nplaceholder so the user can reauth cleanly, and repair canonical\n`.powerpacks/network-import/directory.csv` from the best local operator\nbootstrap bundle when that bundle has strictly more LinkedIn mappings. It must\nnot run imports, msgvault sync, WhatsApp sync, enrichment, processing, GCS\npulls, uploads, provider-spend operations, or destructive cleanup unless the\nuser separately and explicitly requests that.\n\n## Principles\n\n1. Product commands run from the canonical non-`.codex` Powerpacks repo.\n2. Powerpacks-owned local state lives under that repo\u2019s `.powerpacks/`.\n3. `~/.msgvault/msgvault.db` is external local app state; Powerpacks should\n   point to it, not move it into `.powerpacks`.\n4. `.codex/powerpacks/.powerpacks` is a legacy/accidental state source, not the\n   runtime root.\n5. Copy/adopt only files that are missing or newer than the canonical target.\n6. Rename/quarantine stale bad directories instead of deleting them.\n7. Ledgers are logs/checkpoints; current artifacts and live read-only checks are\n   more authoritative than stale ledger statuses.\n8. When files are missing or bootstrap contents do not match expectations,\n   report the exact missing path and observed counts. Do not invent substitute\n   files or silently treat an old artifact as equivalent.\n9. Stale run-id/temp directories are cleanup candidates, not source of truth.\n   Report them by path and size/count first; quarantine/remove them only after a\n   separate explicit cleanup request.\n\n## State path contract\n\nThe tracked path contract is:\n\n```text\nconfig/powerpacks-state-paths.json\n```\n\nThe fixer script reads that contract and knows the managed paths needed for\nsetup/import/enrichment to work, including:\n\n- `.env` local runtime config/credentials, copied only if canonical `.env` is missing and never printed\n- `.powerpacks/ingestion/accounts.json`\n- `.powerpacks/messages/research_review.csv`\n- `.powerpacks/messages/contacts.csv`\n- `.powerpacks/messages/wacli/`\n- `.powerpacks/messages/wacli.contacts.csv`\n- `.powerpacks/network-import/directory.csv`\n- `.powerpacks/network-import/discover/`\n- `.powerpacks/network-import/import/`\n- `.powerpacks/network-import/profile_cache_v2/`\n- `.powerpacks/network-import/merged/people.csv`\n- `.powerpacks/operator-bootstrap/bundles/`\n\nReport-only paths include dirty ledgers, rebuildable DuckDB files, and stale\nrun-id/temp artifact directories. The canonical current paths are stable and\nshould not include arbitrary run IDs:\n\n```text\n.powerpacks/network-import/discover/<vertical>/manifest.json\n.powerpacks/network-import/import/<vertical>/manifest.json\n.powerpacks/network-import/final/\n.powerpacks/network-import/merged/\n.powerpacks/network-import/directory.csv\n.powerpacks/network-import/profile_cache_v2/\n```\n\nKnown stale/legacy cleanup candidates include paths like:\n\n```text\n.powerpacks/network-import/network-runs/<run-id>/\n.powerpacks/network-import/import-network-run*.json\n.powerpacks/network-import/<timestamp-or-run-id>/\n```\n\nDo not delete or quarantine these during the normal fixer run. Report them so\nthe user can decide whether to clean them up.\n\n## Standard flow\n\nResolve and enter canonical repo:\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -d \"$candidate/packs\" && -f \"$candidate/pyproject.toml\" ]]; then\n      printf '%s\\n' \"$candidate\"\n      return 0\n    fi\n  done\n  return 1\n}\nrepo=\"$(resolve_powerpacks_root)\" || {\n  echo \"No canonical non-.codex Powerpacks repo found. Install/copy Powerpacks to ~/powerpacks first.\" >&2\n  exit 1\n}\ncd \"$repo\"\n```\n\nBefore running repair, verify the canonical checkout actually contains the fixer.\nIf this file is missing, the installed skill is newer than the repo that Codex is\nusing; stop and run `$update-powerpacks` from a checkout/branch that contains the\nfixer, or update/merge the canonical repo first.\n\n```bash\ntest -f scripts/fix-powerpacks-state.py || {\n  echo \"Missing scripts/fix-powerpacks-state.py in $repo; update the canonical checkout first.\" >&2\n  exit 1\n}\n```\n\nRun the default fixer. This applies safe repairs and scrubs a bad canonical\nwacli placeholder if no authenticated store is available:\n\n```bash\nuv run --project . python scripts/fix-powerpacks-state.py --json\n```\n\nSummarize:\n\n- canonical repo path;\n- current working directory;\n- legacy `.powerpacks` roots found;\n- managed paths copied/adopted, including whether `.env` was copied or kept without showing contents;\n- linked source checks that failed;\n- operator bootstrap bundle health, including whether local bundles contain\n  `.powerpacks/network-import/directory.csv`, how many usable LinkedIn mappings\n  they contain, and whether canonical `directory.csv` was repaired from one;\n- exact missing bootstrap files/artifacts. For each expected bootstrap artifact,\n  say `present`, `missing`, or `stale`, with the observed path. Do not infer that\n  another similarly named file is acceptable unless the code explicitly supports\n  that fallback;\n- per-source discovery/import manifest health:\n  `.powerpacks/network-import/discover/<vertical>/manifest.json` and\n  `.powerpacks/network-import/import/<vertical>/manifest.json`;\n- stale run-id/temp artifact directories under `.powerpacks/network-import/`,\n  with path, approximate size, and why they are not part of the current stable\n  contract;\n- local gcloud active-account/config status. This is only a local auth snapshot;\n  it does not prove the latest GCS bootstrap was pulled. If the local bundle is\n  stale or missing, run `$powerset setup` and then rerun `$fix-powerpacks`;\n- whether Gmail accounts were repaired from msgvault;\n- whether WhatsApp/wacli was authenticated, copied from a better store, or\n  scrubbed for reauth;\n- root cause for anything still failing.\n\nFor debugging only, inspect without changing files:\n\n```bash\nuv run --project . python scripts/fix-powerpacks-state.py --dry-run --json\n```\n\nIf the user explicitly asks to clean up stale `.codex` state after adoption,\nquarantine it instead of deleting:\n\n```bash\nuv run --project . python scripts/fix-powerpacks-state.py \\\n  --quarantine-legacy-state \\\n  --json\n```\n\n## What \u201cfix\u201d is allowed to do\n\nAllowed by default:\n\n- copy newer/missing managed files from legacy installs into the canonical repo,\n  including managed `.powerpacks` state;\n- copy legacy `.env` only when canonical `.env` is missing; never overwrite an\n  existing canonical `.env`;\n- update only Powerpacks-owned local state under canonical `.powerpacks`;\n- read `~/.msgvault/msgvault.db` and repair `accounts.json` Gmail linkage when\n  the local DB clearly contains the selected Gmail accounts;\n- read-only test WhatsApp/wacli auth using the canonical store;\n- inspect local operator bootstrap tarballs under\n  `.powerpacks/operator-bootstrap/bundles/`;\n- replace canonical `.powerpacks/network-import/directory.csv` from the best\n  local operator bootstrap bundle when the bundle has strictly more nonempty\n  `linkedin_url` mappings than the canonical file, with backup;\n- report discovery/import manifest status for Gmail, LinkedIn, and Messages;\n- report stale run-id/temp artifact directories so the harness can propose a\n  cleanup plan;\n- compare legacy wacli stores and copy a better authenticated store into the\n  canonical repo when the canonical store is missing or unauthenticated;\n- move aside a bad unauthenticated canonical wacli placeholder when no better\n  authenticated store exists, so the user can reauth cleanly;\n- run read-only sqlite/status checks against msgvault and wacli stores.\n\nRequires explicit approval:\n\n- overwrite canonical files with older/equal legacy files;\n- quarantine/rename legacy `.powerpacks` directories;\n- quarantine/remove stale run-id/temp artifact directories;\n- move aside dirty ledgers;\n- delete anything;\n- run browser auth, WhatsApp QR linking, msgvault sync, imports, enrichment,\n  processing, GCS bootstrap pulls, or uploads.\n\nNever do:\n\n- run product commands from `~/.codex/powerpacks`;\n- keep `.codex/powerpacks/.powerpacks` as the long-term runtime state root;\n- move `~/.msgvault/msgvault.db` into `.powerpacks`;\n- delete ledgers or stores without a backup and explicit user approval.\n\n## Response format\n\nEnd with a concise summary:\n\n```text\nCanonical repo: ...\nCopied/adopted: N files / M directories\nKept target because newer: ...\nLinked source checks: Gmail ok, WhatsApp store present/auth unknown, LinkedIn CSV missing, ...\nBootstrap directory: canonical X LinkedIn URLs, best bundle Y LinkedIn URLs, repaired yes/no\nSource stages: Gmail discovery/import ok, LinkedIn discovery/import ok, Messages discovery/import missing/stale\nMissing bootstrap files: ...\nStale run dirs: ...\nQuarantined legacy state: yes/no\nNext: open /setup from canonical repo\n```\n", "mcp_count": 0, "mcp_refs": [], "name": "fix-powerpacks", "pack": "powerset", "path": "packs/powerset/skills/fix-powerpacks/SKILL.md", "primitive_count": 0, "primitive_refs": []}, {"description": "Run the local Powerpacks Console web app for browsing .powerpacks artifacts, including network search and rerank results. Use when the user asks to preview, inspect, browse, or view Powerpacks results locally in a browser.", "display_name": "powerset:powerpacks-console", "heading": "Powerpacks Console", "markdown": "---\nname: powerpacks-console\ndescription: Run the local Powerpacks Console web app for browsing .powerpacks artifacts, including network search and rerank results. Use when the user asks to preview, inspect, browse, or view Powerpacks results locally in a browser.\n---\n\n# Powerpacks Console\n\nPowerpacks Console is the local browser UI in `app/`. It reads artifacts from\n`.powerpacks/` via a Vite dev-server middleware and is intended to become the\nshared top-level console for search, rerank/review, Sales Nav, messages, and\ncontact import outputs.\n\n## Start in the background\n\nFrom the Powerpacks repo root, run:\n\n```bash\nscripts/run-powerpacks-console.sh start\n```\n\nIf the current Codex cwd is not the Powerpacks repo, resolve the installed\nbundle first:\n\n```bash\nif [[ -n \"${POWERPACKS_REPO_ROOT:-}\" ]]; then\n  \"$POWERPACKS_REPO_ROOT/scripts/run-powerpacks-console.sh\" start\nelif [[ -x \"scripts/run-powerpacks-console.sh\" && -d \"packs\" ]]; then\n  scripts/run-powerpacks-console.sh start\nelse\n  \"$HOME/.codex/powerpacks/scripts/run-powerpacks-console.sh\" start\nfi\n```\n\nThe script:\n\n- installs `app/` npm dependencies if needed\n- starts Vite in the background\n- binds to `0.0.0.0` by default for LAN/Tailscale preview\n- reads `.powerpacks` from the repo root by default\n- writes logs/PID under `.powerpacks/servers/`\n\nUseful commands:\n\n```bash\nscripts/run-powerpacks-console.sh status\nscripts/run-powerpacks-console.sh restart\nscripts/run-powerpacks-console.sh stop\n```\n\nOpen a specific app route:\n\n```bash\nscripts/run-powerpacks-console.sh start --path /onboarding --open\nscripts/run-powerpacks-console.sh start --path /setup\n```\n\nDefault URL is usually:\n\n```text\nhttp://localhost:5177/\n```\n\nVite may choose the next open port if 5177 is already busy. Check the script\noutput or `.powerpacks/servers/powerpacks-console.log` for the actual URL.\n\n## Alternate artifact root\n\nTo point the console at a different Powerpacks checkout or artifact directory\nlayout, set `POWERPACKS_REPO_ROOT`:\n\n```bash\nPOWERPACKS_REPO_ROOT=/path/to/powerpacks /path/to/powerpacks/scripts/run-powerpacks-console.sh start\n```\n\nThe app expects content in:\n\n```text\n$POWERPACKS_REPO_ROOT/.powerpacks/\n```\n\n## Current scope\n\nCurrent implemented views:\n\n- `/onboarding` guided setup flow for account linking, import, enrichment, and\n  local indexing\n- `/setup` detailed setup tables and stage controls\n- `/setup/imessage/review` local messages review\n- lists `.powerpacks/runs/search-network-*.json`\n- reads run state and `expand_search_request` query expansion\n- reads result JSONL in pages of 50\n- reads hydrated profiles for the visible page only\n- uses rerank CSV (`llm_rerank_candidates/query_results.csv`) when present\n- shows app-style person/results table with tags, trait scores, overall score,\n  and reasoning\n\nDo not add Sales Nav review or unrelated write flows unless the user explicitly\nasks. Setup and messages review are now first-class local console surfaces.\n", "mcp_count": 0, "mcp_refs": [], "name": "powerpacks-console", "pack": "powerset", "path": "packs/powerset/skills/powerpacks-console/SKILL.md", "primitive_count": 3, "primitive_refs": ["expand_search_request", "llm_rerank_candidates", "setup"]}, {"description": "Unified Powerset command surface. Use for `$powerset setup`, `$powerset login`, `$powerset status`, `$powerset whoami`, `$powerset sets list`, `$powerset sets use <id|name>`, `$powerset mcp install`, `$powerset env pull`, `$powerset create oauth app`, and `$powerset help`.", "display_name": "powerset:powerset", "heading": "Powerset", "markdown": "---\nname: powerset\ndescription: Unified Powerset command surface. Use for `$powerset setup`, `$powerset login`, `$powerset status`, `$powerset whoami`, `$powerset sets list`, `$powerset sets use <id|name>`, `$powerset mcp install`, `$powerset env pull`, `$powerset create oauth app`, and `$powerset help`.\n---\n\n# Powerset\n\nUse this skill when the user asks for `$powerset ...` or wants Powerset setup,\nstatus, identity, MCP registration, runtime env provisioning, operator bootstrap\nsync, or default set selection. `$powerset setup` is the preferred one-command\nfirst-run path: it\ndoes login, runtime env pull, published operator bootstrap sync, and MCP\nregistration so users do not need to run multiple smaller commands.\n\n## Command routing\n\n| User command | Do this |\n| --- | --- |\n| `$powerset`, `$powerset help` | Print the supported subcommands below. |\n| `$powerset setup [--profile <profile>]` | Run the setup workflow below: ensure login, pull env, sync any matching operator bootstrap, and install/refresh MCP. The explicit command is consent to write `.env`. |\n| `$powerset login` | Run the login workflow below. |\n| `$powerset status` | Run the setup check quietly and summarize only blockers. |\n| `$powerset whoami` | Run the Auth0 `whoami` primitive. |\n| `$powerset sets`, `$powerset sets list` | List sets via the Powerset Search MCP. |\n| `$powerset sets use <id|name>` | Resolve a set via MCP and write `POWERPACKS_DEFAULT_SET_ID` to local `.env`. |\n| `$powerset mcp install` | Register/refresh the `powerset-search` MCP for local hosts. |\n| `$powerset env pull [--profile <profile>]` | Pull allowlisted runtime keys into `.env`. The explicit command is consent to write `.env`. Default `search-core` is the standard setup; use `search-network` or `import-contacts` for minimal per-user provisioning. |\n| `$powerset create oauth app` | Route to the msgvault setup primitive for Gmail OAuth Desktop app guidance. |\n\nAliases remain valid for backcompat: `$powerset-login` means `$powerset login`;\n`$powerset-set` means `$powerset sets` / `$powerset sets use`. If the user asks\nfor Powerset setup, runtime setup, or API key bootstrap without naming a\nsubcommand, prefer `$powerset setup` over separate login/env commands. Keep\nplain `$setup` routed to the ingestion/product setup skill, not this command.\n\n## Help text\n\nWhen asked for help, respond with:\n\n```text\n$powerset setup                 log in, pull env, sync bootstrap, and install/refresh MCP\n$powerset login                 refresh Auth0 credentials and MCP config\n$powerset status                check local setup\n$powerset whoami                show current Powerset/Auth0 identity\n$powerset sets list             list visible Powerset sets\n$powerset sets use <id|name>    set local default set in .env\n$powerset mcp install           install/refresh powerset-search MCP\n$powerset env pull              pull profile keys into .env\n$powerset create oauth app      guide Gmail OAuth app setup for msgvault\n$powerset help                  show this help\n```\n\n## Canonical repo setup\n\nFor mutating commands (`$powerset setup`, `$powerset login`, `$powerset env\npull`, `$powerset sets use`, `$powerset mcp install`, and `$powerset create\noauth app`), first resolve and enter the canonical non-`.codex` Powerpacks repo.\nThis ensures `.env`, operator bootstrap bundles, and any local Powerpacks state\nare written under the installed checkout such as `~/powerpacks`, not under an\nagent skill bundle like `~/.codex/powerpacks`.\n\nPrefer, in order:\n\n1. `$POWERPACKS_REPO_ROOT` if it points to a Powerpacks repo;\n2. current working directory if it is a Powerpacks repo and not under `.codex`;\n3. `~/powerpacks`;\n4. `~/workspace/powerpacks`.\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -d \"$candidate/packs\" && -f \"$candidate/pyproject.toml\" ]]; then\n      printf '%s\\n' \"$candidate\"\n      return 0\n    fi\n  done\n  return 1\n}\nrepo=\"$(resolve_powerpacks_root)\" || {\n  echo \"No canonical non-.codex Powerpacks repo found. Install/copy Powerpacks to ~/powerpacks first.\" >&2\n  exit 1\n}\ncd \"$repo\"\n```\n\nFor read-only commands (`$powerset status`, `$powerset whoami`, `$powerset sets\nlist`), still prefer the canonical repo when available. If no canonical repo is\navailable, stop instead of writing or syncing from `~/.codex/powerpacks`.\n\nRun primitives from the canonical repo with `uv run --project . python\npacks/...`. Prefer `python3` only when invoking a local helper outside `uv`.\n\n## `$powerset setup`\n\nThis is the preferred one-command setup path. It combines the user-facing pieces\npeople otherwise had to run separately:\n\n1. ensure Powerset/Auth0 login is present;\n2. pull allowlisted runtime env keys into local `.env`;\n3. sync any published operator bootstrap bundle into local `.powerpacks/`;\n4. install/refresh the `powerset-search` MCP for local hosts.\n\nDefault profile is `search-core` unless the user specifies `--profile <name>`.\nThe explicit `$powerset setup` request is consent to write `.env`; do not ask\nfor a separate env-write confirmation. It is not the same as bare `$setup`,\nwhich stays the ingestion/product setup flow.\n\nUser-facing output must be terse:\n\n- Start with exactly: `Setting up Powerset...`\n- Do not narrate setup checks, missing check names, token formats, MCP config\n  details, or successful substeps.\n- If a browser/code login is needed, show only the auth URL/code prompt.\n- On success, say exactly:\n  `Powerset setup complete. Please restart Codex to reload the Powerset MCP token.`\n- If still blocked, give one short sentence with the required action. Do not\n  paste raw reports or secret values.\n\nRun one internal setup check first:\n\n```bash\nuv run --project . python packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env \\\n  --gcp-project powerset-search\n```\n\nHandle `fix_kind` values exactly as in the `$powerset login` workflow below.\nIn particular, run direct primitives/CLIs from this shell rather than nested\ndoctor fix commands so browser/code prompts stay visible.\n\nIf `auth0_login` is missing or expired, run the Auth0 login directly:\n\n```bash\nuv run --project . python packs/powerset/primitives/auth/auth.py login\n```\n\nAfter Auth0 credentials and gcloud access are usable, always run the env pull\nfor the requested/default profile, even if the initial setup check was already\nhealthy. This makes `$powerset setup` the single refresh command for rotated or\nnewly added per-user runtime keys:\n\n```bash\nuv run --project . python packs/powerset/primitives/provision_runtime_env/provision_runtime_env.py pull \\\n  --profile search-core \\\n  --env-file .env \\\n  --confirm \\\n  --best-effort\n```\n\nIf this reports expired gcloud credentials, immediately run:\n\n```bash\ngcloud auth login --no-launch-browser\n```\n\nRelay the URL/code prompt tersely, then rerun the env pull command.\n\nThen sync the operator bootstrap:\n\n```bash\nuv run --project . python packs/powerset/primitives/operator_bootstrap/operator_bootstrap.py sync \\\n  --env-file .env\n```\n\nIf this reports expired gcloud credentials, immediately run:\n\n```bash\ngcloud auth login --no-launch-browser\n```\n\nRelay the URL/code prompt tersely, then rerun the env pull command and the\noperator bootstrap sync command. If bootstrap sync reports `skipped` because no\nmatching bundle is published or the registry is not available, continue with MCP\ninstallation; `$setup` can still proceed from local account linking/import.\n\nThen install/refresh MCP:\n\n```bash\nuv run --project . python packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nRe-run the setup check at the end and use the success/blocker message above. If\n`user_secrets` is still a human-action blocker, tell the user to ping\n`#powerpacks` with the email they use for gcloud so a maintainer can provision\nper-user secrets.\n\n## `$powerset login`\n\nUser-facing output must be terse:\n\n- Start with exactly: `Updating your credentials...`\n- Do not narrate setup checks, missing check names, token formats, MCP config\n  details, or successful substeps.\n- If a browser/code login is needed, show only the auth URL/code prompt.\n- On success, say exactly:\n  `Credentials updated. Please restart Codex to reload the Powerset MCP token.`\n- If everything was already valid, say:\n  `Credentials are already up to date. Restart Codex if the Powerset MCP still fails.`\n- For unresolved human-action blockers, give one short sentence with the action\n  required. Do not paste raw reports.\n\nRun one internal setup check:\n\n```bash\nuv run --project . python packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env \\\n  --gcp-project powerset-search\n```\n\nThis check intentionally does **not** check gcloud application-default\ncredentials. ADC is not needed for normal Powerpacks workflows.\n\nIf `overall == \"ok\"`, use the already-valid success sentence above and stop.\nOtherwise handle `fix_kind` values internally:\n\n- `auto`: run the primitive directly from this shell.\n- `interactive`: run the CLI directly from this shell. For browser/code flows,\n  keep prompts visible to the user.\n- `shell_install`: ask before running any OS-level install command.\n- `human_action`: tell the user what maintainer/Slack action is required.\n\nCommon direct fixes:\n\n```bash\nuv run --project . python packs/powerset/primitives/auth/auth.py login\nuv run --project . python packs/powerset/primitives/provision_runtime_env/provision_runtime_env.py pull \\\n  --profile search-core --env-file .env --confirm --best-effort\nuv run --project . python packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nDo not run nested fix commands in the normal login flow; they can hide\ninteractive work inside a subprocess. Run the direct primitives above instead.\nNever print secret values.\n\nThe setup check only probes per-user Secret Manager access when `.env` is incomplete\n(or when `--check-user-secrets` is used for refresh debugging). If `.env` already\nhas the requested profile keys, expired gcloud Secret Manager auth is not a\nlogin blocker and should not be surfaced.\n\nIf the setup check reports `user_secrets` with `fix_kind: interactive` or a message\nlike `gcloud credentials need reauthentication`, this is not a Slack/IAM issue:\nthe selected `@powerset.co` account is fine, but gcloud's cached token expired.\nFor explicit `$powerset setup`, `$powerset login`, or `$powerset env pull`\nrequests, immediately run `gcloud auth login --no-launch-browser`, relay the\nverification URL/code prompt, and ask them to paste the code. Do not stop for a\nseparate yes/no confirmation.\n\nRe-run the setup check at the end and use one of the terse final messages above.\nIf `user_secrets` is still\na human-action blocker, tell the user to ping `#powerpacks` with their\n`@powerset.co` email so a maintainer can provision per-user secrets.\n\n## `$powerset status`\n\nRun the setup check read-only with the requested or default profile:\n\n```bash\nuv run --project . python packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env \\\n  --gcp-project powerset-search\n```\n\nSummarize only `Ready` or the concise blocker/action. Do not mention the checker,\nraw counts, ADC, or individual passed checks unless the user explicitly asks for\ndebugging detail.\n\n## `$powerset whoami`\n\n```bash\nuv run --project . python packs/powerset/primitives/auth/auth.py whoami\n```\n\nReport the email and authorization/role. Do not print raw tokens.\n\n## `$powerset mcp install`\n\n```bash\nuv run --project . python packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nIf the user asks only to inspect MCP state, run:\n\n```bash\nuv run --project . python packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\n## `$powerset env pull`\n\nDefault profile is `search-core` unless the user specifies another profile.\nIt pulls the standard Powerpacks runtime secrets into `.env` on a best-effort\nbasis. The explicit `$powerset env pull` request is consent to write `.env`;\ndo not ask for separate confirmation. Run:\n\n```bash\nuv run --project . python packs/powerset/primitives/provision_runtime_env/provision_runtime_env.py pull \\\n  --profile search-core \\\n  --env-file .env \\\n  --confirm \\\n  --best-effort\n```\n\nIf this reports expired gcloud credentials or the setup check reports\n`user_secrets` with `fix_kind: interactive`, immediately run:\n\n```bash\ngcloud auth login --no-launch-browser\n```\n\nRelay the URL/code prompt tersely, then rerun the env pull command.\n\nFor non-`@powerset.co` users, do not block on the email domain. Secret Manager\nis the source of truth: if the matching per-user secrets are missing or IAM does\nnot grant access, the pull reports `not_provisioned` / `not_privileged`.\nUseful minimal profiles:\n\n- `search-network`: local search execution (`TURBOPUFFER_API_KEY`,\n  `DATABASE_URL`, `OPENAI_API_KEY`)\n- `import-contacts`: LLM review + Parallel research\n  (`OPENROUTER_API_KEY`, `PARALLEL_API_KEY`)\n\n## `$powerset create oauth app`\n\nThis alias is for msgvault/Gmail OAuth setup. Prefer browser automation:\n\n```bash\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py browser-setup\n```\n\nIf the user only wants instructions, run:\n\n```bash\nuv run --project . python packs/ingestion/primitives/msgvault_setup/msgvault_setup.py create-oauth-app\n```\n\nIf the user provided an email, add `--email <gmail>`. If they provided a Google\nCloud project, add `--project <project>`. Report the browser action and the\ncontinuation command with `--client-secret`.\n\n## `$powerset sets list` / `$powerset sets use <id|name>`\n\nUse the Powerset Search MCP for set retrieval and name resolution. Do not use\nlocal SQL for normal set listing.\n\nFor `sets list`, call the MCP `list_sets` tool and show concise rows with name,\nset ID, role, and counts.\n\nFor `sets use <id|name>`:\n\n1. Call MCP `list_sets`.\n2. Resolve the user's value against set IDs and names.\n3. Upsert exactly one local `.env` line:\n\n```dotenv\nPOWERPACKS_DEFAULT_SET_ID=<set_id>\n```\n\nIf `POWERPACKS_DEFAULT_SET_ID=` already exists, replace that line; otherwise\nappend it. Do not append duplicates. If only legacy `POWERSET_DEFAULT_SET_ID`\nexists, leave it alone and add the preferred `POWERPACKS_DEFAULT_SET_ID` line.\n\nAfter setting, report the selected set name, `set_id`, `person_count`,\n`member_count`, and `sales_nav_account_count` when available.\n", "mcp_count": 1, "mcp_refs": ["list_sets"], "name": "powerset", "pack": "powerset", "path": "packs/powerset/skills/powerset/SKILL.md", "primitive_count": 6, "primitive_refs": ["auth", "doctor", "mcp_install", "msgvault_setup", "operator_bootstrap", "provision_runtime_env"]}, {"description": "One-command Powerset login flow. Quietly refreshes credentials, env, bootstrap sync, and MCP registration, and only stops for OS installs, visible auth codes, or human actions.", "display_name": "powerset:powerset-login", "heading": "Powerset Login", "markdown": "---\nname: powerset-login\ndescription: One-command Powerset login flow. Quietly refreshes credentials, env, bootstrap sync, and MCP registration, and only stops for OS installs, visible auth codes, or human actions.\n---\n\n# Powerset Login\n\nUse this skill when the user asks for `$powerset login`, `$powerset-login`,\nor \"log me in to Powerset\". For first-run Powerset setup, runtime setup,\nsecret provisioning, or API key bootstrap, prefer the unified `$powerset setup`\ncommand in `packs/powerset/skills/powerset/SKILL.md`; it intentionally runs\nlogin plus env pull plus operator bootstrap sync plus MCP registration so users\ndo not need multiple small commands. This alias remains the right skill when an\nunrelated Powerpacks command failed because of a missing key or expired session.\n\n**This skill is built to be fast and quiet.** The user said \"log me in\" \u2014 do\nthat. Don't ask permission for every step. Use setup-check classifications to\ndecide what needs asking, but run fixes yourself from the current\ninvocation/shell so prompts, URLs, and failures are visible.\n\nUser-facing output must be terse:\n\n- Start with exactly: `Updating your credentials...`\n- Do not narrate setup checks, missing check names, token formats, MCP config\n  details, or successful substeps.\n- If a browser/code login is needed, show only the auth URL/code prompt.\n- On success, say exactly:\n  `Credentials updated. Please restart Codex to reload the Powerset MCP token.`\n- If everything was already valid, say:\n  `Credentials are already up to date. Restart Codex if the Powerset MCP still fails.`\n- For unresolved human-action blockers, give one short sentence with the action\n  required. Do not paste raw reports.\n\n## Core rule\n\nUse the read-only setup checker for diagnosis. In the normal skill flow, do not\nrun nested fix commands; they can hide interactive work inside a subprocess and\nswallow browser/code prompts. Let the skill self-heal by running the relevant\nprimitive or CLI command directly.\n\nOnly use install commands when something is actually missing. Do not reinstall\nPowerpacks adapters, MCP config, `gcloud`, or credentials when the setup check says\nthe check is already `ok`.\n\n## Canonical repo setup\n\nResolve and enter the canonical non-`.codex` Powerpacks repo before running any\nPowerset login/setup command. This ensures `.env` and bootstrap state are written\nunder the installed checkout such as `~/powerpacks`, not under an agent skill\nbundle like `~/.codex/powerpacks`.\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -d \"$candidate/packs\" && -f \"$candidate/pyproject.toml\" ]]; then\n      printf '%s\\n' \"$candidate\"\n      return 0\n    fi\n  done\n  return 1\n}\nrepo=\"$(resolve_powerpacks_root)\" || {\n  echo \"No canonical non-.codex Powerpacks repo found. Install/copy Powerpacks to ~/powerpacks first.\" >&2\n  exit 1\n}\ncd \"$repo\"\n```\n\nRun primitives from the canonical repo with `uv run --project . python packs/...`.\n\n## Happy path\n\nRun one internal read-only setup check:\n\n```bash\nuv run --project . python packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env \\\n  --gcp-project powerset-search\n```\n\nIf `overall == \"ok\"`, use the already-valid success sentence above and stop.\nThe setup check does not check gcloud application-default credentials by default;\nADC is not needed for normal Powerpacks workflows.\n\n## How to handle the setup report\n\nThe setup check returns one JSON object. The fields you care about are `checks`,\n`by_fix_kind`, and `next_actions`. Each missing/fail check has a `fix_kind`:\n\n| `fix_kind` | What to do | Ask the user? |\n| --- | --- | --- |\n| `auto` | Run the specific primitive directly from this shell. | **no** |\n| `interactive` | Run the CLI directly from this shell. For `gcloud`, use `--no-launch-browser`, echo the login URL, ask for the code, and write it to stdin. | **no**, except asking for the auth code |\n| `shell_install` | OS-level install (`brew install`, etc.). | **yes**, with the exact command shown |\n| `human_action` | Cannot be fixed by the skill (Slack ping, IAM grant from a maintainer). | tell the user, don't loop |\n\n## Workflow\n\n### Step 1 \u2014 Install/bootstrap only when missing\n\nIf `gcloud_installed` is missing, ask before running the exact OS install\ncommand from the setup report (`brew install --cask google-cloud-sdk` on macOS).\n\nIf the Powerpacks skill bundle or host adapter is missing and you are in the\nPowerpacks repo, run the repo installer for the current host instead of trying\nto repair it through a nested fix command:\n\n```bash\n./install.sh codex\n./install.sh claude-code\n```\n\nPick the host the user is currently using. If both hosts need repair, run both.\nBecause this writes outside the repo, request escalation if the sandbox\nrequires it.\n\n### Step 2 \u2014 Login directly from this shell\n\nIf `auth0_login` is missing or expired, run:\n\n```bash\nuv run --project . python packs/powerset/primitives/auth/auth.py login\n```\n\nIf `gcloud_account` is missing, run:\n\n```bash\ngcloud auth login --no-launch-browser\n```\n\nRelay the full `https://accounts.google.com/...` URL from stdout to the user.\nWhen `gcloud` asks for the verification code, ask the user for it and write it\nto the running command's stdin. If `gcloud` cannot read or write\n`~/.config/gcloud`, request escalation for `gcloud auth ...`.\n\nIf `gcloud_account` is a non-`@powerset.co` account, do not reject it only\nbecause of the domain. The env pull path is per-user scoped and GCP Secret\nManager IAM is the source of truth. If matching per-user secrets are missing or\ndenied, surface that structured blocker.\n\nDo not check or configure gcloud application-default credentials during the\nnormal login flow. Only run `gcloud auth application-default login\n--no-launch-browser` if the user explicitly asks for SDK/client ADC debugging.\n\n### Step 3 \u2014 Pull secrets and register MCP directly\n\nIf `env_file` is missing keys and `user_secrets` is accessible, run:\n\n```bash\nuv run --project . python packs/powerset/primitives/provision_runtime_env/provision_runtime_env.py pull \\\n  --profile search-core \\\n  --env-file .env \\\n  --confirm \\\n  --best-effort\n```\n\nIf `mcp_powerset_search` is missing but a host CLI exists, run:\n\n```bash\nuv run --project . python packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nIf `mcp_powerset_search` says no MCP host CLI is on PATH, that is an install\ngap: use `./install.sh codex` or `./install.sh claude-code` only for the host\nthe user is using, or tell the user which host CLI is missing.\n\n### Step 4 \u2014 Human-action blockers\n\n**`human_action`** entries:\n\n- `auth0_role` warn \u2192 \"You're logged in but haven't been granted a Powerpacks\n  role on Auth0. Ping #powerpacks on Slack with your @powerset.co email and\n  ask to be added to the Powerpacks role.\"\n- `user_secrets` `not_provisioned` / `not_privileged` \u2192 \"You're set up\n  locally but don't have GCP per-user secrets yet. Ping #powerpacks on\n  Slack with the email you use for gcloud \u2014 a maintainer will run\n  `provision_user_secrets apply --users <you>` and you can re-run\n  `$powerset login`.\"\n\nThese are not blockers for unrelated workflows unless that workflow needs the\nmissing shared infra key.\n\n### Step 5 \u2014 Final state\n\nRe-run the setup check and report a terse final message:\n\n- `overall: ok` \u2192 \"Credentials updated. Please restart Codex to reload the\n  Powerset MCP token.\"\n- `overall: warn` \u2192 same, but mention the remaining warning in one short phrase.\n- `overall: needs_setup` \u2192 list the still-blocked items and what the user\n  needs to do.\n\n## Hard rules\n\n- **Never print secret values.** Every primitive redacts.\n- **Never run an OS install command without explicit user approval.** That's\n  the `shell_install` line.\n- **Never write `.env` without `--confirm`.** All primitive paths refuse\n  without it.\n- Real authorization is enforced by GCP IAM on Secret Manager resources; do not\n  add a separate email-domain gate in front of env pull.\n- Per-user secret IDs follow `powerpacks-users-<slug>-<capability>`. The\n  active `gcloud` account decides scope.\n\n## Profiles\n\n| Profile | Includes | When to pick |\n| --- | --- | --- |\n| `search-core` | Standard Powerpacks runtime secrets | default setup for search plus messages review/research |\n| `search-network` | TurboPuffer + database + OpenAI only | minimal local `/search-network` setup |\n| `import-contacts` | OpenRouter + Parallel only | minimal `$import-contacts` review/research setup |\n| `messages` | OpenRouter + Parallel | `import-contacts` LLM/research extras |\n| `sales-nav` | RapidAPI LinkedIn | LinkedIn enrichment |\n| `twitter` | RapidAPI Twitter | Twitter pipelines |\n| `supabase-admin` | Supabase URL + service role | admin only |\n| `all` | every allowlisted key | one-shot full setup |\n\nPass `--profile <name>` to the setup check and to the direct provisioning\nprimitive.\n\n## Maintainer-only: provisioning a new user\n\nIf a user shows up in `#powerpacks` with `user_secrets: not_provisioned`, a\nmaintainer (anyone with `roles/owner` on `powerset-search`) runs:\n\n```bash\nuv run --project . python packs/powerset/primitives/provision_user_secrets/provision_user_secrets.py plan \\\n  --users newperson@powerset.co \\\n  --project powerset-search --with-diff\n\nuv run --project . python packs/powerset/primitives/provision_user_secrets/provision_user_secrets.py apply \\\n  --users newperson@powerset.co \\\n  --project powerset-search --confirm\n```\n\nIdempotent. Re-running on an existing user reconciles missing IAM bindings\nor refreshes secret versions when the source value changed.\n", "mcp_count": 0, "mcp_refs": [], "name": "powerset-login", "pack": "powerset", "path": "packs/powerset/skills/powerset-login/SKILL.md", "primitive_count": 5, "primitive_refs": ["auth", "doctor", "mcp_install", "provision_runtime_env", "provision_user_secrets"]}, {"description": "List accessible Powerset sets, show the active default set, or set POWERPACKS_DEFAULT_SET_ID so local Powerpacks search primitives inherit the desired set scope.", "display_name": "powerset:powerset-set", "heading": "Powerset Set", "markdown": "---\nname: powerset-set\ndescription: List accessible Powerset sets, show the active default set, or set POWERPACKS_DEFAULT_SET_ID so local Powerpacks search primitives inherit the desired set scope.\n---\n\n# Powerset Set\n\nUse this skill when the user wants to choose, inspect, retrieve, list, switch,\nor set the active Powerset set for local Powerpacks search.\n\nThe skill uses the Powerset Search MCP for set retrieval and name resolution.\nIt only manages local set scope:\n\n- lists sets accessible to the logged-in Powerset user\n- shows the resolved default set and operator IDs\n- writes `POWERPACKS_DEFAULT_SET_ID` into the local ignored `.env`\n- does not upload contacts, run searches, or mutate server-side set membership\n\n## Canonical repo setup\n\nFor `$powerset sets use <id|name>`, resolve and enter the canonical non-`.codex`\nPowerpacks repo before writing `.env`:\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -d \"$candidate/packs\" && -f \"$candidate/pyproject.toml\" ]]; then\n      printf '%s\\n' \"$candidate\"\n      return 0\n    fi\n  done\n  return 1\n}\nrepo=\"$(resolve_powerpacks_root)\" || {\n  echo \"No canonical non-.codex Powerpacks repo found. Install/copy Powerpacks to ~/powerpacks first.\" >&2\n  exit 1\n}\ncd \"$repo\"\n```\n\nFor read-only set listing, still prefer the canonical repo when available.\n\n## Workflow\n\n1. Ensure Powerset setup exists. If credentials or MCP registration are missing,\n   route the user to `$powerset setup`.\n2. Confirm the Powerset Search MCP is installed when needed:\n\n```bash\nuv run --project . python packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\n3. List sets by calling the Powerset Search MCP `list_sets` tool directly.\n   Do not use local SQL or `set_scope.py` for normal set retrieval.\n\n4. Show the current default by reading `POWERPACKS_DEFAULT_SET_ID` from the\n   local `.env`, then matching that ID against the MCP `list_sets` result.\n   If `POWERPACKS_DEFAULT_SET_ID` is unset, check legacy\n   `POWERSET_DEFAULT_SET_ID`.\n\n5. Set the default by ID or name:\n\n- call MCP `list_sets`\n- resolve the user's `<name>` or `<set_id>` against the returned sets\n- upsert only this local `.env` line. If `POWERPACKS_DEFAULT_SET_ID=` already\n  exists, replace that line; otherwise append it. Do not append duplicates.\n\n```dotenv\nPOWERPACKS_DEFAULT_SET_ID=<set_id>\n```\n\n6. After setting, report the selected set name, `set_id`, `person_count`,\n   `member_count`, and `sales_nav_account_count` from MCP. Only run\n   `resolve_set_operators` if the user specifically asks to validate local\n   TurboPuffer operator scoping.\n\n## Notes\n\n- `set_id` is a Powerset set UUID.\n- Local search primitives resolve it to `operator_ids` before applying\n  TurboPuffer `allowed_operator_ids`.\n- `POWERPACKS_DEFAULT_SET_ID` is preferred. `POWERSET_DEFAULT_SET_ID` is still\n  accepted as a legacy alias by search primitives.\n- The remote MCP owns set listing. The local repo owns only the default choice\n  stored in `.env`.\n", "mcp_count": 1, "mcp_refs": ["list_sets"], "name": "powerset-set", "pack": "powerset", "path": "packs/powerset/skills/powerset-set/SKILL.md", "primitive_count": 2, "primitive_refs": ["mcp_install", "resolve_set_operators"]}, {"description": "Update/reinstall Powerpacks agent skills from the canonical Powerpacks checkout. Use for $update-powerpacks when the user wants Codex, Claude Code, or Pi skills refreshed after code changes.", "display_name": "powerset:update-powerpacks", "heading": "update-powerpacks", "markdown": "---\nname: update-powerpacks\ndescription: Update/reinstall Powerpacks agent skills from the canonical Powerpacks checkout. Use for $update-powerpacks when the user wants Codex, Claude Code, or Pi skills refreshed after code changes.\n---\n\n# update-powerpacks\n\nUse this skill for `$update-powerpacks` only when the user wants to update the\nPowerpacks code checkout and reinstall the agent-facing skills.\n\nThis skill does exactly two things:\n\n1. Pull/update the canonical Powerpacks repo when safe.\n2. Reinstall Powerpacks skills for the current agent environment.\n\nIt must not run setup, inspect/import sources, sync msgvault, authenticate\nWhatsApp, run enrichment, run processing, run doctor/fix, repair state, or move\n`.powerpacks` data.\n\n## Resolve canonical repo\n\nRun from a canonical non-`.codex` Powerpacks checkout. Prefer, in order:\n\n1. `$POWERPACKS_REPO_ROOT` if it points to a Powerpacks repo;\n2. current working directory if it is a Powerpacks repo and not under `.codex`;\n3. `~/powerpacks`;\n4. `~/workspace/powerpacks`.\n\n```bash\nresolve_powerpacks_root() {\n  for candidate in \"${POWERPACKS_REPO_ROOT:-}\" \"$PWD\" \"$HOME/powerpacks\" \"$HOME/workspace/powerpacks\"; do\n    [[ -n \"$candidate\" ]] || continue\n    [[ \"$candidate\" != *\"/.codex/\"* ]] || continue\n    if [[ -d \"$candidate/packs\" && -f \"$candidate/pyproject.toml\" ]]; then\n      printf '%s\\n' \"$candidate\"\n      return 0\n    fi\n  done\n  return 1\n}\nrepo=\"$(resolve_powerpacks_root)\" || {\n  echo \"No canonical non-.codex Powerpacks repo found. Install/copy Powerpacks to ~/powerpacks first.\" >&2\n  exit 1\n}\ncd \"$repo\"\n```\n\nIf no canonical checkout exists, ask the user where it should live. Do not create\nor use `~/.codex/powerpacks` as the runtime checkout.\n\n## Update code\n\nCheck for local changes, but ignore known generated dependency lockfile churn:\n\n```bash\nignored_dirty_paths='^(app/package-lock\\.json)$'\ngit status --short\nblocking_dirty=\"$(git status --short --porcelain=v1 | awk '{print $2}' | grep -Ev \"$ignored_dirty_paths\" || true)\"\n```\n\nIf `blocking_dirty` is empty, pull fast-forward:\n\n```bash\ngit fetch --quiet || true\ngit pull --ff-only || true\n```\n\nIf only ignored generated paths are dirty, do not stop just because of them.\nIf `git pull --ff-only` refuses to continue because one of those ignored paths\nwould be overwritten, restore only the ignored path and retry once:\n\n```bash\ngit restore -- app/package-lock.json\ngit pull --ff-only || true\n```\n\nIf `blocking_dirty` is non-empty or the retry still fails, stop and report the\nstatus. Do not stash, reset, merge, or overwrite other user changes without\nexplicit approval.\n\n## Reinstall skills\n\nFor Codex:\n\n```bash\nbin/update-codex\n```\n\nFor Claude Code:\n\n```bash\nbin/update-claude-code\n```\n\nFor Pi:\n\n```bash\nadapters/pi/install.sh\n```\n\nIf the user did not specify the agent, infer it from context when obvious. If not\nobvious, run the installer for the current agent only.\n\n## Finish\n\nTell the user:\n\n- which repo path was updated;\n- which installer ran;\n- the current git commit;\n- that they must restart/reload the agent to pick up changed skills.\n\nDo not run any post-update setup/status/import checks. `$update-powerpacks` is\nonly a code/skill refresh command.\n", "mcp_count": 0, "mcp_refs": [], "name": "update-powerpacks", "pack": "powerset", "path": "packs/powerset/skills/update-powerpacks/SKILL.md", "primitive_count": 0, "primitive_refs": []}, {"description": "Run a Sales Navigator search through the Powerset Search MCP. Resolves company / title filters to LinkedIn IDs, runs a paginated lead search with server-side artifact persistence on by default, and offers paginated retrieval via get_artifact.", "display_name": "powerset:sales-nav-search", "heading": "Sales Nav Search", "markdown": "---\nname: sales-nav-search\ndescription: Run a Sales Navigator search through the Powerset Search MCP. Resolves company / title filters to LinkedIn IDs, runs a paginated lead search with server-side artifact persistence on by default, and offers paginated retrieval via get_artifact.\n---\n\n# Sales Nav Search\n\nUse this skill when the user asks for `/sales-nav-search <query>`,\n\"find LinkedIn leads at <company>\", \"show me sales nav results for <title>\",\nor any other Sales Navigator search request scoped to the user's set.\n\nThe skill is in its own pack (`packs/sales-nav`) but **depends on\n`packs/powerset`** for Auth0 login and MCP install. If those aren't ready,\nroute the user to `$powerset setup` first.\n\nIt calls these MCP tools served by the remote `powerset-search` MCP at\n`https://search-api-7wk4uhe77q-uw.a.run.app/mcp`:\n\n- `sales_nav_resolve` \u2014 turn company names + titles into LinkedIn\n  `company_ids` / canonical title strings\n- `sales_nav_search` \u2014 paginated lead search scoped to the user's set;\n  with `conversation_id` + `persist_artifact: true` the server writes a\n  Supabase artifact row and returns an `artifact_id`\n- `get_artifact` \u2014 paginated retrieval of a persisted artifact\n- `enrich_extended_profiles` \u2014 enrich selected lead member IDs with profile\n  fields, then persist them back to the latest Sales Nav artifact\n- `sales_nav_resolve_member_ids` \u2014 resolve mutual member IDs to LinkedIn URLs\n  through cache/free layers by default\n\nThe skill itself does not call HTTP \u2014 Claude Code / Codex invoke the MCP\ntools directly once `mcp_install` (in `packs/powerset`) has registered the\nserver.\n\n## Hard rules\n\n- This skill **requires** the `powerset-search` MCP. If it is not\n  registered, route the user through `$powerset setup` \u2192\n  `mcp_install install --host all`.\n- Every Sales Nav call is **scoped to a `set_id`**. The MCP server enforces\n  the set context. Pass the one the user specifies. If the user does not\n  specify one, resolve the default with\n  `packs/search/primitives/resolve_set_operators/resolve_set_operators.py`\n  so it can inherit `POWERPACKS_DEFAULT_SET_ID` / `POWERSET_DEFAULT_SET_ID`, or\n  fall back to the logged-in operator's active personal set. Do not invent or\n  guess `set_id`s.\n- **Default to `persist_artifact: true` on every `sales_nav_search` call.**\n  Persistence is cheap and lets the user (or the agent in a later turn) page\n  large result sets via `get_artifact`. Only pass `persist_artifact: false`\n  when the user explicitly asks for an ephemeral search.\n- Persistence requires a `conversation_id`. See the conversation_id playbook\n  below \u2014 without one, persistence is silently skipped server-side and you\n  only get the inline `leads` list back.\n- Lead profiles can include LinkedIn URLs and contact metadata. Treat them\n  as sensitive: keep them in local `.powerpacks/` handoff files and present only\n  compact summaries in chat unless the user asks for details.\n- Do not pass accumulated lead/mutual payloads through chat or command args.\n  Save each MCP page response to a small JSON file, then run\n  `sales_nav_artifacts ingest-page --response <path>` so later steps pass only\n  paths/state.\n- **Default to the orchestrator.** For normal runs, do not hand-compose a long\n  MCP/tool sequence in chat. Create a search args/plan JSON, run\n  `sales_nav_pipeline`, execute only the `blocked_tool_call` it emits, save the\n  response to the requested path, then continue until completed or blocked.\n  Use primitives directly only for narrow debugging or power-user requested\n  edits.\n- For clear, unambiguous searches, do not ask approval/clarifying questions.\n  Resolve filters, build a one-or-more-query search plan, let the orchestrator\n  search, ingest full artifact content, enrich the visible leads, resolve mutual\n  URLs locally, export CSVs, and present a compact summary. Ask only when a\n  filter is genuinely ambiguous (for example multiple plausible \"Cisco\"\n  companies) or when the user asks to page/enrich far beyond the visible result\n  set.\n- Start a fresh Sales Nav search for each search request. Do not scan, discover,\n  reuse, resume, or refine from previous `.powerpacks/sales-nav`, artifact,\n  `artifact_id`, CSV, JSONL, manifest, or state files. You may use artifacts\n  created by the current run for ingestion, enrichment, pagination, and export.\n- Do not auto-page endlessly. It is OK for the orchestrator search plan to\n  include deliberate same-turn fallback queries/pages for robustness (for\n  example strict role + company-only fallback), but otherwise surface\n  `has_more` / `next_start_offset` and ask before loading more.\n- Keep fallback searches structured before falling back to free text. If an\n  exact current-company query returns 0, retry with the same org ID in\n  `past_company_ids` before using `keywords`. Keywords are the last fallback.\n\n## Prereqs\n\nRun this once. It starts Auth0 login if credentials are missing or expired,\nthen installs the MCP into the chosen host:\n\n```bash\n./install-powerset-mcp.sh --host all\n```\n\nIf on Codex, rerun MCP install when the Auth0 token needs to be refreshed.\nThe installer writes a fresh `Authorization` header into `~/.codex/config.toml`:\n\n```bash\n./install-powerset-mcp.sh --host codex\n```\n\n## conversation_id playbook\n\n`conversation_id` is a Supabase `conversations.id`. The MCP server uses it\nto scope artifact reads/writes to a specific conversation. Three ways to\nget one:\n\n1. **From search.powerset.dev** \u2014 copy the conversation id from the URL\n   when the user has an open chat.\n2. **REST API** \u2014 `POST /v2/conversations` with the user's bearer token\n   returns `{ \"id\": \"...\" }`.\n3. **Per-skill ephemeral session** \u2014 generate a UUID4 the first time you\n   need one in the current skill invocation and reuse it for follow-ups\n   in the same turn. The artifact rows still persist in Supabase keyed by\n   that id; they just won't be linked to a webapp conversation.\n\nAlways pass the same `conversation_id` to subsequent `sales_nav_search`\ncalls and the matching `get_artifact` call.\n\n## Fast path runner\n\nPrefer the resumable Sales Nav orchestrator for normal runs:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_pipeline/sales_nav_pipeline.py run \\\n  --query \"<user query>\" \\\n  --set-id \"<set_id>\" \\\n  --search-plan-json .powerpacks/sales-nav/<run>/search_plan.json\n```\n\nFor a single simple pass, `--search-args-json` is still accepted. Prefer\n`--search-plan-json` because robust Sales Nav recall often needs multiple\nqueries.\n\nThe runner owns local state for the current invocation and exits with\n`status: blocked_tool_call` whenever the harness should call a `powerset-search`\nMCP tool. The block includes the `tool_name`, `tool_args`, `save_response_to`,\nand `continue_command`. The harness/agent should call the MCP tool natively,\nwrite the JSON response to the specified path, then run the continue command.\nLocal ingest, lead enrichment, mutual URL resolution, export, scoring approvals,\nand the ledger are handled by the runner.\n\nFor follow-up qualitative search criteria, run a new Sales Nav search. Only pass\n`--criteria` when the user explicitly asks to score or analyze the current run's\nloaded leads rather than search again.\n\nSearch plan shape:\n\n```json\n{\n  \"score_criteria\": \"investment/endowment team\",\n  \"queries\": [\n    {\"id\": \"finance\", \"label\": \"parent company + finance\", \"args\": {\"company_ids\": [163348], \"function_ids\": [\"10\"]}},\n    {\"id\": \"company_only\", \"label\": \"parent company only\", \"args\": {\"company_ids\": [163348]}}\n  ]\n}\n```\n\nThe MCP `sales_nav_search` schema accepts current-company IDs via\n`company_ids`, past-company IDs via `past_company_ids`, optional display-name\nmaps for both, and text filters. Keep unrelated agent-only annotations in plan\nmetadata; the orchestrator strips unsupported fields from tool args.\n\n## Local file handoff\n\nNormally `sales_nav_pipeline` performs these local handoffs. Use the primitives\nbelow directly only when debugging a failed block in the current run or honoring\na power-user request to operate at the primitive level.\n\nUse `packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py` as\nthe durable local store for each skill invocation. It normalizes MCP page output\ninto these files:\n\n- `leads.jsonl` \u2014 internal handoff, one row per lead with `member_id`,\n  `profile_id`, `source_account_ids`, `operators`, `mutual_member_ids`,\n  `total_interactions` when present, `linkedin_url`, title/company/location,\n  enriched profile fields (`summary`, `experiences`, `education`, `enriched`)\n  when available, artifact/source metadata, and seen counts.\n- `mutuals.jsonl` \u2014 internal handoff, one row per lead\u2194mutual edge with\n  `lead_member_id`, `mutual_member_id`, mutual LinkedIn URL if resolved,\n  `total_interactions` when present, operator/source metadata, and\n  artifact/source metadata.\n- `member_urls.json` \u2014 `member_id -> LinkedIn URL` results from\n  `sales_nav_resolve_member_ids`.\n- `manifest.json` / `state.json` \u2014 paths, counts, artifact ids, pages.\n- `exports/leads.csv` and `exports/mutuals.csv` \u2014 final user-facing CSVs written\n  only when you run `export`.\n\nInitialize once per search:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py init \\\n  --query \"<user query>\" \\\n  --set-id \"<set_id>\" \\\n  --conversation-id \"<conversation_id>\"\n```\n\nDo not ingest compact MCP preview rows when full artifact content is available.\nAfter each MCP `sales_nav_search`, save the response for audit, then immediately\ncall `get_artifact(include_content=true)` for the returned `artifact_id`, save\nthat full artifact response, and ingest with `--prefer-content`:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py ingest-page \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json \\\n  --response .powerpacks/sales-nav/runs/<run>/pages/artifact-full-000.json \\\n  --prefer-content\n```\n\nWhen the user asks for mutual LinkedIn URLs, first get pending IDs from the\nlocal file store:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py pending-mutual-ids \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json --limit 100\n```\n\nPass those IDs to MCP `sales_nav_resolve_member_ids`, save the MCP response,\nthen merge it:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py ingest-member-urls \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json \\\n  --response .powerpacks/sales-nav/runs/<run>/member_urls.response.json\n```\n\nAfter `enrich_extended_profiles`, call `get_artifact(include_content=true)` again\nand ingest with `--prefer-content` so `leads.jsonl` contains the full enriched\nprofile fields (`summary`, `experiences`, `education`).\n\nFor final files:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py export \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json\n```\n\nDo not use local lookup to answer search/refinement requests. The lookup\nprimitive is only for explicit inspection of the current run's local files, not\nfor deciding whether to avoid a new Sales Nav search:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/sales_nav_artifacts/sales_nav_artifacts.py lookup \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json --query \"<name/company/title>\"\n```\n\nFor explicit current-run analysis requests (for example \"score these current\nresults for real estate exposure\"), use the scoring primitive instead of\ngrepping manually. For search/refinement requests, run a new Sales Nav search:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/sales-nav/primitives/score_sales_nav_leads/score_sales_nav_leads.py \\\n  --state .powerpacks/sales-nav/runs/<run>/state.json \\\n  --criteria \"real estate exposure\" \\\n  --threshold 0.7\n```\n\nIt fans out over `leads.jsonl`, includes joined mutual context, writes only\nmatching leads to `scores/<criteria>/matches.jsonl`, and writes the user-facing\n`matches.csv`. Non-matches are not written unless `--dump-debug` is passed.\n\n## Manual workflow / debugging reference\n\nThe normal workflow is the orchestrator loop above. The lower-level sequence\nbelow documents what the orchestrator is doing and is useful when a block fails\nor a power user wants to call primitives directly.\n\n### Step 0 \u2014 Confirm prereqs\n\n```bash\nuv run --project powerpacks python powerpacks/packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\nIf `installed: false` for the host the user is on, route to\n`$powerset setup` first.\n\n### Step 0b \u2014 Resolve set scope\n\nIf the user provided a `set_id`, use it. Otherwise run:\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_set_operators/resolve_set_operators.py \\\n  --env-file .env\n```\n\nUse the returned `set_id` in Sales Nav MCP calls. The returned\n`operator_ids` are useful for parity with local TurboPuffer searches, but the\nSales Nav MCP is still scoped by `set_id`.\n\n### Step 1 \u2014 Decide whether to resolve filters\n\nIf the user gave you free-text companies or titles, call\n`sales_nav_resolve` first to convert them into stable IDs / canonical\nstrings. If there is a single obvious recommended company/title match, proceed\nwithout asking. Ask the user only when multiple plausible matches are genuinely\nambiguous (for example many unrelated \"Cisco\" entities and no exact/obvious\nmatch):\n\n```text\nTool: sales_nav_resolve\nArgs: {\n  \"set_id\": \"<the user's set>\",\n  \"companies\": [\"Stripe\", \"Ramp\"],\n  \"titles\": [\"staff engineer\", \"principal engineer\"]\n}\n```\n\nIf the user already gave you a `company_id` or `function_id`, skip this\nand go straight to step 2.\n\nResolution robustness:\n\n- LinkedIn company URLs should be passed directly to `sales_nav_resolve`; the\n  server can resolve vanity slugs such as `linkedin.com/company/genies-inc`.\n- Endowment / investment office / foundation phrases often name a team rather\n  than a LinkedIn company. Resolve the parent institution too. Example:\n  `\"Dartmouth endowment\"` should be tried with `\"Dartmouth\"` /\n  `\"Dartmouth College\"`, then the search plan should use the parent org ID plus\n  finance/investment keywords and a parent company-only fallback.\n- If the first resolve call returns no company matches, do not stop. Retry once\n  in the same turn with cleaned parent/name variants before telling the user it\n  cannot be resolved.\n- If a current-company search returns 0 for a resolved org, keep the same org\n  ID and run a past-company query next. Only use keyword fallback after the\n  structured current/past company paths are empty or unavailable.\n\nMode defaults:\n\n- \"who works at Brookfield\" / \"who's in my extended network at Cisco\" \u2192 company\n  search. Resolve company, search it, ingest full artifact content, enrich the\n  visible page, export.\n- \"who works at Brookfield in the finance department\" \u2192 same company search plus\n  finance intent. Use reliable Sales Nav filters if known (`function_ids`), and\n  also pass targeted `keywords`/`title` when helpful. If the first query is too\n  sparse, retry once or twice by relaxing the weakest text filter while keeping\n  the company/set fixed.\n- \"show me people with real estate exposure\" after a Sales Nav run \u2192 run a new\n  Sales Nav search with the updated criteria. Do not scan previous `leads.jsonl`\n  or local artifacts for refinement.\n\n### Step 2 \u2014 Run the search (always with persistence)\n\nInitialize the local file store before the MCP call if you have not already.\n\n```text\nTool: sales_nav_search\nArgs: {\n  \"set_id\":         \"<the user's set>\",\n  \"conversation_id\":\"<UUID \u2014 see conversation_id playbook>\",\n  \"persist_artifact\": true,\n  \"company_ids\":    [...],         // from sales_nav_resolve\n  \"company_names\":  {\"<org_id>\": \"<display name>\"},\n  \"past_company_ids\": [...],       // alumni / worked-at searches\n  \"past_company_names\": {\"<org_id>\": \"<display name>\"},\n  \"title\":          \"staff engineer\",\n  \"function_ids\":   [...],\n  \"seniority_ids\":  [...],\n  \"geography_ids\":  [...],\n  \"headcount_ids\":  [...],\n  \"keywords\":       \"distributed systems\",\n  \"count\":          25,            // max 25 per page\n  \"start_offset\":   0\n}\n```\n\nResponse shape (with persistence):\n\n```jsonc\n{\n  \"artifact_id\": \"...\",\n  \"artifact\": { /* metadata */ },\n  \"total_count\": 1342,\n  \"max_total_count\": 2500,\n  \"results_returned\": 25,\n  \"has_more\": true,\n  \"next_start_offset\": 25,\n  \"filters_used\": { /* what the server actually filtered on */ },\n  \"reconnect_required\": false,\n  \"leads\": [\n    {\n      \"name\": \"...\",\n      \"headline\": \"...\",\n      \"linkedin_url\": \"...\",\n      \"company\": \"...\",\n      \"location\": \"...\",\n      \"mutual_count\": 3,\n      \"mutual_member_ids\": [\"...\", \"...\"]\n    }\n  ]\n}\n```\n\n`reconnect_required: true` means the user's Unipile/LinkedIn session\nneeds upstream re-auth; tell the user and stop. Do not retry.\n\nSave the MCP response for audit, but ingest the full artifact content: call\n`get_artifact` with `include_content: true`, save that response, then run\n`sales_nav_artifacts ingest-page --prefer-content` on it. The primitive records\n`artifact_id`, lead rows, mutual edges, and source/operator metadata in local\nhandoff files.\n\nThen enrich the visible leads by default:\n\n```text\nTool: enrich_extended_profiles\nArgs: {\n  \"conversation_id\": \"<same conversation_id>\",\n  \"member_ids\": [<member_ids from this visible page>],\n  \"set_id\": \"<same set_id>\"\n}\n```\n\nAfter enrichment, call `get_artifact(include_content=true)` again and ingest\nwith `--prefer-content`. This is what puts full profile data (`summary`,\n`experiences`, `education`) into `leads.jsonl`.\n\nEvery follow-up retrieval (next page, mutual lookup, re-display) should use the\nlocal state path plus `get_artifact` / `sales_nav_resolve_member_ids` as needed.\n\n### Step 3 \u2014 Present the first page\n\n- Lead with `total_count`, `results_returned`, and any non-zero `mutual`\n  counts.\n- For each lead present `name`, `headline`, `company`, `location`,\n  `mutual_count`, and `linkedin_url`.\n- Mention `artifact_id` to the user (they may want to reference it across\n  turns / sessions).\n- If `has_more`, ask if they want page N+1 \u2014 do **not** auto-fetch.\n\n### Step 4 \u2014 Paginate via get_artifact\n\nSubsequent pages of the same result set should go through\n`get_artifact`, not a fresh `sales_nav_search`. Save each page response and\nappend it to the same local files with `sales_nav_artifacts ingest-page`:\n\n```text\nTool: get_artifact\nArgs: {\n  \"artifact_id\":     \"<from step 2>\",\n  \"offset\":          25,\n  \"limit\":           25,\n  \"include_content\": true    // prefer full accumulated lead shape for local files\n}\n```\n\nThis avoids re-running an expensive Sales Nav fetch and keeps the\nfilters/result-set stable across pages. For each retrieved page, prefer\n`include_content=true` + `ingest-page --prefer-content` so local files keep the\nfull accumulated lead shape. The local primitive dedupes by `member_id` and\nappends new lead\u2194mutual edges to `mutuals.jsonl`.\n\n### Step 5 \u2014 Refining filters\n\nRefining upstream Sales Nav filters is a **new search**, not pagination. Re-call\n`sales_nav_search` with the new args, the same `conversation_id`, and\n`persist_artifact: true`. You'll get back a new `artifact_id`. Tell the\nuser the artifact id changed.\n\nRefining over already-loaded people is a **new Sales Nav search**. For\nquestions like \"which of these have real estate exposure\", \"who is in NYC\", or\n\"show the Brookfield VPs with mutuals\", do not scan local state first. Re-call\n`sales_nav_search` with the updated filters and `persist_artifact: true`.\n\n| User says | What changes |\n| --- | --- |\n| \"next page\" | `get_artifact` with `offset += 25` |\n| \"narrow to NYC\" | new `sales_nav_search` with `geography_ids` |\n| \"only senior+ folks\" | new `sales_nav_search` with `seniority_ids` |\n| \"filter to mid-stage companies\" | new `sales_nav_search` with `headcount_ids` |\n| \"show me their mutual\" | use current-run `mutual_member_ids`; do not scan prior artifacts |\n\n### Step 6 \u2014 Resuming a previous search\n\nDo not resume previous searches. If the user references a prior `artifact_id`\nwhile asking for search results, run a new search instead. Only call\n`get_artifact` for an old artifact when the user explicitly asks to inspect that\nartifact rather than run a search.\n\n## What this skill does NOT do\n\n- It does not write leads to your local `contacts.csv`. Lead \u2192 contact\n  promotion is a separate (future) `import-sales-nav-leads` skill, likely\n  also under `packs/sales-nav`.\n- It does not promote leads into the Powerset main set. That UI affordance\n  is on the web app today.\n- It does not run a sequence of pages on its own. Pagination is always\n  user-confirmed and goes through `get_artifact`.\n", "mcp_count": 4, "mcp_refs": ["enrich_extended_profiles", "sales_nav_resolve", "sales_nav_resolve_member_ids", "sales_nav_search"], "name": "sales-nav-search", "pack": "sales-nav", "path": "packs/sales-nav/skills/sales-nav-search/SKILL.md", "primitive_count": 4, "primitive_refs": ["resolve_set_operators", "sales_nav_artifacts", "sales_nav_pipeline", "score_sales_nav_leads"]}, {"description": "Resolve company names, company descriptions, investor/funding filters, or vertical queries into canonical TurboPuffer company IDs for downstream people search.", "display_name": "powerset:search-company", "heading": "Search Company", "markdown": "---\nname: search-company\ndescription: Resolve company names, company descriptions, investor/funding filters, or vertical queries into canonical TurboPuffer company IDs for downstream people search.\n---\n\n# Search Company\n\nUse this when the user asks for company search directly, or when they want the\ncompany set behind a people search inspected first.\n\nExamples:\n\n- `/search-company database companies`\n- `/search-company series b fintech startups in california`\n- `/search-company companies backed by sequoia`\n\n## Workflow\n\nFresh company resolution only: do not scan, discover, reuse, or resume prior\ncompany search artifacts, state files, CSVs, JSONL, or manifests. Resolve the\ncompany set from the user's current request every time.\n\n1. Decompose the request into the `role-search-filters` company fields only:\n   `company_names`, `company_semantic_queries`, `entity_types`, `sector_types`,\n   funding/headcount filters, company geography, `investor_names`, and\n   resolved `investors`. Preserve `set_id` when the user provides one.\n2. Resolve set scoping before company resolution. If the user did not provide a\n   `set_id`, run `resolve_set_operators` without `--set-id` so it inherits\n   `POWERPACKS_DEFAULT_SET_ID` / `POWERSET_DEFAULT_SET_ID`, or falls back to the\n   logged-in operator's active personal set. Copy the returned `operator_ids`\n   into the company resolver payload. Do not pass the raw set UUID as\n   `allowed_operator_ids`.\n3. If `investor_names` are present, run `resolve_investors` first and record or\n   copy the returned `investor_urns` into `investors`.\n4. Run `resolve_companies`.\n5. Present the returned company count, sample companies, set scope, and the company IDs\n   artifact/state path when available.\n6. If the user wants people at those companies, pass `company_ids` and\n   `operator_ids` into\n   `search-network`; for large company sets, use `apply_prefilters` so people\n   search batches company IDs instead of sending one giant `company_id In [...]`.\n\n## Query Guidance\n\nUse `company_semantic_queries` for vertical/domain intent, not just\n`sector_types`. Coarse sectors are useful, but the resolver needs an explicit\nsector strategy:\n\n- Use `company_sector_strategy: \"staged\"` by default for ambiguous domain\n  searches. This starts with sector-intersected semantic search and broadens if\n  the hard frontier is too small.\n- Use `company_sector_strategy: \"soft_union\"` when recall matters more than\n  precision or labels are known to be incomplete. This matches semantic results\n  OR sector-filter matches.\n- Use `company_sector_strategy: \"hard_filter\"` when the user explicitly wants\n  sector labels as a strict constraint.\n- Use `company_sector_strategy: \"semantic_only\"` when sector labels are too\n  noisy for the requested company domain.\n\nGood:\n\n```json\n{\n  \"company_semantic_queries\": [\n    \"Companies building database systems, hosted databases, data storage engines, database infrastructure, SQL or NoSQL databases, or developer platforms for managing application data.\"\n  ],\n  \"sector_types\": [\"data\"],\n  \"company_sector_strategy\": \"staged\",\n  \"company_sector_min_results\": 500\n}\n```\n\nBad:\n\n```json\n{ \"sector_types\": [\"data\"] }\n```\n\n## Commands\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_set_operators/resolve_set_operators.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_investors/resolve_investors.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n\n```bash\nuv run --project powerpacks python powerpacks/packs/search/primitives/resolve_companies/resolve_companies.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n", "mcp_count": 0, "mcp_refs": [], "name": "search-company", "pack": "search", "path": "packs/search/skills/search-company/SKILL.md", "primitive_count": 4, "primitive_refs": ["apply_prefilters", "resolve_companies", "resolve_investors", "resolve_set_operators"]}, {"description": "Run a role-first people search from a natural-language query, job description, or URL. Use when the user wants the agent to decompose the request, show one compact search preview, then execute retrieval, hydration, LLM filtering/reranking, and result export. For complex JDs, detect broad multi-trait intent, plan multiple narrow searches, execute the probes, review with a bounded LLM budget, cluster exemplars, and run bounded fan-out searches.", "display_name": "powerset:search-network", "heading": "Search Network", "markdown": "---\nname: search-network\ndescription: Run a role-first people search from a natural-language query, job description, or URL. Use when the
