": "count_candidates", "pack": "search", "path": "packs/search/primitives/count_candidates"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "decide_search_strategy", "pack": "search", "path": "packs/search/primitives/decide_search_strategy"}, {"entrypoint": "packs/search/primitives/execute_role_search/execute_role_search.py", "file_count": 2, "has_readme": true, "name": "execute_role_search", "pack": "search", "path": "packs/search/primitives/execute_role_search"}, {"entrypoint": "packs/search/primitives/execute_search_slice/execute_search_slice.py", "file_count": 2, "has_readme": true, "name": "execute_search_slice", "pack": "search", "path": "packs/search/primitives/execute_search_slice"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "expand_search_request", "pack": "search", "path": "packs/search/primitives/expand_search_request"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "generate_search_slices", "pack": "search", "path": "packs/search/primitives/generate_search_slices"}, {"entrypoint": "packs/search/primitives/hydrate_people/hydrate_people.py", "file_count": 2, "has_readme": true, "name": "hydrate_people", "pack": "search", "path": "packs/search/primitives/hydrate_people"}, {"entrypoint": null, "file_count": 3, "has_readme": false, "name": "lib", "pack": "search", "path": "packs/search/primitives/lib"}, {"entrypoint": "packs/search/primitives/llm_filter_candidates/llm_filter_candidates.py", "file_count": 2, "has_readme": true, "name": "llm_filter_candidates", "pack": "search", "path": "packs/search/primitives/llm_filter_candidates"}, {"entrypoint": "packs/search/primitives/llm_rerank_candidates/llm_rerank_candidates.py", "file_count": 2, "has_readme": true, "name": "llm_rerank_candidates", "pack": "search", "path": "packs/search/primitives/llm_rerank_candidates"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "merge_candidate_frontier", "pack": "search", "path": "packs/search/primitives/merge_candidate_frontier"}, {"entrypoint": null, "file_count": 2, "has_readme": true, "name": "persist_search_results", "pack": "search", "path": "packs/search/primitives/persist_search_results"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "plan_adjacency_search", "pack": "search", "path": "packs/search/primitives/plan_adjacency_search"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "plan_candidate_review", "pack": "search", "path": "packs/search/primitives/plan_candidate_review"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "query_postgres_profiles", "pack": "search", "path": "packs/search/primitives/query_postgres_profiles"}, {"entrypoint": null, "file_count": 1, "has_readme": true, "name": "refine_search_results", "pack": "search", "path": "packs/search/primitives/refine_search_results"}, {"entrypoint": "packs/search/primitives/resolve_companies/resolve_companies.py", "file_count": 2, "has_readme": true, "name": "resolve_companies", "pack": "search", "path": "packs/search/primitives/resolve_companies"}, {"entrypoint": "packs/search/primitives/resolve_education/resolve_education.py", "file_count": 2, "has_readme": true, "name": "resolve_education", "pack": "search", "path": "packs/search/primitives/resolve_education"}, {"entrypoint": "packs/search/primitives/resolve_investors/resolve_investors.py", "file_count": 2, "has_readme": true, "name": "resolve_investors", "pack": "search", "path": "packs/search/primitives/resolve_investors"}, {"entrypoint": "packs/search/primitives/resolve_set_operators/resolve_set_operators.py", "file_count": 2, "has_readme": true, "name": "resolve_set_operators", "pack": "search", "path": "packs/search/primitives/resolve_set_operators"}, {"entrypoint": "packs/search/primitives/task_state/task_state.py", "file_count": 2, "has_readme": true, "name": "task_state", "pack": "search", "path": "packs/search/primitives/task_state"}], "skills": [{"description": "Browse the Powerset company directory by company name or id. Uses the existing deterministic company-directory API to show people who work at a company with pagination.", "display_name": "powerset:company-directory", "heading": "Company Directory", "markdown": "---\nname: company-directory\ndescription: Browse the Powerset company directory by company name or id. Uses the existing deterministic company-directory API to show people who work at a company with pagination.\n---\n\n# Company Directory\n\nUse this skill when the user asks for `/company-directory <company>`, \"show me\npeople at OpenAI\", or \"who works at Stripe?\".\n\nThis skill is **not** semantic people search. It does not use `search`, `count`,\n`query_results`, `sales_nav_search`, or LLM reranking. It is a deterministic\ncompany-directory lookup backed by the existing app endpoint:\n\n- `POST /v2/companies/search`\n- with `include_people: true`\n- with exact `company_id` when known\n- with app company-name lookup only for initial disambiguation\n\n## Tool\n\nCall the remote `powerset-search` MCP tool:\n\n- `list_company_people`\n\nIf the MCP is missing, route the user through `powerset-login` / `mcp_install`.\n\n## Workflow\n\n1. Extract the company name or company id from the user request.\n2. If the user supplied a company id, call `list_company_people(company_id=...)`.\n3. If the user supplied a name, call `list_company_people(company_name=..., company_limit=5)`.\n   This uses the app's company-name lookup, not semantic search.\n4. If multiple plausible companies are returned, ask the user to choose. Prefer\n   an exact case-insensitive name match when one is obvious.\n5. Page through people using `page` and `page_size`. Do not auto-page unless the\n   user explicitly asks.\n\n## Supported parameters\n\n- `company_id` \u2014 exact company id / URN when known\n- `company_name` \u2014 company name for lookup/disambiguation\n- `set_id` \u2014 optional app-supported set filter; use only if the user explicitly\n  asks for the company directory scoped to a set\n- `page` \u2014 zero-indexed people page\n- `page_size` \u2014 people per company page\n- `position_type` \u2014 `current` or `all`\n- `people_sort` \u2014 `current`, `status`, `name`, or `tenure`\n- `people_dir` \u2014 `asc` or `desc`\n\nDo not invent additional filters. If the user asks for something unsupported\n(e.g. \"AI engineers at OpenAI\"), explain that this skill lists the company\ndirectory and can sort/page the app-supported directory results. Suggest\n`search-network` if they actually want semantic/role search in a set.\n\n## Output\n\nRender a compact table:\n\n- name\n- headline/title\n- LinkedIn/public identifier when present\n- current/all position info returned by the API\n- network badges/operators when present\n\nIf the response has `people_has_more` or tool-level `next_page`, tell the user\nhow to ask for the next page.\n\n## Examples\n\n### Company name\n\nUser:\n\n```text\n/company-directory openai\n```\n\nTool:\n\n```text\nlist_company_people(company_name=\"openai\", page=0, page_size=50, company_limit=5)\n```\n\nIf the returned company is clearly OpenAI, show its `people`. If several matches\nare plausible, ask the user to pick the company id/name.\n\n### Exact company id\n\nUser:\n\n```text\n/company-directory company_abc123 page 2\n```\n\nTool:\n\n```text\nlist_company_people(company_id=\"company_abc123\", page=1, page_size=50)\n```\n", "mcp_count": 1, "mcp_refs": ["list_company_people"], "name": "company-directory", "pack": "contacts", "path": "packs/contacts/skills/company-directory/SKILL.md", "primitive_count": 1, "primitive_refs": ["mcp_install"]}, {"description": "Browse Powerset contacts through the Powerset Search MCP. Natural-language routing for my contacts vs set contacts, app-native search fields, app-native sorting, pagination, and field projection.", "display_name": "powerset:search-contacts", "heading": "Search Contacts", "markdown": "---\nname: search-contacts\ndescription: Browse Powerset contacts through the Powerset Search MCP. Natural-language routing for my contacts vs set contacts, app-native search fields, app-native sorting, pagination, and field projection.\n---\n\n# Search Contacts\n\nUse this skill when the user asks for `/search-contacts <request>`, \"show my\ncontacts\", \"show the most messaged contacts in my Powerset set\", or \"show my\ncontacts with emails, LinkedIn, and Twitter\".\n\nThis is a pure MCP representation of the existing Powerset app contacts views.\nDo **not** convert this into semantic people search. Do **not** call `search`,\n`count`, `query_results`, Sales Nav tools, or company-directory tools from this\nskill.\n\n## Tools\n\nCall the remote `powerset-search` MCP tools directly:\n\n- `list_contacts` \u2014 app-equivalent `GET /v2/contacts` for the authenticated\n  user's own contacts.\n- `list_sets` \u2014 enumerate accessible sets when the user names a set.\n- `list_set_contacts` \u2014 app-equivalent `GET /v2/set-contacts/{set_id}` for\n  contacts across a set.\n\nIf the MCP is missing, route the user through `powerset-login` / `mcp_install`\nrather than pretending to fetch contacts.\n\n## Routing\n\n### 1. Decide own contacts vs set contacts\n\nUse `list_contacts` unless the user explicitly names a set.\n\nSet language examples:\n\n- \"in my Powerset set\"\n- \"in the Powerset set\"\n- \"for the Powerset set\"\n- \"from the Founders set\"\n\nIf the user names a set:\n\n1. Call `list_sets`.\n2. Resolve the set name using this exact tie-breaker:\n   1. exact case-insensitive name match\n   2. prefer non-personal sets\n   3. prefer highest `member_count`\n   4. then personal sets\n   5. if still ambiguous, ask the user to choose\n3. Call `list_set_contacts` with that `set_id`.\n\nDo not invent set ids. Do not call local `resolve_set_operators` from this\nskill; the MCP set list is the source of truth for this UX.\n\n### 2. Parse app-native sort intent\n\nOnly use sort fields the contacts APIs expose.\n\nFor `list_contacts`:\n\n- \"most messaged\", \"most messages\", \"most interactions\" \u2192\n  `sort_field: \"total_messages\"`, `sort_dir: \"desc\"`\n  (`list_contacts` accepts `total_messages` as an alias for the app's\n  `total_interactions` sort field.)\n- \"least messaged\" \u2192 `sort_field: \"total_messages\"`, `sort_dir: \"asc\"`\n- \"by first name\", \"alphabetical\" \u2192 `sort_field: \"first_name\"`, `sort_dir: \"asc\"`\n- \"by last name\" \u2192 `sort_field: \"last_name\"`, `sort_dir: \"asc\"`\n- \"by headline/title\" \u2192 `sort_field: \"headline\"`, `sort_dir: \"asc\"`\n- \"by location\" \u2192 `sort_field: \"location_raw\"`, `sort_dir: \"asc\"`\n\nFor `list_set_contacts`:\n\n- allowed sort fields: `first_name`, `last_name`, `headline`, `total_messages`\n- default for set contacts: `sort_field: \"total_messages\"`, `sort_dir: \"desc\"`\n\nIf the user gives no sort preference:\n\n- own contacts: use tool defaults (`first_name asc`)\n- set contacts: use `total_messages desc`\n\n### 3. Parse app-native search filters\n\nOnly use the search syntax supported by the app contacts routes:\n\n- plain text \u2192 name search, e.g. `search: \"arthur chen\"`\n- `email:<text>` for email/domain filtering, e.g. `email:@powerset.co`\n- `phone:<digits>` for phone filtering, or `phone:` for contacts with phones\n- `headline:<text>` for title/headline filtering\n- `company:<text>` only when the user explicitly asks to filter contacts by a\n  company field in the contacts view\n\nNo Twitter search exists in the app search syntax today. If the user asks to\n\"show twitter\", treat Twitter as an output field, not a search filter.\n\nDo not interpret phrases like \"AI engineers\" semantically. If the user clearly\nasks for a headline/title filter, use `headline:engineer`; otherwise ask a\nclarifying question.\n\n### 4. Parse output fields\n\nIf the user does not specify fields, show the default useful columns:\n\n- name/display_name\n- headline/title\n- location\n- total_messages or interaction_level\n- LinkedIn when available\n\nIf the user asks for fields, pass `include_fields` only to `list_contacts`.\n`list_set_contacts` returns the app's set-contact lead shape; project fields in\nthe final answer rather than passing `include_fields`.\n\nField aliases for own contacts:\n\n- \"name\" \u2192 `display_name`, `first_name`, `last_name`\n- \"email\" / \"emails\" \u2192 `emails`\n- \"linkedin\" \u2192 `confirmed_linkedin_url`, `public_profile_url`, `public_identifier`\n- \"twitter\" / \"x\" \u2192 `x_twitter_handle`\n- \"phone\" \u2192 `phone_number`\n- \"messages\" / \"interactions\" \u2192 `total_messages`\n- \"headline\" / \"title\" \u2192 `headline`\n- \"location\" \u2192 `location_raw`\n\nAlways include enough identity fields to make the output readable even when the\nuser requests only contact fields. For example, \"show emails and LinkedIn\" still\nneeds `display_name` or `first_name`/`last_name`.\n\n### 5. Pagination\n\nDefault to page 0 and page size 50 unless the user asks otherwise. Present the\nfirst 20-50 rows as a compact markdown table. If `has_more` / `hasMore` is true,\ntell the user how to ask for the next page.\n\nDo not auto-page through all contacts unless the user explicitly asks to export\nor retrieve all pages.\n\n## Examples\n\n### My contacts, most messaged, selected fields\n\nUser:\n\n```text\n/search-contacts show me my contacts ordered by most messages and show emails, twitter, and linkedin\n```\n\nTool:\n\n```text\nlist_contacts(\n  sort_field=\"total_messages\",\n  sort_dir=\"desc\",\n  page=0,\n  page_size=50,\n  include_fields=[\n    \"display_name\", \"first_name\", \"last_name\", \"emails\",\n    \"confirmed_linkedin_url\", \"public_profile_url\", \"public_identifier\",\n    \"x_twitter_handle\", \"total_messages\"\n  ]\n)\n```\n\n### Set contacts, most messaged\n\nUser:\n\n```text\n/search-contacts show me the most messaged contacts in my Powerset set\n```\n\nTools:\n\n```text\nlist_sets()\n# resolve \"Powerset\" with exact \u2192 non-personal \u2192 most members \u2192 personal \u2192 ask\nlist_set_contacts(set_id=\"...\", sort_field=\"total_messages\", sort_dir=\"desc\", page=0, page_size=50)\n```\n\n### Email domain filter\n\nUser:\n\n```text\n/search-contacts show my contacts with @powerset.co emails\n```\n\nTool:\n\n```text\nlist_contacts(search=\"email:@powerset.co\", page=0, page_size=50)\n```\n", "mcp_count": 3, "mcp_refs": ["list_contacts", "list_set_contacts", "list_sets"], "name": "search-contacts", "pack": "contacts", "path": "packs/contacts/skills/search-contacts/SKILL.md", "primitive_count": 1, "primitive_refs": ["mcp_install"]}, {"description": "One-command guided contact import workflow. Orchestrates iMessage, WhatsApp, merge, Powerset candidate sync, local matching, review, and enrichment queue prep with a resumable checklist.", "display_name": "powerset:import-contacts", "heading": "Import Contacts", "markdown": "---\nname: import-contacts\ndescription: One-command guided contact import workflow. Orchestrates iMessage, WhatsApp, merge, Powerset candidate sync, local matching, review, and enrichment queue prep with a resumable checklist.\n---\n\n# Import Contacts\n\nUse this skill when the user wants to import contacts, import both iMessage and\nWhatsApp, set up relationship signals, or run the full contacts harness.\n\nThis is the main user-facing entrypoint. The narrower `import-imessage`,\n`import-whatsapp`, and `import-contacts-review` skills are subflows and\ndebugging escape hatches.\n\n## Consent Model\n\nAsk once at the beginning:\n\n> This imports local message/contact metadata only. It never reads or stores\n> message bodies. It may read local iMessage metadata, local Contacts names,\n> start a local WAHA Docker container, ask you to scan a WhatsApp QR, merge CSVs,\n> and sync your Powerset candidate catalog for local matching. Continue?\n\nAfter the user says yes, do not ask again for local metadata extraction,\nnormalization, merge, Powerset login, candidate sync, or local matching. Stop\nonly for real human actions:\n\n- macOS Full Disk Access / Contacts permission\n- Docker install/start approval if Docker is missing or stopped\n- WhatsApp QR scan\n- LLM cost approval\n- Parallel.ai/deep-research cost approval\n- upload approval\n\nNever upload contacts or run paid LLM/research steps without a separate,\nexplicit approval after showing the estimate.\n\n## Checklist\n\nKeep a visible task list and update it as work proceeds:\n\n1. Check iMessage access\n2. Import iMessage\n3. Check Docker / WAHA\n4. Link WhatsApp\n5. Import WhatsApp\n6. Merge contacts\n7. Sync Powerset candidates\n8. Match local contacts\n9. Build enrichment queue\n10. Estimate/run deep research when explicitly approved\n11. Review profile cards / enrichment decisions\n12. Upload reviewed artifact when explicitly approved\n\nUse `.powerpacks/messages/import-run.json` as the run ledger when practical.\nStatuses: `pending`, `running`, `blocked_user_action`, `completed`, `failed`,\n`skipped`.\n\n## Workflow\n\n1. Read `packs/messages/tasks/import-contacts.task.json`.\n2. Run iMessage:\n   - `extract_imessage_contacts.py check`\n   - if readable, run `extract` to `.powerpacks/messages/imessage.contacts.*`\n   - normalize to `.powerpacks/messages/imessage.contacts.normalized.jsonl`\n3. Run WhatsApp:\n   - `waha_runtime.py check`\n   - if Docker is installed but stopped, ask before starting Docker/Colima\n   - `waha_runtime.py up`\n   - `waha_session.py start --open --wait`\n   - if QR is needed, show the user the QR path and wait\n   - `extract_whatsapp_contacts.py extract`\n   - normalize to `.powerpacks/messages/whatsapp.contacts.normalized.jsonl`\n4. Merge whichever sources exist:\n\n```bash\npython packs/messages/primitives/merge_message_contacts/merge_message_contacts.py merge \\\n  --input .powerpacks/messages/imessage.contacts.csv \\\n  --input .powerpacks/messages/whatsapp.contacts.csv \\\n  --output .powerpacks/messages/contacts.csv\n```\n\nOnly include input files that exist.\n\n5. Sync and match:\n\n```bash\npython packs/messages/primitives/sync_powerset_candidates/sync_powerset_candidates.py sync \\\n  --output .powerpacks/messages/powerset_contacts.csv\n\npython packs/messages/primitives/match_local_candidates/match_local_candidates.py match \\\n  --contacts .powerpacks/messages/contacts.csv \\\n  --candidates .powerpacks/messages/powerset_contacts.csv\n```\n\n6. Build the enrichment queue:\n\n```bash\npython packs/messages/primitives/prepare_research_queue/prepare_research_queue.py prepare \\\n  --input .powerpacks/messages/contacts.csv \\\n  --output .powerpacks/messages/research_queue.csv\n```\n\nThis queue uses the same name-quality and prune rules ported from\n`../network-search-api/data_pipeline_v2/pipelines/synthetic/prepare_phone_contacts.py`:\nonly named, searchable, unresolved contacts with enough signal become paid\nresearch candidates.\n\n7. Estimate/run Parallel deep research before review.\n\nAlways estimate first:\n\n```bash\npython packs/messages/primitives/deep_research_contacts/deep_research_contacts.py estimate \\\n  --input .powerpacks/messages/research_queue.csv \\\n  --processor core2x\n```\n\nAfter the user approves the displayed Parallel.ai spend:\n\n```bash\nPARALLEL_API_KEY=... python packs/messages/primitives/deep_research_contacts/deep_research_contacts.py run \\\n  --input .powerpacks/messages/research_queue.csv \\\n  --processor core2x \\\n  --output-dir .powerpacks/messages/research\n```\n\n8. Build and open the profile-card review:\n\n```bash\npython packs/messages/primitives/build_research_review_csv/build_research_review_csv.py build \\\n  --research-dir .powerpacks/messages/research \\\n  --queue-csv .powerpacks/messages/research_queue.csv \\\n  --output-csv .powerpacks/messages/research_review.csv\n\npython packs/messages/primitives/review_research_web/review_research_web.py serve \\\n  --csv .powerpacks/messages/research_review.csv \\\n  --research-dir .powerpacks/messages/research \\\n  --open\n```\n\nThis is the default review surface after Parallel runs. It shows the profile\ndata from `01_research_parallel.json` and autosaves yes/no decisions to the\n`exclude` column in `research_review.csv`.\n\nAfter review, summarize the upload artifact and ask before uploading:\n\n```bash\npython packs/messages/primitives/upload_research_review/upload_research_review.py summarize \\\n  --csv .powerpacks/messages/research_review.csv\n```\n\nOnly after the user explicitly approves the upload:\n\n```bash\npython packs/messages/primitives/upload_research_review/upload_research_review.py upload \\\n  --csv .powerpacks/messages/research_review.csv \\\n  --confirm-upload\n```\n\nThis posts to `/v2/messages-research/artifacts`. The server stores a reviewed\nartifact with yes/maybe/no splits; the yes split is the include/enrich set. The\nprimitive translates the web UI's `exclude` decisions into upload buckets so\nexplicit yes/no enrich choices are reflected in that split.\n\nIf Parallel is skipped, unavailable, or the queue is empty, fall back to the raw\ncontacts yes/no reviewer:\n\n```bash\npython packs/messages/primitives/review_contacts_web/review_contacts_web.py serve \\\n  --contacts .powerpacks/messages/contacts.csv \\\n  --open\n```\n\nUse the web reviewer for yes/no enrichment decisions only. Do not ask the user\nto edit names, match details, or free-text fields in the normal import flow.\nUse LLM review only after showing the estimate and getting explicit approval.\n\nIf `PARALLEL_API_KEY` is unavailable and the user still wants review help,\nfall back to parallel sub-agent review over small queue shards. Each sub-agent\nshould return only public LinkedIn/profile candidates plus a confidence and\nreason; never send message bodies.\n\n## Resume Rules\n\n- If iMessage already produced `imessage.contacts.csv`, do not re-extract\n  unless the user asks.\n- If WAHA session is `WORKING`, do not show a QR again.\n- If `contacts.csv` exists, merge can be rerun safely.\n- If `powerset_contacts.csv` exists and sync fails, use the cached catalog and\n  continue to local matching.\n- If a step blocks on user action, report the exact action and the command to\n  continue.\n\n## Output\n\nEnd with a compact summary:\n\n- source row counts\n- merged unique contacts\n- matched / suggested / unmatched counts\n- review URL or artifact path\n- research queue path and tier counts\n- deep research estimate/path when run\n- uploaded artifact ID when upload is approved\n", "mcp_count": 0, "mcp_refs": [], "name": "import-contacts", "pack": "messages", "path": "packs/messages/skills/import-contacts/SKILL.md", "primitive_count": 13, "primitive_refs": ["build_research_review_csv", "deep_research_contacts", "extract_imessage_contacts", "extract_whatsapp_contacts", "match_local_candidates", "merge_message_contacts", "prepare_research_queue", "review_contacts_web", "review_research_web", "sync_powerset_candidates", "upload_research_review", "waha_runtime", "waha_session"]}, {"description": "After import-imessage / import-whatsapp, log in to Powerset, sync the operator candidate catalog, run local name matching, and (after explicit user request) LLM-review the unmatched contacts to decide who is worth enriching.", "display_name": "powerset:import-contacts-review", "heading": "Import Contacts Review", "markdown": "---\nname: import-contacts-review\ndescription: After import-imessage / import-whatsapp, log in to Powerset, sync the operator candidate catalog, run local name matching, and (after explicit user request) LLM-review the unmatched contacts to decide who is worth enriching.\n---\n\n# Import Contacts Review\n\nUse this skill **after** `import-imessage` and/or `import-whatsapp` have\nproduced a message-contacts CSV (e.g. `.powerpacks/messages/contacts.csv`).\n\nThe pack is privacy-first:\n\n- never request or store message content\n- never send phone numbers, emails, or message bodies to LLM providers\n- LLM review only sends `name`, `source`, `message_count`, recency,\n  `is_in_group_chats`, and `group_names`\n- every step that touches the network or an LLM is gated on explicit user\n  approval\n\nWhen invoked by the top-level `import-contacts` workflow, the user's initial\nworkflow consent covers Powerset login, candidate sync, and local matching.\nLLM review, deep research, and upload still require separate cost/action\napproval.\n\n## Architecture\n\nEight small primitive groups:\n\n1. `auth` (in `packs/powerset/primitives/auth/`) \u2014 Auth0 PKCE login \u2192 JWT cached at\n   `~/.powerpacks/credentials.json`\n2. `sync_powerset_candidates` \u2014 paginated GET `/v2/contacts` using the JWT,\n   writes a flat candidate CSV\n3. `match_local_candidates` \u2014 exact / first-name-prefix / fuzzy last-name\n   matcher updates `match_*` columns in the contacts CSV\n4. `llm_review_contacts` \u2014 OpenRouter batched ENRICH/SKIP review of\n   unmatched/suggested rows, updates the `skip` column\n5. `review_contacts_web` \u2014 local browser yes/no enrichment reviewer with\n   `Matched`, `Suggested`, `Unmatched`, `Low signal`, and `Skipped` tabs\n6. `prepare_research_queue` \u2014 applies the old `network-search-api`\n   phone-contact prune rules and writes the Parallel input CSV\n7. `deep_research_contacts` / `build_research_review_csv` /\n   `review_research_web` \u2014 native Parallel deep research, profile-card review,\n   and review CSV assembly\n8. `upload_research_review` \u2014 upload the reviewed CSV to\n   `/v2/messages-research/artifacts` after explicit user approval\n\n## Workflow\n\n### 1. Confirm the contacts CSV exists\n\nDefault path: `.powerpacks/messages/contacts.csv`. If it doesn't exist, ask the\nuser to run `import-imessage` or `import-whatsapp` first.\n\n### 2. Log in to Powerset (if needed)\n\n```bash\npython packs/powerset/primitives/auth/auth.py whoami\n```\n\nIf `status: anonymous`, ask the user for permission to open a browser, then:\n\n```bash\npython packs/powerset/primitives/auth/auth.py login\n```\n\nThis opens the user's browser to Auth0, runs a localhost callback on\n`127.0.0.1:9876`, exchanges the code for a JWT, and stores credentials at\n`~/.powerpacks/credentials.json`.\n\n### 3. Sync the candidate catalog\n\n```bash\npython packs/messages/primitives/sync_powerset_candidates/sync_powerset_candidates.py sync \\\n  --output .powerpacks/messages/powerset_contacts.csv\n```\n\nIf auth/network fails and a previous catalog exists, the manifest will report\n`status: cached_after_auth_error` or `cached_after_network_error` and the\nmatcher can still run.\n\n### 4. Apply local matching\n\n```bash\npython packs/messages/primitives/match_local_candidates/match_local_candidates.py match \\\n  --contacts .powerpacks/messages/contacts.csv \\\n  --candidates .powerpacks/messages/powerset_contacts.csv\n```\n\nThe contacts CSV is updated in place with `match_status` \u2208\n`{matched, suggested, unmatched}` and the `matched_*` columns. Surface the\nmanifest's `stats` dict to the user before continuing.\n\n### 5. Estimate LLM review cost (optional but recommended)\n\n```bash\npython packs/messages/primitives/llm_review_contacts/llm_review_contacts.py estimate \\\n  --input .powerpacks/messages/contacts.csv \\\n  --model anthropic/claude-sonnet-4-6\n```\n\nShow the user the candidate count and `estimated_usd` before spending money.\n\n### 6. Run the LLM review (after explicit user request)\n\n```bash\npython packs/messages/primitives/llm_review_contacts/llm_review_contacts.py review \\\n  --input .powerpacks/messages/contacts.csv \\\n  --model anthropic/claude-sonnet-4-6\n```\n\n`OPENROUTER_API_KEY` must be in the environment, or pass `--api-key`. The\nprimitive only reviews unmatched/suggested rows by default; pass `--all` to\ninclude matched rows too.\n\nThe contacts CSV is updated in place \u2014 only the `skip` column changes. A\nverdict JSONL artifact is written next to the CSV for auditability.\n\n### 7. Build the deep-research queue\n\n```bash\n# Whole ENRICH queue.\npython packs/messages/primitives/prepare_research_queue/prepare_research_queue.py prepare \\\n  --input .powerpacks/messages/contacts.csv \\\n  --output .powerpacks/messages/research_queue.csv\n\n# High-signal slice only (cross-channel + active relationships).\npython packs/messages/primitives/prepare_research_queue/prepare_research_queue.py prepare \\\n  --input .powerpacks/messages/contacts.csv \\\n  --output .powerpacks/messages/research_queue.p1p2.csv \\\n  --tiers P1 P2a P2b\n```\n\nThe manifest reports a per-tier breakdown and a Parallel.ai cost estimate at\nevery processor tier (`core2x` / `pro` / `ultra8x`).\n\nDo not treat the raw matcher's `unmatched` count as the paid-research count.\nThe research queue only includes named, searchable, unresolved contacts and\ndefaults to the old `looks_like_real_name` plus `message_count >= 3` prune\nrules from `../network-search-api/data_pipeline_v2/pipelines/synthetic/prepare_phone_contacts.py`.\nIt also ports the old `phone_prune_config` last-name token blocklist:\n`hinge`, `raya`, `tinder`, and `bumble`.\n\n### 8. Run deep research (Parallel.ai)\n\nAfter explicit user approval and budget confirmation:\n\n```bash\n# Estimate the cost without making API calls first.\npython packs/messages/primitives/deep_research_contacts/deep_research_contacts.py estimate \\\n  --input .powerpacks/messages/research_queue.p1p2.csv \\\n  --processor core2x\n\n# Submit + poll + write per-handle JSON artifacts.\nPARALLEL_API_KEY=... python packs/messages/primitives/deep_research_contacts/deep_research_contacts.py run \\\n  --input .powerpacks/messages/research_queue.p1p2.csv \\\n  --processor core2x \\\n  --output-dir .powerpacks/messages/research\n```\n\nResults land at `.powerpacks/messages/research/<handle>/01_research_parallel.json`\nin the same shape `aleph-mvp` produces, so any downstream consumer of that\nschema (assemble_profile, network review, etc.) keeps working.\n\nIf Parallel is unavailable because `PARALLEL_API_KEY` is not set, and the user\nexplicitly approves a fallback, split the queue into small shards and spawn\nparallel sub-agents to do public-profile review. Each shard result must include\nthe contact handle, candidate LinkedIn/profile URL, confidence, and reason.\nThis fallback should be used for validation or tiny batches only; Parallel is\nthe primitive for production-scale work.\n\nFor long batches the `submit` and `poll` subcommands can be split so the\nshell isn't tied up:\n\n```bash\npython ... deep_research_contacts.py submit --input ... --processor core2x\npython ... deep_research_contacts.py status --output-dir .powerpacks/messages/research\npython ... deep_research_contacts.py poll --output-dir .powerpacks/messages/research\n```\n\n### 9. Review contacts locally\n\nPrefer the local web reviewer for yes/no enrichment decisions:\n\n```bash\npython packs/messages/primitives/review_contacts_web/review_contacts_web.py serve \\\n  --contacts .powerpacks/messages/contacts.csv \\\n  --open\n```\n\nClicking a card toggles `YES` / `NO` and immediately autosaves `skip=false` /\n`skip=true` in the contacts CSV. Do not ask the user to edit names, match\nfields, or free-text details in this flow.\n\nDefault `YES` excludes no-name rows, phone-number names, weak names, and the\nported dating-app name-token blocklist. Already matched rows still default to\n`YES` unless the user explicitly skips them.\n\n### 10. Build a research-review CSV for the existing TUI\n\nFold the per-handle research artifacts into one flat CSV in the shape\n`contact-exporter`'s research-review TUI expects:\n\n```bash\n# Heuristic bucketing (free):\npython packs/messages/primitives/build_research_review_csv/build_research_review_csv.py build \\\n  --research-dir .powerpacks/messages/research \\\n  --queue-csv .powerpacks/messages/research_queue.csv \\\n  --output-csv .powerpacks/messages/research_review.csv\n\n# Or LLM-scored bucketing (mirrors aleph-mvp's review_phone_research SYSTEM_PROMPT):\nOPENROUTER_API_KEY=... python ... build_research_review_csv.py build \\\n  --bucket-mode llm --model anthropic/claude-sonnet-4-6 \\\n  --output-csv .powerpacks/messages/research_review.csv\n```\n\nThen open the native web reviewer for yes / maybe / no buckets and profile\ncards:\n\n```bash\npython packs/messages/primitives/review_research_web/review_research_web.py serve \\\n  --csv .powerpacks/messages/research_review.csv \\\n  --research-dir .powerpacks/messages/research \\\n  --open\n```\n\nThis ports the `contact-exporter` research-review TUI behavior:\n\n- bucket tabs: yes / maybe / no\n- a card displays phone signal, title/company, education, location, reason,\n  identity risk, signals, and profile links\n- clicking toggles enrich yes/no\n- every click writes the CSV `exclude` column (`exclude=no` include,\n  `exclude=yes` exclude), so refresh/quit does not lose progress\n\nAnd, after the user reviews and explicitly approves upload, upload the artifact\nback to Powerset:\n\n```bash\npython packs/messages/primitives/upload_research_review/upload_research_review.py summarize \\\n  --csv .powerpacks/messages/research_review.csv\n\npython packs/messages/primitives/upload_research_review/upload_research_review.py upload \\\n  --csv .powerpacks/messages/research_review.csv \\\n  --confirm-upload\n```\n\nThe uploader uses the cached `$powerset-login` credentials and converts the web\nreviewer's `exclude` decisions into upload buckets before posting. The server\nartifact stores yes/maybe/no splits; the yes split is the include/enrich set.\n\n## What this skill does NOT do\n\n- It does not upload contacts or reviewed research artifacts without explicit\n  user approval.\n- It does not run deep research or LLM scoring without explicit cost approval.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-contacts-review", "pack": "messages", "path": "packs/messages/skills/import-contacts-review/SKILL.md", "primitive_count": 10, "primitive_refs": ["auth", "build_research_review_csv", "deep_research_contacts", "llm_review_contacts", "match_local_candidates", "prepare_research_queue", "review_contacts_web", "review_research_web", "sync_powerset_candidates", "upload_research_review"]}, {"description": "Import local iMessage relationship signals through the Powerpacks messages pack.", "display_name": "powerset:import-imessage", "heading": "Import iMessage", "markdown": "---\nname: import-imessage\ndescription: Import local iMessage relationship signals through the Powerpacks messages pack.\n---\n\n# Import iMessage\n\nUse this skill for local iMessage-only message-contact imports on macOS.\n\nThe pack is privacy-first:\n\n- never request or store message content\n- only work with contact metadata: phone, name, source, groups, message counts,\n  last message timestamp, skip/review/match metadata\n- do not run extraction or upload unless the user explicitly asks for that action\n- before extraction, explicitly say it will read local Messages metadata and\n  local Contacts/AddressBook phone/name metadata to fill the `name` column\n- keep message contact normalization as explicit steps the run can replay\n\nWhen invoked by the top-level `import-contacts` workflow, the user's initial\nworkflow consent covers iMessage metadata extraction. Do not ask a second\napproval question unless permissions are missing or the user asked for upload.\n\n## Prereqs\n\n- macOS (this skill is macOS-only)\n- Python 3.9+ (stdlib only, no extra packages)\n- **Full Disk Access** granted to the terminal / IDE Codex or Claude Code is\n  running from. Without it, `chat.db` reads will fail with permission errors.\n  Open `System Settings \u2192 Privacy & Security \u2192 Full Disk Access`, add the app,\n  and restart it.\n- **Contacts access** may also be required by macOS when reading the local\n  AddressBook database. If macOS prompts, the user must approve it for name\n  matching; otherwise extraction can still produce phone/message metadata with\n  fewer names.\n\nIf step 2 reports `chat_db.readable: false`, `addressbook.readable: false`,\nor AddressBook diagnostics with errors, that is almost always a macOS privacy\npermission issue. Do not retry blindly \u2014 surface the diagnostic to the user\nand ask them to grant access.\n\nTo open the relevant macOS panes for the user, run:\n\n`python packs/messages/primitives/extract_imessage_contacts/extract_imessage_contacts.py open-privacy-settings --target full-disk-access`\n\nor, for local Contacts / AddressBook name matching:\n\n`python packs/messages/primitives/extract_imessage_contacts/extract_imessage_contacts.py open-privacy-settings --target contacts`\n\n## Workflow\n\n1. Inspect `packs/messages/docs/harness.md`.\n2. Check local iMessage access:\n   `python packs/messages/primitives/extract_imessage_contacts/extract_imessage_contacts.py check`\n   If permission is missing, offer to open the relevant privacy settings pane\n   with `open-privacy-settings`; opening System Settings itself is OK, but do\n   not rerun extraction until the user has granted access and explicitly asks.\n3. After explicit user approval that mentions both Messages and Contacts /\n   AddressBook metadata, or when `import-contacts` has already collected that\n   workflow consent, run:\n   `python packs/messages/primitives/extract_imessage_contacts/extract_imessage_contacts.py extract --output-csv .powerpacks/messages/imessage.contacts.csv --output-jsonl .powerpacks/messages/imessage.contacts.jsonl`\n4. Normalize the exported rows to the canonical schema:\n   `python packs/messages/primitives/normalize_message_contacts/normalize_message_contacts.py normalize --input .powerpacks/messages/imessage.contacts.csv --out-jsonl .powerpacks/messages/imessage.contacts.normalized.jsonl`\n5. Merge into the unified `contacts.csv` (single-channel today, ready for WhatsApp later):\n   `python packs/messages/primitives/merge_message_contacts/merge_message_contacts.py merge --input .powerpacks/messages/imessage.contacts.csv --output .powerpacks/messages/contacts.csv`\n5. Present the manifest counts and artifact paths. If the primitive fails,\n   inspect the manifest diagnostics and patch or rerun with explicit paths.\n6. For a tolerant run that records repair notes, use:\n   `python packs/messages/primitives/messages_harness/messages_harness.py imessage --output-dir .powerpacks/messages`\n7. Upload only after a separate explicit upload request.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-imessage", "pack": "messages", "path": "packs/messages/skills/import-imessage/SKILL.md", "primitive_count": 4, "primitive_refs": ["extract_imessage_contacts", "merge_message_contacts", "messages_harness", "normalize_message_contacts"]}, {"description": "Import local WhatsApp relationship signals via a user-controlled WAHA Docker container. No contact-exporter dependency.", "display_name": "powerset:import-whatsapp", "heading": "Import WhatsApp", "markdown": "---\nname: import-whatsapp\ndescription: Import local WhatsApp relationship signals via a user-controlled WAHA Docker container. No contact-exporter dependency.\n---\n\n# Import WhatsApp\n\nUse this skill to extract WhatsApp contact metadata locally through a WAHA\ncontainer the user runs on their own machine.\n\nThe pack is privacy-first:\n\n- never request or store message content\n- only collect: phone, name, source, group flags/names, message counts, and\n  the most recent message timestamp\n- every Docker / WAHA / extraction action is gated on explicit user approval\n- the WAHA container is yours to start and stop; nothing runs on a remote service\n\nWhen invoked by the top-level `import-contacts` workflow, the user's initial\nworkflow consent covers starting/reusing WAHA and extracting WhatsApp contact\nmetadata. Still stop for Docker installation, starting a stopped Docker daemon,\nand the QR scan.\n\n## Prereqs\n\n- Python 3.9+ (stdlib only)\n- Docker Engine reachable as the current user\n  - macOS GUI: `brew install --cask docker && open -a Docker`\n  - macOS lightweight: `brew install colima docker && colima start --memory 2 --vm-type vz --vz-rosetta`\n  - Linux: `curl -fsSL https://get.docker.com | sh && sudo systemctl start docker`\n- WhatsApp on the user's phone (for the QR scan in step 3)\n\nThe `waha_runtime check` primitive surfaces these alternatives in its JSON\nmanifest if Docker is missing. Always show that manifest to the user and\n**ask explicit permission** before running any `install_cmd`. Do not\nauto-install.\n\n## Architecture\n\nThe skill is composed of three small primitives:\n\n1. `waha_runtime` \u2014 checks Docker, pulls/runs/stops the WAHA NOWEB container\n2. `waha_session` \u2014 creates the WAHA session, fetches the QR code, polls for auth\n3. `extract_whatsapp_contacts` \u2014 reads contacts from the authenticated session\n   into the canonical CSV/JSONL shape\n\n`normalize_message_contacts` then folds the result into the unified\n`message-contact.schema.json` format shared with iMessage.\n\n## Workflow\n\n### 0. Inspect the harness contract\n\nRead `packs/messages/docs/harness.md` and surface the privacy contract above\nto the user before doing anything.\n\n### 1. Check Docker availability\n\n```bash\npython packs/messages/primitives/waha_runtime/waha_runtime.py check\n```\n\nInspect the JSON manifest:\n\n- `docker.installed == true` and `docker.daemon_ok == true`: continue.\n- `docker.installed == false`: stop. Show the user the\n  `docker.alternatives` array (Docker Desktop, Colima, Linux Docker Engine)\n  and **ask explicit permission** before running any of the suggested\n  `install_cmd` values. Do not auto-install.\n- `docker.installed == true` but `docker.daemon_ok == false`: ask the user\n  whether they want to start Docker Desktop / Colima now (the corresponding\n  `start_cmd` is in the manifest).\n\n### 2. Start the WAHA container\n\nAfter explicit user approval, or when `import-contacts` has already collected\nworkflow consent:\n\n```bash\npython packs/messages/primitives/waha_runtime/waha_runtime.py up\n```\n\nReuse-on-rerun is the default. To force a clean container, pass `--recreate`.\nThe first run pulls `devlikeapro/waha:noweb-2026.3.4` (a few hundred MB), which\nthe user should be told about up front.\n\n### 3. Authenticate the session via QR code\n\n```bash\npython packs/messages/primitives/waha_session/waha_session.py start --open --wait\n```\n\nThis:\n\n- creates (or reuses) the `default` WAHA session with NOWEB store enabled\n- writes `qr.png` and `qr.txt` under `.powerpacks/messages/whatsapp/`\n- opens the PNG in the system image viewer (`--open`)\n- polls until status reaches `WORKING` or times out (`--wait`)\n\nTell the user to open WhatsApp > Settings > Linked Devices > Link a Device,\nthen scan the displayed QR. If the previous session is still good (credentials\npersist under `~/.powerpacks/waha-sessions/`), no scan is needed and the\ncommand returns immediately with `state.status == \"WORKING\"`.\n\nIf `start --wait` times out, run `wait` again to keep polling without\nrecreating the session:\n\n```bash\npython packs/messages/primitives/waha_session/waha_session.py wait\n```\n\n### 4. Extract contacts\n\nAfter explicit user approval, or when `import-contacts` has already collected\nworkflow consent:\n\n```bash\npython packs/messages/primitives/extract_whatsapp_contacts/extract_whatsapp_contacts.py extract \\\n  --output-csv .powerpacks/messages/whatsapp.contacts.csv \\\n  --output-jsonl .powerpacks/messages/whatsapp.contacts.jsonl\n```\n\nThe primitive writes a manifest with diagnostics next to the CSV. Per-chat\nmessage-count pagination is on by default; pass `--skip-message-counts` for a\nfast, less complete run.\n\n### 5. Normalize into the canonical schema\n\n```bash\npython packs/messages/primitives/normalize_message_contacts/normalize_message_contacts.py normalize \\\n  --input .powerpacks/messages/whatsapp.contacts.csv \\\n  --out-jsonl .powerpacks/messages/whatsapp.contacts.normalized.jsonl\n```\n\n### 5b. Merge with iMessage (if iMessage was already imported)\n\n```bash\npython packs/messages/primitives/merge_message_contacts/merge_message_contacts.py merge \\\n  --input .powerpacks/messages/imessage.contacts.csv \\\n  --input .powerpacks/messages/whatsapp.contacts.csv \\\n  --output .powerpacks/messages/contacts.csv\n```\n\nThis dedupes by phone, unions sources/groups, and keeps the higher\n`message_count` / more recent `last_message` per contact. The unified\n`contacts.csv` is what `import-contacts-review` reads as input.\n\n### 6. Tear down (optional)\n\n```bash\npython packs/messages/primitives/waha_runtime/waha_runtime.py down\n```\n\nAdd `--purge-session` if the user wants to wipe the persisted WhatsApp\ncredentials so the next `up` requires a fresh QR scan.\n\n## What this skill does NOT do (yet)\n\n- LLM review, candidate matching, and upload to Powerset are out of scope here.\n  Those are intentionally separate steps that require explicit user approval\n  and currently still live in `powerset_contacts_harness` for non-WhatsApp\n  channels. Native primitives for review/match/upload can be added the same\n  way the extraction primitives were split.\n", "mcp_count": 0, "mcp_refs": [], "name": "import-whatsapp", "pack": "messages", "path": "packs/messages/skills/import-whatsapp/SKILL.md", "primitive_count": 6, "primitive_refs": ["extract_whatsapp_contacts", "merge_message_contacts", "normalize_message_contacts", "powerset_contacts_harness", "waha_runtime", "waha_session"]}, {"description": "One-command Powerset login flow. Uses the doctor as a read-only checker, self-heals missing setup from the current shell, and only stops for OS installs, visible auth codes, or human actions.", "display_name": "powerset:powerset-login", "heading": "Powerset Login", "markdown": "---\nname: powerset-login\ndescription: One-command Powerset login flow. Uses the doctor as a read-only checker, self-heals missing setup from the current shell, and only stops for OS installs, visible auth codes, or human actions.\n---\n\n# Powerset Login\n\nUse this skill when the user asks for `$powerset-login`, secret provisioning,\nruntime setup, API key bootstrap, or \"log me in to Powerset\". Also the right\nskill when an unrelated Powerpacks command failed because of a missing key\nor expired session.\n\n**This skill is built to be fast and quiet.** The user said \"log me in\" \u2014 do\nthat. Don't ask permission for every step. Use the doctor's `fix_kind`\nclassification to decide what needs asking, but run fixes yourself from the\ncurrent invocation/shell so prompts, URLs, and failures are visible.\n\n## Core rule\n\n`doctor.py run` is a checker. In the normal skill flow, do **not** run\n`doctor.py fix`; it hides interactive work inside a nested subprocess and can\nswallow browser/code prompts. Let the skill self-heal by running the relevant\nprimitive or CLI command directly.\n\nOnly use install commands when something is actually missing. Do not reinstall\nPowerpacks adapters, MCP config, `gcloud`, or credentials when the doctor says\nthe check is already `ok`.\n\n## Path setup\n\nResolve primitive paths from the current environment:\n\n- From the Powerpacks repo root, use `packs/powerset/primitives/...`.\n- From an installed skill bundle, use `powerpacks/packs/powerset/primitives/...`.\n- If the example command path does not exist, locate it with `rg --files -g\n  'doctor.py' -g 'auth.py' -g 'provision_runtime_env.py' -g 'mcp_install.py'`.\n\nPrefer `python3` if `python` is not on PATH.\n\n## Happy path\n\nRun one read-only check:\n\n```bash\npython3 packs/powerset/primitives/doctor/doctor.py run \\\n  --profile search-core \\\n  --env-file .env \\\n  --gcp-project powerset-search\n```\n\nIf `overall == \"ok\"`, tell the user \"Already set up as `<email>`\" and stop.\nIf `overall == \"warn\"` and the only warning is `gcloud_adc`, tell the user\nthey are set up for normal Powerpacks search workflows and mention ADC is only\nneeded for SDK clients.\n\n## How to handle the doctor's report\n\n`doctor run` returns one JSON object. The fields you care about are `checks`,\n`by_fix_kind`, and `next_actions`. Each missing/fail check has a `fix_kind`:\n\n| `fix_kind` | What to do | Ask the user? |\n| --- | --- | --- |\n| `auto` | Run the specific primitive directly from this shell. | **no** |\n| `interactive` | Run the CLI directly from this shell. For `gcloud`, use `--no-launch-browser`, echo the login URL, ask for the code, and write it to stdin. | **no**, except asking for the auth code |\n| `shell_install` | OS-level install (`brew install`, etc.). | **yes**, with the exact command shown |\n| `human_action` | Cannot be fixed by the skill (Slack ping, IAM grant from a maintainer). | tell the user, don't loop |\n\n## Workflow\n\n### Step 1 \u2014 Install/bootstrap only when missing\n\nIf `gcloud_installed` is missing, ask before running the exact OS install\ncommand from the doctor (`brew install --cask google-cloud-sdk` on macOS).\n\nIf the Powerpacks skill bundle or host adapter is missing and you are in the\nPowerpacks repo, run the repo installer for the current host instead of trying\nto repair it through the doctor:\n\n```bash\n./install.sh codex\n./install.sh claude-code\n```\n\nPick the host the user is currently using. If both hosts need repair, run both.\nBecause this writes outside the repo, request escalation if the sandbox\nrequires it.\n\n### Step 2 \u2014 Login directly from this shell\n\nIf `auth0_login` is missing or expired, run:\n\n```bash\npython3 packs/powerset/primitives/auth/auth.py login\n```\n\nIf `gcloud_account` is missing, run:\n\n```bash\ngcloud auth login --no-launch-browser\n```\n\nRelay the full `https://accounts.google.com/...` URL from stdout to the user.\nWhen `gcloud` asks for the verification code, ask the user for it and write it\nto the running command's stdin. If `gcloud` cannot read or write\n`~/.config/gcloud`, request escalation for `gcloud auth ...`.\n\nIf `gcloud_account` is a non-`@powerset.co` account, do not guess. Tell the\nuser to log in as a Powerset account or run:\n\n```bash\ngcloud config set account you@powerset.co\n```\n\nIf `gcloud_adc` is the only warning, do not block. Only run\n`gcloud auth application-default login --no-launch-browser` when the requested\nworkflow needs SDK application-default credentials.\n\n### Step 3 \u2014 Pull secrets and register MCP directly\n\nIf `env_file` is missing keys and `user_secrets` is accessible, run:\n\n```bash\npython3 packs/powerset/primitives/provision_runtime_env/provision_runtime_env.py pull \\\n  --profile search-core \\\n  --env-file .env \\\n  --confirm \\\n  --best-effort\n```\n\nIf `mcp_powerset_search` is missing but a host CLI exists, run:\n\n```bash\npython3 packs/powerset/primitives/mcp_install/mcp_install.py install --host all\n```\n\nIf `mcp_powerset_search` says no MCP host CLI is on PATH, that is an install\ngap: use `./install.sh codex` or `./install.sh claude-code` only for the host\nthe user is using, or tell the user which host CLI is missing.\n\n### Step 4 \u2014 Human-action blockers\n\n**`human_action`** entries:\n\n- `auth0_role` warn \u2192 \"You're logged in but haven't been granted a Powerpacks\n  role on Auth0. Ping #powerpacks on Slack with your @powerset.co email and\n  ask to be added to the Powerpacks role.\"\n- `user_secrets` `not_provisioned` / `not_privileged` \u2192 \"You're set up\n  locally but don't have GCP per-user secrets yet. Ping #powerpacks on\n  Slack with your @powerset.co email \u2014 a maintainer will run\n  `provision_user_secrets apply --users <you>` and you can re-run\n  `$powerset-login`.\"\n\nThese are not blockers for unrelated workflows unless that workflow needs the\nmissing shared infra key.\n\n### Step 5 \u2014 Final state\n\nRe-run `doctor run` and report a one-line summary:\n\n- `overall: ok` \u2192 \"Logged in as `<email>`. `.env` populated from per-user\n  secrets (`<N>` keys).\"\n- `overall: warn` \u2192 same, but mention the optional `gcloud_adc` warn if\n  present.\n- `overall: needs_setup` \u2192 list the still-blocked items and what the user\n  needs to do.\n\n## Hard rules\n\n- **Never print secret values.** Every primitive redacts.\n- **Never run an OS install command without explicit user approval.** That's\n  the `shell_install` line.\n- **Never write `.env` without `--confirm`.** All primitive paths refuse\n  without it.\n- The `@powerset.co` check is a UX guardrail; real authorization is enforced\n  by GCP IAM on Secret Manager resources.\n- Per-user secret IDs follow `powerpacks-users-<slug>-<capability>`. The\n  active `gcloud` account decides scope.\n\n## Profiles\n\n| Profile | Includes | When to pick |\n| --- | --- | --- |\n| `search-core` | TurboPuffer + Postgres + OpenAI | `/search-network`, `/search-company` |\n| `messages` | OpenRouter + Parallel | `import-contacts-review` LLM/research |\n| `sales-nav` | RapidAPI LinkedIn | LinkedIn enrichment |\n| `twitter` | RapidAPI Twitter | Twitter pipelines |\n| `supabase-admin` | Supabase URL + service role | admin only |\n| `all` | every allowlisted key | one-shot full setup |\n\nPass `--profile <name>` to `doctor run` and to the direct provisioning\nprimitive.\n\n## Maintainer-only: provisioning a new user\n\nIf a user shows up in `#powerpacks` with `user_secrets: not_provisioned`, a\nmaintainer (anyone with `roles/owner` on `powerset-search`) runs:\n\n```bash\npython powerpacks/packs/powerset/primitives/provision_user_secrets/provision_user_secrets.py plan \\\n  --users newperson@powerset.co \\\n  --project powerset-search --with-diff\n\npython powerpacks/packs/powerset/primitives/provision_user_secrets/provision_user_secrets.py apply \\\n  --users newperson@powerset.co \\\n  --project powerset-search --confirm\n```\n\nIdempotent. Re-running on an existing user reconciles missing IAM bindings\nor refreshes secret versions when the source value changed.\n", "mcp_count": 0, "mcp_refs": [], "name": "powerset-login", "pack": "powerset", "path": "packs/powerset/skills/powerset-login/SKILL.md", "primitive_count": 4, "primitive_refs": ["auth", "mcp_install", "provision_runtime_env", "provision_user_secrets"]}, {"description": "List accessible Powerset sets, show the active default set, or set POWERPACKS_DEFAULT_SET_ID so local Powerpacks search primitives inherit the desired set scope.", "display_name": "powerset:powerset-set", "heading": "Powerset Set", "markdown": "---\nname: powerset-set\ndescription: List accessible Powerset sets, show the active default set, or set POWERPACKS_DEFAULT_SET_ID so local Powerpacks search primitives inherit the desired set scope.\n---\n\n# Powerset Set\n\nUse this skill when the user wants to choose, inspect, retrieve, list, switch,\nor set the active Powerset set for local Powerpacks search.\n\nThe skill uses the Powerset Search MCP for set retrieval and name resolution.\nIt only manages local set scope:\n\n- lists sets accessible to the logged-in Powerset user\n- shows the resolved default set and operator IDs\n- writes `POWERPACKS_DEFAULT_SET_ID` into the local ignored `.env`\n- does not upload contacts, run searches, or mutate server-side set membership\n\n## Workflow\n\n1. Ensure Powerset login exists. If credentials are missing, route the user to\n   `$powerset-login`.\n2. Confirm the Powerset Search MCP is installed when needed:\n\n```bash\npython packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\n3. List sets by calling the Powerset Search MCP `list_sets` tool directly.\n   Do not use local SQL or `set_scope.py` for normal set retrieval.\n\n4. Show the current default by reading `POWERPACKS_DEFAULT_SET_ID` from the\n   local `.env`, then matching that ID against the MCP `list_sets` result.\n   If `POWERPACKS_DEFAULT_SET_ID` is unset, check legacy\n   `POWERSET_DEFAULT_SET_ID`.\n\n5. Set the default by ID or name:\n\n- call MCP `list_sets`\n- resolve the user's `<name>` or `<set_id>` against the returned sets\n- upsert only this local `.env` line. If `POWERPACKS_DEFAULT_SET_ID=` already\n  exists, replace that line; otherwise append it. Do not append duplicates.\n\n```dotenv\nPOWERPACKS_DEFAULT_SET_ID=<set_id>\n```\n\n6. After setting, report the selected set name, `set_id`, `person_count`,\n   `member_count`, and `sales_nav_account_count` from MCP. Only run\n   `resolve_set_operators` if the user specifically asks to validate local\n   TurboPuffer operator scoping.\n\n## Notes\n\n- `set_id` is a Powerset set UUID.\n- Local search primitives resolve it to `operator_ids` before applying\n  TurboPuffer `allowed_operator_ids`.\n- `POWERPACKS_DEFAULT_SET_ID` is preferred. `POWERSET_DEFAULT_SET_ID` is still\n  accepted as a legacy alias by search primitives.\n- The remote MCP owns set listing. The local repo owns only the default choice\n  stored in `.env`.\n", "mcp_count": 1, "mcp_refs": ["list_sets"], "name": "powerset-set", "pack": "powerset", "path": "packs/powerset/skills/powerset-set/SKILL.md", "primitive_count": 2, "primitive_refs": ["mcp_install", "resolve_set_operators"]}, {"description": "Run a Sales Navigator search through the Powerset Search MCP. Resolves company / title filters to LinkedIn IDs, runs a paginated lead search with server-side artifact persistence on by default, and offers paginated retrieval via get_artifact.", "display_name": "powerset:sales-nav-search", "heading": "Sales Nav Search", "markdown": "---\nname: sales-nav-search\ndescription: Run a Sales Navigator search through the Powerset Search MCP. Resolves company / title filters to LinkedIn IDs, runs a paginated lead search with server-side artifact persistence on by default, and offers paginated retrieval via get_artifact.\n---\n\n# Sales Nav Search\n\nUse this skill when the user asks for `/sales-nav-search <query>`,\n\"find LinkedIn leads at <company>\", \"show me sales nav results for <title>\",\nor any other Sales Navigator search request scoped to the user's set.\n\nThe skill is in its own pack (`packs/sales-nav`) but **depends on\n`packs/powerset`** for Auth0 login and MCP install. If those aren't ready,\nroute the user to `$powerset-login` first.\n\nIt calls three MCP tools served by the remote `powerset-search` MCP at\n`https://search-api-7wk4uhe77q-uw.a.run.app/mcp`:\n\n- `sales_nav_resolve` \u2014 turn company names + titles into LinkedIn\n  `company_ids` / canonical title strings\n- `sales_nav_search` \u2014 paginated lead search scoped to the user's set;\n  with `conversation_id` + `persist_artifact: true` the server writes a\n  Supabase artifact row and returns an `artifact_id`\n- `get_artifact` \u2014 paginated retrieval of a persisted artifact\n\nThe skill itself does not call HTTP \u2014 Claude Code / Codex invoke the MCP\ntools directly once `mcp_install` (in `packs/powerset`) has registered the\nserver.\n\n## Hard rules\n\n- This skill **requires** the `powerset-search` MCP. If it is not\n  registered, route the user through `$powerset-login` \u2192\n  `mcp_install install --host all`.\n- Every Sales Nav call is **scoped to a `set_id`**. The MCP server enforces\n  the set context. Pass the one the user specifies. If the user does not\n  specify one, resolve the default with\n  `packs/search/primitives/resolve_set_operators/resolve_set_operators.py`\n  so it can inherit `POWERPACKS_DEFAULT_SET_ID` / `POWERSET_DEFAULT_SET_ID`, or\n  fall back to the logged-in operator's active personal set. Do not invent or\n  guess `set_id`s.\n- **Default to `persist_artifact: true` on every `sales_nav_search` call.**\n  Persistence is cheap and lets the user (or the agent in a later turn) page\n  large result sets via `get_artifact`. Only pass `persist_artifact: false`\n  when the user explicitly asks for an ephemeral search.\n- Persistence requires a `conversation_id`. See the conversation_id playbook\n  below \u2014 without one, persistence is silently skipped server-side and you\n  only get the inline `leads` list back.\n- Lead profiles can include LinkedIn URLs and contact metadata. Treat them\n  as sensitive \u2014 present in chat, do not dump to disk unless the user asks.\n- Do not auto-page beyond what the user requested. `sales_nav_search`\n  returns `has_more` and `next_start_offset`; surface them, don't loop.\n\n## Prereqs\n\nRun this once. It starts Auth0 login if credentials are missing or expired,\nthen installs the MCP into the chosen host:\n\n```bash\n./install-powerset-mcp.sh --host all\n```\n\nIf on Codex, rerun MCP install when the Auth0 token needs to be refreshed.\nThe installer writes a fresh `Authorization` header into `~/.codex/config.toml`:\n\n```bash\n./install-powerset-mcp.sh --host codex\n```\n\n## conversation_id playbook\n\n`conversation_id` is a Supabase `conversations.id`. The MCP server uses it\nto scope artifact reads/writes to a specific conversation. Three ways to\nget one:\n\n1. **From search.powerset.dev** \u2014 copy the conversation id from the URL\n   when the user has an open chat.\n2. **REST API** \u2014 `POST /v2/conversations` with the user's bearer token\n   returns `{ \"id\": \"...\" }`.\n3. **Per-skill ephemeral session** \u2014 generate a UUID4 the first time you\n   need one in the current skill invocation and reuse it for follow-ups\n   in the same turn. The artifact rows still persist in Supabase keyed by\n   that id; they just won't be linked to a webapp conversation.\n\nAlways pass the same `conversation_id` to subsequent `sales_nav_search`\ncalls and the matching `get_artifact` call.\n\n## Workflow\n\n### Step 0 \u2014 Confirm prereqs\n\n```bash\npython powerpacks/packs/powerset/primitives/mcp_install/mcp_install.py status --host all\n```\n\nIf `installed: false` for the host the user is on, route to\n`$powerset-login` first.\n\n### Step 0b \u2014 Resolve set scope\n\nIf the user provided a `set_id`, use it. Otherwise run:\n\n```bash\npython powerpacks/packs/search/primitives/resolve_set_operators/resolve_set_operators.py \\\n  --env-file .env\n```\n\nUse the returned `set_id` in Sales Nav MCP calls. The returned\n`operator_ids` are useful for parity with local TurboPuffer searches, but the\nSales Nav MCP is still scoped by `set_id`.\n\n### Step 1 \u2014 Decide whether to resolve filters\n\nIf the user gave you free-text companies or titles, call\n`sales_nav_resolve` first to convert them into stable IDs / canonical\nstrings:\n\n```text\nTool: sales_nav_resolve\nArgs: {\n  \"set_id\": \"<the user's set>\",\n  \"companies\": [\"Stripe\", \"Ramp\"],\n  \"titles\": [\"staff engineer\", \"principal engineer\"]\n}\n```\n\nIf the user already gave you a `company_id` or `function_id`, skip this\nand go straight to step 2.\n\n### Step 2 \u2014 Run the search (always with persistence)\n\n```text\nTool: sales_nav_search\nArgs: {\n  \"set_id\":         \"<the user's set>\",\n  \"conversation_id\":\"<UUID \u2014 see conversation_id playbook>\",\n  \"persist_artifact\": true,\n  \"company_ids\":    [...],         // from sales_nav_resolve\n  \"title\":          \"staff engineer\",\n  \"function_ids\":   [...],\n  \"seniority_ids\":  [...],\n  \"geography_ids\":  [...],\n  \"headcount_ids\":  [...],\n  \"keywords\":       \"distributed systems\",\n  \"count\":          25,            // max 25 per page\n  \"start_offset\":   0\n}\n```\n\nResponse shape (with persistence):\n\n```jsonc\n{\n  \"artifact_id\": \"...\",\n  \"artifact\": { /* metadata */ },\n  \"total_count\": 1342,\n  \"max_total_count\": 2500,\n  \"results_returned\": 25,\n  \"has_more\": true,\n  \"next_start_offset\": 25,\n  \"filters_used\": { /* what the server actually filtered on */ },\n  \"reconnect_required\": false,\n  \"leads\": [\n    {\n      \"name\": \"...\",\n      \"headline\": \"...\",\n      \"linkedin_url\": \"...\",\n      \"company\": \"...\",\n      \"location\": \"...\",\n      \"mutual_count\": 3,\n      \"mutual_member_ids\": [\"...\", \"...\"]\n    }\n  ]\n}\n```\n\n`reconnect_required: true` means the user's Unipile/LinkedIn session\nneeds upstream re-auth; tell the user and stop. Do not retry.\n\n**Save the `artifact_id`** in your skill's working memory \u2014 every\nfollow-up retrieval (next page, mutual lookup, re-display) goes through\n`get_artifact` against that id.\n\n### Step 3 \u2014 Present the first page\n\n- Lead with `total_count`, `results_returned`, and any non-zero `mutual`\n  counts.\n- For each lead present `name`, `headline`, `company`, `location`,\n  `mutual_count`, and `linkedin_url`.\n- Mention `artifact_id` to the user (they may want to reference it across\n  turns / sessions).\n- If `has_more`, ask if they want page N+1 \u2014 do **not** auto-fetch.\n\n### Step 4 \u2014 Paginate via get_artifact\n\nSubsequent pages of the same result set should go through\n`get_artifact`, not a fresh `sales_nav_search`:\n\n```text\nTool: get_artifact\nArgs: {\n  \"artifact_id\":     \"<from step 2>\",\n  \"offset\":          25,\n  \"limit\":           25,\n  \"include_content\": false   // true to also return full filters_used etc.\n}\n```\n\nThis avoids re-running an expensive Sales Nav fetch and keeps the\nfilters/result-set stable across pages.\n\n### Step 5 \u2014 Refining filters\n\nRefining filters is a **new search**, not pagination. Re-call\n`sales_nav_search` with the new args, the same `conversation_id`, and\n`persist_artifact: true`. You'll get back a new `artifact_id`. Tell the\nuser the artifact id changed.\n\n| User says | What changes |\n| --- | --- |\n| \"next page\" | `get_artifact` with `offset += 25` |\n| \"narrow to NYC\" | new `sales_nav_search` with `geography_ids` |\n| \"only senior+ folks\" | new `sales_nav_search` with `seniority_ids` |\n| \"filter to mid-stage companies\" | new `sales_nav_search` with `headcount_ids` |\n| \"show me their mutual\" | use `mutual_member_ids` from the existing leads |\n\n### Step 6 \u2014 Resuming a previous search\n\nIf the user references a prior `artifact_id` (from a previous session,\nthe web app, or a paste), skip directly to `get_artifact` \u2014 no\n`sales_nav_search` needed.\n\n## What this skill does NOT do\n\n- It does not write leads to your local `contacts.csv`. Lead \u2192 contact\n  promotion is a separate (future) `import-sales-nav-leads` skill, likely\n  also under `packs/sales-nav`.\n- It does not promote leads into the Powerset main set. That UI affordance\n  is on the web app today.\n- It does not run a sequence of pages on its own. Pagination is always\n  user-confirmed and goes through `get_artifact`.\n", "mcp_count": 2, "mcp_refs": ["sales_nav_resolve", "sales_nav_search"], "name": "sales-nav-search", "pack": "sales-nav", "path": "packs/sales-nav/skills/sales-nav-search/SKILL.md", "primitive_count": 1, "primitive_refs": ["resolve_set_operators"]}, {"description": "Decompose a recruiting search query, job description, or URL into the Powerpacks role-search filter schema without executing retrieval.", "display_name": "powerset:extract-search-query", "heading": "Extract Search Query", "markdown": "---\nname: extract-search-query\ndescription: Decompose a recruiting search query, job description, or URL into the Powerpacks role-search filter schema without executing retrieval.\n---\n\n# Extract Search Query\n\nUse this skill when the next step needs a schema-valid search payload before\nrunning TurboPuffer or Postgres primitives.\n\nThis skill does not retrieve candidates. It only produces the\n`expand_search_request` output that downstream primitives consume.\n\n## Inputs\n\n- natural-language recruiting query\n- optional job description text\n- optional URL content already fetched by the host\n- optional prior task state or refinement instruction\n\n## Output Contract\n\nReturn JSON shaped like:\n\n```json\n{\n  \"intent_type\": \"role_search\",\n  \"source_type\": \"query\",\n  \"normalized_query\": \"...\",\n  \"vertical\": \"people_by_role\",\n  \"role_search_filters\": {\n    \"semantic_query\": \"...\",\n    \"bm25_queries\": [],\n    \"role_tracks\": [],\n    \"role_ids\": [],\n    \"seniority_bands\": [],\n    \"cities\": [],\n    \"states\": [],\n    \"countries\": [],\n    \"education_names\": [],\n    \"company_names\": [],\n    \"company_semantic_queries\": [],\n    \"position_after_date\": null,\n    \"position_before_date\": null\n  },\n  \"notes\": []\n}\n```\n\nThe exact fields must validate against:\n\n- `powerpacks/schemas/decomposed-query.schema.json`\n- `powerpacks/schemas/role-search-filters.schema.json`\n\nOmit null or empty fields in the final payload unless they clarify intent.\n\n## Rules\n\n- Do not run retrieval, hydration, reranking, or persistence.\n- Do not invent schema fields.\n- Preserve hard constraints: role, location, seniority, currentness, education,\n  YOE, age, tenure/date windows, company names, company domains, funding,\n  headcount, investors, social thresholds, and `set_id`.\n- Use `education_names` for unresolved school names. Do not invent school IDs.\n- Use `company_names` for explicit companies. Do not invent company IDs.\n- Use `set_id` only when the user provides one or a prior task state already\n  has one. If no `set_id` is present, leave it unset; the orchestrating skill\n  will run `resolve_set_operators` to use the env/default/personal set.\n- Use `investor_names` for unresolved investors. Do not invent investor URNs.\n- Use `company_semantic_queries` for vertical/domain company intent such as\n  database companies, fintech startups, AI infrastructure, healthcare, or\n  developer tooling.\n- Always choose `company_sector_strategy` explicitly when both\n  `company_semantic_queries` and `sector_types` are present.\n- Treat tenure/date constraints as overlapping-position windows:\n  `position_after_date` means the position overlaps after that date, not merely\n  that it started after that date.\n- Treat broad graduation ranges as education filters, not position-tenure\n  filters.\n- Treat query words like \"current\" or \"currently\" as `is_current: true`.\n  Otherwise leave currentness unset unless the user clearly asks for past-only.\n- For role or company queries, include a `notes` entry that makes currentness\n  semantics explicit: current-only, all-time, or past-only. If the user's\n  wording does not make currentness clear, do not choose silently; leave a note\n  for the orchestrator to ask before retrieval. If `is_current` is set, say\n  whether it is intended to mean current at the requested company, current in\n  the requested role, or both on the same matched position row.\n- Remember that `role_search_filters.is_current` applies to a matched position\n  row. When company and role constraints are both present in one payload,\n  `is_current: true` means the same position row must satisfy currentness and\n  those company/role constraints. If the user's wording requires split\n  semantics, such as current at a company but any past role, leave a note for\n  the orchestrator to ask or plan separate filters/prefilters.\n- For recall-style tests, do not add seniority unless the query or test\n  explicitly requires it.\n\n## Semantic Query Standard\n\n`semantic_query` must be dense retrieval prose, not a bare title.\n\nGood:\n\n```json\n{\n  \"semantic_query\": \"People who build, debug, and maintain production software systems. They write application, backend, frontend, mobile, platform, infrastructure, or systems code and have hands-on responsibility for shipping software in a professional engineering environment.\",\n  \"bm25_queries\": [\"software engineer\", \"software developer\", \"SWE\"]\n}\n```\n\nBad:\n\n```json\n{ \"semantic_query\": \"software engineer\" }\n```\n\n## Title Inspection\n\nWhen role intent is broad, ambiguous, or recall-sensitive, the extraction step\nshould plan a follow-up title-inspection step before final retrieval.\n\nExamples:\n\n- `ai engineers`\n- `data science leaders`\n- `people with gtm experience`\n- `finance, data, operations, or supply chain leaders`\n\nThe output should include a string note such as:\n\n```json\n{\n  \"notes\": [\n    \"title_inspection_needed: The query names a broad role family; inspect matching indexed titles before choosing final BM25/title slices.\"\n  ]\n}\n```\n\n## Recording\n\nAfter producing the JSON, the orchestrating skill or harness should record it:\n\n```bash\npython powerpacks/packs/search/primitives/task_state/task_state.py record-step \\\n  --state \"$STATE\" \\\n  --step-id expand_search_request \\\n  --output-json '<the extraction JSON>'\n```\n\nDownstream primitives read this state. They should not re-extract the query.\n", "mcp_count": 0, "mcp_refs": [], "name": "extract-search-query", "pack": "search", "path": "packs/search/skills/extract-search-query/SKILL.md", "primitive_count": 3, "primitive_refs": ["expand_search_request", "resolve_set_operators", "task_state"]}, {"description": "Resolve company names, company descriptions, investor/funding filters, or vertical queries into canonical TurboPuffer company IDs for downstream people search.", "display_name": "powerset:search-company", "heading": "Search Company", "markdown": "---\nname: search-company\ndescription: Resolve company names, company descriptions, investor/funding filters, or vertical queries into canonical TurboPuffer company IDs for downstream people search.\n---\n\n# Search Company\n\nUse this when the user asks for company search directly, or when they want the\ncompany set behind a people search inspected first.\n\nExamples:\n\n- `/search-company database companies`\n- `/search-company series b fintech startups in california`\n- `/search-company companies backed by sequoia`\n\n## Workflow\n\n1. Decompose the request into the `role-search-filters` company fields only:\n   `company_names`, `company_semantic_queries`, `entity_types`, `sector_types`,\n   funding/headcount filters, company geography, `investor_names`, and\n   resolved `investors`. Preserve `set_id` when the user provides one.\n2. Resolve set scoping before company resolution. If the user did not provide a\n   `set_id`, run `resolve_set_operators` without `--set-id` so it inherits\n   `POWERPACKS_DEFAULT_SET_ID` / `POWERSET_DEFAULT_SET_ID`, or falls back to the\n   logged-in operator's active personal set. Copy the returned `operator_ids`\n   into the company resolver payload. Do not pass the raw set UUID as\n   `allowed_operator_ids`.\n3. If `investor_names` are present, run `resolve_investors` first and record or\n   copy the returned `investor_urns` into `investors`.\n4. Run `resolve_companies`.\n5. Present the returned company count, sample companies, set scope, and the company IDs\n   artifact/state path when available.\n6. If the user wants people at those companies, pass `company_ids` and\n   `operator_ids` into\n   `search-network`; for large company sets, use `apply_prefilters` so people\n   search batches company IDs instead of sending one giant `company_id In [...]`.\n\n## Query Guidance\n\nUse `company_semantic_queries` for vertical/domain intent, not just\n`sector_types`. Coarse sectors are useful, but the resolver needs an explicit\nsector strategy:\n\n- Use `company_sector_strategy: \"staged\"` by default for ambiguous domain\n  searches. This starts with sector-intersected semantic search and broadens if\n  the hard frontier is too small.\n- Use `company_sector_strategy: \"soft_union\"` when recall matters more than\n  precision or labels are known to be incomplete. This matches semantic results\n  OR sector-filter matches.\n- Use `company_sector_strategy: \"hard_filter\"` when the user explicitly wants\n  sector labels as a strict constraint.\n- Use `company_sector_strategy: \"semantic_only\"` when sector labels are too\n  noisy for the requested company domain.\n\nGood:\n\n```json\n{\n  \"company_semantic_queries\": [\n    \"Companies building database systems, hosted databases, data storage engines, database infrastructure, SQL or NoSQL databases, or developer platforms for managing application data.\"\n  ],\n  \"sector_types\": [\"data\"],\n  \"company_sector_strategy\": \"staged\",\n  \"company_sector_min_results\": 500\n}\n```\n\nBad:\n\n```json\n{ \"sector_types\": [\"data\"] }\n```\n\n## Commands\n\n```bash\npython powerpacks/packs/search/primitives/resolve_set_operators/resolve_set_operators.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n\n```bash\npython powerpacks/packs/search/primitives/resolve_investors/resolve_investors.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n\n```bash\npython powerpacks/packs/search/primitives/resolve_companies/resolve_companies.py \\\n  --payload-json '<json>' \\\n  --env-file .env\n```\n", "mcp_count": 1, "mcp_refs": ["resolve_companies"], "name": "search-company", "pack": "search", "path": "packs/search/skills/search-company/SKILL.md", "primitive_count": 4, "primitive_refs": ["apply_prefilters", "resolve_companies", "resolve_investors", "resolve_set_operators"]}, {"description": "Run a role-first people search from a natural-language query, job description, or URL. Use when the user wants the agent to decompose the request, choose a search strategy, retrieve candidates from TurboPuffer, review the frontier, and hydrate the best results without using expensive scoring.", "display_name": "powerset:search-network", "heading": "Search Network", "markdown": "---\nname: search-network\ndescription: Run a role-first people search from a natural-language query, job description, or URL. Use when the user wants the agent to decompose the request, choose a search strategy, retrieve candidates from TurboPuffer, review the frontier, and hydrate the best results without using expensive scoring.\n---\n\n# Search Network\n\nRun the full Powerpacks search loop from one user request such as:\n\n- `/search-network who are software engineers in sf`\n- `/search-network senior engineers at series a fintech companies`\n- `/search-network stanford engineers with 3-5 yoe in new york`\n\n## Intent\n\nGive the user one operational entrypoint that does the work end to end.\n\nThe agent should:\n\n- create a unique JSON task run before retrieval\n- orchestrate helper skills when they produce a cleaner intermediate artifact\n- decompose the request into the Powerpacks role-search schema\n- decide whether adjacent/domain search is off, confirmed, or should be asked\n  about\n- decide whether to search directly, count first, or generate slices\n- ask the user to choose `search only`, `rerank`, or requested changes before\n  executing retrieval\n- execute retrieval through TurboPuffer\n- review the candidate frontier after each step\n- hydrate the full candidate frontier through Postgres before LLM filtering\n- filter clearly bad candidates with the conservative LLM filter when enabled\n- if the user chooses `rerank` at approval, prepare sharded agentic review and\n  reduce shard outputs into one sorted review artifact\n- persist CSV/JSONL result artifacts for refinement and interoperability\n\n## Skill Composition\n\n`search-network` is the high-level orchestration skill. It may sequence other\nskills, but every handoff must be explicit and durable. Do not rely on chat\nmemory as the boundary between steps.\n\nWhen a sub-step is covered by another installed skill:\n\n- load that skill's instructions for that step\n- give it a concrete input artifact or task-state path\n- require a concrete output artifact or recorded task-state step\n- feed that artifact into the next step\n\nDefault composition:\n\n- `extract-search-query`: always use this first to produce\n  `expand_search_request` JSON\n- `search-company`: use when natural-language company criteria, investors,\n  sectors, funding, headcount, or company-domain intent must resolve into\n  canonical company IDs before people retrieval\n- `fix-people`: use only when the user explicitly asks to reconcile, merge, or\n  clean persisted person artifacts after search\n\nUseful handoff artifacts:\n\n- task state: `.powerpacks/runs/
